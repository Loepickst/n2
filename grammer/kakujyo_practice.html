<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>格助词总题库练习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+JP:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        washi: '#F9F6F0',
                        sumi: '#3E3A39',
                        enji: '#9B2C2C',
                        ukon: '#D4A017',
                        koge: '#6B4E31',
                        border: '#E8DFD5',
                        hoverBg: '#F0EBE1',
                        success: '#3F8F5B',
                        danger: '#D9544D',
                        paleGreen: '#F2FBF5',
                        paleRed: '#FFF6F5',
                        paleGold: '#FFF9EE'
                    },
                    fontFamily: {
                        serif: ['"Noto Serif SC"', '"Noto Serif JP"', 'serif'],
                        sans: ['"Noto Sans SC"', '"Noto Sans JP"', 'sans-serif']
                    },
                    boxShadow: {
                        soft: '0 10px 30px rgba(62, 58, 57, 0.06)',
                        paper: '0 6px 18px rgba(62, 58, 57, 0.05)'
                    }
                }
            }
        };
    </script>
    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.82), transparent 24%),
                linear-gradient(180deg, #fbf8f3 0%, #f3ede4 100%);
            color: #3E3A39;
        }

        /* ビュー切り替えアニメーション */
        .view-section {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .view-section.active {
            display: block;
        }

        .fade-enter {
            animation: fadeIn 0.32s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* カードのホバー効果 */
        .mode-card {
            transition: all 0.25s ease;
        }

        .mode-card:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(155, 44, 44, 0.08);
            border-color: rgba(155, 44, 44, 0.3);
        }
        
        .mode-card:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        /* フィルターコントロール */
        .select-field {
            width: 100%;
            border: 1px solid #E8DFD5;
            border-radius: 14px;
            background: rgba(255,255,255,0.92);
            padding: 0.8rem 0.95rem;
            color: #3E3A39;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .select-field:focus {
            border-color: #9B2C2C;
            box-shadow: 0 0 0 3px rgba(155, 44, 44, 0.08);
        }

        .chip-btn {
            border: 1px solid #E8DFD5;
            background: rgba(255,255,255,0.95);
            color: #6B4E31;
            border-radius: 999px;
            padding: 0.45rem 0.8rem;
            font-size: 0.86rem;
            line-height: 1;
            transition: all 0.18s ease;
            cursor: pointer;
        }

        .chip-btn:hover {
            border-color: #9B2C2C;
            color: #9B2C2C;
        }

        .chip-btn.active {
            background: #9B2C2C;
            color: #ffffff;
            border-color: #9B2C2C;
            box-shadow: 0 6px 14px rgba(155, 44, 44, 0.18);
        }

        .drawer-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border-radius: 18px;
            border: 1px solid #E8DFD5;
            background: rgba(255,255,255,0.92);
            padding: 0.95rem 1rem;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .drawer-toggle:hover {
            border-color: rgba(155, 44, 44, 0.28);
            background: rgba(255,255,255,0.98);
        }

        .drawer-toggle-icon {
            transition: transform 0.2s ease;
        }

        .drawer-toggle[aria-expanded="true"] .drawer-toggle-icon {
            transform: rotate(180deg);
        }

        .practice-shell {
            background: #f9f8f6;
            border: 1px solid #e5e5e0;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(44, 44, 42, 0.06);
        }

        .practice-topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.9rem;
            border-bottom: 1px solid #d4d4d0;
        }

        .practice-stats {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.65rem;
        }

        .practice-stat {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.65rem;
            border-radius: 4px;
            border: 1px solid #e5e5e0;
            background: #ffffff;
            font-size: 0.86rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #2c2c2a;
        }

        .practice-stat.correct {
            color: #2e7d32;
            border-color: #d7ead9;
            background: #f7fcf7;
        }

        .practice-stat.wrong {
            color: #c4463d;
            border-color: #f0d7d4;
            background: #fff8f7;
        }

        .practice-stat.hp {
            color: #8a3324;
            border-color: #ead9d4;
            background: #fffdfb;
        }

        .practice-hint-controls {
            display: inline-flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.55rem;
        }

        .practice-hint-trigger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 0.45rem 0.85rem;
            border-radius: 4px;
            border: 1px solid #d4d4d0;
            background: #ffffff;
            color: #2c2c2a;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .practice-hint-trigger:hover:not(:disabled) {
            border-color: #a0a09c;
            box-shadow: 0 2px 8px rgba(44, 44, 42, 0.08);
            transform: translateY(-1px);
        }

        .practice-hint-trigger:disabled {
            opacity: 0.58;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .practice-hint-status {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #777772;
            white-space: nowrap;
        }

        .practice-exit-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            min-height: 34px;
            padding: 0.45rem 0.85rem;
            border-radius: 4px;
            border: 1px solid #e5e5e0;
            background: #ffffff;
            color: #555552;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            transition: border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
        }

        .practice-exit-btn:hover {
            color: #2c2c2a;
            border-color: #a0a09c;
            box-shadow: 0 2px 8px rgba(44, 44, 42, 0.07);
        }

        /* 入力＆オプション */
        .question-surface {
            background: #f9f8f6;
            border: 1px solid #e5e5e0;
            border-radius: 4px;
            padding: 1.3rem 1.5rem;
            box-shadow: 0 2px 6px rgba(44, 44, 42, 0.03);
        }

        .practice-question-text {
            display: block;
            margin: 0;
            text-align: left;
            font-family: "Noto Serif SC", "Noto Serif JP", serif;
            font-size: 1.1rem;
            line-height: 2.05;
            letter-spacing: 0.01em;
            color: #2c2c2a;
        }

        .practice-translation-note {
            margin: 0;
            padding-left: 0.75rem;
            border-left: 2px solid #d4d4d0;
            text-align: left;
            font-size: 0.84rem;
            line-height: 1.85;
            color: #555552;
        }

        .question-blank {
            display: inline-block;
            min-width: 1ch;
            margin: 0 0.08em;
            color: #8a3324;
            font-weight: 700;
            line-height: 1;
            transform: translateY(-1px);
        }

        .blank-input {
            width: 2.1em;
            text-align: center;
            border: none;
            background-color: transparent;
            font: inherit;
            color: #8a3324;
            font-weight: 700;
            outline: none;
            margin: 0 0.08em;
            padding: 0;
            caret-color: #8a3324;
        }

        .blank-input::placeholder {
            color: #8a3324;
            opacity: 0.92;
        }

        .blank-input:focus {
            color: #2c2c2a;
        }

        .blank-input.is-empty,
        .blank-input.is-empty::placeholder {
            color: #D9544D;
            opacity: 1;
        }

        .blank-input:disabled {
            opacity: 1;
        }

        .practice-options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            width: 100%;
            min-height: 56px;
            padding: 0.8rem 1rem;
            border-radius: 6px;
            border: 1px solid #e5e5e0;
            background: #ffffff;
            color: #2c2c2a;
            text-align: left;
            box-shadow: 0 1px 3px rgba(44, 44, 42, 0.04);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(44, 44, 42, 0.08);
            border-color: #a0a09c;
            color: #2c2c2a;
        }

        .option-btn.correct {
            background: #f3faf4;
            color: #245e38;
            border-color: #9ac4a8;
        }

        .option-btn.wrong {
            background: #fff4f3;
            color: #8c2e29;
            border-color: #e1a3a0;
        }

        .option-index {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.7rem;
            height: 1.7rem;
            border-radius: 4px;
            border: 1px solid #d4d4d0;
            background: #f9f8f6;
            color: #777772;
            font-size: 0.78rem;
            font-weight: 700;
            line-height: 1;
        }

        .option-label {
            font-family: "Noto Serif SC", "Noto Serif JP", serif;
            font-size: 1rem;
            line-height: 1.7;
            color: inherit;
        }

        .progress-bar {
            transition: width 0.28s ease;
        }

        .meta-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            border-radius: 999px;
            padding: 0.45rem 0.85rem;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .meta-pill.source {
            background: rgba(155, 44, 44, 0.09);
            color: #9B2C2C;
            border-color: rgba(155, 44, 44, 0.14);
        }

        .meta-pill.focus {
            background: rgba(212, 160, 23, 0.14);
            color: #7a5800;
            border-color: rgba(212, 160, 23, 0.2);
        }

        .meta-pill.kind {
            background: rgba(62, 58, 57, 0.07);
            color: #3E3A39;
            border-color: rgba(62, 58, 57, 0.1);
        }

        .word-bank-panel {
            border: 1px solid #e5e5e0;
            border-radius: 4px;
            background: #f9f8f6;
            padding: 1rem 1.15rem;
        }

        .word-bank-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
        }

        .bank-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            border: 1px solid #e5e5e0;
            background: #ffffff;
            border-radius: 6px;
            padding: 0.7rem 1rem;
            font-size: 0.96rem;
            font-weight: 700;
            color: #2c2c2a;
            box-shadow: 0 1px 3px rgba(44, 44, 42, 0.04);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .bank-chip:hover {
            border-color: #a0a09c;
            color: #2c2c2a;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(44, 44, 42, 0.07);
        }

        @media (min-width: 640px) {
            .practice-options-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 768px) {
            .word-bank-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .practice-shell {
                border-radius: 8px;
            }

            .practice-topbar {
                flex-direction: column;
                align-items: stretch;
                gap: 0.8rem;
                margin-bottom: 0.85rem;
                padding-bottom: 0.75rem;
            }

            .practice-stats {
                gap: 0.45rem 0.5rem;
            }

            .practice-stat {
                padding: 0.32rem 0.55rem;
                font-size: 0.78rem;
            }

            .practice-hint-trigger {
                min-height: 32px;
                padding: 0.4rem 0.7rem;
                font-size: 0.76rem;
            }

            .practice-hint-status {
                font-size: 0.72rem;
            }

            .question-surface {
                padding: 1rem 0.95rem;
            }

            .practice-question-text {
                font-size: 1rem;
                line-height: 1.95;
            }

            .practice-translation-note {
                font-size: 0.8rem;
                line-height: 1.75;
            }

            .option-btn {
                min-height: 50px;
                padding: 0.72rem 0.85rem;
            }

            .option-index {
                width: 1.55rem;
                height: 1.55rem;
                font-size: 0.74rem;
            }

            .option-label {
                font-size: 0.98rem;
            }

            .word-bank-panel {
                padding: 0.9rem;
            }

            .bank-chip {
                min-height: 42px;
                padding: 0.65rem 0.8rem;
                font-size: 0.92rem;
            }
        }

        /* アニメーション関連 */
        @keyframes floatUpFade {
            0% { opacity: 1; transform: translateY(0) scale(1); color: #D9544D; }
            100% { opacity: 0; transform: translateY(-30px) scale(1.25); color: #D9544D; }
        }

        .damage-float {
            position: absolute;
            top: -16px;
            right: -26px;
            font-size: 1.3rem;
            font-weight: 900;
            animation: floatUpFade 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 50;
            text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff, 1px -1px 0px #fff, -1px 1px 0px #fff;
        }

        @keyframes hpShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px) rotate(-3deg); }
            40% { transform: translateX(4px) rotate(3deg); }
            60% { transform: translateX(-4px) rotate(-3deg); }
            80% { transform: translateX(4px) rotate(3deg); }
        }

        .hp-shake-anim {
            animation: hpShake 0.4s ease-in-out;
            color: #D9544D !important;
        }
    </style>
    <link rel="stylesheet" href="../shared/site-fonts.css">
    
    <!-- データソース -->
    <script src="kakujyo-question-bank.js"></script>
    <script src="../shared/back-navigation.js"></script>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col items-center">
    
    <!-- 共通ヘッダー -->
    <div class="w-full border-b border-border sticky top-0 z-50 bg-washi/95 backdrop-blur-md">
        <div class="w-full max-w-5xl mx-auto px-6 py-4 flex items-center justify-start gap-4">
            <a id="back-link" href="kakujyo.html" class="text-sumi opacity-70 hover:opacity-100 hover:text-enji transition-all flex items-center gap-2 font-bold text-sm md:text-base no-underline">
                <i class="fas fa-arrow-left"></i> 退出题库
            </a>
            <div id="bank-headline" class="hidden"></div>
        </div>
    </div>

    <main class="w-full max-w-5xl mx-auto px-6 py-10 flex-grow relative" id="app-container">
        
        <!-- ビュー1：ホーム (题型选择) -->
        <div id="view-home" class="view-section active max-w-4xl mx-auto">
            <div class="text-center mb-12">
                <h1 class="font-serif text-4xl md:text-5xl font-bold text-sumi tracking-wide mb-4">
                    <span class="text-enji">格助词</span>练习
                </h1>
                <p class="text-koge text-base font-serif">选择题型，可通过助词筛选来集中练习自己理解薄弱的助词。</p>
            </div>

            <div class="grid md:grid-cols-2 gap-8 w-full">
                <!-- MCQ Card -->
                <button data-action="go-setup" data-type="mcq" class="mode-card text-left bg-white border border-border rounded-3xl p-8 shadow-paper relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-2 h-full bg-ukon group-hover:bg-enji transition-colors"></div>
                    <div class="flex justify-between items-start mb-6">
                        <div class="p-4 bg-paleGold rounded-2xl text-ukon group-hover:text-enji transition-colors">
                            <i class="fas fa-list-ul text-3xl"></i>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-koge tracking-widest uppercase mb-1">Total</p>
                            <p class="font-serif text-2xl text-sumi font-bold" id="home-mcq-total">0</p>
                        </div>
                    </div>
                    <h3 class="text-2xl font-serif text-sumi font-bold mb-3">选择题突破</h3>
                    <p class="text-sm text-koge leading-relaxed mb-6">从选项中选择符合语句使用的助词。</p>
                    <div class="flex items-center gap-3 text-sm text-enji font-bold">
                        <i class="fas fa-book-dead"></i> 待复习错题：<span id="home-mcq-wrong">0</span>
                    </div>
                </button>

                <!-- Fill Card -->
                <button data-action="go-setup" data-type="fill" class="mode-card text-left bg-white border border-border rounded-3xl p-8 shadow-paper relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-2 h-full bg-enji group-hover:bg-sumi transition-colors"></div>
                    <div class="flex justify-between items-start mb-6">
                        <div class="p-4 bg-paleRed rounded-2xl text-enji group-hover:text-sumi transition-colors">
                            <i class="fas fa-pen-nib text-3xl"></i>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-koge tracking-widest uppercase mb-1">Total</p>
                            <p class="font-serif text-2xl text-sumi font-bold" id="home-fill-total">0</p>
                        </div>
                    </div>
                    <h3 class="text-2xl font-serif text-sumi font-bold mb-3">填空题试炼</h3>
                    <p class="text-sm text-koge leading-relaxed mb-6">通过自己的判断来思考符合语句使用的助词。</p>
                    <div class="flex items-center gap-3 text-sm text-enji font-bold">
                        <i class="fas fa-book-dead"></i> 待复习错题：<span id="home-fill-wrong">0</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- ビュー2：セットアップ (筛选与模式配置) -->
        <div id="view-setup" class="view-section max-w-4xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8 border-b border-border pb-6">
                <div>
                    <button data-action="go-home" class="text-koge hover:text-enji transition-colors font-bold text-sm flex items-center gap-2 mb-3">
                        <i class="fas fa-arrow-left"></i> 返回大厅
                    </button>
                    <h2 class="text-3xl font-serif text-sumi font-bold" id="setup-title">选择题配置</h2>
                </div>
            </div>

            <!-- 过滤器 Forge -->
            <div class="bg-white/85 rounded-3xl border border-border p-6 md:p-8 shadow-paper mb-8">
                <button id="filter-drawer-toggle" class="drawer-toggle" type="button" aria-expanded="false">
                    <span class="text-sm font-bold tracking-widest text-koge uppercase"><i class="fas fa-filter mr-2"></i>Filter Forge</span>
                    <span class="text-xs font-bold text-enji flex items-center gap-2">
                        筛选范围
                        <i class="fas fa-chevron-down drawer-toggle-icon"></i>
                    </span>
                </button>

                <div id="filter-drawer-body" class="hidden mt-5 border-t border-border pt-5">
                    <div class="flex items-center justify-between gap-4 mb-4">
                        <p class="text-sm font-bold text-sumi">考察助词选择</p>
                        <button id="filter-reset" class="text-xs font-bold text-enji hover:text-sumi transition-colors">重置条件</button>
                    </div>
                    <div id="particle-filter-group" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
            <p id="setup-notice" class="hidden mt-4 rounded-xl border border-red-200 bg-paleRed px-5 py-3 text-sm text-red-700 font-bold"></p>

            <!-- モード選択 -->
            <h3 class="text-xl font-serif text-sumi font-bold mb-4 px-2">选择练习模式</h3>
            <div class="grid md:grid-cols-3 gap-5 w-full">
                <button data-start="normal" class="mode-card text-left p-6 bg-washi border border-border rounded-2xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-ukon"></div>
                    <h4 class="text-lg font-serif text-sumi font-bold mb-2"><i class="fas fa-leaf text-ukon mr-2"></i>普通模式</h4>
                    <p class="text-xs text-koge leading-relaxed">随机抽题 (单轮最多10题)。</p>
                </button>
                <button data-start="challenge" class="mode-card text-left p-6 bg-white border border-border rounded-2xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-enji"></div>
                    <h4 class="text-lg font-serif text-sumi font-bold mb-2"><i class="fas fa-fire text-enji mr-2"></i>挑战模式</h4>
                    <p class="text-xs text-koge leading-relaxed">测试反应能力，类似闯关性质。</p>
                </button>
                <button data-start="wrong" id="btn-start-wrong" class="mode-card text-left p-6 bg-sumi text-washi border border-sumi rounded-2xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-washi"></div>
                    <h4 class="text-lg font-serif font-bold mb-2"><i class="fas fa-book-dead text-washi/70 mr-2"></i>错题清扫</h4>
                    <p class="text-xs text-washi/70 leading-relaxed">仅针对当前范围内的错题进行集中复盘清理。</p>
                </button>
            </div>
        </div>

        <!-- ビュー3：プラクティス (答题界面) -->
        <div id="view-practice" class="view-section max-w-4xl mx-auto">
            <div class="practice-shell p-5 md:p-8 min-h-[520px] flex flex-col justify-between">
                
                <!-- ヘッダーとプログレス -->
                <div>
                    <div id="practice-topbar" class="practice-topbar"></div>
                    <div class="mb-5">
                        <div class="w-full h-1.5 bg-[#ebe7df] rounded-sm overflow-hidden">
                            <div id="practice-progress" class="progress-bar h-full bg-enji rounded-sm" style="width:0%"></div>
                        </div>
                    </div>

                    <!-- 質問エリア -->
                    <div id="practice-question-area" class="question-surface mb-4 fade-enter">
                        <p id="practice-text" class="practice-question-text"></p>
                    </div>
                    
                    <div id="practice-hint-area" class="hidden mb-4">
                        <p id="practice-translation" class="practice-translation-note"></p>
                    </div>

                    <!-- オプション/ワードバンク (動的切り替え) -->
                    <div id="practice-interactive-area" class="w-full fade-enter"></div>
                </div>

                <!-- フィードバック -->
                <div id="practice-feedback" class="hidden mb-5"></div>

                <!-- アクションボタン -->
                <div class="text-center mt-auto flex justify-center gap-3 flex-wrap pt-4 border-t border-[#e5e5e0]">
                    <button id="fill-check-btn" class="hidden px-6 py-2.5 bg-sumi text-washi hover:bg-black transition-colors rounded-md font-serif text-base shadow-sm">
                        判定 <i class="fas fa-gavel ml-2"></i>
                    </button>
                    <button id="practice-next-btn" class="hidden px-6 py-2.5 bg-sumi text-washi hover:bg-black transition-colors rounded-md font-serif text-base shadow-sm">
                        下一题 <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                    <button id="practice-back-btn" class="hidden px-6 py-2.5 bg-white border border-[#e5e5e0] text-sumi hover:bg-[#f4f1ea] transition-colors rounded-md font-serif text-base shadow-sm">
                        返回配置
                    </button>
                </div>
            </div>
        </div>

    </main>

    <footer class="w-full py-8 text-center text-koge text-sm font-serif border-t border-border mt-auto">
        <p>格助词练习</p>
    </footer>

    <script>
        (() => {
            // もし外部スクリプト(kakujyo-question-bank.js)が存在しない場合のためのモックデータ
            const FALLBACK_BANK = {
                meta: {
                    sourceDays: ['1', '2'],
                    particleFilters: ['は', 'が', 'を', 'に', 'で'],
                    questionCount: 4,
                    multiAnswerCount: 0,
                    multiBlankCount: 0
                },
                questions: [
                    {
                        id: 'mock-mcq-1',
                        type: 'mcq',
                        sourceDay: '1',
                        particles: ['に'],
                        sentence: '学校＿行きます。',
                        blankCount: 1,
                        options: ['に', 'で', 'を', 'が'],
                        acceptedAnswers: ['に'],
                        answerRationales: { 'に': '表示移动的目的地。' },
                        focusLabel: '目的地'
                    },
                    {
                        id: 'mock-mcq-2',
                        type: 'mcq',
                        sourceDay: '2',
                        particles: ['で'],
                        sentence: '図書館＿本を読みます。',
                        blankCount: 1,
                        options: ['に', 'で', 'を', 'は'],
                        acceptedAnswers: ['で'],
                        answerRationales: { 'で': '表示动作发生的场所。' },
                        focusLabel: '场所'
                    },
                    {
                        id: 'mock-fill-1',
                        type: 'fill',
                        sourceDay: '1',
                        particles: ['を'],
                        sentence: 'ご飯＿食べます。',
                        blankCount: 1,
                        wordBank: ['が', 'を', 'に', 'で'],
                        acceptedAnswers: ['を'],
                        answerRationales: { 'を': '表示动作的直接对象。' },
                        focusLabel: '宾语'
                    },
                    {
                        id: 'mock-fill-2',
                        type: 'fill',
                        sourceDay: '2',
                        particles: ['が'],
                        sentence: '雨＿降っています。',
                        blankCount: 1,
                        wordBank: ['が', 'を', 'は', 'で'],
                        acceptedAnswers: ['が'],
                        answerRationales: { 'が': '表示自然现象的主语。' },
                        focusLabel: '主语'
                    }
                ]
            };

            const BANK = window.kakujyoQuestionBank || FALLBACK_BANK;
            const isMockData = !window.kakujyoQuestionBank;
            const STORAGE_KEY = 'kakujyo-wrong-bank-v1';
            const MAX_HP = 20;
            const DAMAGE = 4;
            const CHALLENGE_HINT_LIMIT = 3;
            const EMPTY_BANK = { mcq: [], fill: [] };

            // グローバル状態管理
            let wrongBank = { ...EMPTY_BANK };
            let currentView = 'home'; // 'home', 'setup', 'practice'
            let currentType = 'mcq';  // 'mcq' または 'fill'
            let currentQ = null;
            let session = createIdleSession('mcq');

            const questionMap = new Map((BANK.questions || []).map((question) => [question.id, question]));
            const $ = (id) => document.getElementById(id);

            document.addEventListener('DOMContentLoaded', init);

            function init() {
                if (!BANK.questions || BANK.questions.length === 0) {
                    $('bank-headline').textContent = '题库加载失败 (无数据)';
                    console.warn('kakujyoQuestionBank is missing or empty. Please ensure the data file is loaded properly.');
                    return;
                }

                wrongBank = loadWrongBank();
                setupBackLink();
                buildFilterControls();
                setFilterDrawer(false);
                bindEvents();
                updateBankHeadline();
                
                // ホーム画面の初期レンダリング
                renderHomeStats();
                switchView('home');
                runSelfTests();
            }

            function createIdleSession(type) {
                return {
                    type,
                    mode: 'normal',
                    correct: 0,
                    wrong: 0,
                    answered: 0,
                    hp: MAX_HP,
                    total: 0,
                    queue: [],
                    hintUsesRemaining: CHALLENGE_HINT_LIMIT,
                    hintShownForCurrent: false
                };
            }

            function setupBackLink() {
                window.bindStatefulBack({
                    selector: '#back-link',
                    fallback: 'kakujyo.html'
                });
            }

            function setFilterDrawer(open) {
                $('filter-drawer-body').classList.toggle('hidden', !open);
                $('filter-drawer-toggle').setAttribute('aria-expanded', open ? 'true' : 'false');
            }

            function isSingleChoiceMcq(question) {
                return question.type === 'mcq'
                    && Number(question.blankCount) === 1
                    && Array.isArray(question.acceptedAnswers)
                    && question.acceptedAnswers.length === 1;
            }

            function isEligibleQuestionForType(question, type) {
                if (type === 'mcq') return isSingleChoiceMcq(question);
                return question.type === 'fill';
            }

            function buildFilterControls() {
                const particleValues = ['all', ...((BANK.meta.particleFilters) || [])];
                $('particle-filter-group').innerHTML = particleValues.map((value) => {
                    const label = value === 'all' ? '全部' : value;
                    const activeClass = value === 'all' ? ' active' : '';
                    return `<button type="button" class="chip-btn${activeClass}" data-particle-value="${escapeHtml(value)}">${escapeHtml(label)}</button>`;
                }).join('');
            }

            function bindEvents() {
                // ビュー切り替えイベント
                document.querySelectorAll('[data-action="go-setup"]').forEach(btn => {
                    btn.addEventListener('click', () => goToSetup(btn.dataset.type));
                });
                
                document.querySelectorAll('[data-action="go-home"]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        renderHomeStats();
                        switchView('home');
                    });
                });

                // クイズ開始イベント
                document.querySelectorAll('[data-start]').forEach((button) => {
                    button.addEventListener('click', () => {
                        startQuiz(currentType, button.dataset.start);
                    });
                });

                // プラクティス画面のアクション
                $('practice-next-btn').addEventListener('click', nextQuestion);
                $('fill-check-btn').addEventListener('click', checkFill);
                $('practice-back-btn').addEventListener('click', () => goToSetup(currentType));

                // フィルターイベント
                $('filter-drawer-toggle').addEventListener('click', () => {
                    const isOpen = $('filter-drawer-toggle').getAttribute('aria-expanded') === 'true';
                    setFilterDrawer(!isOpen);
                });
                $('filter-reset').addEventListener('click', resetFilters);
                $('particle-filter-group').addEventListener('click', (event) => {
                    const button = event.target.closest('[data-particle-value]');
                    if (!button) return;

                    [...$('particle-filter-group').querySelectorAll('[data-particle-value]')].forEach((el) => {
                        el.classList.remove('active');
                    });
                    button.classList.add('active');
                    updateSetupStats();
                });
            }

            // ビューの切り替え
            function switchView(viewId) {
                currentView = viewId;
                document.querySelectorAll('.view-section').forEach(el => {
                    el.classList.remove('active');
                });
                $(`view-${viewId}`).classList.add('active');
                window.scrollTo(0, 0);
            }

            // ホーム統計の更新
            function renderHomeStats() {
                const mcqTotal = BANK.questions.filter((q) => isSingleChoiceMcq(q)).length;
                const fillTotal = BANK.questions.filter(q => q.type === 'fill').length;
                
                $('home-mcq-total').innerText = mcqTotal;
                $('home-fill-total').innerText = fillTotal;
                $('home-mcq-wrong').innerText = (wrongBank.mcq || []).length;
                $('home-fill-wrong').innerText = (wrongBank.fill || []).length;
            }

            // セットアップビューへ移動
            function goToSetup(type) {
                currentType = type;
                $('setup-title').innerText = type === 'mcq' ? '选择题配置' : '填空题配置';
                
                resetFilters();
                setFilterDrawer(false);
                switchView('setup');
            }

            // フィルター状態の取得
            function getFilterState() {
                const activeParticle = $('particle-filter-group').querySelector('.active');
                return {
                    particle: activeParticle ? activeParticle.dataset.particleValue : 'all'
                };
            }

            // フィルターのリセット
            function resetFilters(triggerUpdate = true) {
                [...$('particle-filter-group').querySelectorAll('[data-particle-value]')].forEach((button) => {
                    button.classList.toggle('active', button.dataset.particleValue === 'all');
                });
                if (triggerUpdate) updateSetupStats();
            }

            // セットアップ画面の統計＆UI更新
            function updateSetupStats() {
                hideNotice();
                
                const poolWrong = getFilteredPool(currentType, { wrongOnly: true });

                // 錯語ボタンの有効/無効化
                $('btn-start-wrong').disabled = poolWrong.length === 0;
            }

            function matchesFilters(question) {
                const filterState = getFilterState();

                if (filterState.particle !== 'all' && !question.particles.includes(filterState.particle)) return false;

                return true;
            }

            function getFilteredPool(type, options = {}) {
                const wrongOnly = Boolean(options.wrongOnly);
                const wrongSet = new Set((wrongBank[type] || []));

                return BANK.questions.filter((question) => {
                    if (!isEligibleQuestionForType(question, type)) return false;
                    if (!matchesFilters(question)) return false;
                    if (wrongOnly && !wrongSet.has(question.id)) return false;
                    return true;
                });
            }

            function updateBankHeadline() {
                $('bank-headline').textContent = isMockData ? '使用模拟数据' : '';
            }

            function showNotice(message) {
                const notice = $('setup-notice');
                notice.textContent = message;
                notice.classList.remove('hidden');
            }

            function hideNotice() {
                $('setup-notice').classList.add('hidden');
            }

            // クイズセッションの開始
            function startQuiz(type, mode) {
                hideNotice();

                const basePool = mode === 'wrong'
                    ? getFilteredPool(type, { wrongOnly: true })
                    : getFilteredPool(type);

                if (basePool.length === 0) {
                    showNotice(mode === 'wrong'
                        ? '当前筛选下没有可复盘的错题。'
                        : '当前筛选下没有可练题目，请调整筛选后再开练。');
                    return;
                }

                const shuffled = shuffle(basePool);
                const queue = mode === 'wrong'
                    ? shuffled
                    : shuffled.slice(0, Math.min(shuffled.length, 10));

                session = {
                    type,
                    mode,
                    correct: 0,
                    wrong: 0,
                    answered: 0,
                    hp: MAX_HP,
                    total: queue.length,
                    queue,
                    hintUsesRemaining: CHALLENGE_HINT_LIMIT,
                    hintShownForCurrent: false
                };
                currentQ = null;

                switchView('practice');
                resetPracticeShell();
                nextQuestion();
            }

            function resetPracticeShell() {
                $('practice-feedback').classList.add('hidden');
                $('practice-next-btn').classList.add('hidden');
                $('practice-back-btn').classList.add('hidden');
                $('fill-check-btn').classList.add('hidden');
                $('practice-interactive-area').innerHTML = '';
                resetHintArea();
            }

            function nextQuestion() {
                resetPracticeShell();

                if (session.queue.length === 0) {
                    currentQ = null;
                    updateTopbar(false);
                    if (session.mode === 'wrong') {
                        showWrongBankComplete();
                    } else {
                        showSessionComplete();
                    }
                    return;
                }

                currentQ = session.queue.shift();
                session.hintShownForCurrent = false;
                
                if (session.type === 'fill') {
                    $('fill-check-btn').classList.remove('hidden');
                }

                updateTopbar(false);
                updateProgress();

                if (session.type === 'mcq') {
                    renderMCQ();
                } else {
                    renderFill();
                }
            }

            function updateTopbar(tookDamage) {
                const topbar = $('practice-topbar');
                let statsHtml = '';

                if (session.mode === 'challenge') {
                    const hpClass = session.hp <= 8 ? 'text-red-600 animate-pulse' : '';
                    const damageHtml = tookDamage ? `<span class="damage-float">-${DAMAGE}</span>` : '';
                    const shakeClass = tookDamage ? 'hp-shake-anim' : '';

                    statsHtml = `
                        <span class="practice-stat correct"><i class="fas fa-check"></i>${session.correct}</span>
                        <span class="practice-stat wrong"><i class="fas fa-times"></i>${session.wrong}</span>
                        <span class="practice-stat hp relative ${hpClass} ${shakeClass} transition-colors">
                                ${damageHtml}
                                <i class="fas fa-heart"></i>${session.hp}
                        </span>
                    `;
                } else {
                    statsHtml = `
                        <span class="practice-stat correct"><i class="fas fa-check"></i>${session.correct}</span>
                        <span class="practice-stat wrong"><i class="fas fa-times"></i>${session.wrong}</span>
                    `;
                }

                const exitHtml = `
                    <button data-exit title="结束练习" class="practice-exit-btn">
                        <i class="fas fa-sign-out-alt mr-1"></i>结束
                    </button>
                `;

                const hintControlsHtml = buildHintControlsHtml();
                topbar.innerHTML = `
                    <div class="practice-stats">
                        ${statsHtml}
                        ${hintControlsHtml}
                    </div>
                    <div class="flex items-center gap-3">${exitHtml}</div>
                `;

                topbar.querySelector('[data-exit]').addEventListener('click', () => goToSetup(session.type));
                const hintBtn = topbar.querySelector('#practice-hint-btn');
                if (hintBtn) {
                    hintBtn.addEventListener('click', revealTranslationHint);
                }
            }

            function updateProgress() {
                const progressEl = $('practice-progress');
                if (!session.total) {
                    progressEl.style.width = '0%';
                    return;
                }

                let percent = 0;
                if (session.mode === 'wrong') {
                    const remaining = session.queue.length + (currentQ ? 1 : 0);
                    percent = ((session.total - remaining) / session.total) * 100;
                } else {
                    percent = (session.answered / session.total) * 100;
                }

                progressEl.style.width = `${Math.max(0, Math.min(percent, 100))}%`;
            }

            function renderSentenceWithBlanks(sentence, placeholderHtml) {
                return escapeHtml(sentence).replace(/＿/g, placeholderHtml);
            }

            function getHintUiState() {
                const hasTranslation = Boolean(currentQ && currentQ.translation);
                const noHintsLeft = session.mode === 'challenge' && session.hintUsesRemaining <= 0;

                return {
                    hasTranslation,
                    shown: Boolean(session.hintShownForCurrent),
                    disabled: !hasTranslation || Boolean(session.hintShownForCurrent) || noHintsLeft,
                    label: !hasTranslation
                        ? '无中文提示'
                        : session.hintShownForCurrent
                            ? '中文已显示'
                            : noHintsLeft
                                ? '提示已用完'
                                : '显示中文提示',
                    status: session.mode === 'challenge'
                        ? `剩余 ${session.hintUsesRemaining} 次`
                        : '不限次数'
                };
            }

            function buildHintControlsHtml() {
                const hintState = getHintUiState();
                if (!hintState.hasTranslation) return '';

                return `
                    <div class="practice-hint-controls">
                        <button id="practice-hint-btn" type="button" class="practice-hint-trigger" ${hintState.disabled ? 'disabled' : ''}>
                            ${hintState.label}
                        </button>
                        <span id="practice-hint-status" class="practice-hint-status">${hintState.status}</span>
                    </div>
                `;
            }

            function resetHintArea() {
                $('practice-hint-area').classList.add('hidden');
                $('practice-translation').textContent = '';
            }

            function renderHintControls() {
                const hintArea = $('practice-hint-area');
                const translationEl = $('practice-translation');
                const hintState = getHintUiState();

                hintArea.classList.toggle('hidden', !hintState.shown || !hintState.hasTranslation);
                translationEl.textContent = hintState.shown && hintState.hasTranslation
                    ? `中文提示：${currentQ.translation}`
                    : '';
            }

            function revealTranslationHint() {
                if (!currentQ || !currentQ.translation || session.hintShownForCurrent) return;
                if (session.mode === 'challenge' && session.hintUsesRemaining <= 0) return;

                if (session.mode === 'challenge') {
                    session.hintUsesRemaining -= 1;
                }

                session.hintShownForCurrent = true;
                updateTopbar(false);
                renderHintControls();
            }

            // MCQのレンダリング
            function renderMCQ() {
                $('practice-text').innerHTML = renderSentenceWithBlanks(
                    currentQ.sentence,
                    "<span class='question-blank' aria-hidden='true'>_</span>"
                );
                renderHintControls();

                const container = $('practice-interactive-area');
                container.innerHTML = '<div id="mcq-options" class="practice-options-grid w-full fade-enter"></div>';
                const optionsContainer = $('mcq-options');

                shuffle([...currentQ.options]).forEach((optionText, index) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.dataset.answer = optionText;
                    button.className = 'option-btn';
                    button.innerHTML = `
                        <span class="option-index">${index + 1}</span>
                        <span class="option-label">${escapeHtml(optionText)}</span>
                    `;
                    button.addEventListener('click', () => {
                        handleResult(currentQ.acceptedAnswers.includes(optionText), optionText, button);
                    });
                    optionsContainer.appendChild(button);
                });

                animateIn('practice-question-area');
            }

            // Fillのレンダリング
            function renderFill() {
                const inputHtml = '<input type="text" id="fill-input" class="blank-input" autocomplete="off" maxlength="2" placeholder="_" />';
                $('practice-text').innerHTML = renderSentenceWithBlanks(currentQ.sentence, inputHtml);
                renderHintControls();

                const container = $('practice-interactive-area');
                container.innerHTML = '<div id="fill-word-bank" class="word-bank-panel fade-enter"></div>';

                const inputEl = $('fill-input');
                setTimeout(() => inputEl.focus(), 80);
                inputEl.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' && !$('fill-check-btn').classList.contains('hidden')) {
                        checkFill();
                    }
                });

                renderWordBank(currentQ);
                animateIn('practice-question-area');
            }

            function renderWordBank(question) {
                const container = $('fill-word-bank');
                container.innerHTML = `
                    <p class="text-xs uppercase tracking-[0.16em] text-koge/70 font-bold mb-3">Word Bank</p>
                    <div class="word-bank-grid" id="fill-word-bank-items"></div>
                `;

                const list = container.querySelector('#fill-word-bank-items');
                question.wordBank.forEach((item) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'bank-chip';
                    button.textContent = item;
                    button.addEventListener('click', () => {
                        const input = $('fill-input');
                        if (!input || input.disabled) return;
                        input.value = item;
                        input.focus();
                    });
                    list.appendChild(button);
                });
            }

            function checkFill() {
                const inputEl = $('fill-input');
                const userAnswer = normalizeAnswer(inputEl.value);

                if (!userAnswer) {
                    inputEl.classList.add('is-empty');
                    setTimeout(() => { inputEl.classList.remove('is-empty'); }, 400);
                    return;
                }

                inputEl.disabled = true;
                $('fill-check-btn').classList.add('hidden');
                handleResult(currentQ.acceptedAnswers.includes(userAnswer), userAnswer, inputEl);
            }

            // 結果の処理
            function handleResult(isCorrect, selectedAnswer, targetEl) {
                const feedback = $('practice-feedback');
                feedback.classList.remove('hidden');
                let tookDamage = false;

                if (session.type === 'mcq') {
                    document.querySelectorAll('#mcq-options .option-btn').forEach((button) => {
                        button.disabled = true;
                        if (
                            currentQ.acceptedAnswers.includes(button.dataset.answer) &&
                            !currentQ.acceptedAnswers.includes(selectedAnswer)
                        ) {
                            button.classList.add('border-green-700', 'border-2');
                        }
                    });
                }

                if (isCorrect) {
                    session.correct += 1;
                    session.answered += 1;

                    if (session.mode === 'wrong') {
                        removeWrongQuestion(session.type, currentQ.id);
                    }

                    if (session.type === 'mcq') {
                        targetEl.classList.add('correct');
                    } else {
                        targetEl.style.color = '#3F8F5B';
                    }

                    if (session.mode === 'challenge') {
                        feedback.className = 'border border-[#d7ead9] bg-white rounded-md p-4 md:p-5 text-left fade-enter mb-5';
                        feedback.innerHTML = buildCompactFeedback('見事（正确）', selectedAnswer, true);
                        updateTopbar(false);
                        updateProgress();
                        setTimeout(nextQuestion, 850);
                        return;
                    }

                    feedback.className = 'border border-[#d7ead9] bg-white rounded-md p-4 md:p-5 text-left fade-enter mb-5';
                    feedback.innerHTML = buildDetailedFeedback(true, selectedAnswer);
                    $('practice-next-btn').classList.remove('hidden');
                } else {
                    session.wrong += 1;

                    if (session.mode === 'challenge') {
                        session.hp = Math.max(0, session.hp - DAMAGE);
                        session.answered += 1;
                        tookDamage = true;
                    } else if (session.mode === 'wrong') {
                        session.queue.push(currentQ);
                    } else {
                        addWrongQuestion(session.type, currentQ.id);
                        session.answered += 1;
                    }

                    if (session.type === 'mcq') {
                        targetEl.classList.add('wrong');
                    } else {
                        targetEl.style.color = '#D9544D';
                    }

                    feedback.className = 'border border-[#f0d7d4] bg-white rounded-md p-4 md:p-5 text-left fade-enter mb-5';
                    feedback.innerHTML = session.mode === 'challenge'
                        ? buildCompactFeedback('惜しい（错误）', selectedAnswer, false)
                        : buildDetailedFeedback(false, selectedAnswer);

                    if (session.mode === 'challenge') {
                        updateTopbar(tookDamage);
                        updateProgress();

                        if (session.hp <= 0) {
                            showGameOver(feedback);
                            return;
                        }

                        setTimeout(nextQuestion, 900);
                        return;
                    }

                    $('practice-next-btn').classList.remove('hidden');
                }

                updateTopbar(tookDamage);
                updateProgress();
            }

            function buildCompactFeedback(title, selectedAnswer, isCorrect) {
                const accepted = currentQ.acceptedAnswers.map((answer) => (
                    `<span class="inline-flex items-center px-3 py-1 rounded-full bg-white border border-border mr-2 mb-2">${escapeHtml(answer)}</span>`
                )).join('');

                const selectedHtml = selectedAnswer
                    ? `<p class="text-sumi leading-relaxed mt-2">你的答案：<strong class="${isCorrect ? 'text-green-700' : 'text-red-700'} text-xl mx-1">${escapeHtml(selectedAnswer)}</strong></p>`
                    : '';

                return `
                    <p class="font-bold ${isCorrect ? 'text-green-800' : 'text-red-800'} text-lg"><i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-times-circle'} mr-2"></i>${title}</p>
                    ${selectedHtml}
                    <div class="mt-3 text-sm text-koge">可接受答案：${accepted}</div>
                `;
            }

            function buildDetailedFeedback(isCorrect, selectedAnswer) {
                const title = isCorrect
                    ? '<p class="font-bold text-green-800 text-lg"><i class="fas fa-check-circle mr-2"></i>見事（正确）</p>'
                    : '<p class="font-bold text-red-800 text-lg"><i class="fas fa-times-circle mr-2"></i>惜しい（错误）</p>';

                return `
                    ${title}
                    <div class="rounded-md border border-border bg-white/85 p-4 mt-3">
                        <p class="text-sumi font-bold mb-2">解析</p>
                        ${buildExplanationHtml()}
                    </div>
                `;
            }

            function buildExplanationHtml() {
                const answers = currentQ.acceptedAnswers || [];
                const rationales = currentQ.answerRationales || {};

                if (answers.length <= 1) {
                    const answer = answers[0] || '';
                    const rationale = rationales[answer];
                    const answerLine = answer
                        ? `正确答案：<strong class="text-enji text-lg mx-1">${escapeHtml(answer)}</strong>`
                        : '';
                    const rationaleLine = rationale ? ` ${escapeHtml(rationale)}` : '';

                    return `<p class="text-koge leading-relaxed">${answerLine}${rationaleLine}</p>`;
                }

                const summary = answers.map((answer) => `<strong class="text-enji">${escapeHtml(answer)}</strong>`).join(' / ');
                const detailLines = answers.map((answer) => {
                    const rationale = rationales[answer];
                    return `
                        <p class="text-koge leading-relaxed">
                            <span class="font-bold text-sumi">${escapeHtml(answer)}：</span>${rationale ? escapeHtml(rationale) : '此答案也可接受。'}
                        </p>
                    `;
                }).join('');

                return `
                    <p class="text-koge leading-relaxed mb-2">可接受答案：${summary}</p>
                    <div class="space-y-2">${detailLines}</div>
                `;
            }

            // ゲームオーバー処理
            function showGameOver(feedbackEl) {
                currentQ = null;
                updateTopbar(false);
                const cleared = session.answered;
                let comment = '';
                if (cleared < 3) comment = '基础语感还在热身，被细小差别绊住很正常。';
                else if (cleared < 7) comment = '已经有手感了，再刷一轮就会更稳。';
                else comment = '这轮已经很强了，只是倒在细节判断上。';

                feedbackEl.className = 'rounded-xl p-8 text-center bg-sumi text-washi fade-enter mt-4 shadow-lg';
                feedbackEl.innerHTML = `
                    <h3 class="text-3xl font-serif text-enji mb-4"><i class="fas fa-skull border-b border-enji/30 pb-2"></i> 挑战终结</h3>
                    <p class="text-xl mb-3">本次试炼止步于第 <strong class="text-3xl text-ukon mx-2">${Math.min(cleared, session.total)}</strong> 题</p>
                    <p class="text-border italic mb-8 border-t border-washi/20 pt-4">神谕：${comment}</p>
                    <div class="flex justify-center gap-4 flex-wrap">
                        <button id="retry-challenge-btn" class="px-6 py-2 bg-enji text-washi rounded-xl hover:bg-red-800 transition font-serif shadow">再次挑战</button>
                        <button id="back-hall-btn" class="px-6 py-2 bg-washi text-sumi rounded-xl hover:bg-border transition font-serif">返回配置</button>
                    </div>
                `;

                $('retry-challenge-btn').addEventListener('click', () => startQuiz(session.type, 'challenge'));
                $('back-hall-btn').addEventListener('click', () => goToSetup(session.type));
            }

            // セッション完了処理
            function showSessionComplete() {
                const questionArea = $('practice-question-area');
                $('practice-interactive-area').innerHTML = '';
                $('fill-check-btn').classList.add('hidden');
                resetHintArea();

                questionArea.innerHTML = `
                    <div class="py-10 text-center fade-enter">
                        <i class="fas fa-medal text-5xl text-ukon mb-4"></i>
                        <p class="text-2xl font-serif text-sumi mb-3">本轮练习完成</p>
                        <p class="text-koge leading-7">
                            答对 ${session.correct} 题，答错 ${session.wrong} 题。
                            ${session.mode === 'challenge' ? `剩余血量 ${session.hp} / ${MAX_HP}。` : '可以回配置页切换条件再来一轮。'}
                        </p>
                    </div>
                `;

                const feedback = $('practice-feedback');
                feedback.className = 'border border-[#e5e5e0] bg-white rounded-md p-4 md:p-5 text-left fade-enter mb-5';
                feedback.innerHTML = `
                    <p class="font-bold text-sumi text-lg"><i class="fas fa-star text-ukon mr-2"></i>练习总结</p>
                    <p class="text-koge leading-relaxed mt-2">
                        这轮共处理 ${session.total} 题，错题已经同步进本地归档，之后可以继续按筛选条件精准回炉。
                    </p>
                `;
                feedback.classList.remove('hidden');

                $('practice-back-btn').classList.remove('hidden');
                updateProgress();
            }

            function showWrongBankComplete() {
                const questionArea = $('practice-question-area');
                $('practice-interactive-area').innerHTML = '';
                $('fill-check-btn').classList.add('hidden');
                resetHintArea();

                questionArea.innerHTML = `
                    <div class="py-10 text-center fade-enter">
                        <i class="fas fa-check-double text-5xl text-green-600 mb-4"></i>
                        <p class="text-2xl font-serif text-sumi">当前筛选下的错题已清空</p>
                        <p class="text-koge mt-3">这批薄弱点已经拔掉了，换个筛选继续刷也很合适。</p>
                    </div>
                `;

                $('practice-feedback').classList.add('hidden');
                $('practice-back-btn').classList.remove('hidden');
                updateProgress();
            }

            // ローカルストレージ管理
            function addWrongQuestion(type, questionId) {
                if (!(wrongBank[type] || []).includes(questionId)) {
                    wrongBank[type] = [...(wrongBank[type] || []), questionId];
                    saveWrongBank();
                }
            }

            function removeWrongQuestion(type, questionId) {
                wrongBank[type] = (wrongBank[type] || []).filter((id) => id !== questionId);
                saveWrongBank();
            }

            function loadWrongBank() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return { ...EMPTY_BANK };

                    const parsed = JSON.parse(raw);
                    return {
                        mcq: (Array.isArray(parsed.mcq) ? parsed.mcq : []).filter((id) => {
                            const question = questionMap.get(id);
                            return question && isSingleChoiceMcq(question);
                        }),
                        fill: (Array.isArray(parsed.fill) ? parsed.fill : []).filter((id) => {
                            const question = questionMap.get(id);
                            return question && question.type === 'fill';
                        })
                    };
                } catch (error) {
                    return { ...EMPTY_BANK };
                }
            }

            function saveWrongBank() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(wrongBank));
            }

            function shuffle(list) {
                const array = [...list];
                for (let i = array.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            function animateIn(id) {
                const element = $(id);
                element.classList.remove('fade-enter');
                void element.offsetWidth;
                element.classList.add('fade-enter');
            }

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function normalizeAnswer(value) {
                return String(value || '').trim();
            }

            function runSelfTests() {
                if (isMockData) return; // モックデータ使用時はテストをスキップ
                
                const questions = BANK.questions || [];
                console.assert(questions.length === 198, '题库总数必须是 198');
                console.assert(questions.filter((question) => isSingleChoiceMcq(question)).length === 118, '选择题必须是 118');
                console.assert(questions.filter((question) => question.type === 'fill').length === 80, 'fill 必须是 80');
                console.assert(new Set(questions.map((question) => question.id)).size === questions.length, '所有题目 id 必须唯一');
                console.assert(questions.filter((question) => question.type === 'mcq' && Number(question.blankCount) > 1).length === 0, '选择题不应保留双空题');
                console.assert(questions.filter((question) => question.type === 'mcq' && question.acceptedAnswers.length > 1).length === 0, '选择题不应保留多解题');
                console.assert(
                    questions.every((question) => question.sourceDay && question.type && question.acceptedAnswers.length > 0),
                    '每题都必须带 sourceDay、type 和 acceptedAnswers'
                );
            }
        })();
    </script>
</body>
</html>
