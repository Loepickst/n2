<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try! N2</title>
    <style>
        /* =========================================
           1. 🎨 全局变量
           ========================================= */
        :root {
            --bg-paper: #F9F8F4;       
            --bg-sidebar: #2C3038;     
            --text-main: #333333;      
            --text-sub: #777777;       
            --accent: #2A4073;         
            --highlight: #B4A582;      
            
            --grammar-theme: #C0392B;   /* 语法红 */
            --vocab-theme: #21618C;     /* 词汇蓝 */
            --supplement-theme: #E67E22; /* 补充橙 */

            --font-serif: "Hiragino Mincho ProN", "Yu Mincho", "Songti SC", serif;
            --font-sans: "Hiragino Sans", "Yu Gothic", "Helvetica Neue", sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-paper);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 2.2;
            font-size: 18px; /* 电脑端基准字号 */
            display: flex;
            height: 100vh;
            overflow: hidden; 
            transition: all 0.3s ease;
        }

        body.hide-ruby rt { display: none; }

        /* =========================================
           2. 🖥️ 电脑端专用样式 (min-width: 769px)
           ========================================= */
        @media (min-width: 769px) {
            body { font-size: 18px; flex-direction: row; }

            aside {
                width: 280px; height: 100vh;
                background-color: var(--bg-sidebar); color: #E0E0E0;
                display: flex; flex-direction: column; flex-shrink: 0; 
                z-index: 100; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                white-space: nowrap; border-right: 1px solid rgba(0,0,0,0.1);
            }
            body.sidebar-closed aside { width: 0; padding: 0; opacity: 0; overflow: hidden; }

            .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); display: block; }
            .sidebar-header h1 { margin: 0; font-family: var(--font-serif); font-size: 1.4rem; letter-spacing: 2px; color: #FFF; }
            #nav-list { flex: 1; overflow-y: auto; padding: 10px 0; list-style: none; margin: 0; display: block; }

            .nav-item { padding: 12px 25px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; border-left: 3px solid transparent; font-family: var(--font-sans); color: #ccc; margin: 0; border-radius: 0; background-color: transparent; border: none; border-left: 3px solid transparent; }
            .nav-item:hover { background-color: rgba(255,255,255,0.05); padding-left: 30px; color: #FFF; }
            .nav-item.active { background-color: rgba(255,255,255,0.1); color: #FFF; border-left-color: var(--highlight); font-weight: bold; }

            header { height: 70px; padding: 0 30px; justify-content: space-between; }
            #sidebar-toggle { font-size: 1.4rem; display: flex; order: 1; }
            .tools { order: 3; margin-left: 0; }
            
            #grammar-panel { 
                position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); 
                width: 620px; height: 0; background: #FFF; 
                box-shadow: 0 10px 40px rgba(0,0,0,0.25); border-radius: 12px;
                transition: height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); 
                z-index: 200; overflow: hidden; pointer-events: none; 
            }
            #grammar-panel.open { height: auto; max-height: 60vh; min-height: 200px; pointer-events: auto; overflow-y: auto; }
            
            article { padding-bottom: 200px; }
            .job-main-title { font-size: 2.5rem; }
        }

        /* =========================================
           3. 📱 手机端及平板专用样式 (max-width: 1024px) - 扩大范围以覆盖 iPad
           ========================================= */
        @media (max-width: 1024px) {
            .btn-text { display: none; }
            body { font-size: 16px; flex-direction: column; } /* iPad 上稍微大一点 */

            aside {
                width: 100%; height: 60px; min-height: 0; padding: 0 10px; opacity: 1; overflow: hidden;
                flex-direction: row; align-items: center; 
                background-color: #fafafa; 
                border-bottom: 1px solid rgba(0,0,0,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.05);
                overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
                transition: all 0.3s ease; z-index: 100;
            }
            aside::-webkit-scrollbar { display: none; }
            
            body.mobile-menu-open aside { 
                height: 60px; padding: 0 10px; opacity: 1; 
                border-bottom: 1px solid rgba(0,0,0,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            }
            .sidebar-header { display: none; }
            #nav-list { display: flex; flex-direction: row; padding: 10px 5px; margin: 0; height: 100%; align-items: center; list-style: none;}
            
            .nav-item { flex: 0 0 auto; margin-right: 10px; padding: 6px 14px; border: 1px solid #EEE; border-radius: 20px; font-size: 13px; background-color: #fff; color: #666; cursor: pointer; }
            .nav-item.active { background-color: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

            header { height: auto; padding: 12px 15px; flex-wrap: nowrap; align-items: center; justify-content: space-between; }
            #sidebar-toggle { order: 1; margin-right: auto; font-size: 1.2rem; display: flex; }
            .tools { order: 2; margin-left: auto; }

            /* 📱 手机/平板端调整：减小边距，使内容铺开 */
            #content-scroller { padding: 20px 15px 140px 15px !important; }

            /* 🎵 手机/平板端强制固定底部，避免被浏览器工具栏遮挡 */
            .audio-container {
                left: 0 !important; /* 移动端强制全宽 */
                width: 100% !important;
                z-index: 10001 !important; 
                display: flex !important;
            }

            #grammar-panel {
                position: fixed; width: 100%; left: 0; bottom: 85px; transform: none; 
                background: #FFF; border-radius: 12px 12px 0 0; 
                box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
                height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; pointer-events: none; transition: height 0.3s; z-index: 9999;
                overscroll-behavior: contain;
                bottom: calc(85px + env(safe-area-inset-bottom, 0px)); /* 适配底部安全区 */
            }
            #grammar-panel.open { height: auto; max-height: 75vh; pointer-events: auto; }
            
            article { padding-bottom: 100px; }
            .lesson-title { font-size: 1.6rem; }
            
            .panel-content { padding: 20px 15px !important; }
            .panel-title { font-size: 1.2rem !important; }
            .tag { font-size: 0.8rem !important; padding: 3px 8px !important; margin-right: 8px !important; }
            .desc-row { flex-direction: row !important; margin-bottom: 8px; align-items: flex-start; font-size: 14px !important; } 
            .desc-label { margin-bottom: 0; min-width: 3.2em; margin-right: 5px; flex-shrink: 0; }
            .desc-text { word-break: break-all !important; line-height: 1.5 !important; }
            .example-block { padding: 10px 12px !important; border-left-width: 3px !important; font-size: 14px !important; margin-top: 10px !important; }
            .example-title { font-size: 12px !important; margin-bottom: 3px !important; }
            
            .job-notice { padding: 15px !important; }
            .job-row { flex-direction: column; }
            
            /* 🔴 手机端标签重置：取消 margin-top，避免间距过大 */
            .job-label { 
                margin-bottom: 5px; margin-top: 0 !important; 
                width: 100%; background: none; color: var(--accent); 
                padding: 0; border: none; text-align: left; justify-content: flex-start;
            }
            
            .job-main-title { font-size: 1.6rem !important; }
            .salary-row { font-size: 0.9em; }
        }

        /* =========================================
           4. 通用样式
           ========================================= */
        main { flex: 1; display: flex; flex-direction: column; position: relative; background-color: var(--bg-paper); width: 100%; overflow: hidden; }
        
        header { background-color: rgba(249, 248, 244, 0.95); backdrop-filter: blur(5px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; flex-shrink: 0; z-index: 50; }
        #sidebar-toggle { cursor: pointer; color: #555; background: none; border: none; padding: 5px; align-items: center; justify-content: center; }
        #sidebar-toggle:hover { color: var(--accent); }
        
        /* 🎵 音频条固定底部样式 - 改为 fixed 定位以适应所有设备 */
        .audio-container {
            position: fixed; /* 关键修改：从 absolute 改为 fixed */
            bottom: 0;
            left: 0; /* 默认全宽，桌面端会被覆盖 */
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 10px 20px 20px 20px;
            /* 适配 iPhone/iPad 底部安全区 */
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.08);
            border-top: 1px solid rgba(0,0,0,0.05);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* 配合侧边栏动画 */
        }
        
        /* 桌面端适配：避开侧边栏 */
        @media (min-width: 769px) {
            .audio-container {
                left: 280px; /* 默认侧边栏宽度 */
            }
            /* 当侧边栏收起时，音频条撑满全屏 */
            body.sidebar-closed .audio-container {
                left: 0;
            }
        }
        audio { 
            width: 100%; 
            max-width: 800px; 
            height: 45px; 
            filter: sepia(10%); 
        }

        .tools { display: flex; gap: 8px; align-items: center; }
        .btn { background: transparent; border: 1px solid #CCC; padding: 0 14px; border-radius: 20px; font-size: 0.85rem; color: #555; cursor: pointer; transition: all 0.2s; font-weight: bold; font-family: var(--font-sans); height: 32px; line-height: 32px; display: inline-flex; align-items: center; justify-content: center; }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn.active { background: var(--accent); color: #FFF; border-color: var(--accent); box-shadow: 0 2px 5px rgba(42, 64, 115, 0.3); }

        select.btn { appearance: none; -webkit-appearance: none; padding-right: 24px; padding-left: 12px; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20256%20256%22%3E%3Cpath%20fill%3D%22%23555555%22%20d%3D%22M213.66%20101.66l-80%2080a8%208%200%200%201-11.32%200l-80-80A8%208%200%200%201%2053.66%2090.34L128%20164.69l74.34-74.35a8%208%200%200%201%2011.32%2011.32z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 6px center; background-size: 10px; }
        select.btn:hover { background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20256%20256%22%3E%3Cpath%20fill%3D%22%232A4073%22%20d%3D%22M213.66%20101.66l-80%2080a8%208%200%200%201-11.32%200l-80-80A8%208%200%200%201%2053.66%2090.34L128%20164.69l74.34-74.35a8%208%200%200%201%2011.32%2011.32z%22%2F%3E%3C%2Fsvg%3E"); }

        #content-scroller { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px 40px 120px 40px; 
            scroll-behavior: smooth; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            -webkit-overflow-scrolling: touch; 
        }
        article { max-width: 800px; width: 100%; margin: 0 auto; display: none; animation: fadeUp 0.5s ease-out; }
        article.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .lesson-header { border-top: 1px solid var(--text-main); border-bottom: 1px solid var(--text-main); padding: 12px 0; margin-bottom: 40px; display: flex; justify-content: space-between; font-family: var(--font-serif); font-size: 0.85rem; letter-spacing: 1px; width: 100%;}
        .lesson-title { text-align: center; font-family: var(--font-serif); font-size: 2.2rem; color: var(--accent); margin: 0 0 15px 0; }
        .lesson-intro { text-align: center; color: var(--text-sub); margin-bottom: 60px; font-family: var(--font-serif); font-style: italic; font-size: 1rem;}
        
        .sentence-block { margin-bottom: 30px; text-align: justify; }
        .text-group { margin-bottom: 25px; }

        .translation { 
            display: none; margin-top: 8px; padding: 12px 16px; 
            background-color: #f2f2f2; border-radius: 8px; font-size: 0.9em; 
            color: #555; font-family: var(--font-sans); line-height: 1.6;
        }
        body.show-trans .translation { display: block; }

        .vocab-point { cursor: pointer; font-weight: bold; color: var(--vocab-theme); background: linear-gradient(transparent 70%, rgba(33, 97, 140, 0.15) 70%); padding: 0 2px; border-radius: 2px; transition: background 0.2s; }
        .vocab-point:hover { background: rgba(33, 97, 140, 0.2); }
        .grammar-point { cursor: pointer; font-weight: bold; color: var(--grammar-theme); border-bottom: 2px solid rgba(192, 57, 43, 0.3); transition: all 0.2s; }
        .grammar-point:hover { background-color: rgba(192, 57, 43, 0.1); }

        /* =========================================
           5. 📄 招聘告示样式
           ========================================= */
        .job-title-box { text-align: center; margin-bottom: 30px; font-family: var(--font-sans); }
        .job-main-title { 
            font-size: 2rem; 
            font-weight: 900; letter-spacing: 2px; display: inline-block; position: relative; margin-bottom: 10px;
        }
        .paper-holes { height: 20px; background: radial-gradient(circle, #ddd 30%, transparent 35%); background-size: 30px 30px; margin-bottom: 20px; opacity: 0.5; }

        .job-notice {
            background: #fff; padding: 40px; 
            border: 1px solid #ddd; border-top: 5px solid var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); border-radius: 4px;
            font-family: var(--font-sans); font-size: inherit; 
        }

        /* 🔴 核心修复：Flex 对齐控制 */
        .job-row { 
            display: flex; 
            align-items: flex-start; /* 关键：强制顶部对齐 */
            margin-bottom: 20px; border-bottom: 1px dashed #eee; padding-bottom: 20px; 
        }
        .job-row:last-child { border-bottom: none; }

        .job-label { 
            width: 80px; flex-shrink: 0; font-weight: bold; font-size: 1rem; 
            margin-right: 20px; display: flex; align-items: center; justify-content: center;
            background-color: #f0f0f0; height: 30px; border-radius: 4px; color: #555;
            
            /* 🔴 光学调整：稍微往下推一点，和右边正文的第一行字对齐 */
            margin-top: 5px; 
        }

        .job-content { flex: 1; text-align: justify; line-height: 2.4; }

        .salary-row { display: flex; justify-content: space-between; max-width: 400px; margin-bottom: 5px; padding: 5px 0; border-bottom: 1px dotted #f4f4f4;}
        .salary-price { font-weight: bold; font-size: 1.1em; color: var(--accent); }
        
        .contact-info { margin-top: 30px; padding-top: 20px; border-top: 2px solid #333; font-size: 0.9rem; line-height: 1.6; }
        .contact-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-top: 5px; }
        .icon-phone::before { content: "☎"; margin-right: 5px; }

        /* =========================================
           6. 解释框样式
           ========================================= */
        .panel-content { padding: 30px 40px; position: relative; }
        .panel-close { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #CCC; transition: color 0.2s;}
        .panel-close:hover { color: #555; }
        .panel-header-box { display: flex; align-items: center; margin-bottom: 20px; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 4px; color: #fff; font-size: 0.9rem; font-weight: bold; margin-right: 15px; }
        .panel-title { font-size: 1.6rem; font-weight: bold; color: #333; }
        
        .desc-row { margin-bottom: 8px; font-size: 1rem; line-height: 1.5; color: #333; display: flex; align-items: flex-start; }
        .desc-label { font-weight: bold; min-width: 4em; margin-right: 10px; flex-shrink: 0; }
        .desc-text { flex: 1; word-wrap: break-word; word-break: keep-all; }
        .desc-row.supplement .desc-label { color: var(--supplement-theme); }
        .desc-row.supplement { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ccc; }
        
        .example-block { margin-top: 15px; padding: 15px 20px; background-color: #F7F7F7; border-radius: 6px; border-left: 5px solid #ccc; font-family: var(--font-sans); font-size: 1rem; line-height: 1.6; }
        .example-title { font-size: 0.9rem; font-weight: bold; color: #777; margin-bottom: 5px; display: block; }

        .type-grammar .tag { background-color: var(--grammar-theme); }
        .type-grammar .desc-label { color: var(--grammar-theme); }
        .type-grammar .example-block { border-left-color: var(--grammar-theme); }
        .type-vocab .tag { background-color: var(--vocab-theme); }
        .type-vocab .desc-label { color: var(--vocab-theme); }
        .type-vocab .example-block { border-left-color: var(--vocab-theme); }
        .desc-label.supplement-label { color: var(--supplement-theme); }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header"><h1>Try! N2</h1></div>
        <ul id="nav-list"></ul>
    </aside>

    <main>
        <header>
            <button id="sidebar-toggle">☰</button>
            <div class="tools">
                <a href="n2_menu.html" class="btn" style="text-decoration: none;">⬅ <span class="btn-text">返回</span></a>
                <button class="btn" onclick="goToReview()">復習</button>
                <button id="btn-ruby" class="btn active" onclick="toggleRuby()">注音</button>
                <button id="btn-trans" class="btn" onclick="toggleTrans()">译文</button>
            </div>
        </header>

        <div class="audio-container"><audio id="audio-player" controls></audio></div>

        <div id="content-scroller">
            <div id="lesson-container"></div>
        </div>

        <div id="grammar-panel">
            <div class="panel-content">
                <span class="panel-close" onclick="closePanel()">×</span>
                <div id="panel-body"></div>
            </div>
        </div>
    </main>

    <template id="lesson-1-content">
        <article>
            <div class="lesson-header"><span>お知らせを読む</span><span>求人情報</span></div>
            
            <div class="paper-holes"></div> <div class="job-title-box">
                <div class="job-main-title">
                    サニー　店内スタッフ<ruby>募<rt>ぼ</rt></ruby><ruby>集<rt>しゅう</rt></ruby>
                </div>
                <div class="text-group">
                    <div>
                        さいわい<ruby>駅<rt>えき</rt></ruby><ruby>前<rt>まえ</rt></ruby><ruby>店<rt>てん</rt></ruby>オープン<span class="grammar-point" onclick="showItem('nitsuki')">につき</span>、<ruby>人<rt>じん</rt></ruby><ruby>材<rt>ざい</rt></ruby>を<ruby>求<rt>もと</rt></ruby>めています
                    </div>
                    <p class="translation">因“幸（Saiwai）站前店”即将开业，现诚聘英才。</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="job-row">
                    <div class="job-label">仕事</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>開<rt>かい</rt></ruby><ruby>店<rt>てん</rt></ruby><ruby>業<rt>ぎょう</rt></ruby><ruby>務<rt>む</rt></ruby>、<ruby>販<rt>はん</rt></ruby><ruby>売<rt>ばい</rt></ruby>、<ruby>清<rt>せい</rt></ruby><ruby>掃<rt>そう</rt></ruby>、<ruby>商<rt>しょう</rt></ruby><ruby>品<rt>ひん</rt></ruby><ruby>管<rt>かん</rt></ruby><ruby>理<rt>り</rt></ruby>、<ruby>閉<rt>へい</rt></ruby><ruby>店<rt>てん</rt></ruby><ruby>業<rt>ぎょう</rt></ruby><ruby>務<rt>む</rt></ruby>
                            <p class="translation">开店准备、销售、清扫、商品管理、闭店业务</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">資格</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>年<rt>ねん</rt></ruby><ruby>齢<rt>れい</rt></ruby>・<ruby>経<rt>けい</rt></ruby><ruby>験<rt>けん</rt></ruby>・<ruby>国<rt>こく</rt></ruby><ruby>籍<rt>せき</rt></ruby><span class="grammar-point" onclick="showItem('otowazu')">を問わず</span>、<span class="vocab-point" onclick="showItem('yaruki')">やる気</span>のある<ruby>方<rt>かた</rt></ruby>、<ruby>大<rt>だい</rt></ruby><ruby>歓<rt>かん</rt></ruby><ruby>迎<rt>げい</rt></ruby>！
                            <p class="translation">不限年龄、经验及国籍。欢迎充满干劲的人士加入！</p>
                        </div>
                        
                        <div class="text-group">
                            <span style="font-size:0.9em; color:#666;">

    <template id="lesson-2-content">
        <article>
            <div class="lesson-header"><span>スピーチをする</span><span>転任のあいさつ（１）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    <ruby>転<rt>てん</rt></ruby><ruby>任<rt>にん</rt></ruby>のあいさつ（１）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">调职致辞（1）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    <ruby>皆<rt>みな</rt></ruby><ruby>様<rt>さま</rt></ruby>、<ruby>本<rt>ほん</rt></ruby><ruby>日<rt>じつ</rt></ruby>は、<span class="vocab-point" onclick="showItem('watakushi')"><ruby>私<rt>わたくし</rt></ruby></span>のためにこのような<ruby>会<rt>かい</rt></ruby>を<ruby>開<rt>ひら</rt></ruby>いていただき、ありがとうございます。
                    <p class="translation">各位，衷心感谢各位今天特意为我举办这场欢送会。</p>
                </div>

                <div class="text-group">
                    <ruby>入<rt>にゅう</rt></ruby><ruby>社<rt>しゃ</rt></ruby>して<span class="grammar-point" onclick="showItem('irai_l2')">以来</span>、この<ruby>営<rt>えい</rt></ruby><ruby>業<rt>ぎょう</rt></ruby><ruby>部<rt>ぶ</rt></ruby>において、<ruby>部<rt>ぶ</rt></ruby><ruby>長<rt>ちょう</rt></ruby><span class="grammar-point" onclick="showItem('wohajime')">をはじめ</span><ruby>先<rt>せん</rt></ruby><ruby>輩<rt>ぱい</rt></ruby><ruby>方<rt>がた</rt></ruby>のご<span class="vocab-point" onclick="showItem('shido')"><ruby>指<rt>し</rt></ruby><ruby>導<rt>どう</rt></ruby></span><span class="grammar-point" onclick="showItem('nomoto')">のもと</span>で、<ruby>営<rt>えい</rt></ruby><ruby>業<rt>ぎょう</rt></ruby>について<ruby>一<rt>いち</rt></ruby>から<ruby>学<rt>まな</rt></ruby>ぶことができ、たいへん<ruby>幸<rt>こう</rt></ruby><ruby>運<rt>うん</rt></ruby>でした。
                    <p class="translation">自入职以来，我非常有幸能在营业部这个集体中，在以部长为首的各位前辈们的悉心指导下，从零开始学习销售工作的点点滴滴。</p>
                </div>

                <div class="text-group">
                    <ruby>仕<rt>し</rt></ruby><ruby>事<rt>ごと</rt></ruby>の<ruby>進<rt>すす</rt></ruby>め<ruby>方<rt>かた</rt></ruby><span class="grammar-point" onclick="showItem('hamotoyori')">はもとより</span>、<span class="vocab-point" onclick="showItem('torihikisaki')"><ruby>取<rt>とり</rt></ruby><ruby>引<rt>ひき</rt></ruby><ruby>先<rt>さき</rt></ruby></span>との<span class="vocab-point" onclick="showItem('tsukiaikata')"><ruby>付<rt>つ</rt></ruby>き<ruby>合<rt>あ</rt></ruby>い<ruby>方<rt>かた</rt></ruby></span>など<ruby>本<rt>ほん</rt></ruby><ruby>当<rt>とう</rt></ruby>に<ruby>様<rt>さま</rt></ruby><ruby>々<rt>ざま</rt></ruby>なことを<ruby>教<rt>おし</rt></ruby>えていただき、<ruby>心<rt>こころ</rt></ruby>から<ruby>感<rt>かん</rt></ruby><ruby>謝<rt>しゃ</rt></ruby>いたしております。
                    <p class="translation">大家不仅教给我工作的基本流程，更不用说还教会了我如何与客户建立深厚的关系等各种宝贵经验，对此我由衷地表示感谢。</p>
                </div>

                <div class="text-group">
                    <span class="vocab-point" onclick="showItem('tokuni')"><ruby>特<rt>とく</rt></ruby>に</span><ruby>部<rt>ぶ</rt></ruby><ruby>長<rt>ちょう</rt></ruby>の、「<ruby>人<rt>ひと</rt></ruby>は<ruby>失<rt>しっ</rt></ruby><ruby>敗<rt>ぱい</rt></ruby>から<ruby>学<rt>まな</rt></ruby>ぶ<span class="grammar-point" onclick="showItem('monoda_l2')">ものだ</span>」という<ruby>言<rt>こと</rt></ruby><ruby>葉<rt>ば</rt></ruby>は<ruby>忘<rt>わす</rt></ruby>れられません。
                    <p class="translation">特别是部长常说的那句“人就是要在失败中不断学习的”，至今仍让我铭刻于心。</p>
                </div>

                <div class="text-group">
                    <ruby>仕<rt>し</rt></ruby><ruby>事<rt>ごと</rt></ruby>をする<span class="grammar-point" onclick="showItem('uede_l2')">上で</span><ruby>大<rt>たい</rt></ruby><ruby>切<rt>せつ</rt></ruby>なことを、まだまだたくさん<ruby>学<rt>まな</rt></ruby>びたかったのですが、このたび<ruby>大<rt>おお</rt></ruby><ruby>阪<rt>さか</rt></ruby><ruby>支<rt>し</rt></ruby><ruby>社<rt>しゃ</rt></ruby><ruby>勤<rt>きん</rt></ruby><ruby>務<rt>む</rt></ruby>を<span class="vocab-point" onclick="showItem('meijirare')"><ruby>命<rt>めい</rt></ruby>じられ</span>、<ruby>残<rt>ざん</rt></ruby><ruby>念<rt>ねん</rt></ruby><span class="grammar-point" onclick="showItem('nagara')">ながら</span>この<ruby>職<rt>しょく</rt></ruby><ruby>場<rt>ば</rt></ruby>を<ruby>離<rt>はな</rt></ruby>れることになりました。
                    <p class="translation">在开展工作方面，我原本还想向大家请教更多重要的经验，但遗憾的是，这次我接到了前往大阪分公司任职的调令，不得不离开这个温暖的工作岗位了。</p>
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-3-content">
        <article>
            <div class="lesson-header"><span>スピーチをする</span><span>転任のあいさつ（２）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    <ruby>転<rt>てん</rt></ruby><ruby>任<rt>にん</rt></ruby>のあいさつ（２）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">调职致辞（2）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    <ruby>大<rt>おお</rt></ruby><ruby>阪<rt>さか</rt></ruby><ruby>支<rt>し</rt></ruby><ruby>社<rt>しゃ</rt></ruby>では、アジア<ruby>各<rt>かっ</rt></ruby><ruby>国<rt>こく</rt></ruby>への<span class="vocab-point" onclick="showItem('yushutsu')"><ruby>輸<rt>ゆ</rt></ruby><ruby>出<rt>しゅつ</rt></ruby></span><ruby>拡<rt>かく</rt></ruby><ruby>大<rt>だい</rt></ruby><span class="grammar-point" onclick="showItem('wotoshita')">を目的とした</span>プロジェクトに<ruby>参<rt>さん</rt></ruby><ruby>加<rt>か</rt></ruby>することになりました。
                    <p class="translation">在大阪分公司，我将参加以扩大向亚洲各国出口为目的的项目。</p>
                </div>

                <div class="text-group">
                    この<span class="vocab-point" onclick="showItem('tenkin')"><ruby>転<rt>てん</rt></ruby><ruby>勤<rt>きん</rt></ruby></span>を<span class="grammar-point" onclick="showItem('kikkake')">きっかけ</span>に、また<span class="vocab-point" onclick="showItem('arata')"><ruby>新<rt>あら</rt></ruby>た</span>な<ruby>挑<rt>ちょう</rt></ruby><ruby>戦<rt>せん</rt></ruby>ができることを<ruby>期<rt>き</rt></ruby><ruby>待<rt>たい</rt></ruby>しております。
                    <p class="translation">以这次调职为契机，我期待着能再次进行新的挑战。</p>
                </div>

                <div class="text-group">
                    やる<span class="grammar-point" onclick="showItem('karaniwa')">からには</span><ruby>全<rt>ぜん</rt></ruby><ruby>力<rt>りょく</rt></ruby>でがんばります。
                    <p class="translation">既然要做，我就全心全力去努力。</p>
                </div>

                <div class="text-group">
                    <ruby>入<rt>にゅう</rt></ruby><ruby>社<rt>しゃ</rt></ruby><ruby>以<rt>い</rt></ruby><ruby>来<rt>らい</rt></ruby><span class="vocab-point" onclick="showItem('nareshitashinda')"><ruby>慣<rt>な</rt></ruby>れ<ruby>親<rt>した</rt></ruby>しんだ</span>この<ruby>職<rt>しょく</rt></ruby><ruby>場<rt>ば</rt></ruby>を<ruby>離<rt>はな</rt></ruby>れることになりましたが、<ruby>皆<rt>みな</rt></ruby><ruby>様<rt>さま</rt></ruby>と<ruby>一<rt>いっ</rt></ruby><ruby>緒<rt>しょ</rt></ruby>に<ruby>仕<rt>し</rt></ruby><ruby>事<rt>ごと</rt></ruby>をする<ruby>機<rt>き</rt></ruby><ruby>会<rt>かい</rt></ruby>がなくなるという<span class="grammar-point" onclick="showItem('wakedahearimasen')">わけではありません</span>。
                    <p class="translation">虽然要离开这个自入职以来就非常熟悉的职场，但这并不意味着就没有和大家一起工作的机会了。</p>
                </div>

                <div class="text-group">
                    どうぞこれまでと<ruby>変<rt>か</rt></ruby>わる<span class="grammar-point" onclick="showItem('kotonaku')">ことなく</span>、ご<ruby>指<rt>し</rt></ruby><ruby>導<rt>どう</rt></ruby>よろしくお<ruby>願<rt>ねが</rt></ruby>いいたします。
                    <p class="translation">请大家一如既往地（不改变地）给予指导，拜托了。</p>
                </div>

                <div class="text-group">
                    <ruby>最<rt>さい</rt></ruby><ruby>後<rt>ご</rt></ruby>に、<ruby>本<rt>ほん</rt></ruby><ruby>日<rt>じつ</rt></ruby>は<ruby>雨<rt>あめ</rt></ruby><span class="grammar-point" onclick="showItem('nimokakawarazu')">にもかかわらず</span>、このように<ruby>多<rt>おお</rt></ruby>くの<span class="vocab-point" onclick="showItem('katagata')"><ruby>方<rt>かた</rt></ruby><ruby>々<rt>がた</rt></ruby></span>が<ruby>来<rt>き</rt></ruby>てくださったこと、<ruby>皆<rt>みな</rt></ruby><ruby>様<rt>さま</rt></ruby>の<ruby>温<rt>あたた</rt></ruby>かいお<span class="vocab-point" onclick="showItem('kokorozukai')"><ruby>心<rt>こころ</rt></ruby><ruby>遣<rt>づか</rt></ruby>い</span>に<ruby>心<rt>こころ</rt></ruby>から<ruby>感<rt>かん</rt></ruby><ruby>謝<rt>しゃ</rt></ruby>しております。
                    <p class="translation">最后，今天尽管下着雨，还是有这么多人前来，对于大家温暖的关怀，我由衷地表示感谢。</p>
                </div>

                <div class="text-group">
                    <ruby>本<rt>ほん</rt></ruby><ruby>当<rt>とう</rt></ruby>にありがとうございました。
                    <p class="translation">真的非常感谢。</p>
                </div>
            </div>

    <template id="lesson-4-content">
        <article>
            <div class="lesson-header"><span>説明を聞く</span><span>ホテルの仕事</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    ホテルの<ruby>仕<rt>し</rt></ruby><ruby>事<rt>ごと</rt></ruby>
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">酒店的工作</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    <ruby>今<rt>いま</rt></ruby>からこのホテルの<ruby>一<rt>いち</rt></ruby><ruby>員<rt>いん</rt></ruby>となる<ruby>皆<rt>みな</rt></ruby>さんに、ホテルスタッフ<span class="grammar-point" onclick="showItem('toshite')">として</span>の<span class="vocab-point" onclick="showItem('kokorogamae')"><ruby>心<rt>こころ</rt></ruby><ruby>構<rt>がま</rt></ruby>え</span>をお<ruby>話<rt>はな</rt></ruby>しします。
                    <p class="translation">各位即将成为本酒店一员的同事们，今天我想和大家谈谈作为一名酒店从业人员应有的职业素养。</p>
                </div>

                <div class="text-group">
                    いちばん<ruby>難<rt>むずか</rt></ruby>しいのは、<span class="vocab-point" onclick="showItem('kujoshori')"><ruby>苦<rt>く</rt></ruby><ruby>情<rt>じょう</rt></ruby><ruby>処<rt>しょ</rt></ruby><ruby>理<rt>り</rt></ruby></span>です。
                    <p class="translation">在我们的工作中，最困难的莫过于投诉处理。</p>
                </div>

                <div class="text-group">
                    <ruby>皆<rt>みな</rt></ruby>さん、やりたくないとは<ruby>思<rt>おも</rt></ruby>うでしょうが、ホテルで<ruby>仕<rt>し</rt></ruby><ruby>事<rt>ごと</rt></ruby>を<ruby>続<rt>つづ</rt></ruby>ける<span class="grammar-point" onclick="showItem('kagiri')">限り</span>、お<ruby>客<rt>きゃく</rt></ruby><ruby>様<rt>さま</rt></ruby>からの<span class="vocab-point" onclick="showItem('claim')">クレーム</span>に<ruby>対<rt>たい</rt></ruby><ruby>応<rt>おう</rt></ruby>せ<span class="grammar-point" onclick="showItem('zaruwoenai')">ざるを得ない</span><ruby>場<rt>ば</rt></ruby><ruby>面<rt>めん</rt></ruby>に<ruby>必<rt>かなら</rt></ruby>ず<ruby>出<rt>で</rt></ruby><ruby>会<rt>あ</rt></ruby>います。
                    <p class="translation">尽管大家可能并不情愿面对，但只要你们还在酒店行业工作，就必然会遇到不得不处理客诉的场面。</p>
                </div>

                <div class="text-group">
                    お<ruby>客<rt>きゃく</rt></ruby><ruby>様<rt>さま</rt></ruby>が<ruby>苦<rt>く</rt></ruby><ruby>情<rt>じょう</rt></ruby>をおっしゃったときは、<span class="vocab-point" onclick="showItem('tada')">ただ</span><ruby>謝<rt>あやま</rt></ruby>ればいい<span class="grammar-point" onclick="showItem('toiumonodewaarimasen')">というものではありません</span>。
                    <p class="translation">当客人表达不满时，并不是说只要道歉就能解决问题的。</p>
                </div>

                <div class="text-group">
                    そのクレームが<span class="vocab-point" onclick="showItem('seito')"><ruby>正<rt>せい</rt></ruby><ruby>当<rt>とう</rt></ruby></span>なものかどうか<span class="grammar-point" onclick="showItem('watomokaku')">はともかく</span>、お<ruby>客<rt>きゃく</rt></ruby><ruby>様<rt>さま</rt></ruby>は<span class="vocab-point" onclick="showItem('fukai')"><ruby>不<rt>ふ</rt></ruby><ruby>快<rt>かい</rt></ruby></span>な<ruby>気<rt>き</rt></ruby><ruby>持<rt>も</rt></ruby>ちになっていらっしゃるので、<ruby>対<rt>たい</rt></ruby><ruby>応<rt>おう</rt></ruby>を<span class="vocab-point" onclick="showItem('machigaeru')"><ruby>間<rt>ま</rt></ruby><ruby>違<rt>ちが</rt></ruby></span>えるとホテルへの<ruby>信<rt>し</rt></ruby><ruby>頼<rt>らい</rt></ruby>を<ruby>失<rt>うしな</rt></ruby>い<span class="grammar-point" onclick="showItem('kanemasen')">かねません</span>。
                    <p class="translation">且不论客人的投诉是否正当，其身体力行的不快感是真实存在的，一旦应对失当，极有可能导致客人对酒店失去信任。</p>
                </div>

                <div class="text-group">
                    では、どうすればいいのでしょうか。そのときはお<ruby>客<rt>きゃく</rt></ruby><ruby>様<rt>さま</rt></ruby>のお<ruby>話<rt>はなし</rt></ruby>を<ruby>聞<rt>き</rt></ruby>くことがいちばん<ruby>大<rt>たい</rt></ruby><ruby>切<rt>せつ</rt></ruby>です。
                    <p class="translation">那么，我们究竟该如何应对呢？ 在那样的时刻，倾听客人的心声是最重要的。</p>
                </div>

                <div class="text-group">
                    <ruby>数<rt>すう</rt></ruby><ruby>日<rt>じつ</rt></ruby><ruby>間<rt>かん</rt></ruby><span class="vocab-point" onclick="showItem('taizai')"><ruby>滞<rt>たい</rt></ruby><ruby>在<rt>ざい</rt></ruby>する</span>だけのお<ruby>客<rt>きゃく</rt></ruby><ruby>様<rt>さま</rt></ruby><span class="grammar-point" onclick="showItem('toiuyori')">というより</span>、<ruby>自<rt>じ</rt></ruby><ruby>分<rt>ぶん</rt></ruby>の<ruby>家<rt>か</rt></ruby><ruby>族<rt>ぞく</rt></ruby>だと<ruby>思<rt>おも</rt></ruby>って、<ruby>最<rt>さい</rt></ruby><ruby>後<rt>ご</rt></ruby>まで<span class="vocab-point" onclick="showItem('kichinto')">きちんと</span><ruby>聞<rt>き</rt></ruby>いてください。
                    <p class="translation">与其将他们看作只逗留几天的普通住客，不如把他们当作自己的家人，耐心地听他们把话讲完。</p>
                </div>

                <div class="text-group">
                    わがABKホテルは<ruby>多<rt>おお</rt></ruby>くのお<ruby>客<rt>きゃく</rt></ruby><ruby>様<rt>さま</rt></ruby>にサービスの<ruby>質<rt>しつ</rt></ruby>の<ruby>高<rt>たか</rt></ruby>さを<ruby>評<rt>ひょう</rt></ruby><ruby>価<rt>か</rt></ruby>され、<ruby>愛<rt>あい</rt></ruby>されてきました。
                    <p class="translation">一直以来，我们ABK酒店都凭借高品质的服务赢得了广大客人的认可与喜爱。</p>
                </div>

                <div class="text-group">
                    しかし、<ruby>今<rt>こん</rt></ruby><ruby>後<rt>ご</rt></ruby>ホテル<ruby>業<rt>ぎょう</rt></ruby><ruby>界<rt>かい</rt></ruby>は<span class="vocab-point" onclick="showItem('masumasu')">ますます</span><ruby>競<rt>きょう</rt></ruby><ruby>争<rt>そう</rt></ruby>が<span class="vocab-point" onclick="showItem('kibishiku')"><ruby>厳<rt>きび</rt></ruby>しく</span>なりますから、<ruby>安<rt>あん</rt></ruby><ruby>心<rt>しん</rt></ruby>し<span class="grammar-point" onclick="showItem('tewairaremasen')">てはいられません</span>。
                    <p class="translation">然而，未来的行业竞争将愈发激烈，我们绝不能掉以轻心。</p>
                </div>

                <div class="text-group">
                    これからの<ruby>時<rt>じ</rt></ruby><ruby>代<rt>だい</rt></ruby>は、<ruby>今<rt>いま</rt></ruby>まで<ruby>以<rt>い</rt></ruby><ruby>上<rt>じょう</rt></ruby>によいサービスを<ruby>追<rt>つい</rt></ruby><ruby>求<rt>きゅう</rt></ruby>する<ruby>必<rt>ひつ</rt></ruby><ruby>要<rt>よう</rt></ruby>があります。ホテルのために、お<ruby>客<rt>きゃく</rt></ruby><ruby>様<rt>さま</rt></ruby>のために、<span class="vocab-point" onclick="showItem('chikaraoawasete')"><ruby>力<rt>ちから</rt></ruby>を<ruby>合<rt>あ</rt></ruby>わせて</span>、がんばりましょう。
                    <p class="translation">在新的时代背景下，我们需要追求比以往更优质的服务。为了酒店，也为了客人，让我们齐心协力，共同努力吧！</p>
                </div>

                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （イラスト：ABKホテル入社式）
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-5-content">
        <article>
            <div class="lesson-header"><span>ニュースを聞く</span><span>台風情報</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    <ruby>台<rt>たい</rt></ruby><ruby>風<rt>ふう</rt></ruby><ruby>情<rt>じょう</rt></ruby><ruby>報<rt>ほう</rt></ruby>
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">台风预报</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    <ruby>次<rt>つぎ</rt></ruby>は<ruby>台<rt>たい</rt></ruby><ruby>風<rt>ふう</rt></ruby><span class="vocab-point" onclick="showItem('kankei')"><ruby>関<rt>かん</rt></ruby><ruby>係<rt>けい</rt></ruby></span>のニュースをお<ruby>伝<rt>つた</rt></ruby>えします。
                    <p class="translation">接下来为您播报台风相关消息。</p>
                </div>

                <div class="text-group">
                    <ruby>非<rt>ひ</rt></ruby><ruby>常<rt>じょう</rt></ruby>に<ruby>強<rt>つよ</rt></ruby>い<ruby>台<rt>たい</rt></ruby><ruby>風<rt>ふう</rt></ruby>5<ruby>号<rt>ごう</rt></ruby>は8<ruby>月<rt>がつ</rt></ruby>1<ruby>日<rt>ついたち</rt></ruby>15<ruby>時<rt>じ</rt></ruby>には<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby>の<ruby>南<rt>みなみ</rt></ruby><ruby>海<rt>かい</rt></ruby><ruby>上<rt>じょう</rt></ruby>にあって、1<ruby>時<rt>じ</rt></ruby><ruby>間<rt>かん</rt></ruby>に<span class="vocab-point" onclick="showItem('oyoso')">およそ</span>30キロメートルの<ruby>速<rt>はや</rt></ruby>さで<ruby>北<rt>ほく</rt></ruby><ruby>東<rt>とう</rt></ruby>に<span class="vocab-point" onclick="showItem('susumu')"><ruby>進<rt>すす</rt></ruby>んで</span>います。
                    <p class="translation">截至8月1日15时，强台风5号正位于日本以南洋面，目前正以约30公里/小时的时速向东北方向推进。</p>
                </div>

                <div class="text-group">
                    <ruby>中<rt>ちゅう</rt></ruby><ruby>心<rt>しん</rt></ruby>の<ruby>気<rt>き</rt></ruby><ruby>圧<rt>あつ</rt></ruby>は945<span class="vocab-point" onclick="showItem('hPa')">ヘクトパスカル</span>、<ruby>中<rt>ちゅう</rt></ruby><ruby>心<rt>しん</rt></ruby><span class="vocab-point" onclick="showItem('fukin')"><ruby>付<rt>ふ</rt></ruby><ruby>近<rt>きん</rt></ruby></span>の<ruby>最<rt>さい</rt></ruby><ruby>大<rt>だい</rt></ruby><ruby>瞬<rt>しゅん</rt></ruby><ruby>間<rt>かん</rt></ruby><ruby>風<rt>ふう</rt></ruby><ruby>速<rt>そく</rt></ruby>は35メートルです。
                    <p class="translation">台风中心气压为945百帕，中心附近最大瞬时风速达35米/秒。</p>
                </div>

                <div class="text-group">
                    <ruby>今<rt>こん</rt></ruby><ruby>後<rt>ご</rt></ruby><ruby>台<rt>たい</rt></ruby><ruby>風<rt>ふう</rt></ruby>は<ruby>速<rt>そく</rt></ruby><ruby>度<rt>ど</rt></ruby>を<ruby>速<rt>はや</rt></ruby>め<span class="grammar-point" onclick="showItem('tsutsu')">つつ</span><ruby>東<rt>ひがし</rt></ruby>に<ruby>進<rt>すす</rt></ruby>むと<span class="vocab-point" onclick="showItem('yosousaremasu')"><ruby>予<rt>よ</rt></ruby><ruby>想<rt>そう</rt></ruby>されます</span>。
                    <p class="translation">预计未来台风将进一步提速，并继续向东移动。</p>
                </div>

                <div class="text-group">
                    <ruby>現<rt>げん</rt></ruby><ruby>在<rt>ざい</rt></ruby>、<ruby>沖<rt>おき</rt></ruby><ruby>縄<rt>なわ</rt></ruby>を<ruby>中<rt>ちゅう</rt></ruby><ruby>心<rt>しん</rt></ruby>に<ruby>暴<rt>ぼう</rt></ruby><ruby>風<rt>ふう</rt></ruby><ruby>域<rt>いき</rt></ruby>に<ruby>入<rt>はい</rt></ruby>り、<ruby>広<rt>こう</rt></ruby><ruby>範<rt>はん</rt></ruby><ruby>囲<rt>い</rt></ruby><span class="grammar-point" onclick="showItem('niwatatte')">にわたって</span><ruby>強<rt>つよ</rt></ruby>い<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>っています。
                    <p class="translation">目前，以冲绳为中心的地区已进入暴风警戒区，广大范围内正伴随强降水。</p>
                </div>

                <div class="text-group">
                    また、<ruby>九<rt>きゅう</rt></ruby><ruby>州<rt>しゅう</rt></ruby><ruby>沿<rt>えん</rt></ruby><ruby>岸<rt>がん</rt></ruby><span class="grammar-point" onclick="showItem('karanikakete')">から</span><ruby>四<rt>し</rt></ruby><ruby>国<rt>こく</rt></ruby><span class="grammar-point" onclick="showItem('karanikakete')">にかけて</span><span class="vocab-point" onclick="showItem('nami')"><ruby>波<rt>なみ</rt></ruby></span>も<ruby>高<rt>たか</rt></ruby>くなってきています。
                    <p class="translation">从九州沿岸至四国一带，海面浪高正在持续上升。</p>
                </div>

                <div class="text-group">
                    <ruby>台<rt>たい</rt></ruby><ruby>風<rt>ふう</rt></ruby>の<span class="vocab-point" onclick="showItem('sekkin')"><ruby>接<rt>せっ</rt></ruby><ruby>近<rt>きん</rt></ruby></span><span class="grammar-point" onclick="showItem('nitomonai')">にともない</span>、<ruby>九<rt>きゅう</rt></ruby><ruby>州<rt>しゅう</rt></ruby><ruby>南<rt>なん</rt></ruby><ruby>部<rt>ぶ</rt></ruby>をはじめ<ruby>各<rt>かく</rt></ruby><ruby>地<rt>ち</rt></ruby><ruby>域<rt>いき</rt></ruby>に<ruby>大<rt>おお</rt></ruby><ruby>雨<rt>あめ</rt></ruby><ruby>洪<rt>こう</rt></ruby><ruby>水<rt>ずい</rt></ruby><ruby>注<rt>ちゅう</rt></ruby><ruby>意<rt>い</rt></ruby><ruby>報<rt>ほう</rt></ruby>が<span class="vocab-point" onclick="showItem('dasarete')"><ruby>出<rt>だ</rt></ruby>され</span>ています。
                    <p class="translation">受台风接近影响，以九州南部为首的各地已相继发布大雨及洪水预警。</p>
                </div>

                <div class="text-group">
                    これから<ruby>明<rt>あ</rt></ruby><ruby>日<rt>す</rt></ruby>の<span class="vocab-point" onclick="showItem('akegata')"><ruby>明<rt>あ</rt></ruby>け<ruby>方<rt>がた</rt></ruby></span>にかけて、<span class="vocab-point" onclick="showItem('kyokuchiteki')"><ruby>局<rt>きょく</rt></ruby><ruby>地<rt>ち</rt></ruby><ruby>的<rt>てき</rt></ruby></span>に1<ruby>時<rt>じ</rt></ruby><ruby>間<rt>かん</rt></ruby>70ミリの<ruby>強<rt>つよ</rt></ruby>い<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>る<span class="grammar-point" onclick="showItem('osoregaarimasu')">おそれがあります</span>。
                    <p class="translation">从现在起到明日凌晨，部分地区可能出现小时雨量达70毫米的局地强降水。</p>
                </div>

                <div class="text-group">
                    <ruby>台<rt>たい</rt></ruby><ruby>風<rt>ふう</rt></ruby>の<span class="vocab-point" onclick="showItem('shinro')"><ruby>進<rt>しん</rt></ruby><ruby>路<rt>ろ</rt></ruby></span>に<span class="vocab-point" onclick="showItem('ataru')">あたる</span><ruby>地<rt>ち</rt></ruby><ruby>域<rt>いき</rt></ruby>では、<ruby>強<rt>きょう</rt></ruby><ruby>風<rt>ふう</rt></ruby><span class="grammar-point" onclick="showItem('totomoni')">とともに</span><ruby>河<rt>か</rt></ruby><ruby>川<rt>せん</rt></ruby>の<ruby>増<rt>ぞう</rt></ruby><ruby>水<rt>すい</rt></ruby>にもご<ruby>注<rt>ちゅう</rt></ruby><ruby>意<rt>い</rt></ruby>ください。
                    <p class="translation">台风路径沿途地区在谨防强风的同时，还需高度警惕河流水位上涨及泛滥。</p>
                </div>

                <div class="text-group">
                    なお、<ruby>暴<rt>ぼう</rt></ruby><ruby>風<rt>ふう</rt></ruby><ruby>域<rt>いき</rt></ruby>に<ruby>入<rt>はい</rt></ruby>った<ruby>沖<rt>おき</rt></ruby><ruby>縄<rt>なわ</rt></ruby>の<span class="vocab-point" onclick="showItem('yosu')"><ruby>様<rt>よう</rt></ruby><ruby>子<rt>す</rt></ruby></span>は<span class="vocab-point" onclick="showItem('chukei')"><ruby>中<rt>ちゅう</rt></ruby><ruby>継<rt>けい</rt></ruby></span>が<span class="vocab-point" onclick="showItem('tsunagari')">つながり</span><span class="grammar-point" onclick="showItem('shidai')"><ruby>次<rt>し</rt></ruby><ruby>第<rt>だい</rt></ruby></span>、<ruby>番<rt>ばん</rt></ruby><ruby>組<rt>ぐみ</rt></ruby>の<ruby>中<rt>なか</rt></ruby>でお<ruby>伝<rt>つた</rt></ruby>えする<ruby>予<rt>よ</rt></ruby><ruby>定<rt>てい</rt></ruby>です。
                    <p class="translation">此外，关于已进入暴风区的冲绳现场实况，我们将在连线成功后第一时间为您带来后续报道。</p>
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-6-content">
        <article>
            <div class="lesson-header"><span>友達同士の会話</span><span>就職活動（１）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    <ruby>就<rt>しゅう</rt></ruby><ruby>職<rt>しょく</rt></ruby><ruby>活<rt>かつ</rt></ruby><ruby>動<rt>どう</rt></ruby>（１）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">求职活动（1）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="job-row">
                    <div class="job-label">渡辺</div>
                    <div class="job-content">
                        <div class="text-group">
                            ねえ、<span class="vocab-point" onclick="showItem('circle')">サークル</span>のみんなで<ruby>旅<rt>りょ</rt></ruby><ruby>行<rt>こう</rt></ruby>に<ruby>行<rt>い</rt></ruby>かない？ <ruby>私<rt>わたし</rt></ruby>もアメリカに<ruby>留<rt>りゅう</rt></ruby><ruby>学<rt>がく</rt></ruby>しちゃったら、みんなにも<ruby>簡<rt>かん</rt></ruby><ruby>単<rt>たん</rt></ruby>に<ruby>会<rt>あ</rt></ruby>えなくなるし…。<ruby>去<rt>きょ</rt></ruby><ruby>年<rt>ねん</rt></ruby><ruby>京<rt>きょう</rt></ruby><ruby>都<rt>と</rt></ruby>に<ruby>行<rt>い</rt></ruby>った<span class="grammar-point" onclick="showItem('kiri')">きり</span>、<ruby>今<rt>こん</rt></ruby><ruby>年<rt>ねん</rt></ruby>はどこへも<ruby>行<rt>い</rt></ruby>っていないし…。
                            <p class="translation">哎，咱们社团的朋友们一起去旅行怎么样？你看，我要是真去美国留学了，以后想见大家一面就没那么容易了……而且自从去年去过一次京都以来，今年我哪儿都还没去过呢。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">木山</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>悪<rt>わる</rt></ruby>いけど、<ruby>就<rt>しゅう</rt></ruby><ruby>職<rt>しょく</rt></ruby><ruby>先<rt>さき</rt></ruby>もまだ<ruby>決<rt>き</rt></ruby>まらないのに、<ruby>旅<rt>りょ</rt></ruby><ruby>行<rt>こう</rt></ruby><span class="grammar-point" onclick="showItem('dokorojanai')">どころじゃない</span>よ。
                            <p class="translation">抱歉啊，我现在连工作还没定下来呢，哪有心思去旅行啊。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">渡辺</div>
                    <div class="job-content">
                        <div class="text-group">
                            そうか…。ゲーム<ruby>会<rt>がい</rt></ruby><ruby>社<rt>しゃ</rt></ruby>に<ruby>入<rt>はい</rt></ruby>りたいんだったよね。どう？
                            <p class="translation">这样啊……我记得你是想进游戏公司对吧？进展得怎么样了？</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">木山</div>
                    <div class="job-content">
                        <div class="text-group">
                            うーん。いろいろ<ruby>情<rt>じょう</rt></ruby><ruby>報<rt>ほう</rt></ruby>は<ruby>集<rt>あつ</rt></ruby>めている<span class="grammar-point" onclick="showItem('monono')">ものの</span>、<span class="vocab-point" onclick="showItem('nakanaka')">なかなか</span><ruby>厳<rt>きび</rt></ruby>しくて…。<ruby>困<rt>こま</rt></ruby>った<span class="grammar-point" onclick="showItem('kotoni')">ことに</span>この<ruby>業<rt>ぎょう</rt></ruby><ruby>界<rt>かい</rt></ruby>、<ruby>募<rt>ぼ</rt></ruby><ruby>集<rt>しゅう</rt></ruby>はどこも「<span class="vocab-point" onclick="showItem('jakkan')"><ruby>若<rt>じゃっ</rt></ruby><ruby>干<rt>かん</rt></ruby></span><ruby>名<rt>めい</rt></ruby>」なんだよ。
                            <p class="translation">嗯……情报搜集工作虽说一直在做，但现实真的很残酷。最让我发愁的是，这个行业不管哪家公司，招人都只招“若干名”。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">渡辺</div>
                    <div class="job-content">
                        <div class="text-group">
                            へえ。<ruby>人<rt>にん</rt></ruby><ruby>気<rt>き</rt></ruby>の<ruby>業<rt>ぎょう</rt></ruby><ruby>界<rt>かい</rt></ruby><span class="grammar-point" onclick="showItem('nishitewa')">にしては</span>、<span class="vocab-point" onclick="showItem('kyujin')"><ruby>求<rt>きゅう</rt></ruby><ruby>人<rt>じん</rt></ruby></span><ruby>少<rt>すく</rt></ruby>ないんだね。
                            <p class="translation">嘿~ 亏它还是个热门行业，结果招聘名额这么少啊。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">木山</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>求<rt>きゅう</rt></ruby><ruby>人<rt>じん</rt></ruby>があるところは<ruby>全<rt>ぜん</rt></ruby><ruby>部<rt>ぶ</rt></ruby><ruby>応<rt>おう</rt></ruby><ruby>募<rt>ぼ</rt></ruby>して、<span class="vocab-point" onclick="showItem('jikopr')"><ruby>自<rt>じ</rt></ruby><ruby>己<rt>こ</rt></ruby>PR</span><ruby>何<rt>なん</rt></ruby><ruby>回<rt>かい</rt></ruby><ruby>書<rt>か</rt></ruby>いた<span class="grammar-point" onclick="showItem('kotoka')">ことか</span>。
                            <p class="translation">可不是嘛。只要是有招人的地方我全都投了，都不记得自己写过多少回自我推荐信了。</p>
                        </div>
                    </div>
                </div>
                
                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （イラスト：就職活動の悩み）
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-7-content">
        <article>
            <div class="lesson-header"><span>友達同士の会話</span><span>就職活動（２）</span></div>
            
            <div class="paper-holes"></div>

                </div>

                <div class="text-group">
                    <ruby>人<rt>にん</rt></ruby><ruby>間<rt>げん</rt></ruby>の<ruby>立<rt>たち</rt></ruby><ruby>場<rt>ば</rt></ruby><span class="grammar-point" onclick="showItem('karamiruto')">から見ると</span>、オオカミは<ruby>牛<rt>うし</rt></ruby>などの<ruby>家<rt>か</rt></ruby><ruby>畜<rt>ちく</rt></ruby>を<span class="vocab-point" onclick="showItem('osou')"><ruby>襲<rt>おそ</rt></ruby>う</span><ruby>敵<rt>てき</rt></ruby>だ。
                    <p class="translation">从人类的立场来看，狼是袭击牛等家畜的敌人。</p>

                <div class="text-group">

                </div>

                <div class="text-group">

                <div class="text-group">

                    <p class="translation">这是因为随着鹿群数量的增长，食物和栖息地变得越来越少，导致其他生物无法继续生存下去。</p>

    <template id="lesson-11-content">
        <article>
            <div class="lesson-header"><span>論説文を読む</span><span>オオカミと生態系（２）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    オオカミと<ruby>生<rt>せい</rt></ruby><ruby>態<rt>たい</rt></ruby><ruby>系<rt>けい</rt></ruby>（２）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">狼与生态系统（2）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    そこで、<ruby>国<rt>こく</rt></ruby><ruby>立<rt>りつ</rt></ruby><ruby>公<rt>こう</rt></ruby><ruby>園<rt>えん</rt></ruby>にオオカミを<ruby>戻<rt>もど</rt></ruby>そうという<span class="vocab-point" onclick="showItem('torikumi')"><ruby>取<rt>と</rt></ruby>り<ruby>組<rt>く</rt></ruby>み</span>が<ruby>始<rt>はじ</rt></ruby>まった。
                    <p class="translation">于是，将狼群送回国家公园的尝试正式启动。</p>
                </div>

                <div class="text-group">
                    オオカミの<ruby>復<rt>ふっ</rt></ruby><ruby>活<rt>かつ</rt></ruby>により<ruby>生<rt>せい</rt></ruby><ruby>態<rt>たい</rt></ruby><ruby>系<rt>けい</rt></ruby>を<span class="vocab-point" onclick="showItem('kaifuku')"><ruby>回<rt>かい</rt></ruby><ruby>復<rt>ふく</rt></ruby></span>させ<span class="grammar-point" onclick="showItem('uru')">得る</span>と<ruby>考<rt>かんが</rt></ruby>えたのだ。
                    <p class="translation">人们认为，通过狼群的复兴，有望使生态系统得以恢复。</p>
                </div>

                <div class="text-group">
                    しかし<ruby>生<rt>せい</rt></ruby><ruby>物<rt>ぶつ</rt></ruby><ruby>学<rt>がく</rt></ruby><ruby>者<rt>しゃ</rt></ruby>の<ruby>期<rt>き</rt></ruby><ruby>待<rt>たい</rt></ruby><span class="grammar-point" onclick="showItem('nihanshite')">に反して</span>、この<ruby>計<rt>けい</rt></ruby><ruby>画<rt>かく</rt></ruby>はすぐには<ruby>実<rt>じっ</rt></ruby><ruby>行<rt>こう</rt></ruby>されなかった。
                    <p class="translation">然而，与生物学家的期待相反，这项计划并未能立即付诸实践。</p>
                </div>

                <div class="text-group">
                    <ruby>野<rt>や</rt></ruby><ruby>生<rt>せい</rt></ruby>のオオカミを<ruby>連<rt>つ</rt></ruby>れてくること<span class="grammar-point" onclick="showItem('nikanshite')">に関しては</span>、<ruby>成<rt>せい</rt></ruby><ruby>果<rt>か</rt></ruby>が<ruby>期<rt>き</rt></ruby><ruby>待<rt>たい</rt></ruby>される<span class="grammar-point" onclick="showItem('hanmen')">反面</span>、<ruby>家<rt>か</rt></ruby><ruby>畜<rt>ちく</rt></ruby>の<ruby>被<rt>ひ</rt></ruby><ruby>害<rt>がい</rt></ruby>の<span class="vocab-point" onclick="showItem('osore')">おそれ</span>もあるため、<ruby>理<rt>り</rt></ruby><ruby>論<rt>ろん</rt></ruby><span class="grammar-point" onclick="showItem('jou')">上</span>は<ruby>有<rt>ゆう</rt></ruby><ruby>効<rt>こう</rt></ruby>だとわかっていても、<span class="vocab-point" onclick="showItem('ukeirenikui')"><ruby>受<rt>う</rt></ruby>け<ruby>入<rt>い</rt></ruby>れにくい</span>ことだったからだ。
                    <p class="translation">关于引入野生狼群一事，虽然预期的成果令人期待，但另一方面由于担心家畜受害，即便在理论上已知其有效性，现实中依然难以被大众接受。</p>
                </div>

                <div class="text-group">
                    20<ruby>年<rt>ねん</rt></ruby><ruby>以<rt>い</rt></ruby><ruby>上<rt>じょう</rt></ruby>の<ruby>時<rt>じ</rt></ruby><ruby>間<rt>かん</rt></ruby>をかけて<span class="vocab-point" onclick="showItem('hanashiai')"><ruby>話<rt>はな</rt></ruby>し<ruby>合<rt>あ</rt></ruby>い</span>を<ruby>続<rt>つづ</rt></ruby>けた<ruby>結<rt>けっ</rt></ruby><ruby>果<rt>か</rt></ruby>、1995<ruby>年<rt>ねん</rt></ruby>、<span class="vocab-point" onclick="showItem('tsuini')">ついに</span>オオカミが<span class="vocab-point" onclick="showItem('hanasareta')"><ruby>放<rt>はな</rt></ruby>された</span>。
                    <p class="translation">在经历了长达20多年的持续讨论后，1995年，狼群终于被释放归山。</p>
                </div>

                <div class="text-group">
                    その<ruby>後<rt>ご</rt></ruby>、オオカミがシカを<ruby>食<rt>しょく</rt></ruby><ruby>料<rt>りょう</rt></ruby>として<span class="vocab-point" onclick="showItem('junchou')"><ruby>順<rt>じゅん</rt></ruby><ruby>調<rt>ちょう</rt></ruby></span>に<ruby>数<rt>かず</rt></ruby>を<ruby>増<rt>ふ</rt></ruby>やした<ruby>結<rt>けっ</rt></ruby><ruby>果<rt>か</rt></ruby>、<span class="vocab-point" onclick="showItem('ichiji')"><ruby>一<rt>いち</rt></ruby><ruby>時<rt>じ</rt></ruby></span>は<ruby>激<rt>げき</rt></ruby><ruby>減<rt>げん</rt></ruby>したその<ruby>他<rt>た</rt></ruby>の<ruby>動<rt>どう</rt></ruby><ruby>植<rt>しょく</rt></ruby><ruby>物<rt>ぶつ</rt></ruby>も、<span class="vocab-point" onclick="showItem('jojo')"><ruby>徐<rt>じょ</rt></ruby><ruby>々<rt>じょ</rt></ruby>に</span><ruby>増<rt>ぞう</rt></ruby><ruby>加<rt>か</rt></ruby>し<span class="grammar-point" onclick="showItem('tsutsuaru')">つつある</span>ことが<ruby>報<rt>ほう</rt></ruby><ruby>告<rt>こく</rt></ruby>されている。
                    <p class="translation">随后，狼群以鹿为食，数量稳步增长。据报告，曾一度数量锐减的其他动植物，目前也正在逐渐增加。</p>
                </div>

                <div class="text-group">
                    <ruby>同<rt>おな</rt></ruby>じような<ruby>取<rt>と</rt></ruby>り<ruby>組<rt>く</rt></ruby>みはアメリカ<span class="grammar-point" onclick="showItem('nikagirazu')">に限らず</span>、ヨーロッパでも<span class="vocab-point" onclick="showItem('kentou')"><ruby>検<rt>けん</rt></ruby><ruby>討<rt>とう</rt></ruby>されて</span>いる。
                    <p class="translation">类似的举措不仅限于美国，欧洲各国也正在探讨。</p>
                </div>

                <div class="text-group">
                    <span class="vocab-point" onclick="showItem('shinchou')"><ruby>慎<rt>しん</rt></ruby><ruby>重<rt>ちょう</rt></ruby></span>に<ruby>意<rt>い</rt></ruby><ruby>見<rt>けん</rt></ruby><ruby>交<rt>こう</rt></ruby><ruby>換<rt>かん</rt></ruby>を<ruby>続<rt>つづ</rt></ruby>けながら、<ruby>自<rt>し</rt></ruby><ruby>然<rt>ぜん</rt></ruby>のバランスをとっていくことになるだろう。
                    <p class="translation">在慎重进行意见交换的同时，人们将致力于维持自然界的平衡。</p>
                </div>

                <div class="text-group">
                    こうした<ruby>意<rt>い</rt></ruby><ruby>識<rt>しき</rt></ruby>の<ruby>変<rt>へん</rt></ruby><ruby>化<rt>か</rt></ruby>にともない、オオカミに<ruby>対<rt>たい</rt></ruby>する<ruby>悪<rt>わる</rt></ruby>いイメージも<ruby>過<rt>か</rt></ruby><ruby>去<rt>こ</rt></ruby>のものになっていくかもしれない。
                    <p class="translation">随着这种意识的转变，狼的负面形象或许也将随之成为过去。</p>
                </div>

                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （出典：『オオカミと生態系』）
                </div>
            </div>
        </article>
    </template>
