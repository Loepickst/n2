<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日运势抽奖 & 图鉴</title>
    <style>
        :root {
            --bg-color: #fdfaf5;
            --text-color: #2c2c2c;
            --accent-color: #b33e3e;
            --card-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        body {
            font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 16px;
            font-weight: bold;
            opacity: 0.7;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .back-btn:hover { opacity: 1; }

        .collection-btn {
            position: absolute;
            right: 20px;
            background: none;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .collection-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        h1 { margin: 0; font-size: 18px; font-weight: 700; }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .omikuji-container {
            position: relative;
            margin-bottom: 40px;
            cursor: pointer;
            animation: floatIn 0.8s ease-out forwards;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .omikuji-img {
            width: 280px;
            max-width: 80vw;
            height: auto;
            object-fit: contain;
            background-color: #fff;
            padding: 12px;
            border: 2px solid rgba(179, 62, 62, 0.25);
            border-radius: 12px;
            box-shadow: 
                0 0 0 10px #fff,
                0 0 0 11px rgba(0,0,0,0.05),
                0 20px 40px rgba(0,0,0,0.18);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            z-index: 2;
        }

        .omikuji-container:active .omikuji-img { 
            transform: scale(0.96) translateY(5px);
            box-shadow: 
                0 0 0 10px #fff,
                0 0 0 11px rgba(0,0,0,0.05),
                0 10px 20px rgba(0,0,0,0.1);
        }

        .magic-glow {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.5) 0%, rgba(255, 255, 255, 0) 65%);
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        .shake .omikuji-img { 
            animation: hardShake 0.8s cubic-bezier(.36,.07,.19,.97) both; 
        }
        .shake .magic-glow {
            animation: glowPulse 0.8s ease-in-out;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes hardShake {
            0%, 100% { transform: translate3d(0, 0, 0) rotate(0); }
            10%, 30%, 50%, 70%, 90% { transform: translate3d(-6px, -4px, 0) rotate(-4deg); }
            20%, 40%, 60%, 80% { transform: translate3d(6px, 4px, 0) rotate(4deg); }
        }

        @keyframes glowPulse {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2.2); }
        }

        .result-card {
            display: none;
            width: 300px;
            background: white;
            border-radius: 16px;
            border: 8px solid #333; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: epicEnter 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            padding: 0;
            margin-bottom: 30px;
        }

        @keyframes epicEnter {
            0% { opacity: 0; transform: scale(0.6) translateY(60px); filter: brightness(1.5); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1); }
        }

        .rarity-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e6b422;
            color: #fff;
            padding: 4px 10px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .new-badge {
            position: absolute;
            top: 50px;
            left: 5px;
            background: #ff1744;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 12px;
            box-shadow: 0 4px 10px rgba(255, 23, 68, 0.5);
            animation: popBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
            animation-delay: 0.3s;
            display: none;
            z-index: 12;
            transform: rotate(-15deg);
        }

        @keyframes popBounce {
            0% { transform: scale(0); }
            100% { transform: scale(1) rotate(15deg); }
        }

        .result-inner {
            width: 100%;
            position: relative;
        }

        .result-title {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
            font-family: "Yu Mincho", serif;
            border: 2px solid currentColor;
        }

        .result-icon {
            width: 100%;
            height: 320px;
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .icon-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-desc-container { 
            padding: 15px 20px; 
            background: white; 
            border-top: 1px solid #eee;
            display: block; 
        }
        .result-desc { font-size: 15px; color: #555; line-height: 1.6; margin: 0; }
        .result-meta { margin-top: 10px; font-size: 13px; color: #888; letter-spacing: 0.04em; }

        .count-info { margin-top: 40px; font-size: 14px; color: #888; background: rgba(0,0,0,0.03); padding: 8px 16px; border-radius: 20px; }
        
        button.action-btn { background-color: var(--accent-color); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(179, 62, 62, 0.3); transition: transform 0.2s;}
        button.action-btn:active { transform: scale(0.95); }
        button.action-btn:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; transform: scale(1); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: var(--bg-color);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 10px;
            min-width: 0;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 18px;
            color: var(--text-color);
            white-space: nowrap;
            flex: 1 1 auto;
            min-width: 0;
        }
        .modal-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }
        .modal-action-btn {
            border: 1px solid rgba(179, 62, 62, 0.18);
            background: rgba(255,255,255,0.92);
            color: #7a5d53;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-action-btn:hover {
            border-color: rgba(179, 62, 62, 0.35);
            color: var(--accent-color);
            background: #fff;
        }
        .close-btn {
            width: 30px;
            height: 30px;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 999px;
            background: rgba(255,255,255,0.92);
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            color: #888;
            padding: 0;
            transition: all 0.2s;
        }
        .close-btn:hover {
            color: var(--accent-color);
            border-color: rgba(179, 62, 62, 0.2);
            background: #fff;
        }
        .collection-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: nowrap;
            min-width: 0;
        }
        .collection-stats {
            flex: 0 0 auto;
            min-width: 0;
            font-size: 13px;
            color: #666;
            text-align: right;
            white-space: nowrap;
            letter-spacing: 0.03em;
        }
        .collection-filters {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            flex: 1 1 auto;
            min-width: 0;
        }
        .collection-filter-btn {
            border: 1px solid rgba(179, 62, 62, 0.18);
            background: rgba(255,255,255,0.9);
            color: #7a5d53;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            flex: 0 1 auto;
            cursor: pointer;
            transition: all 0.2s;
        }
        .collection-filter-btn:hover { border-color: rgba(179, 62, 62, 0.35); color: var(--accent-color); }
        .collection-filter-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); box-shadow: 0 6px 16px rgba(179, 62, 62, 0.2); }
        .collection-grid { display: block; }
        .collection-empty { padding: 36px 12px; text-align: center; color: #9a8f88; font-size: 14px; }
        .rarity-section { margin-bottom: 25px; }
        .rarity-title { font-size: 16px; font-weight: bold; color: #555; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-bottom: 15px; display: flex; align-items: center; }
        .rarity-badge-small { display: inline-block; padding: 2px 8px; border-radius: 4px; color: white; font-size: 12px; margin-right: 8px; min-width: 30px; text-align: center; }
        .rarity-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .collection-item { background: white; border-radius: 10px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; box-shadow: var(--shadow); border: 2px solid transparent; position: relative; transition: transform 0.2s; }
        .collection-item:hover { transform: translateY(-3px); }
        .collection-item.latest-target { box-shadow: 0 0 0 3px rgba(179, 62, 62, 0.14), 0 12px 24px rgba(0,0,0,0.08); }
        .collection-item .item-icon { width: 40px; height: 40px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; }
        .collection-icon-img { max-width: 100%; max-height: 100%; object-fit: contain; transition: filter 0.3s, opacity 0.3s; }
        .collection-item .item-title { font-weight: bold; font-size: 16px; font-family: "Yu Mincho", serif;}
        .item-new-badge { position: absolute; top: 8px; left: 8px; background: #ff1744; color: #fff; border-radius: 999px; padding: 3px 7px; font-size: 10px; font-weight: 900; line-height: 1; box-shadow: 0 4px 10px rgba(255, 23, 68, 0.28); }
        .item-count { margin-top: 6px; font-size: 12px; color: #7f736c; font-weight: 700; }
        .collection-item .item-rarity { font-size: 12px; font-weight: bold; margin-top: 5px; padding: 2px 6px; border-radius: 4px;}
        .collection-item.locked { background: #f0f0f0; border-color: #ddd !important; }
        .collection-item.locked .collection-icon-img { filter: grayscale(100%); opacity: 0.3; }
        .collection-item.locked .item-title { color: #aaa; }
        .collection-item.locked .item-rarity { background: #ccc !important; color: #666 !important; }
        .collection-item.unlocked { cursor: pointer; }

        .preview-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center; z-index: 1200; padding: 20px; box-sizing: border-box; }
        .preview-overlay.active { display: flex; }
        .preview-card { background: #fdfaf5; border-radius: 16px; max-width: 340px; width: 90%; border: 6px solid #333; box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; padding: 20px; box-sizing: border-box; animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes cardPop { 0% { transform: scale(0.8) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .preview-close { position: absolute; right: -12px; top: -12px; width: 32px; height: 32px; border: 2px solid #fff; border-radius: 50%; background: #333; color: #fff; font-size: 20px; line-height: 28px; text-align: center; cursor: pointer; z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.2); padding: 0; transition: transform 0.2s; }
        .preview-close:hover { transform: scale(1.1); }
        .preview-rarity-badge { position: absolute; top: -15px; left: -15px; color: #fff; padding: 6px 16px; font-weight: 900; font-size: 16px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid #fff; z-index: 10; transform: rotate(-5deg); letter-spacing: 1px; }
        .preview-image-container { width: 100%; height: 280px; background: #fff; border: 2px solid #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); padding: 10px; box-sizing: border-box; }
        .preview-image { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        .preview-title { text-align: center; font-family: "Yu Mincho", serif; font-size: 22px; font-weight: bold; margin: 0 0 15px 0; letter-spacing: 2px; }
        .preview-meta { display: grid; gap: 8px; margin-bottom: 15px; }
        .preview-meta-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 10px 12px; background: rgba(255,255,255,0.88); border: 1px solid #eee; border-radius: 10px; font-size: 13px; color: #706861; }
        .preview-meta-row strong { color: #3d3734; font-size: 14px; }
        .preview-desc-container { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); position: relative; }
        .preview-desc-container::before { content: "✦"; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #fdfaf5; padding: 0 10px; color: #ccc; font-size: 12px; }
        .preview-desc { font-size: 14px; color: #555; line-height: 1.6; margin: 0; text-align: justify; }
        .backup-toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translate(-50%, 16px);
            background: rgba(43, 39, 36, 0.92);
            color: #fff;
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: 0.02em;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
            z-index: 1300;
            white-space: nowrap;
            max-width: min(92vw, 360px);
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .backup-toast.active {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        .backup-toast.error {
            background: rgba(144, 44, 44, 0.94);
        }

        @media (max-width: 480px) {
            .omikuji-img {
                width: 220px;
                padding: 8px;
                border-radius: 8px;
                box-shadow: 
                    0 0 0 8px #fff, 
                    0 0 0 9px rgba(0,0,0,0.05), 
                    0 15px 30px rgba(0,0,0,0.15); 
            }

            .omikuji-container:active .omikuji-img {
                transform: scale(0.96) translateY(3px);
                box-shadow: 
                    0 0 0 8px #fff,
                    0 0 0 9px rgba(0,0,0,0.05),
                    0 8px 15px rgba(0,0,0,0.1);
            }

            .magic-glow {
                width: 300px;
                height: 300px;
            }
            
            .result-card {
                width: 280px; 
            }

            .collection-toolbar {
                gap: 8px;
            }

            .modal-header {
                gap: 8px;
            }

            .modal-header h2 {
                font-size: 17px;
            }

            .modal-header-actions {
                gap: 6px;
            }

            .modal-action-btn {
                font-size: 11px;
                padding: 6px 10px;
            }

            .close-btn {
                width: 28px;
                height: 28px;
                font-size: 20px;
            }

            .collection-filters {
                gap: 5px;
            }

            .collection-filter-btn {
                font-size: 10px;
                padding: 6px 8px;
                letter-spacing: 0.02em;
            }

            .collection-stats {
                font-size: 10px;
                letter-spacing: 0;
            }

            .backup-toast {
                bottom: 18px;
                max-width: min(94vw, 320px);
                font-size: 12px;
                padding: 9px 12px;
            }
        }
    </style>
    <link rel="stylesheet" href="shared/site-fonts.css">
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">ホーム</a>
        <h1>每日运势</h1>
        <button class="collection-btn" id="openCollectionBtn">📖 图鉴</button>
    </header>

    <div class="container">
        <div class="omikuji-container" id="omikujiContainer">
            <img src="https://cdn.jsdelivr.net/gh/Loepickst/kiki@main/chouqian.png"
                 onerror="this.src='https://images.unsplash.com/photo-1601362694738-f947e4eb1bc0?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80'; this.style.borderRadius='15px';" 
                 alt="点击抽签" class="omikuji-img" id="omikujiImg">
            <div class="magic-glow" id="magicGlow"></div>
        </div>

        <div class="result-card" id="resultCard">
            <div class="rarity-badge" id="rarityBadge">SSR</div>
            <div class="new-badge" id="newBadge">NEW!</div>
            <div class="result-inner" id="resultInner">
                <div class="result-icon" id="resultIcon"></div>
                <div class="result-title" id="resultTitle">大吉</div>
            </div>
            <div class="result-desc-container" id="resultDescBox">
                <div class="result-desc" id="resultDesc">今天的学习效率会非常高！</div>
                <div class="result-meta" id="resultMeta"></div>
            </div>
        </div>

        <div class="count-info">
            今日剩余次数：<span id="remainCount">3</span> / 3
        </div>
        
        <button class="action-btn" id="drawBtn">抽签 (Start)</button>
    </div>

    <div class="modal-overlay" id="collectionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>图鉴</h2>
                <div class="modal-header-actions">
                    <button type="button" class="modal-action-btn" id="exportCollectionBtn">导出</button>
                    <button type="button" class="modal-action-btn" id="importCollectionBtn">导入</button>
                    <button type="button" class="close-btn" id="closeCollectionBtn" aria-label="关闭图鉴">&times;</button>
                </div>
            </div>
            <div class="collection-toolbar">
                <div class="collection-filters" id="collectionFilters">
                    <button type="button" class="collection-filter-btn active" data-collection-filter="all">全部</button>
                    <button type="button" class="collection-filter-btn" data-collection-filter="unlocked">只看已解锁</button>
                    <button type="button" class="collection-filter-btn" data-collection-filter="locked">只看未解锁</button>
                </div>
                <div class="collection-stats" id="collectionStats">收集进度：0 / 11</div>
            </div>
            <div class="collection-grid" id="collectionGrid"></div>
        </div>
    </div>
    <input type="file" id="backupImportInput" accept=".json,application/json" hidden>
    <div class="backup-toast" id="backupToast" aria-live="polite"></div>

    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-card" id="previewCard">
            <button class="preview-close" id="previewClose">×</button>
            <div class="preview-rarity-badge" id="previewRarityBadge">SSR</div>
            <div class="preview-image-container">
                <img id="previewImage" class="preview-image" src="" alt="图鉴大图">
            </div>
            <div class="preview-title" id="previewTitle"></div>
            <div class="preview-meta" id="previewMeta"></div>
            <div class="preview-desc-container">
                <div class="preview-desc" id="previewDesc"></div>
            </div>
        </div>
    </div>

    <script>

        function safeParseJSON(rawValue, fallback) {
            try {
                const parsed = JSON.parse(rawValue);
                return parsed === null || parsed === undefined ? fallback : parsed;
            } catch (error) {
                return fallback;
            }
        }

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function getDailyState() {
            const today = getTodayString();
            const stored = localStorage.getItem('lotteryState_v2');
            if (stored) {
                const state = JSON.parse(stored);
                if (state.date === today) return state;
            }
            return { date: today, count: 0 };
        }

        function saveDailyState(count) {
            localStorage.setItem('lotteryState_v2', JSON.stringify({ date: getTodayString(), count: count }));
        }

        function getCollection() {
            const parsed = safeParseJSON(localStorage.getItem(COLLECTION_KEY), []);
            if (!Array.isArray(parsed)) {
                return [];
            }
            return parsed.filter((id) => typeof id === 'string' && id.trim());
        }

        function saveCollection(ids) {
            localStorage.setItem(COLLECTION_KEY, JSON.stringify(Array.from(new Set(ids))));
        }

        function getCollectionMeta() {
            const raw = safeParseJSON(localStorage.getItem(COLLECTION_META_KEY), {});
            if (!raw || typeof raw !== 'object' || Array.isArray(raw)) {
                return {};
            }

            return Object.keys(raw).reduce((acc, id) => {
                const entry = raw[id];
                if (!entry || typeof entry !== 'object' || Array.isArray(entry)) {
                    return acc;
                }

                const count = Number.parseInt(entry.count, 10);
                if (!Number.isInteger(count) || count <= 0) {
                    return acc;
                }

                const firstObtainedAt = Number(entry.firstObtainedAt);
                const lastObtainedAt = Number(entry.lastObtainedAt);
                acc[id] = {
                    count,
                    firstObtainedAt: Number.isFinite(firstObtainedAt) && firstObtainedAt > 0 ? firstObtainedAt : null,
                    lastObtainedAt: Number.isFinite(lastObtainedAt) && lastObtainedAt > 0 ? lastObtainedAt : null,
                    isNew: Boolean(entry.isNew)
                };
                return acc;
            }, {});
        }

        function saveCollectionMeta(meta) {
            localStorage.setItem(COLLECTION_META_KEY, JSON.stringify(meta));
        }

            const parsed = safeParseJSON(localStorage.getItem(LAST_OBTAINED_KEY), null);

            return {

            };

        function getNormalizedPetRewardState() {
            const parsed = safeParseJSON(localStorage.getItem(PET_STATE_KEY), {});
            const source = parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
            const hasWrappedPetStates = source.petStates && typeof source.petStates === 'object' && !Array.isArray(source.petStates);
            const hasWrappedCollection = source.petCollection && typeof source.petCollection === 'object' && !Array.isArray(source.petCollection);
            const wrapper = (hasWrappedPetStates || hasWrappedCollection)
                ? { ...source }
                : { petStates: { shiba: source }, petCollection: {} };

            if (!wrapper.petStates || typeof wrapper.petStates !== 'object' || Array.isArray(wrapper.petStates)) {
                wrapper.petStates = {};
            }
            if (!wrapper.petCollection || typeof wrapper.petCollection !== 'object' || Array.isArray(wrapper.petCollection)) {
                wrapper.petCollection = {};
            }

            const unlockedPetIds = Array.isArray(wrapper.petCollection.unlockedPetIds)
                ? wrapper.petCollection.unlockedPetIds.filter((petId) => typeof petId === 'string' && petId.trim())
                : [];
            const unlockedInteractionIds = Array.isArray(wrapper.petCollection.unlockedInteractionIds)
                ? wrapper.petCollection.unlockedInteractionIds.filter((interactionId) => typeof interactionId === 'string' && interactionId.trim())
                : [];

            wrapper.petCollection.unlockedPetIds = Array.from(new Set([...DEFAULT_UNLOCKED_PET_IDS, ...unlockedPetIds]));
            wrapper.petCollection.unlockedInteractionIds = Array.from(new Set(unlockedInteractionIds));
            return wrapper;
        }

        function unlockPetInteraction(interactionId) {
            const normalizedId = String(interactionId || '').trim();
            if (!normalizedId) {
                return false;
            }

            const petState = getNormalizedPetRewardState();
            if (petState.petCollection.unlockedInteractionIds.includes(normalizedId)) {
                return false;
            }

            petState.petCollection.unlockedInteractionIds.push(normalizedId);
            localStorage.setItem(PET_STATE_KEY, JSON.stringify(petState));
            return true;
        }

        function getUnlockedIdsFromMeta(meta) {
            return Object.keys(meta).filter((id) => {
                const entry = meta[id];
                return entry && Number(entry.count) > 0;
            });
        }

        function migrateLegacyCollectionIfNeeded() {
            const legacyIds = getCollection();
            const meta = getCollectionMeta();
            let didChange = false;

            legacyIds.forEach((id) => {
                if (!meta[id]) {
                    meta[id] = {
                        count: 1,
                        firstObtainedAt: null,
                        lastObtainedAt: null,
                        isNew: false
                    };
                    didChange = true;
                }
            });

            const normalizedLegacy = getUnlockedIdsFromMeta(meta);
            if (normalizedLegacy.length !== legacyIds.length || normalizedLegacy.some((id, index) => id !== legacyIds[index])) {
                saveCollection(normalizedLegacy);
            }

            if (didChange) {
                saveCollectionMeta(meta);
            }

            return meta;
        }

        function recordFortuneObtained(fortune) {
            const meta = migrateLegacyCollectionIfNeeded();
            const now = Date.now();
            const existing = meta[fortune.id];
            const isNew = !existing;

            if (existing) {
                existing.count += 1;
                existing.lastObtainedAt = now;
            } else {
                meta[fortune.id] = {
                    count: 1,
                    firstObtainedAt: now,
                    lastObtainedAt: now,
                    isNew: true
                };
            }

            saveCollectionMeta(meta);
            saveCollection(getUnlockedIdsFromMeta(meta));
            saveLastObtained(fortune.id, now);

            return {
                isNew,
                meta: meta[fortune.id]
            };
        }

        function markFortunePreviewed(id) {
            const meta = migrateLegacyCollectionIfNeeded();
            if (!meta[id] || !meta[id].isNew) {
                return false;
            }

            meta[id].isNew = false;
            saveCollectionMeta(meta);
            return true;
        }

        function formatDateTime(timestamp) {
            const value = Number(timestamp);
            if (!Number.isFinite(value) || value <= 0) {
                return '历史解锁';

            const d = new Date(value);
            return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function getBackupFileName(timestamp = Date.now()) {
            const d = new Date(timestamp);
            return `lottery-backup-${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}-${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}${String(d.getSeconds()).padStart(2, '0')}.json`;
        }

        function buildLotteryBackupPayload() {
            const normalizedMeta = migrateLegacyCollectionIfNeeded();
            const exportedAt = Date.now();

            return {
                version: 1,
                exportedAt,
                source: 'lottery',
                data: {
                    omikujiCollection: getUnlockedIdsFromMeta(normalizedMeta),
                    omikujiCollectionMeta_v1: normalizedMeta,
                    omikujiLastObtained_v1: getLastObtained(),
                    lotteryState_v2: getDailyState(),
                    specialPoolState_v1: getSpecialPoolState()
                }
            };
        }

        function createLotteryBackupFile(payload) {
            const content = JSON.stringify(payload, null, 2);
            const fileName = getBackupFileName(payload.exportedAt);
            const blob = new Blob([content], { type: 'application/json' });
            const file = typeof File === 'function'
                ? new File([blob], fileName, { type: 'application/json' })
                : null;

            return { content, fileName, blob, file };
        }

        async function shareLotteryBackup(file) {

                return 'unsupported';
            }

            const shareData = { files: [file] };
            if (typeof navigator.canShare === 'function' && !navigator.canShare(shareData)) {
                return 'unsupported';
            }

            try {
                await navigator.share(shareData);
                return 'shared';
            } catch (error) {
                if (error && error.name === 'AbortError') {
                    return 'cancelled';
                }
                return 'failed';
            }
        }

        function downloadLotteryBackup(payload) {
            const { blob, fileName } = createLotteryBackupFile(payload);
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = fileName;
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            window.setTimeout(() => URL.revokeObjectURL(url), 1200);
        }

        function promptImportLotteryBackup() {
            if (!backupImportInput) {
                return;
            }

            backupImportInput.value = '';
            backupImportInput.click();
        }

        function parseLotteryBackup(text) {
            try {
                return JSON.parse(text);
            } catch (error) {
                throw new Error('存档文件无法解析');
            }
        }

        function validateLotteryBackup(payload) {
            if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
                throw new Error('存档格式不正确');
            }

            if (Number(payload.version) !== 1 || payload.source !== 'lottery') {
                throw new Error('这不是可用的抽卡存档');
            }

            const data = payload.data;
            if (!data || typeof data !== 'object' || Array.isArray(data)) {
                throw new Error('存档内容缺失');
            }

            const requiredKeys = [
                COLLECTION_KEY,
                COLLECTION_META_KEY,
                LAST_OBTAINED_KEY,
                'lotteryState_v2',
                'specialPoolState_v1'
            ];

            for (const key of requiredKeys) {
                if (!(key in data)) {
                    throw new Error('存档内容不完整');
                }
            }

            if (!Array.isArray(data[COLLECTION_KEY])) {
                throw new Error('图鉴列表数据无效');
            }

            if (!data[COLLECTION_META_KEY] || typeof data[COLLECTION_META_KEY] !== 'object' || Array.isArray(data[COLLECTION_META_KEY])) {
                throw new Error('图鉴元数据无效');
            }

            if (data[LAST_OBTAINED_KEY] !== null && (typeof data[LAST_OBTAINED_KEY] !== 'object' || Array.isArray(data[LAST_OBTAINED_KEY]))) {
                throw new Error('最新获得数据无效');
            }

            if (!data['lotteryState_v2'] || typeof data['lotteryState_v2'] !== 'object' || Array.isArray(data['lotteryState_v2'])) {
                throw new Error('每日抽卡记录无效');
            }

            if (!data['specialPoolState_v1'] || typeof data['specialPoolState_v1'] !== 'object' || Array.isArray(data['specialPoolState_v1'])) {
                throw new Error('特殊奖池记录无效');
            }

            return {
                version: 1,
                exportedAt: Number.isFinite(Number(payload.exportedAt)) ? Number(payload.exportedAt) : Date.now(),
                source: 'lottery',
                data: {
                    omikujiCollection: data[COLLECTION_KEY],
                    omikujiCollectionMeta_v1: data[COLLECTION_META_KEY],
                    omikujiLastObtained_v1: data[LAST_OBTAINED_KEY],
                    lotteryState_v2: data['lotteryState_v2'],
                    specialPoolState_v1: data['specialPoolState_v1']
                }
            };
        }

        function writeBackupStorageValue(key, value) {
            if (value === undefined) {
                return;
            }
            if (value === null) {
                localStorage.setItem(key, 'null');
                return;
            }
            localStorage.setItem(key, JSON.stringify(value));
        }

        function applyLotteryBackup(payload) {
            writeBackupStorageValue(COLLECTION_KEY, payload.data.omikujiCollection);
            writeBackupStorageValue(COLLECTION_META_KEY, payload.data.omikujiCollectionMeta_v1);
            writeBackupStorageValue(LAST_OBTAINED_KEY, payload.data.omikujiLastObtained_v1);
            writeBackupStorageValue('lotteryState_v2', payload.data.lotteryState_v2);
            writeBackupStorageValue('specialPoolState_v1', payload.data.specialPoolState_v1);
            migrateLegacyCollectionIfNeeded();
        }

        function refreshLotteryUIAfterImport() {
            currentState = getDailyState();
            remain = Math.max(0, MAX_DAILY_COUNT - currentState.count);
            remainCountSpan.textContent = remain;

            resultCard.style.display = 'none';
            if (resultDescBox) {
                resultDescBox.style.display = 'none';
            }
            newBadge.style.display = 'none';
            omikujiContainer.style.display = 'flex';

            if (remain > 0) {
                drawBtn.disabled = false;
                drawBtn.textContent = '抽签 (Start)';
                drawBtn.style.backgroundColor = '';
            } else {
                drawBtn.disabled = true;
                drawBtn.textContent = '明日再来';
                drawBtn.style.backgroundColor = '#ccc';
            }

            if (collectionModal.classList.contains('active')) {
                renderCollection({ autoFocusLatest: true });
            }
        }

        function isUnlockedByFilter(filterMode, isUnlocked) {
            if (filterMode === 'unlocked') {
                return isUnlocked;
            }
            if (filterMode === 'locked') {
                return !isUnlocked;
            }
            return true;
        }

        function updateFilterButtons() {
            collectionFilterButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.collectionFilter === currentCollectionFilter);
            });
        }

        function openPreview(fortune) {
            const meta = migrateLegacyCollectionIfNeeded();
            const entry = meta[fortune.id] || null;
            const previewedNow = markFortunePreviewed(fortune.id);

            previewImage.src = fortune.icon;
            previewImage.alt = fortune.title;
            previewTitle.textContent = fortune.title;
            previewTitle.style.color = fortune.color;
            previewCard.style.borderColor = fortune.color;
            previewRarityBadge.textContent = fortune.rarity;
            previewRarityBadge.style.background = fortune.color;
            previewDesc.textContent = fortune.desc;
            previewMeta.innerHTML = `
                <div class="preview-meta-row">
                    <span>获得次数</span>
                    <strong>${entry ? entry.count : 0} 次</strong>
                </div>
            `;

            if (previewedNow) {
                renderCollection({ preserveScroll: true, autoFocusLatest: false });
            }

            previewOverlay.classList.add('active');
        }

        function getSpecialPoolState() {
            return JSON.parse(localStorage.getItem('specialPoolState_v1')) || {
                totalDraws: 0,
                specialHit: false
            };
        }

        function saveSpecialPoolState(state) {
            localStorage.setItem('specialPoolState_v1', JSON.stringify(state));
        }

        function renderCollection(options = {}) {
            const { preserveScroll = false, autoFocusLatest = false } = options;
            const previousScrollTop = preserveScroll ? collectionModalContent.scrollTop : 0;
            const meta = migrateLegacyCollectionIfNeeded();
            const unlockedIds = getUnlockedIdsFromMeta(meta);
            const lastObtained = getLastObtained();
            collectionGrid.innerHTML = '';
            updateFilterButtons();
            
            const rarityOrder = ['SP', 'KR', 'UR', 'SSR', 'SR', 'R'];
            const rarityColors = {
                'SP': '#9c27b0',
                'KR': '#000000',
                'UR': '#d4af37',
                'SSR': '#d32f2f',
                'SR': '#00897b',
                'R': '#f57c00'
            };
            let hasVisibleItem = false;

            rarityOrder.forEach(rarity => {
                const items = fortunes.filter(f => f.rarity === rarity);
                if (items.length === 0) return;
                const filteredItems = items.filter((fortune) => {
                    const entry = meta[fortune.id];
                    const isUnlocked = Boolean(entry && entry.count > 0);
                    return isUnlockedByFilter(currentCollectionFilter, isUnlocked);
                });
                if (filteredItems.length === 0) return;
                hasVisibleItem = true;

                const section = document.createElement('div');
                section.className = 'rarity-section';

                const title = document.createElement('div');
                title.className = 'rarity-title';
                const unlockedInRarity = items.filter(i => {
                    const entry = meta[i.id];
                    return Boolean(entry && entry.count > 0);
                }).length;
                title.innerHTML = `<span class="rarity-badge-small" style="background:${rarityColors[rarity] || '#ccc'}">${rarity}</span> 收集进度: ${unlockedInRarity}/${items.length}`;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'rarity-grid';

                filteredItems.forEach(f => {
                    const entry = meta[f.id];
                    const isUnlocked = Boolean(entry && entry.count > 0);
                    const div = document.createElement('div');
                    div.className = `collection-item ${isUnlocked ? 'unlocked' : 'locked'}`;
                    div.dataset.fortuneId = f.id;
                    if (lastObtained && lastObtained.id === f.id) {
                        div.classList.add('latest-target');
                    }
                    if(isUnlocked) div.style.borderColor = f.color;
                    
                    div.innerHTML = `
                        ${isUnlocked && entry && entry.isNew ? '<div class="item-new-badge">新获得</div>' : ''}
                        <div class="item-icon">
                            <img src="${f.icon}" alt="${f.title}" class="collection-icon-img" onerror="this.src='https://via.placeholder.com/40';">
                        </div>
                        <div class="item-title">${isUnlocked ? f.title : '???'}</div>
                        ${isUnlocked && entry ? `<div class="item-count">×${entry.count}</div>` : ''}
                        <div class="item-rarity" style="background: ${f.color}; color: white;">${f.rarity}</div>
                    `;
                    if (isUnlocked) {
                        div.addEventListener('click', () => openPreview(f));
                    }
                    grid.appendChild(div);
                });

                section.appendChild(grid);
                collectionGrid.appendChild(section);
            });

            if (!hasVisibleItem) {
                collectionGrid.innerHTML = `<div class="collection-empty">当前筛选下还没有对应卡片。</div>`;
            }

            collectionStats.textContent = `总收集进度：${unlockedIds.length} / ${fortunes.length}`;

            if (preserveScroll) {
                requestAnimationFrame(() => {
                    collectionModalContent.scrollTop = previousScrollTop;
                });
            } else if (autoFocusLatest) {
                requestAnimationFrame(() => {
                    const latestId = lastObtained && lastObtained.id;
                    if (!latestId) {
                        collectionModalContent.scrollTop = 0;
                        return;
                    }

                    const target = collectionGrid.querySelector(`[data-fortune-id="${latestId}"]`);
                    if (!target && currentCollectionFilter !== 'all') {
                        currentCollectionFilter = 'all';
                        renderCollection({ autoFocusLatest: true });
                        return;
                    }

                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        collectionModalContent.scrollTop = 0;
                    }
                });
            }
        }

        openCollectionBtn.addEventListener('click', () => {
            currentCollectionFilter = 'all';
            collectionModal.classList.add('active');
            renderCollection({ autoFocusLatest: true });
        });
        exportCollectionBtn.addEventListener('click', async () => {
            const payload = buildLotteryBackupPayload();
            const { file } = createLotteryBackupFile(payload);
            const shareResult = await shareLotteryBackup(file);

            if (shareResult === 'shared') {
                showBackupToast('存档已准备好，可保存到“文件”');
                return;
            }

            if (shareResult === 'cancelled') {
                return;
            }

            downloadLotteryBackup(payload);
            showBackupToast('存档文件已导出');
        });
        importCollectionBtn.addEventListener('click', () => {
            promptImportLotteryBackup();
        });
        closeCollectionBtn.addEventListener('click', () => collectionModal.classList.remove('active'));
        collectionModal.addEventListener('click', (e) => {
            if(e.target === collectionModal) collectionModal.classList.remove('active');
        });
        collectionFilterButtons.forEach((button) => {
            button.addEventListener('click', () => {
                currentCollectionFilter = button.dataset.collectionFilter || 'all';
                renderCollection();
            });
        });
        previewClose.addEventListener('click', () => previewOverlay.classList.remove('active'));
        previewOverlay.addEventListener('click', (e) => {
            if (e.target === previewOverlay) previewOverlay.classList.remove('active');
        });
        backupImportInput.addEventListener('change', async (event) => {
            const [file] = Array.from(event.target.files || []);
            if (!file) {
                return;
            }

            try {
                const text = await file.text();
                const parsed = parseLotteryBackup(text);
                const payload = validateLotteryBackup(parsed);
                const shouldImport = window.confirm('导入后会覆盖当前本地抽卡记录，确定继续吗？');
                if (!shouldImport) {
                    return;
                }

                applyLotteryBackup(payload);
                refreshLotteryUIAfterImport();
                showBackupToast('抽卡记录已恢复');
            } catch (error) {
                showBackupToast(error && error.message ? error.message : '导入失败', 'error');
            } finally {
                event.target.value = '';
            }
        });

        function drawFortune() {
            const rarityRates = {
                "KR": 2,
                "UR": 4,
                "SSR": 15,
                "SR": 35,
                "R": 44
            };

            const rand = Math.random() * 100;
            let cumulative = 0;
            let selectedRarity = "R";
            
            for (const rarity in rarityRates) {
                cumulative += rarityRates[rarity];
                if (rand < cumulative) {
                    selectedRarity = rarity;
                    break;
                }
            }

            const pool = fortunes.filter(f => f.rarity === selectedRarity && !f.isSpecial);
            
            if (pool.length === 0) {
                const normalPool = fortunes.filter(f => !f.isSpecial);
                return normalPool[Math.floor(Math.random() * normalPool.length)];
            }

            const totalWeight = pool.reduce((sum, item) => sum + (item.weight || 1), 0);
            let randomWeight = Math.random() * totalWeight;

            for (const fortune of pool) {
                const w = fortune.weight || 1;
                if (randomWeight < w) {
                    return fortune;
                }
                randomWeight -= w;
            }

            return pool[0];
        }

        function drawSpecialFortune() {
            const specialPool = fortunes.filter(f => f.isSpecial);
            if (specialPool.length === 0) return drawFortune();

            const totalWeight = specialPool.reduce((sum, item) => sum + (item.weight || 1), 0);
            let randomWeight = Math.random() * totalWeight;

            for (const fortune of specialPool) {
                const w = fortune.weight || 1;
                if (randomWeight < w) {
                    return fortune;
                }
                randomWeight -= w;
            }

            return specialPool[0];
        }

        function drawFortuneWithSpecialPool() {
            const specialState = getSpecialPoolState();

            if (specialState.specialHit) {
                specialState.totalDraws += 1;
                saveSpecialPoolState(specialState);
                return drawFortune();
            }

            const nextDrawIndex = specialState.totalDraws + 1;
            let shouldHitSpecial = false;

            if (nextDrawIndex === 10) {
                shouldHitSpecial = true;
            } else if (nextDrawIndex < 10) {
                const earlyRates = {
                    1: 0.03,
                    2: 0.04,
                    3: 0.05,
                    4: 0.06,
                    5: 0.08,
                    6: 0.10,
                    7: 0.12,
                    8: 0.15,
                    9: 0.20
                };
                shouldHitSpecial = Math.random() < (earlyRates[nextDrawIndex] || 0);
            }

            specialState.totalDraws += 1;

            if (shouldHitSpecial) {
                specialState.specialHit = true;
                saveSpecialPoolState(specialState);
                return drawSpecialFortune();
            }

            saveSpecialPoolState(specialState);
            return drawFortune();
        }

        let currentState = getDailyState();
        migrateLegacyCollectionIfNeeded();
        let remain = MAX_DAILY_COUNT - currentState.count;
        remainCountSpan.textContent = remain;
        if (remain <= 0) {
            drawBtn.disabled = true;
            drawBtn.textContent = "明日再来";
            drawBtn.style.backgroundColor = "#ccc";
        }

        drawBtn.addEventListener('click', () => {
            if (remain <= 0) return;

            resultCard.style.display = 'none';
            if (resultDescBox) resultDescBox.style.display = 'none';
            newBadge.style.display = 'none'; 
            
            omikujiContainer.style.display = 'flex'; 
            omikujiContainer.classList.add('shake');
            drawBtn.disabled = true;

            setTimeout(() => {
                omikujiContainer.classList.remove('shake');
                omikujiContainer.style.display = 'none'; 
                
                const randomFortune = drawFortuneWithSpecialPool();
                const drawRecord = recordFortuneObtained(randomFortune);
                const isNew = drawRecord.isNew;
                const didUnlockColaTreat = randomFortune.id === 'f19'
                    ? unlockPetInteraction(COLA_TREAT_UNLOCK_ID)
                    : false;

                resultCard.style.borderColor = randomFortune.color;
                
                resultTitle.style.color = randomFortune.color;
                resultTitle.style.borderColor = randomFortune.color;
                
                rarityBadge.textContent = randomFortune.rarity;
                rarityBadge.style.background = randomFortune.color;

                resultTitle.textContent = randomFortune.title;

                if (resultIcon) {
                    resultIcon.innerHTML = `<img src="${randomFortune.icon}" alt="${randomFortune.title}" class="icon-img" onerror="this.src='https://via.placeholder.com/300x320?text=Card+Missing';">`;
                }

                resultDesc.textContent = randomFortune.desc;
                if (didUnlockColaTreat) {
                    resultMeta.textContent = '已解锁柴犬互动：喂可乐';
                    resultMeta.style.display = 'block';
                } else if (isNew) {
                    resultMeta.textContent = '';
                    resultMeta.style.display = 'none';
                } else {
                    resultMeta.textContent = `已获得 ${drawRecord.meta.count} 次`;
                    resultMeta.style.display = 'block';
                }
                
                currentState.count++;
                saveDailyState(currentState.count);
                remain = MAX_DAILY_COUNT - currentState.count;
                remainCountSpan.textContent = remain;

                resultCard.style.display = 'block';
                if (resultDescBox) resultDescBox.style.display = 'block';
                
                if(isNew) {
                    newBadge.style.display = 'flex';
                }

                if (remain > 0) {
                    drawBtn.disabled = false;
                } else {
                    drawBtn.textContent = "明日再来";
                    drawBtn.style.backgroundColor = "#ccc";
                }

            }, 800); 
        });

        omikujiContainer.addEventListener('click', () => {
            if (!drawBtn.disabled) drawBtn.click();
        });
    </script>
</body>
