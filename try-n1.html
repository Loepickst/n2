                            「<span class="vocab-point" onclick="showItem('senpou')"><ruby>先<rt>せん</rt></ruby><ruby>方<rt>ぽう</rt></ruby></span>から問い合わせがあったんだぞ。うちの商品の良さをわかってもらえる<span class="vocab-point" onclick="showItem('zekkou')"><ruby>絶<rt>ぜっ</rt></ruby><ruby>好<rt>こう</rt></ruby></span>のチャンスだった<span class="grammar-point" onclick="showItem('monowo')">ものを</span>……。」
                            <p class="translation">“明明是对方主动来咨询的啊。这本来是一个让他们了解我们产品优势的绝佳机会，可是你却……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">本田</div>
                        <div class="script-line">
                            「はあ。でも、あちらの担当者<span class="grammar-point" onclick="showItem('tokitara')">ときたら</span>、価格のことしか言わないんです。だから説明し<span class="grammar-point" onclick="showItem('tatokorode')">たところで</span>無駄だと思ったんですよ。」
                            <p class="translation">“唉。但是，说到那边那个负责人，满嘴只谈价格。所以我觉得就算跟他解释了也是白费口舌。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">部長</div>
                        <div class="script-line">
                            「相手が何を<span class="grammar-point" onclick="showItem('ouga')">言おうが</span>、気にしないで、<ruby>我<rt>わ</rt></ruby>が<ruby>社<rt>しゃ</rt></ruby>の技術をどんどん<ruby>宣<rt>せん</rt></ruby><ruby>伝<rt>でん</rt></ruby>しなきゃだめじゃないか。」
                            <p class="translation">“不管对方说什么，你都别在意，必须得不断宣传我们公司的技术才行啊。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">本田</div>
                        <div class="script-line">
                            「でも、部長。『毎年新製品が出るんだから、今年は新製品でも来年は古くなる。だから１年<span class="grammar-review" onclick="showItem('gotoni')">ごとに</span><span class="vocab-point" onclick="showItem('leaseryou')">リース<ruby>料<rt>りょう</rt></ruby></span>を１０％ずつ安くしろ。』と言われたんです。こちらが<span class="vocab-point" onclick="showItem('akaji')"><ruby>赤<rt>あか</rt></ruby><ruby>字<rt>じ</rt></ruby></span>に<span class="grammar-point" onclick="showItem('rougamaimaiga')">なろうがなるまいが</span>、自分の会社<span class="grammar-review" onclick="showItem('saeba')">さえ</span>よけれ<span class="grammar-review" onclick="showItem('saeba')">ば</span>いいんですよ。安くしてほしい<span class="grammar-point" onclick="showItem('narade')">なら</span>ほしい<span class="grammar-point" onclick="showItem('narade')">で</span>、<ruby>納<rt>なっ</rt></ruby><ruby>得<rt>とく</rt></ruby>できる条件を<span class="vocab-point" onclick="showItem('teiji')"><ruby>提<rt>てい</rt></ruby><ruby>示<rt>じ</rt></ruby></span>すべきですよね。」
                            <p class="translation">“可是部长，他对我说：‘反正每年都出新产品，今年的新品明年就变旧了。所以租赁费要每年降10%。’ 不管我们这边会不会亏损，他只在乎自己公司好就行。如果想要便宜，想要便宜也没关系，但应该提出能让我们信服的条件吧。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">部長</div>
                        <div class="script-line">
                            「う〜ん、すごい担当者だな。相手<span class="grammar-point" onclick="showItem('nisureba')">にすれば</span>、<ruby>経<rt>けい</rt></ruby><ruby>費<rt>ひ</rt></ruby>は安ければ安いほどいいわけだからなあ。仕方がない。あちらの条件を聞いてみるか。<span class="vocab-point" onclick="showItem('saisan')"><ruby>採<rt>さい</rt></ruby><ruby>算<rt>さん</rt></ruby></span>が取れなければあきらめる<span class="grammar-point" onclick="showItem('madenokotoda')">までのことだが</span>……。<span class="vocab-point" onclick="showItem('tonikaku')">とにかく</span>、次は私も<ruby>同<rt>どう</rt></ruby><ruby>行<rt>こう</rt></ruby>する<span class="grammar-review" onclick="showItem('kara')">から</span>な。」
                            <p class="translation">“嗯……真是个厉害的负责人啊。站在对方的立场看，经费当然是越便宜越好嘛。没办法，先听听那边的条件吧。如果实在赚不到钱，顶多就是放弃这笔生意罢了……总之，下次我也跟你一起去。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">本田</div>
                        <div class="script-line">
                            「はい。」
                            <p class="translation">“是。”</p>
                        </div>
                    </div>

                </div>
            </article></template>
            <template id="lesson-12-content"><article id="lesson-12">
                <div class="lesson-header">
                    <span>ビジネス会話</span>
                    <span>さすが本田君 (2)</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    さすが<ruby>本<rt>ほん</rt></ruby><ruby>田<rt>だ</rt></ruby>君 (2)
                </h2>
                
                <style>
                    .script-row { display: flex; margin-bottom: 20px; align-items: baseline; }
                    .script-speaker { font-weight: bold; width: 3.5em; flex-shrink: 0; text-align: right; margin-right: 15px; color: #333; }
                    .script-line { flex-grow: 1; line-height: 1.8; }
                    
                    /* 译文样式 */
                    .script-line .translation { 
                        margin-top: 5px; 
                        color: #666; 
                        font-size: 0.85em; 
                    }
                </style>

                <div class="japanese-text">
                    
                    <div class="script-row">
                        <div class="script-speaker">部長</div>
                        <div class="script-line">
                            「<span class="vocab-point" onclick="showItem('kuyashii')"><ruby>悔<rt>くや</rt></ruby>しい</span><span class="grammar-point" onclick="showItem('toittaranai')">といったらない</span>な。たった<ruby>半<rt>はん</rt></ruby><ruby>日<rt>にち</rt></ruby>の差でライバル社に<span class="vocab-point" onclick="showItem('keiyaku')"><ruby>契<rt>けい</rt></ruby><ruby>約<rt>やく</rt></ruby></span>を持っていかれるとは。」
                            <p class="translation">“简直悔得没法说。没想到只差了半天，合同就被竞争对手抢走了。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">本田</div>
                        <div class="script-line">
                            「すみません、部長。僕があのとき商品の説明をしっかりしていれば……。」
                            <p class="translation">“非常抱歉，部长。要是我那时候好好说明产品的话……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">部長</div>
                        <div class="script-line">
                            「いや、君のせいじゃないよ。<span class="vocab-point" onclick="showItem('apo')">アポ</span>が取れなかったんだから、<span class="vocab-point" onclick="showItem('keiyaku')">契約</span>を<span class="grammar-point" onclick="showItem('rounimonai')">取ろうにも取れない</span>じゃないか。」
                            <p class="translation">“不，不是你的错。因为没约上时间，就算想拿合同也拿不到啊。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">本田</div>
                        <div class="script-line">
                            「でも、ほんとに<span class="vocab-point" onclick="showItem('kuyashii')">悔しい</span><span class="grammar-review" onclick="showItem('ssu')">っす</span>。」
                            <p class="translation">“可是，真的好不甘心啊。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">部長</div>
                        <div class="script-line">
                            「こうなったら<span class="vocab-point" onclick="showItem('katappashi')"><ruby>片<rt>かた</rt></ruby>っ<ruby>端<rt>ぱし</rt></ruby></span>からパンフレットを<span class="grammar-point" onclick="showItem('makutte')">配りまくって</span>みるか。」
                            <p class="translation">“既然这样，我们要不就不管三七二十一到处狂发宣传册试试看吧。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">本田</div>
                        <div class="script-line">
                            「そうですね。カプテック社<span class="grammar-point" onclick="showItem('nishitatokorode')">にしたところで</span>あの条件では、そんなに<span class="vocab-point" onclick="showItem('moukaru')"><ruby>儲<rt>もう</rt></ruby>かる</span>はずないですよね。毎年リース料を下げ続けるなんて。」
                            <p class="translation">“说得也是。就算是Captech公司，那种条件下也不可能赚多少钱吧。居然还要每年持续降低租赁费什么的。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">部長</div>
                        <div class="script-line">
                            「そうだよ。契約しなくて<ruby>正<rt>せい</rt></ruby><ruby>解<rt>かい</rt></ruby>だったんだよ。どんな条件で契約したか知らないが、<ruby>仮<rt>かり</rt></ruby>に本当に10％ずつ下げ続けたら……。」
                            <p class="translation">“就是说啊。没签合同才是正解。虽然不知道他们是以什么条件签的，但假如真的每年降10%的话……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">本田</div>
                        <div class="script-line">
                            「10年後はリース料<span class="vocab-point" onclick="showItem('tada')">ただ</span>ですよ。カプテック社も<ruby>馬<rt>ば</rt></ruby><ruby>鹿<rt>か</rt></ruby>だな。はははははは。元気出てきた。部長、僕、次こそいい条件で<span class="vocab-point" onclick="showItem('keiyaku')">契約</span>を<span class="grammar-point" onclick="showItem('temisemasu')">取ってみせます</span>よ。」
                            <p class="translation">“10年后租赁费就是免费了。Captech公司也真够傻的。哈哈哈哈。我有精神了。部长，下一次我一定要签个好条件的合同给您看。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">部長</div>
                        <div class="script-line">
                            「さすが本田君だ。<span class="vocab-point" onclick="showItem('tachinaori')"><ruby>立<rt>た</rt></ruby>ち<ruby>直<rt>なお</rt></ruby>り</span>が早いね。」
                            <p class="translation">“不愧是本田君。恢复得真快啊。”</p>
                        </div>
                    </div>

                </div>
            </article></template>
            <template id="lesson-13-content"><article id="lesson-13">
                <div class="lesson-header">
                    <span>小説</span>
                    <span>楽園の萌花 (1)</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>楽<rt>らく</rt></ruby><ruby>園<rt>えん</rt></ruby>の<ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby> (1)
                </h2>

                <div class="japanese-text">
                    
                    <p>
                        何か<span class="vocab-point" onclick="showItem('kangaekonde')"><ruby>考<rt>かんが</rt></ruby>え<ruby>込<rt>こ</rt></ruby>んで</span>いる表情で<ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby>は<span class="vocab-point" onclick="showItem('sakihodo')"><ruby>先<rt>さき</rt></ruby>ほど</span>から庭を<span class="grammar-point" onclick="showItem('tsutsu')"><ruby>行<rt>い</rt></ruby>きつ<ruby>戻<rt>もど</rt></ruby>りつ</span>している。<ruby>優<rt>ゆう</rt></ruby><ruby>斗<rt>と</rt></ruby>はその様子を見る<span class="grammar-point" onclick="showItem('tomonaku')">ともなく</span>見ている。
                    </p>
                    <p class="translation">萌花面露凝重之色，似乎陷入了沉思，从刚才起便在庭院中徘徊不定。优斗则在一旁，目光漫不经心地追随着她的身影。</p>

                    <p>
                        <ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby>は十六歳。年よりもずっと大人<span class="grammar-review" onclick="showItem('ppoi')">っぽい</span>印象だ。この神社の娘として生まれ、町を<span class="vocab-point" onclick="showItem('ikai')"><ruby>異<rt>い</rt></ruby><ruby>界<rt>かい</rt></ruby></span>のものたちから守る<span class="grammar-point" onclick="showItem('beku')">べく</span>育てられてきたのだから、普通の十六歳と同じはずがない。<span class="vocab-point" onclick="showItem('monogokoro')"><ruby>物<rt>もの</rt></ruby><ruby>心<rt>ごころ</rt></ruby></span>ついて<span class="grammar-point" onclick="showItem('tekaratoiumono')">からというもの</span>、<ruby>修<rt>しゅ</rt></ruby><ruby>行<rt>ぎょう</rt></ruby>ずくめの毎日だった。この家に生まれたばかりに、普通の子どものように遊んだこともない。それは、生まれ<span class="grammar-point" onclick="showItem('nagarani')">ながらに</span>決められていたことだった。とはいえ、それを不満に思っているわけでもない。<ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby><span class="grammar-review" onclick="showItem('nishitemireba')">にしてみれば</span>、当たり前のことをしてき<span class="grammar-point" onclick="showItem('tamadenokotoda')">たまでのことである</span>。厳しい<ruby>修<rt>しゅ</rt></ruby><ruby>行<rt>ぎょう</rt></ruby><span class="grammar-point" onclick="showItem('womonotomosezu')">をものともせず</span>、母親をも超える力を身につけてきた。
                    </p>
                    <p class="translation">萌花今年十六岁，却给人一种远超其实际年龄的成熟感。生为这间神社的女儿，她是为了从“异界”之物手中守护这座小镇而被抚养长大的，自然不可能与寻常的十六岁少女相提并论。自打记事起，她的生活便完全被修行所填满。只因生在这个家族，她从未像普通孩子那样嬉戏玩耍过。那是从降生之刻起便已注定的命运。虽说如此，她并未对此心怀不满。对萌花而言，这不过是履行理所应当的职责罢了。她无视严酷修行的磨砺，甚至习得了凌驾于母亲之上的力量。</p>

                    <p>
                        <ruby>優<rt>ゆう</rt></ruby><ruby>斗<rt>と</rt></ruby>は十七歳、高校２年生である。<ruby>赤<rt>あか</rt></ruby>ん<ruby>坊<rt>ぼう</rt></ruby>のころに事故で両親を失い、この神社に<span class="vocab-point" onclick="showItem('hikitorareta')"><ruby>引<rt>ひ</rt></ruby>き<ruby>取<rt>と</rt></ruby>られた</span>。今は、高校に通う<span class="grammar-point" onclick="showItem('katawara')">かたわら</span>、神社の掃除<span class="grammar-review" onclick="showItem('yara')">やら</span>庭の<span class="vocab-point" onclick="showItem('teire')"><ruby>手<rt>て</rt></ruby><ruby>入<rt>い</rt></ruby>れ</span><span class="grammar-review" onclick="showItem('yara')">やら</span>の手伝いをしている。
                    </p>
                    <p class="translation">优斗十七岁，是名高二学生。尚在襁褓之时，他便因事故失去了双亲，被这间神社收养。如今，他在上学之余，也会帮忙做些神社的扫除、庭院的修剪之类的杂务。</p>

                    <p style="text-align: right; margin-top: 20px;">（つづく）</p>

                </div>
            </article></template>
            <template id="lesson-14-content"><article id="lesson-14">
                <div class="lesson-header">
                    <span>小説</span>
                    <span>楽園の萌花 (2)</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>楽<rt>らく</rt></ruby><ruby>園<rt>えん</rt></ruby>の<ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby> (2)
                </h2>

                <div class="japanese-text">
                    
                    <p>
                        <ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby>の今日の表情には理由がある。昨夜の<span class="vocab-point" onclick="showItem('kooni')"><ruby>小<rt>こ</rt></ruby><ruby>鬼<rt>おに</rt></ruby></span>が残した謎<span class="grammar-point" onclick="showItem('meita')">めいた</span>言葉だ。
                    </p>
                    <p class="translation">萌花今日的神情之中，藏着某种缘由。那便是昨夜那只小鬼留下的、充满谜团的话语。</p>

                    <p>
                        <span class="vocab-point" onclick="showItem('kooni')"><ruby>小<rt>こ</rt></ruby><ruby>鬼<rt>おに</rt></ruby></span>が現れる<span class="grammar-point" onclick="showItem('yainaya')">や否や</span>、<ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby>は<span class="vocab-point" onclick="showItem('futokoro')"><ruby>懐<rt>ふところ</rt></ruby></span>から短い<ruby>刀<rt>かたな</rt></ruby>を出した。この神社に伝わる宝の一つだ。<span class="vocab-point" onclick="showItem('kooni')"><ruby>小<rt>こ</rt></ruby><ruby>鬼<rt>おに</rt></ruby></span><span class="grammar-point" onclick="showItem('gotoki')">ごとき</span>は、その<span class="vocab-point" onclick="showItem('girarito')">ギラリと</span>した光を見ただけで恐れて逃げ出すのが普通である。この<span class="vocab-point" onclick="showItem('kooni')"><ruby>小<rt>こ</rt></ruby><ruby>鬼<rt>おに</rt></ruby></span>も<ruby>慌<rt>あわ</rt></ruby>てて逃げ出す<span class="grammar-point" onclick="showItem('katoomoikiya')">かと思いきや</span>、<span class="vocab-point" onclick="showItem('jitto')">じっと</span><ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby>の目を見ると、声を出さずに伝えた。
                    </p>
                    <p class="translation">小鬼刚一现身，萌花便从怀中拔出了短刀。那是神社代代相传的至宝之一。像小鬼这种程度的妖物，通常光是看到那凛冽的寒光便会吓得落荒而逃。本以为这只小鬼也会惊慌逃窜，未曾想，它竟定定地注视着萌花的双眼，无声地传达了讯息。</p>

                    <p>
                        「<ruby>楽<rt>らく</rt></ruby><ruby>園<rt>えん</rt></ruby>を<ruby>創<rt>つく</rt></ruby>ら<span class="grammar-point" onclick="showItem('ngatame')">んがため</span>、あの<span class="vocab-point" onclick="showItem('okata')">お<ruby>方<rt>かた</rt></ruby></span>がお<ruby>姿<rt>すがた</rt></ruby>を現される。待て。」と。
                    </p>
                    <p class="translation">『为创乐园，那位大人即将现身。静候吧。』</p>

                    <p>
                        <span class="vocab-point" onclick="showItem('kooni')"><ruby>小<rt>こ</rt></ruby><ruby>鬼<rt>おに</rt></ruby></span>の体は<ruby>薄<rt>うす</rt></ruby><ruby>紙<rt>がみ</rt></ruby>の<span class="grammar-point" onclick="showItem('gotoku')">ごとく</span><ruby>透<rt>す</rt></ruby>け始めた。あの<span class="vocab-point" onclick="showItem('okata')">お<ruby>方<rt>かた</rt></ruby></span>とは誰か、<ruby>楽<rt>らく</rt></ruby><ruby>園<rt>えん</rt></ruby>とは何か、それになぜ自分にそれを伝えるのか、すべての質問に答える<span class="grammar-review" onclick="showItem('kotonaku')">ことなく</span>、<span class="vocab-point" onclick="showItem('kooni')"><ruby>小<rt>こ</rt></ruby><ruby>鬼<rt>おに</rt></ruby></span>は黒い空に<span class="vocab-point" onclick="showItem('tokekomi')"><ruby>溶<rt>と</rt></ruby>け<ruby>込<rt>こ</rt></ruby>み</span>、<ruby>姿<rt>すがた</rt></ruby>を消した。暗くなっていた空が、一瞬<span class="grammar-point" onclick="showItem('nishite')">にして</span><ruby>満<rt>まん</rt></ruby><ruby>月<rt>げつ</rt></ruby>の明るさを<span class="vocab-point" onclick="showItem('torimodoshita')"><ruby>取<rt>と</rt></ruby>り<ruby>戻<rt>もど</rt></ruby>した</span>。
                    </p>
                    <p class="translation">小鬼的身躯宛如薄纸一般开始变得透明。那位大人是谁？乐园又是什么？而且为何要特意告诉自己？未回答任何问题，小鬼便融入了漆黑的夜空，销声匿迹。原本黯淡的天空，转瞬之间恢复了满月的清辉。</p>

                    <p style="text-align: center; margin: 20px 0;">― 中略 ―</p>

                    <p>
                        戦いは終わった。<ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby>は倒れている<ruby>優<rt>ゆう</rt></ruby><ruby>斗<rt>と</rt></ruby>のそばに腰を<span class="vocab-point" onclick="showItem('oroshita')"><ruby>下<rt>お</rt></ruby>ろした</span>。今回の戦いで<ruby>優<rt>ゆう</rt></ruby><ruby>斗<rt>と</rt></ruby>がいなかったら、町は、いや日本はどうなっていたか。考える<span class="grammar-point" onclick="showItem('dani')">だに</span>恐ろしいことだ。<ruby>優<rt>ゆう</rt></ruby><ruby>斗<rt>と</rt></ruby>はもうしばらくすれば目を覚ますだろう。しかし、自分が戦いの結果を<span class="vocab-point" onclick="showItem('sayuushita')"><ruby>左<rt>さ</rt></ruby><ruby>右<rt>ゆう</rt></ruby>した</span>ことは覚えている<span class="grammar-review" onclick="showItem('mai')">まい</span>。<ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby>も<ruby>優<rt>ゆう</rt></ruby><ruby>斗<rt>と</rt></ruby>がそのような力を持っているとは想像<span class="grammar-point" onclick="showItem('danishinakatta')">だにしなかった</span>。<ruby>優<rt>ゆう</rt></ruby><ruby>斗<rt>と</rt></ruby>に力のことを伝えるかどうか、<ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby>はまだ決め<span class="grammar-point" onclick="showItem('kanete')">かねて</span>いる。それを伝えれば、<ruby>優<rt>ゆう</rt></ruby><ruby>斗<rt>と</rt></ruby>もまた今日<span class="grammar-point" onclick="showItem('wokagirini')">を限りに</span>普通の高校生の生活には戻れない。
                    </p>
                    <p class="translation">战斗结束了。萌花在倒下的优斗身旁坐了下来。若非优斗在此，这座小镇，不，整个日本将会变成何种惨状？光是想象便令人不寒而栗。优斗恐怕过一会儿就会醒来吧。但他应该不会记得，是自己左右了这场战斗的结局。就连萌花也未曾想象过，优斗竟拥有如此力量。是否要将这份力量的真相告知于他，萌花尚无法决断。因为一旦告知，优斗便将以今日为界，再也无法回归普通高中生的生活了。</p>

                    <p>
                        「まあいい。今は少し休もう。」<ruby>萌<rt>もえ</rt></ruby><ruby>花<rt>か</rt></ruby>は考えるのをやめ、静かに目を閉じた。（完）
                    </p>
                    <p class="translation">“罢了。现在先稍微休息一下吧。” 萌花停止了思考，静静地闭上了双眼。（完）</p>

                </div>
            </article></template>
            <template id="lesson-15-content"><article id="lesson-15">
                <div class="lesson-header">
                    <span>社会・医療</span>
                    <span>トリアージ</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    トリアージ
                </h2>
                
                <style>
                    .script-row { display: flex; margin-bottom: 20px; align-items: baseline; }
                    .script-speaker { font-weight: bold; width: 4.5em; flex-shrink: 0; text-align: right; margin-right: 15px; color: #333; }
                    .script-line { flex-grow: 1; line-height: 1.8; }
                    
                    /* 纯净样式 */
                    .script-line .translation { 
                        margin-top: 5px; 
                        color: #666; 
                        font-size: 0.85em; 
                    }
                </style>

                <div class="japanese-text">
                    
                    <div class="script-row">
                        <div class="script-speaker">司会者</div>
                        <div class="script-line">
                            本日は「<span class="vocab-point" onclick="showItem('triage')">トリアージ</span>」について、<span class="vocab-point" onclick="showItem('kyuumeikyuukyuu')"><ruby>救<rt>きゅう</rt></ruby><ruby>命<rt>めい</rt></ruby><ruby>救<rt>きゅう</rt></ruby><ruby>急<rt>きゅう</rt></ruby></span>がご専門の医師の森先生にお話を伺います。森先生、よろしくお願いします。
                            <p class="translation">今天我们就“伤员分类（Triage）”这一话题，采访急救专业的医生森先生。森医生，请多关照。</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">森</div>
                        <div class="script-line">
                            森です。「<span class="vocab-point" onclick="showItem('triage')">トリアージ</span>」と言いますのは、<ruby>患<rt>かん</rt></ruby><ruby>者<rt>じゃ</rt></ruby>の<ruby>治<rt>ち</rt></ruby><ruby>療<rt>りょう</rt></ruby>について<ruby>優<rt>ゆう</rt></ruby><ruby>先<rt>せん</rt></ruby>順位を決めることです。
                            <p class="translation">我是森。所谓的“伤员分类”，就是决定患者治疗优先顺序的过程。</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">森</div>
                        <div class="script-line">
                            例えば、大きな<ruby>災<rt>さい</rt></ruby><ruby>害<rt>がい</rt></ruby>や事故で<ruby>多<rt>た</rt></ruby><ruby>数<rt>すう</rt></ruby>の<span class="vocab-point" onclick="showItem('keganin')">けが<ruby>人<rt>にん</rt></ruby></span>が出たとしましょう。病院は<ruby>１<rt>いっ</rt></ruby><ruby>カ<rt>か</rt></ruby><ruby>所<rt>しょ</rt></ruby>、対応できる医者が２人しかいないとしたら、どんな治療ができるでしょうか。<ruby>医<rt>い</rt></ruby><ruby>療<rt>りょう</rt></ruby><ruby>設<rt>せつ</rt></ruby><ruby>備<rt>び</rt></ruby>やスタッフの数<span class="grammar-review" onclick="showItem('karashite')">からして</span>、対応に限界があるでしょう。
                            <p class="translation">假设发生了巨大的灾害或事故，出现了大量的伤员。如果只有一所医院，且能应对的医生只有两人，能进行怎样的治疗呢？单从医疗设备和人员数量来看，应对能力肯定是有极限的。</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">森</div>
                        <div class="script-line">
                            100人<span class="grammar-point" onclick="showItem('karairu')">からいる</span><span class="vocab-point" onclick="showItem('keganin')">けが<ruby>人<rt>にん</rt></ruby></span>の中には、命<span class="grammar-point" onclick="showItem('nikakawaru')">にかかわる</span>重傷者もいます。このような<ruby>緊<rt>きん</rt></ruby><ruby>急<rt>きゅう</rt></ruby><ruby>時<rt>じ</rt></ruby><span class="grammar-point" onclick="showItem('niatte')">にあって</span>、医師は<span class="vocab-point" onclick="showItem('sumiyaka')"><ruby>速<rt>すみ</rt></ruby>やか</span>な<span class="vocab-point" onclick="showItem('ketsudan')"><ruby>決<rt>けつ</rt></ruby><ruby>断<rt>だん</rt></ruby></span>を<span class="vocab-point" onclick="showItem('semararemasu')"><ruby>迫<rt>せま</rt></ruby>られます</span>。
                            <p class="translation">在多达100人的伤员中，也有涉及生命危险的重伤员。在这样的紧急时刻，医生被迫要做出迅速的决断。</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">森</div>
                        <div class="script-line">
                            まず専門家が、<ruby>一<rt>ひと</rt></ruby><ruby>目<rt>め</rt></ruby>でわかるように、<span class="vocab-point" onclick="showItem('keganin')">けが<ruby>人<rt>にん</rt></ruby></span>に色分けされた<span class="vocab-point" onclick="showItem('tag')">タグ</span>を付けていきます。<span class="vocab-point" onclick="showItem('tag')">タグ</span>の赤色は、一刻も早い<span class="vocab-point" onclick="showItem('shochi')"><ruby>処<rt>しょ</rt></ruby><ruby>置<rt>ち</rt></ruby></span>が必要で救命の可能性がある者。
                            <p class="translation">首先，专家为了能一目了然，会给伤员系上区分颜色的标签。红色标签代表需要刻不容缓的处置且有救活可能的人。</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">森</div>
                        <div class="script-line">
                            黄色は、今すぐ命<span class="grammar-point" onclick="showItem('nikakawaru')">にかかわる</span>ほどのけがではないが、早い<span class="vocab-point" onclick="showItem('shochi')"><ruby>処<rt>しょ</rt></ruby><ruby>置<rt>ち</rt></ruby></span>が必要な者。緑色は、<ruby>軽<rt>けい</rt></ruby><ruby>傷<rt>しょう</rt></ruby><ruby>者<rt>しゃ</rt></ruby>で救急に搬送の必要のない者。
                            <p class="translation">黄色代表虽然现在不至于危及生命，但也需要尽快处置的人。绿色则是指不需要紧急送医的轻伤员。</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">森</div>
                        <div class="script-line">
                            そして、黒色の<span class="vocab-point" onclick="showItem('tag')">タグ</span>は、すでに死亡が認められたか、あるいは今この段階では救命が不可能な者という分け方です。
                            <p class="translation">然后，黑色标签是指已经确认死亡，或者在现阶段无法救活的人。</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">司会者</div>
                        <div class="script-line">

            <template id="lesson-16-content"><article id="lesson-16">
                <div class="lesson-header">
                    <span>文化・芸術</span>
                    <span>前衛書道</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>前<rt>ぜん</rt></ruby><ruby>衛<rt>えい</rt></ruby><ruby>書<rt>しょ</rt></ruby><ruby>道<rt>どう</rt></ruby>
                </h2>

                <div class="japanese-text">
                    
                    <p>
                        <span class="vocab-point" onclick="showItem('zeneishodou')"><ruby>前<rt>ぜん</rt></ruby><ruby>衛<rt>えい</rt></ruby><ruby>書<rt>しょ</rt></ruby><ruby>道<rt>どう</rt></ruby></span>という書道の<span class="vocab-point" onclick="showItem('bunya')"><ruby>分<rt>ぶん</rt></ruby><ruby>野<rt>や</rt></ruby></span>がある。<ruby>昭<rt>しょう</rt></ruby><ruby>和<rt>わ</rt></ruby>30年代以降急速に発展し、現在では、現代芸術の一分野としての地位を<ruby>確<rt>かく</rt></ruby><ruby>立<rt>りつ</rt></ruby>している。
                    </p>
                    <p class="translation">书道界存在着一个被称为“前卫书法”的领域。自昭和30年代（1955年左右）以来，它得以急速发展，如今已确立了作为现代艺术一个分支的地位。</p>

                    <p>
                        一般的に書道には、<ruby>筆<rt>ひつ</rt></ruby><ruby>順<rt>じゅん</rt></ruby>を守る<span class="grammar-review" onclick="showItem('beshi')">べし</span>、<ruby>二<rt>に</rt></ruby><ruby>度<rt>ど</rt></ruby><ruby>書<rt>が</rt></ruby>きをする<span class="grammar-point" onclick="showItem('bekarazu')">べからず</span><ruby>等<rt>とう</rt></ruby>、数多くの<span class="vocab-point" onclick="showItem('kimari')"><ruby>決<rt>き</rt></ruby>まり</span>がある。<span class="vocab-point" onclick="showItem('zeneishodou')"><ruby>前<rt>ぜん</rt></ruby><ruby>衛<rt>えい</rt></ruby><ruby>書<rt>しょ</rt></ruby><ruby>道<rt>どう</rt></ruby></span>家はこうした<span class="vocab-point" onclick="showItem('kimari')"><ruby>決<rt>き</rt></ruby>まり</span>に<span class="vocab-point" onclick="showItem('shibararezu')"><ruby>縛<rt>しば</rt></ruby>られず</span>に、自由な表現を<span class="vocab-point" onclick="showItem('mezasu')"><ruby>目<rt>め</rt></ruby><ruby>指<rt>ざ</rt></ruby>す</span>ものである。彼らは文字を書こうとさえ考えていない。<span class="grammar-point" onclick="showItem('tadakorenomi')">ただ</span>自分の心を表現すること<span class="grammar-point" onclick="showItem('tadakorenomi')">のみ</span>を<span class="vocab-point" onclick="showItem('mezasu')"><ruby>目<rt>め</rt></ruby><ruby>指<rt>ざ</rt></ruby>す</span>。文字として読めない<span class="grammar-point" onclick="showItem('gayue')">がゆえ</span>に、その筆の線が<span class="vocab-point" onclick="showItem('yohaku')"><ruby>余<rt>よ</rt></ruby><ruby>白<rt>はく</rt></ruby></span><span class="grammar-point" onclick="showItem('toaimatte')">と相まって</span>作り出す<ruby>空<rt>くう</rt></ruby><ruby>間<rt>かん</rt></ruby>の美を<ruby>純<rt>じゅん</rt></ruby><ruby>粋<rt>すい</rt></ruby>に<ruby>鑑<rt>かん</rt></ruby><ruby>賞<rt>しょう</rt></ruby>できるのである。
                    </p>
                    <p class="translation">一般来说，书法有诸多规矩，诸如“应遵守笔顺”、“不得重复描画”等。而前卫书法家则不被这些规矩所束缚，旨在追求自由的表达。他们甚至不认为自己是在书写文字，而是一心只求表达自己的内心。正因为写出的东西作为文字无法阅读，我们才得以纯粹地鉴赏其笔触线条与留白相互融合所构筑的空间之美。</p>

                    <p>
                        <span class="vocab-point" onclick="showItem('zeneishodou')"><ruby>前<rt>ぜん</rt></ruby><ruby>衛<rt>えい</rt></ruby><ruby>書<rt>しょ</rt></ruby><ruby>道<rt>どう</rt></ruby></span>で、よく語られるのが<ruby>上<rt>うえ</rt></ruby><ruby>田<rt>だ</rt></ruby><ruby>桑<rt>そう</rt></ruby><ruby>鳩<rt>きゅう</rt></ruby>（1899-1968年）の「愛」（1951年、第7回日本美術<ruby>展<rt>てん</rt></ruby><ruby>覧<rt>らん</rt></ruby><ruby>会<rt>かい</rt></ruby>に<ruby>出<rt>しゅっ</rt></ruby><ruby>展<rt>てん</rt></ruby>）である。この作品が発表されたときの<ruby>衝<rt>しょう</rt></ruby><ruby>撃<rt>げき</rt></ruby>は想像<span class="grammar-point" onclick="showItem('nikatakunai')">にかたくない</span>。書<span class="grammar-point" onclick="showItem('toshitearumajiki')">としてあるまじき</span>ものと批判され<span class="grammar-point" onclick="showItem('zunihasumanakatta')">ずにはすまなかった</span>のも、よくわかる。<ruby>上<rt>うえ</rt></ruby><ruby>田<rt>だ</rt></ruby><ruby>桑<rt>そう</rt></ruby><ruby>鳩<rt>きゅう</rt></ruby>は「<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>経<rt>けい</rt></ruby><ruby>済<rt>ざい</rt></ruby><ruby>新<rt>しん</rt></ruby><ruby>聞<rt>ぶん</rt></ruby>」の<span class="vocab-point" onclick="showItem('daiji')"><ruby>題<rt>だい</rt></ruby><ruby>字<rt>じ</rt></ruby></span>を書いた<span class="vocab-point" onclick="showItem('koumei')"><ruby>高<rt>こう</rt></ruby><ruby>名<rt>めい</rt></ruby></span>な<ruby>書<rt>しょ</rt></ruby><ruby>家<rt>か</rt></ruby>である。しかし、この作品を見ると、この文字が「<ruby>品<rt>ひん</rt></ruby>」<span class="grammar-point" onclick="showItem('denakutenandarou')">でなくてなんだろう</span>。失礼<span class="grammar-point" onclick="showItem('kiwamarinai')">極まりない</span>ことだが、これを「愛」と思う人などいるのだろうかという疑問<span class="grammar-point" onclick="showItem('wokinjienei')">を禁じえない</span>。
                    </p>
                    <p class="translation">在前卫书法界，经常被人们津津乐道的便是上田桑鸠（1899-1968年）的作品《爱》（1951年参展第7届日本美术展览会）。这幅作品发表时所带来的冲击不难想象。它被批判为“作为书法不可理喻之物”，这种结果也是在所难免的，这点我也很理解。上田桑鸠可是曾为《日本经济新闻》书写报头题字的著名书法家。然而，一看这幅作品，这字如果要不是“品”字（形状像三个口堆叠），还能是什么呢？虽然极其失礼，但我禁不住怀疑，真的会有人认为这是“爱”字吗？</p>

                    <p>
                        人はその文字の持つ意味により、<ruby>固<rt>こ</rt></ruby><ruby>定<rt>てい</rt></ruby><ruby>的<rt>てき</rt></ruby>なイメージを<span class="vocab-point" onclick="showItem('idaku')"><ruby>抱<rt>いだ</rt></ruby>く</span>ものだ。<span class="vocab-point" onclick="showItem('hikin')"><ruby>卑<rt>ひ</rt></ruby><ruby>近<rt>きん</rt></ruby></span>な例で<span class="vocab-point" onclick="showItem('kyoushuku')"><ruby>恐<rt>きょう</rt></ruby><ruby>縮<rt>しゅく</rt></ruby></span>だが、たとえ<span class="vocab-point" onclick="showItem('koumei')"><ruby>高<rt>こう</rt></ruby><ruby>名<rt>めい</rt></ruby></span>な<ruby>書<rt>しょ</rt></ruby><ruby>家<rt>か</rt></ruby>が書いたものであっても、「<ruby>公<rt>こう</rt></ruby><ruby>衆<rt>しゅう</rt></ruby><ruby>便<rt>べん</rt></ruby><ruby>所<rt>じょ</rt></ruby>」と書かれた書が芸術と呼ぶ<span class="grammar-point" onclick="showItem('nitaru')">にたる</span>作品かと聞かれれば、ほとんどの人が<span class="vocab-point" onclick="showItem('ina')"><ruby>否<rt>いな</rt></ruby></span>と答えるであろうことは疑う<span class="grammar-point" onclick="showItem('bekumonai')">べくもない</span>。
                    </p>
                    <p class="translation">人们总是会根据文字所持有的含义，抱有固定的印象。举个粗俗的例子实在惶恐，但假设写的是“公共厕所”，哪怕是著名书法家所写，如果被问到这幅书法是否是值得称为艺术的作品，毫无疑问，绝大多数人大概都会回答“不”吧。</p>

                    <p>
                        だが、固定観念からの解放<span class="grammar-point" onclick="showItem('nakushite')">なくして</span>芸術は生まれない。<span class="vocab-point" onclick="showItem('zeneishodou')"><ruby>前<rt>ぜん</rt></ruby><ruby>衛<rt>えい</rt></ruby><ruby>書<rt>しょ</rt></ruby><ruby>道<rt>どう</rt></ruby></span>は、書道とは異なる新たな芸術の<span class="vocab-point" onclick="showItem('bunya')"><ruby>分<rt>ぶん</rt></ruby><ruby>野<rt>や</rt></ruby></span>なのである。
                    </p>
                    <p class="translation">但是，若不从固定观念中解放出来，艺术便无法诞生。前卫书法，正是与传统书法截然不同的、崭新的艺术领域。</p>

                </div>
            </article></template>

        function loadLesson(id) {
            console.log("Loading lesson", id);
            // 1. Navigation State
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const navs = document.querySelectorAll('.nav-item');
            if(navs[id-1]) navs[id-1].classList.add('active');

            // 2. Load Content from Template
            const template = document.getElementById(`lesson-${id}-content`);
            const container = document.getElementById('lesson-container');
            if (template && container) {
                container.innerHTML = template.innerHTML;
                // Ensure the article is visible (overriding any default display:none)
                const article = container.querySelector('article');
                if(article) article.classList.add('active');
            }

            // 3. Update Header Info
            const conf = lessonConfig[id] || {title:"未定", audio:""};
            const titleEl = document.getElementById('lesson-title');
            if (titleEl) {
                titleEl.innerHTML = `<span style="font-size:0.9rem; color:#888;">第${id}章</span><br><span style="font-size:1.1rem; color:#333;">${conf.title}</span>`;
            }
            
            // 4. Update Audio
            const player = document.getElementById('audio-player');
            if (player) {
                if(conf.audio) { player.src = conf.audio; } else { player.src = ""; }
            }

            // 5. Close Panel & Scroll
            closePanel();
            window.scrollTo(0, 0);

            // 6. Mobile: Sidebar logic moved to onclick
        }

        // 译文开关
        function toggleTrans() {
            document.body.classList.toggle('show-trans');
            document.getElementById('btn-trans').classList.toggle('active');
        }

        // 注音开关 (新增)
        function toggleFurigana() {
            document.body.classList.toggle('hide-ruby');
            const btn = document.getElementById('btn-ruby');
            const isHidden = document.body.classList.contains('hide-ruby');
            
            if (isHidden) {
                btn.classList.remove('active');
                btn.innerText = "注音: OFF";
            } else {
                btn.classList.add('active');
                btn.innerText = "注音: ON";
            }
        }

        function showItem(key) {
            const data = dictData[key];
            if (!data) return;

            const panelBody = document.getElementById('panel-body');
            if (!panelBody) return;

            // 1. Determine Type and Text
            let tagText = '語彙';
            let typeClass = 'type-vocab';

            if (data.type === 'grammar') {
                tagText = '文法';
                typeClass = 'type-grammar';
            } else if (data.type === 'review') {
                tagText = '復習';
                typeClass = 'type-review';
            }

            // 2. Build Header (Using CSS classes)
            let html = `
                <div class="${typeClass}">
                    <div class="panel-header-box">
                        <span class="tag">${tagText}</span>
                        <div class="panel-title">${data.title}</div>
                    </div>
            `;

            // 3. Process Description
            const rawDesc = data.desc || '';
            
            // Check if desc already contains HTML structure (to avoid nested desc-row)
            if (rawDesc.includes('<div class="desc-row">')) {
                html += rawDesc;
            } else {
                const descParts = rawDesc.replace(/\n/g, '<br>').split('<br>');
                
                descParts.forEach(part => {
                    part = part.trim();
                    if (!part) return;

                    // Check for 【Label】 pattern
                    const match = part.match(/^【(.*?)】(.*)/);
                    if (match) {
                        const label = match[1];
                        const text = match[2];
                        html += `
                            <div class="desc-row">
                                <span class="desc-label">【${label}】</span>
                                <span class="desc-text">${text}</span>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="desc-row">
                                <span class="desc-text">${part}</span>
                            </div>
                        `;
                    }
                });
            }

            // 4. Process Example
            if (data.ex) {
                html += `
                    <div class="example-block">
                        <span class="example-title">例文 / 補足 :</span>
                        <div style="color:#333;">
                            ${data.ex.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
            }

            html += `</div>`; // Close wrapper
            
            // 5. Inject and Open
            panelBody.innerHTML = html;
            document.getElementById('grammar-panel').classList.add('open');
        }

        function closePanel() {
            document.getElementById('grammar-panel').classList.remove('open');
        }
        function changeSpeed(el) {
            const player = document.getElementById('audio-player');
            player.playbackRate = parseFloat(el.value);
        }
        window.onload = function() {
            console.log("Window loaded");
            // 1. Generate Sidebar Menu
            const navList = document.getElementById('nav-list');
            if (navList) {
                navList.innerHTML = '';
                Object.keys(lessonConfig).forEach(key => {
                    const conf = lessonConfig[key];
                    const li = document.createElement('li');
                    li.className = 'nav-item';
                    li.innerText = `${conf.label} ${conf.title}`; 
                    li.onclick = () => {
                        loadLesson(parseInt(key));
                        // if (window.innerWidth <= 768) {
                        //     document.body.classList.add('mobile-menu-closed');
                        // }
                    };
                    navList.appendChild(li);
                });
            }

            // 2. Load Initial Lesson
            loadLesson(1); 
            
            // 3. Sidebar Toggle Logic
            const toggleBtn = document.getElementById('sidebar-toggle');
            if (toggleBtn) {
                toggleBtn.onclick = () => {
                    if (window.innerWidth <= 768) {
                        document.body.classList.toggle('mobile-menu-closed');
                    } else {
                        document.body.classList.toggle('sidebar-closed');
                    }
                };
            }

            // Close panel when clicking outside
            document.addEventListener('click', function(e) {
                const panel = document.getElementById('grammar-panel');
                if (!panel || !panel.classList.contains('open')) return;
                const isClickInside = panel.contains(e.target);
                const isTrigger = e.target.classList.contains('vocab-point') || 
                                  e.target.classList.contains('grammar-point') ||
                                  e.target.classList.contains('grammar-review');
                if (!isClickInside && !isTrigger) {
                    closePanel();
                }
            });

            const speedSelect = document.querySelector('select');
            if(speedSelect) speedSelect.value = "1.0";
        };
        
    </script>
</body>
</html>
