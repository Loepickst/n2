        function stopChallengeTimer() {
            if (challengeTimerId) {
                clearInterval(challengeTimerId);
                challengeTimerId = null;
            }
        }

        function getChallengeStatusText() {
            return `连对 ${challengeStreak}｜最高 ${challengeBestStreak}｜错误 ${challengeWrongCount}/${CHALLENGE_MAX_WRONG}｜倒计时 ${challengeTimeLeft}s`;
        }

        function getChallengeStatusHtml() {
            const timerClass = challengeTimeLeft <= 5 ? 'challenge-timer is-urgent' : 'challenge-timer';
            return `连对 ${challengeStreak}｜最高 ${challengeBestStreak}｜错误 ${challengeWrongCount}/${CHALLENGE_MAX_WRONG}｜<span class="${timerClass}">倒计时 ${challengeTimeLeft}s</span>`;
        }

        function updateChallengeProgressText() {
            const progress = document.getElementById('practice-progress');
            if (progress && currentPracticeMode === 'challenge') progress.innerHTML = getChallengeStatusHtml();
        }

        function startChallengeTimer() {
            stopChallengeTimer();
            challengeTimeLeft = CHALLENGE_TIME_LIMIT;
            updateChallengeProgressText();
            challengeTimerId = setInterval(() => {
                challengeTimeLeft -= 1;
                updateChallengeProgressText();
                if (challengeTimeLeft <= 0) handleChallengeTimeout();
            }, 1000);
        }

        function resetChallengeState() {
            stopChallengeTimer();
            clearChallengeAdvanceTimer();
            challengeStreak = 0;
            challengeBestStreak = 0;
            challengeWrongCount = 0;
            challengeTimeLeft = CHALLENGE_TIME_LIMIT;
        }

        function getChallengeCorrectCount() {
            return currentPracticeDeck.reduce((count, question) => {
                if (!practiceSubmittedSet.has(question.id)) return count;
                return count + (practiceAnswersByQuestionId[question.id] === question.correctIndex ? 1 : 0);
            }, 0);
        }

        function getChallengeCompletedCount() {
            return currentPracticeDeck.filter(question => practiceSubmittedSet.has(question.id)).length;
        }

        function advanceChallengeAfterFeedback() {
            clearChallengeAdvanceTimer();
            challengeAdvanceTimerId = setTimeout(() => {
                challengeAdvanceTimerId = null;
                if (challengeWrongCount >= CHALLENGE_MAX_WRONG || currentPracticeIndex >= currentPracticeDeck.length - 1) {
                    renderPracticeResult();
                    return;
                }
                currentPracticeIndex += 1;
                renderPracticeQuestion();
            }, CHALLENGE_AUTO_ADVANCE_DELAY);
        }

        function handleChallengeAnswer(index) {
            const question = getCurrentPracticeQuestion();
            if (!question || practiceSubmittedSet.has(question.id)) return;
            stopChallengeTimer();
            clearChallengeAdvanceTimer();

            practiceAnswersByQuestionId[question.id] = index;
            practiceSubmittedSet.add(question.id);
            if (index === question.correctIndex) {
                challengeStreak += 1;
                challengeBestStreak = Math.max(challengeBestStreak, challengeStreak);
            } else {
                challengeWrongCount += 1;
                challengeStreak = 0;
                updateWrongPracticeQuestion(question, index, 'wrong');
            }
            renderPracticeQuestion();
            advanceChallengeAfterFeedback();
        }

        function handleChallengeTimeout() {
            const question = getCurrentPracticeQuestion();
            if (!question || practiceSubmittedSet.has(question.id)) return;
            stopChallengeTimer();
            clearChallengeAdvanceTimer();

            practiceSubmittedSet.add(question.id);
            updateWrongPracticeQuestion(question, null, 'unanswered');
            challengeWrongCount += 1;
            challengeStreak = 0;
            renderPracticeQuestion();
            advanceChallengeAfterFeedback();
        }

        function renderPracticeQuestion() {
            const question = getCurrentPracticeQuestion();
            const stem = document.getElementById('practice-stem');
            const choicesWrap = document.getElementById('practice-choices');
            const progress = document.getElementById('practice-progress');
            const submitButton = document.getElementById('practice-submit-button');
            const prevButton = document.getElementById('practice-prev-button');
            const nextButton = document.getElementById('practice-next-button');
            const explanationContainer = document.getElementById('practice-explanation');
            if (!question || !stem || !choicesWrap || !progress || !submitButton || !prevButton || !nextButton || !explanationContainer) return;

            showPracticeSection('main');

            const selectedIndex = practiceAnswersByQuestionId[question.id];
            const isSubmitted = practiceSubmittedSet.has(question.id);
            const isChallengeMode = currentPracticeMode === 'challenge';
            const isWrongMode = currentPracticeMode === 'wrong';
            stem.innerHTML = formatPracticeDisplayHtml(question.stemHtml);
            if (isChallengeMode) {
                progress.innerHTML = getChallengeStatusHtml();
            } else if (isWrongMode) {
                progress.innerHTML = `${currentPracticeIndex + 1} / ${currentPracticeDeck.length} <span class="ml-2 inline-flex items-center rounded-full bg-[#fdf0ef] border border-[#f0b8b0] px-2 py-0.5 text-[10px] sm:text-xs font-extrabold text-[#b42318]">错 ${getWrongPracticeQuestionCount(question.id)} 次</span>`;
            } else {
                progress.textContent = `${currentPracticeIndex + 1} / ${currentPracticeDeck.length}`;
            }

            choicesWrap.innerHTML = '';
            question.choices.forEach((choice, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                let className = PRACTICE_CHOICE_DEFAULT_CLASS;
                if (isSubmitted) {
                    if (index === question.correctIndex) className = PRACTICE_CHOICE_CORRECT_CLASS;
                    else if (index === selectedIndex) className = PRACTICE_CHOICE_WRONG_CLASS;
                } else if (index === selectedIndex) {
                    className = PRACTICE_CHOICE_SELECTED_CLASS;
                }
                button.className = className;
                button.disabled = isSubmitted;
                button.innerHTML = `
                    <div class="flex items-start gap-3">
                        <span class="w-6 h-6 sm:w-7 sm:h-7 rounded-full border border-current/20 bg-white/60 flex items-center justify-center text-[10px] sm:text-xs font-extrabold shrink-0 mt-0.5">${index + 1}</span>
                        <span class="leading-relaxed">${formatPracticeDisplayHtml(choice)}</span>
                    </div>
                `;
                button.onclick = () => selectPracticeChoice(index);
                choicesWrap.appendChild(button);
            });

            submitButton.className = PRACTICE_PRIMARY_BUTTON_CLASS;
            submitButton.textContent = isSubmitted ? '已提交' : '提交';
            submitButton.disabled = isSubmitted || typeof selectedIndex !== 'number';
            submitButton.classList.toggle('hidden', isChallengeMode);

            prevButton.className = PRACTICE_SECONDARY_BUTTON_CLASS;
            prevButton.textContent = '上一题';
            prevButton.disabled = currentPracticeIndex === 0;
            prevButton.classList.toggle('hidden', isChallengeMode);

            nextButton.className = isSubmitted ? PRACTICE_PRIMARY_BUTTON_CLASS : PRACTICE_SECONDARY_BUTTON_CLASS;
            nextButton.textContent = currentPracticeIndex === currentPracticeDeck.length - 1 ? '查看结果' : '下一题';
            nextButton.disabled = !isSubmitted;
            nextButton.classList.toggle('hidden', isChallengeMode);

            if (isSubmitted) renderPracticeExplanation(question, selectedIndex);
            else {
                explanationContainer.classList.add('hidden');
                explanationContainer.innerHTML = '';
            }

            if (isChallengeMode && !isSubmitted) startChallengeTimer();
        }

        function selectPracticeChoice(index) {
            const question = getCurrentPracticeQuestion();
            if (!question || practiceSubmittedSet.has(question.id)) return;
            if (currentPracticeMode === 'challenge') {
                handleChallengeAnswer(index);
                return;
            }
            practiceAnswersByQuestionId[question.id] = index;
            renderPracticeQuestion();
        }

        function startPractice(source = currentPracticeSource) {
            const deck = currentPracticeMode === 'challenge'
                ? shuffleArray(getFilteredPracticeQuestionsByScope())
                : (currentPracticeMode === 'wrong' ? buildWrongPracticeDeck() : buildPracticeDeck());
            if (!deck.length) {
                renderPracticeIntro();
                showPracticeSection('intro');
                return;
            }
            resetChallengeState();
            currentPracticeSource = currentPracticeMode === 'wrong' ? 'wrong' : 'standard';
            currentPracticeDeck = deck;
            currentPracticeIndex = 0;
            practiceAnswersByQuestionId = {};
            practiceSubmittedSet = new Set();
            practiceResultSummary = null;
            renderPracticeQuestion();
        }

        function submitPracticeQuestion() {
            if (currentPracticeMode === 'challenge') return;
            const question = getCurrentPracticeQuestion();
            if (!question) return;
            const selectedIndex = practiceAnswersByQuestionId[question.id];
            if (typeof selectedIndex !== 'number') return;
            practiceSubmittedSet.add(question.id);
            updateWrongPracticeQuestion(question, selectedIndex);
            renderPracticeQuestion();
        }

        function goToPracticePrev() {
            if (currentPracticeMode === 'challenge') return;
            if (currentPracticeIndex === 0) return;
            currentPracticeIndex -= 1;
            renderPracticeQuestion();
        }

        function goToPracticeNext() {
            if (currentPracticeMode === 'challenge') return;
            const question = getCurrentPracticeQuestion();
            if (!question || !practiceSubmittedSet.has(question.id)) return;
            if (currentPracticeIndex >= currentPracticeDeck.length - 1) {
                renderPracticeResult();
                return;
            }
            currentPracticeIndex += 1;
            renderPracticeQuestion();
        }

        function renderPracticeResult() {
            stopChallengeTimer();
            clearChallengeAdvanceTimer();
            const summary = document.getElementById('practice-result-summary');
            if (!summary) return;
            const isChallengeMode = currentPracticeMode === 'challenge';
            const total = isChallengeMode ? getChallengeCompletedCount() : currentPracticeDeck.length;
            const correct = isChallengeMode ? getChallengeCorrectCount() : currentPracticeDeck.reduce((count, question) => {
                const selectedIndex = practiceAnswersByQuestionId[question.id];
                return count + (selectedIndex === question.correctIndex ? 1 : 0);
            }, 0);
            const accuracy = total ? Math.round((correct / total) * 100) : 0;
            practiceResultSummary = isChallengeMode
                ? { mode: 'challenge', total, correct, accuracy, wrong: challengeWrongCount, streak: challengeStreak, bestStreak: challengeBestStreak }
                : { mode: currentPracticeMode === 'wrong' ? 'wrong' : 'normal', total, correct, accuracy };
            summary.innerHTML = isChallengeMode ? `
                <p class="text-base sm:text-lg font-bold text-[#2c2c2a]">共完成 ${total} 题</p>
                <p>答对 ${correct} 题</p>
                <p>错误 ${challengeWrongCount}/${CHALLENGE_MAX_WRONG}</p>
                <p>当前连对 ${challengeStreak} 题</p>
                <p>最高连对 ${challengeBestStreak} 题</p>
                <p>正确率 ${accuracy}%</p>
            ` : `
                <p class="text-base sm:text-lg font-bold text-[#2c2c2a]">共完成 ${total} 题</p>
                <p>答对 ${correct} 题</p>
                <p>正确率 ${accuracy}%</p>
            `;
            showPracticeSection('result');
        }

        function resetPractice(shouldRenderIntro = true) {
            resetChallengeState();
            currentPracticeSource = 'standard';
            currentPracticeDeck = [];
            currentPracticeIndex = 0;
            practiceAnswersByQuestionId = {};
            practiceSubmittedSet = new Set();
            practiceResultSummary = null;
            showPracticeSection('intro');
            if (shouldRenderIntro) renderPracticeIntro();
        }

        window.bindHierarchicalBack({
            selector: "[data-back-nav]",
            fallback: "../daily/search/index.html"
        });
    </script>
</body>
</html>
