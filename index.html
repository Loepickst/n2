<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>kikiの日本語の家 🏠</title>
    <!-- Google Fonts: 毛筆フォント(Yuji Syuku)と明朝体(Noto Serif JP) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 🎨 完全对标参考图的配色与尺寸 */
            --bg-washi: #f8f6f0;       
            --text-ink: #1a1a1a;       
            --text-sub: #555555;       
            --accent-red: #c13224;     
            --border-light: #e0ddd5;   
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05); 
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            /* 🌟 核心：强制全局最大宽度，保证上下左右完美对齐 */
            --content-width: 1050px;   
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Serif JP', serif;
            background-color: var(--bg-washi);
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            color: var(--text-ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ========================================= */
        /* ✨ 头部 (完美贴合原图比例) */
        /* ========================================= */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0; 
            max-width: var(--content-width);  
            margin: 0 auto;
            width: 100%;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px; 
            text-decoration: none;
            color: var(--text-ink);
        }

        .logo-icon {
            width: 45px; 
            height: 45px;
            object-fit: contain;
            /* 去掉边框和白色背景，加入正片叠底完美融合和纸纹理 */
            mix-blend-mode: multiply; 
        }

        .logo-text {
            font-family: 'Yuji Syuku', serif;
            font-size: 28px; 
            font-weight: bold;
            letter-spacing: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 30px; 
        }

        /* 🌟 右上角御守/应援 (放大并还原截图细节) */
        .header-actions {
            display: flex;
            gap: 15px; 
            align-items: center;
        }

        .action-btn {
            width: 60px; /* 放大按钮 */
            height: 60px;
            background: #ffffff;
            border-radius: 10px; /* 截图中的微圆角矩形 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
            transition: var(--transition);
            cursor: pointer;
            position: relative; 
            border: 2px solid;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
        }

        .action-btn .icon {
            font-size: 24px; /* 放大图标 */
            line-height: 1;
            margin-bottom: 3px;
        }

        .action-btn .label {
            font-size: 11px; /* 放大文字 */
            font-weight: bold;
            font-family: 'Yuji Syuku', serif;
        }

        /* 御守按钮: 黑色边框，黑色字 */
        .btn-omamori {
            border-color: var(--text-ink);
            color: var(--text-ink);
        }

        .badge-pulse {
            position: absolute;
            top: -10px; 
            right: -10px;
            background: var(--accent-red);
            color: #fff;
            font-size: 11px; 
            font-weight: bold;
            padding: 3px 8px; 
            border-radius: 12px;
            box-shadow: 0 2px 4px rgba(193, 50, 36, 0.4);
            animation: pulse-badge 2s infinite;
            white-space: nowrap;
            z-index: 10;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(193, 50, 36, 0.6); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 6px rgba(193, 50, 36, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(193, 50, 36, 0); }
        }

        /* ========================================= */
        /* ✨ Hero区域 (5.5 : 4.5 黄金比例) */
        /* ========================================= */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: var(--content-width); 
            margin: 10px auto 30px; 
            width: 100%;
            gap: 50px; 
        }

        .hero-image-container {
            flex: 0 0 55%; /* 严格控制图片宽度比例 */
            display: flex;
            justify-content: flex-start; 
            align-items: center;
            mix-blend-mode: multiply; 
        }

        .hero-image-container img {
            width: 100%;
            height: auto;
            display: block;
            filter: sepia(0.05) contrast(1.02); 
        }

        .hero-text-container {
            flex: 0 0 40%; /* 严格控制文字区域比例 */
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
            justify-content: center;
        }

        .hero-title {
            font-family: 'Yuji Syuku', serif;
            font-size: 46px; 
            line-height: 1.4;
            color: var(--text-ink);
            letter-spacing: 4px;
            margin-bottom: 25px;
        }

        /* ========================================= */
        /* ✨ 3列卡片 (与上方完美左右对齐) */
        /* ========================================= */
        .menu-section {
            width: 100%;
            padding: 0; 
            margin-bottom: 40px;
        }

        .menu-wrapper {
            max-width: var(--content-width); 
            margin: 0 auto;
        }

        .main-menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px; /* 原图中比较适中的间距 */
            position: relative;
            z-index: 20;
        }

        .menu-item {
            position: relative; 
            display: flex;
            flex-direction: column;
        }

        .main-card {
            background: #ffffff; 
            border: 1px solid rgba(0,0,0,0.03); 
            border-radius: 4px; 
            padding: 20px 15px; /* 扁平宽矩形比例 */
            display: flex;
            align-items: center;
            gap: 15px; 
            cursor: pointer;
            box-shadow: var(--card-shadow); 
            transition: var(--transition);
            user-select: none;
            height: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .main-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .main-card.active {
            box-shadow: var(--card-shadow);
            transform: none;
            border-color: rgba(0,0,0,0.03);
        }

        .card-img-placeholder {
            width: 60px; /* 原图中比较醒目的图标尺寸 */
            height: 60px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px; 
        }
        
        .card-img-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }

        .card-title {
            font-family: 'Yuji Syuku', serif; 
            font-size: 19px; 
            font-weight: bold;
            margin-bottom: 6px;
            letter-spacing: 1px;
            color: var(--text-ink);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-arrow {
            font-family: sans-serif;
            font-size: 11px;
            color: #aaa;
            transition: transform 0.3s ease;
        }
        .main-card.active .toggle-arrow {
            transform: rotate(180deg);
        }

        .card-desc {
            font-size: 11px; 
            color: var(--text-sub);
            line-height: 1.5;
        }

        /* 二级菜单下拉框保持原样 */
        .sub-menu {
            position: absolute;
            top: calc(100% + 10px); 
            left: 0;
            width: 100%;
            background: #ffffff;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 8px 0;
            z-index: 50;
            
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .sub-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .sub-link {
            padding: 12px 20px;
            text-decoration: none;
            color: var(--text-ink);
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Noto Sans CJK SC", "PingFang SC", "Hiragino Sans GB", sans-serif;
            font-weight: bold;
            border-bottom: 1px dashed #f0ede5;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sub-link:last-child {
            border-bottom: none;
        }

        .sub-link::after {
            content: "→";
            font-family: sans-serif;
            font-size: 12px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
            color: var(--accent-red);
        }

        .sub-link:hover {
            background: #fffcf9;
            color: var(--accent-red);
            padding-left: 25px; 
        }
        
        .sub-link:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        /* ========================================= */
        /* ✨ Footer (居中对齐) */
        /* ========================================= */
        .footer {
            margin-top: auto; 
            padding: 25px 0; 
            border-top: 1px solid var(--border-light);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: var(--text-sub);
            letter-spacing: 1px;
        }

        /* ========================================= */
        /* 📱 响应式 */
        /* ========================================= */
        @media (max-width: 1100px) {
            .site-header, .hero-section, .menu-wrapper, .footer-wrapper {
                padding-left: 30px;
                padding-right: 30px;
            }
        }

        @media (max-width: 992px) {
            .site-header {
                flex-direction: row;
                padding: 15px 20px;
                gap: 10px;
            }
            .logo-icon { width: 35px; height: 35px; }
            .logo-text { font-size: 20px; }
            .header-right { gap: 10px; }
            .action-btn { width: 50px; height: 50px; }
            .action-btn .icon { font-size: 20px; }
            .badge-pulse { font-size: 9px; padding: 2px 6px; top: -5px; right: -5px; }

            .hero-section {
                flex-direction: column;
                padding: 10px 20px;
                gap: 10px;
                margin-bottom: 20px;
            }
            .hero-image-container { display: none; }
            .hero-text-container { flex: auto; align-items: center; text-align: center; }
            .hero-title { font-size: 32px; margin-bottom: 10px; line-height: 1.5; }

            .main-menu-grid {
                grid-template-columns: 1fr;
                padding: 0 20px;
                gap: 15px;
            }

            .menu-item {
                background: #ffffff;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.04);
                overflow: hidden;
                border: 1px solid rgba(0,0,0,0.03);
            }

            .main-card { 
                padding: 16px 20px; 
                min-height: auto; 
                border: none;
                box-shadow: none;
                border-radius: 0;
            }
            .main-card:hover, .main-card:active, .main-card.active { transform: none !important; box-shadow: none !important; border-color: transparent !important; }

            .card-img-placeholder { width: 32px; height: 32px; font-size: 20px; }
            .card-desc, .toggle-arrow { display: none !important; }
            .card-title { font-size: 18px; margin: 0; }

            .sub-menu {
                position: static;
                box-shadow: none;
                border: 0;
                border-radius: 0;
                background: transparent; /* Use transparent to blend with .menu-item */
                margin-top: 0;
                padding: 0 20px;
                max-height: none !important; /* Force override inline styles */
                opacity: 1 !important; /* Force override inline styles */
                visibility: visible;
                transform: none;
                overflow: visible;
                transition: none;
                border-top: 1px solid rgba(0,0,0,0.03);
            }

            .sub-link {
                padding: 14px 0;
                font-size: 14px;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Noto Sans CJK SC", "PingFang SC", "Hiragino Sans GB", sans-serif;
                font-weight: normal;
                color: var(--text-sub);
                border-bottom: 1px solid rgba(0,0,0,0.03);
                display: block; /* Ensure a tags behave properly */
            }
            .sub-link::after { display: none; }
            .sub-link:last-child { border-bottom: none; }

            .footer { padding: 20px; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- ✨ 头部 -->
    <header class="site-header">
        <a href="#" class="header-left">
            <img src="biaoti.png" alt="Logo" class="logo-icon" onerror="this.src='https://images.unsplash.com/photo-1542051841857-5f90071e7989?auto=format&fit=crop&w=100&q=80'">
            <span class="logo-text">また来たね，朋友〜</span>
        </a>
        
        <div class="header-right">
            <!-- 🌟 放大后的御守 (完美对标截图细节) -->
            <div class="header-actions">
                <a href="lottery.html" class="action-btn btn-omamori">
                    <span class="badge-pulse">今日</span>
                    <span class="icon">🎋</span>
                    <span class="label">御守</span>
                </a>
            </div>
        </div>
    </header>

    <!-- ✨ 英雄区 -->
    <section class="hero-section">
        <div class="hero-image-container">
            <img src="kiki3.png" alt="日本の風景" onerror="this.src='https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80'">
        </div>
        <div class="hero-text-container">
            <h1 class="hero-title">頑張ってる君が、<br>美しい。</h1>
        </div>
    </section>

    <!-- ✨ 三列卡片区 -->
    <section class="menu-section">
        <div class="menu-wrapper">
            <div class="main-menu-grid">
                
                <!-- 卡片 1 -->
                <div class="menu-item">
                    <div class="main-card" onclick="toggleSubMenu(event, 'sub-menu-study')">
                        <div class="card-img-placeholder">
                            <img src="icon-boy.png" alt="综合" onerror="this.style.display='none'; this.parentNode.innerHTML='📖';">
                        </div>
                        <div class="card-info">
                            <h3 class="card-title">総合学習 <span class="toggle-arrow">▼</span></h3>
                            <p class="card-desc">从基础到应用，全面提升日语综合能力。</p>
                        </div>
                    </div>
                    <div class="sub-menu" id="sub-menu-study">
                        <a href="textbook/n2_menu.html" class="sub-link">课文学习（Try! N2）</a>
                        <a href="practice.html" class="sub-link">文法练习（专项特训）</a>
                    </div>
                </div>

                <!-- 卡片 2 -->
                <div class="menu-item">
                    <div class="main-card" style="cursor: default;">
                        <div class="card-img-placeholder">
                            <img src="icon-business.png" alt="词汇" onerror="this.style.display='none'; this.parentNode.innerHTML='📓';">
                        </div>
                        <div class="card-info">
                            <h3 class="card-title">
                                語彙勉強 
                                <span style="font-size: 11px; font-family: sans-serif; background: #f0f0f0; color: #888; padding: 2px 6px; border-radius: 4px; font-weight: normal; margin-left: auto;">5月份上线</span>
                            </h3>
                            <p class="card-desc">N2能力考核心词汇</p>
                        </div>
                    </div>
                </div>

                <!-- 卡片 3 -->
                <div class="menu-item">
                    <div class="main-card" onclick="toggleSubMenu(event, 'sub-menu-listen')">
                        <div class="card-img-placeholder">
                            <img src="icon-tea.png" alt="听力" onerror="this.style.display='none'; this.parentNode.innerHTML='🎧';">
                        </div>
                        <div class="card-info">
                            <h3 class="card-title">聴力育成 <span class="toggle-arrow">▼</span></h3>
                            <p class="card-desc">通过故事，真题，锻炼日语听力水平。</p>
                        </div>
                    </div>
                    <div class="sub-menu" id="sub-menu-listen">
                        <a href="listen/listen_index.html" class="sub-link">即时应答（历年真题演练）</a>
                        <a href="#" class="sub-link">民间故事（磨耳朵）</a>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- ✨ 页脚 -->
    <footer class="footer">
        © 2026 kiki's Japanese Home | がんばって！
    </footer>

    <script>
        function isMobileMenu() {
            return window.matchMedia('(max-width: 992px)').matches;
        }

        function closeMenu(menu) {
            menu.classList.remove('show', 'is-open');
            menu.style.maxHeight = '0px';
            menu.previousElementSibling.classList.remove('active');
            menu.parentElement.style.zIndex = '1';
        }

        function openMenu(menu) {
            menu.previousElementSibling.classList.add('active');
            menu.parentElement.style.zIndex = '50';
            if (isMobileMenu()) {
                menu.classList.add('is-open');
                menu.style.maxHeight = menu.scrollHeight + 'px';
            } else {
                menu.classList.add('show');
                menu.style.maxHeight = '';
            }
        }

        function toggleSubMenu(event, menuId) {
            event.stopPropagation();
            if (isMobileMenu()) return;
            const targetMenu = document.getElementById(menuId);
            const isOpen = targetMenu.classList.contains('show') || targetMenu.classList.contains('is-open');

            document.querySelectorAll('.sub-menu').forEach(menu => {
                if (menu.id !== menuId) closeMenu(menu);
            });

            if (isOpen) {
                closeMenu(targetMenu);
            } else {
                openMenu(targetMenu);
            }
        }

        window.addEventListener('resize', () => {
            document.querySelectorAll('.sub-menu').forEach(menu => {
                if (menu.classList.contains('is-open')) {
                    menu.style.maxHeight = menu.scrollHeight + 'px';
                }
            });
        });

        document.addEventListener('click', () => {
            document.querySelectorAll('.sub-menu').forEach(closeMenu);
        });
    </script>
</body>
</html>
