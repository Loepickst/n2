                        <div class="text-group">
                            だから、みんなで<ruby>行<rt>い</rt></ruby>こうよ。ぼくは<span class="vocab-point" onclick="showItem('isshokunuite')">１<ruby>食<rt>しょく</rt></ruby><ruby>抜<rt>ぬ</rt></ruby>いて</span><ruby>行<rt>い</rt></ruby>くつもりなんだ。
                            <p class="translation">所以说，大家一起去吧。我打算饿一顿再去。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">大田</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>小<rt>こ</rt></ruby><ruby>林<rt>ばやし</rt></ruby><ruby>君<rt>くん</rt></ruby><span class="grammar-point" onclick="showItem('ttara')">ったら</span><ruby>何<rt>なに</rt></ruby><ruby>言<rt>い</rt></ruby>ってるの。<ruby>胃<rt>い</rt></ruby>の<ruby>大<rt>おお</rt></ruby>きさは<ruby>食<rt>しょく</rt></ruby><ruby>事<rt>じ</rt></ruby>の<ruby>量<rt>りょう</rt></ruby>によって<ruby>変<rt>か</rt></ruby>わる<span class="grammar-point" onclick="showItem('youninatteiru')">ようになっている</span>のよ。
                            <p class="translation">小林你这人说什么呢。胃的大小可是设计成会根据进食量而变化的哦。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">小林</div>
                    <div class="job-content">
                        <div class="text-group">
                            そうなんだ。この<ruby>間<rt>あいだ</rt></ruby><ruby>食<rt>た</rt></ruby>べられなかった<span class="grammar-point" onclick="showItem('wakeda')">わけだ</span>。<ruby>胃<rt>い</rt></ruby>が<ruby>小<rt>ちい</rt></ruby>さくなっちゃってたんだね。
                            <p class="translation">是这样啊。难怪我上次没怎么吃得下。原来是胃变小了啊。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">大田</div>
                    <div class="job-content">
                        <div class="text-group">
                            そうよ。<ruby>空<rt>くう</rt></ruby><ruby>腹<rt>ふく</rt></ruby>で<ruby>行<rt>い</rt></ruby>ったらたくさん<ruby>食<rt>た</rt></ruby>べる<span class="grammar-point" onclick="showItem('dokoroka')">どころか</span>、いつもより<ruby>食<rt>た</rt></ruby>べられなくなっちゃうんだから。
                            <p class="translation">是啊。如果空腹去的话，别说吃很多了，反而会变得比平时吃得更少。</p>
                        </div>
                        <div class="text-group">
                            そんなことも<ruby>知<rt>し</rt></ruby>らない<span class="grammar-point" onclick="showItem('youja')">ようじゃ</span>、<ruby>小<rt>こ</rt></ruby><ruby>林<rt>ばやし</rt></ruby><ruby>君<rt>くん</rt></ruby>は、<ruby>食<rt>た</rt></ruby>べ<ruby>放<rt>ほう</rt></ruby><ruby>題<rt>だい</rt></ruby><ruby>初<rt>しょ</rt></ruby><ruby>心<rt>しん</rt></ruby><ruby>者<rt>しゃ</rt></ruby>ね。
                            <p class="translation">连这种事都不知道的话，小林你还真是个自助餐新手呢。</p>
                        </div>
                    </div>
                </div>
                
                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （イラスト：食べ放題）
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-14-content">
        <article>
            <div class="lesson-header"><span>友達同士の会話</span><span>食べ放題（２）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    <ruby>食<rt>た</rt></ruby>べ<ruby>放<rt>ほう</rt></ruby><ruby>題<rt>だい</rt></ruby>（２）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">自助餐（2）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="job-row">
                    <div class="job-label">小林</div>
                    <div class="job-content">
                        <div class="text-group">
                            え？<ruby>食<rt>た</rt></ruby>べ<ruby>放<rt>ほう</rt></ruby><ruby>題<rt>だい</rt></ruby>に<ruby>初<rt>しょ</rt></ruby><ruby>心<rt>しん</rt></ruby><ruby>者<rt>しゃ</rt></ruby>って？
                            <p class="translation">欸？吃个自助餐还分新手？</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">大田</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>食<rt>た</rt></ruby>べ<ruby>放<rt>ほう</rt></ruby><ruby>題<rt>だい</rt></ruby>は<ruby>店<rt>みせ</rt></ruby>との<span class="vocab-point" onclick="showItem('shoubu')"><ruby>勝<rt>しょう</rt></ruby><ruby>負<rt>ぶ</rt></ruby></span>よ。<ruby>経<rt>けい</rt></ruby><ruby>験<rt>けん</rt></ruby>も<ruby>技<rt>ぎ</rt></ruby><ruby>術<rt>じゅつ</rt></ruby>も<ruby>必<rt>ひつ</rt></ruby><ruby>要<rt>よう</rt></ruby>よ。<ruby>飲<rt>の</rt></ruby>み<ruby>物<rt>もの</rt></ruby>は<span class="vocab-point" onclick="showItem('hikaeme')"><ruby>控<rt>ひか</rt></ruby>えめ</span>に。<ruby>値<rt>ね</rt></ruby><ruby>段<rt>だん</rt></ruby>の<ruby>高<rt>たか</rt></ruby>いものを<span class="vocab-point" onclick="showItem('nerau')"><ruby>狙<rt>ねら</rt></ruby>う</span>。
                            <p class="translation">自助餐可是跟店家的胜负对决哦。经验和技术都是必要的。饮料要少喝点。专攻价格高的东西。</p>
                        </div>
                        <div class="text-group">
                            あとは、<ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>は<span class="vocab-point" onclick="showItem('tabekireru')"><ruby>食<rt>た</rt></ruby>べきれる</span><ruby>量<rt>りょう</rt></ruby>をとって、<span class="vocab-point" onclick="showItem('yukkuri')">ゆっくり</span><ruby>食<rt>た</rt></ruby>べる<span class="grammar-point" onclick="showItem('kotoda')">こと</span>。
                            <p class="translation">还有，拿料理要拿能吃完的分量，并且要细嚼慢咽。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">小林</div>
                    <div class="job-content">
                        <div class="text-group">
                            なんでゆっくりなんだよ。<ruby>食<rt>た</rt></ruby>べ<ruby>放<rt>ほう</rt></ruby><ruby>題<rt>だい</rt></ruby>で<span class="vocab-point" onclick="showItem('jouhin')"><ruby>上<rt>じょう</rt></ruby><ruby>品<rt>ひん</rt></ruby></span><span class="grammar-point" onclick="showItem('butte')">ぶって</span>もしょうがないだろ？とにかく<span class="vocab-point" onclick="showItem('dondon')">どんどん</span><ruby>食<rt>た</rt></ruby>べなきゃ。
                            <p class="translation">为什么要细嚼慢咽啊。在自助餐厅装优雅也没用吧？总之得大口大口地吃才行啊。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">大田</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>初<rt>しょ</rt></ruby><ruby>心<rt>しん</rt></ruby><ruby>者<rt>しゃ</rt></ruby><span class="grammar-point" onclick="showItem('nikagitte')">に限って</span>そういうこと<ruby>言<rt>い</rt></ruby>うんだよね。<ruby>食<rt>た</rt></ruby>べ<ruby>放<rt>ほう</rt></ruby><ruby>題<rt>だい</rt></ruby>はマラソンよ。
                            <p class="translation">就只有新手才会说这种话呢。自助餐可是马拉松啊。</p>
                        </div>
                        <div class="text-group">
                            <ruby>元<rt>もと</rt></ruby>を<ruby>取<rt>と</rt></ruby>ろうと<ruby>思<rt>おも</rt></ruby>ったら、とにかく<ruby>最<rt>さい</rt></ruby><ruby>後<rt>ご</rt></ruby>まで<span class="vocab-point" onclick="showItem('pace')">ペース</span>を<span class="vocab-point" onclick="showItem('kuzusazu')"><ruby>崩<rt>くず</rt></ruby>さず</span>に<ruby>食<rt>た</rt></ruby>べ<ruby>続<rt>つづ</rt></ruby>ける<span class="grammar-point" onclick="showItem('kotoda')">ことよ</span>。
                            <p class="translation">如果想吃回本，关键在于要保持节奏一直吃到最后。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">小林</div>
                    <div class="job-content">
                        <div class="text-group">
                            へえ。そうなんだ。どうしてそんなに<ruby>詳<rt>くわ</rt></ruby>しいの？
                            <p class="translation">欸，是这样啊。你怎么这么了解？</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">大田</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>私<rt>わたし</rt></ruby>、この<ruby>近<rt>ちか</rt></ruby>くの<ruby>食<rt>た</rt></ruby>べ<ruby>放<rt>ほう</rt></ruby><ruby>題<rt>だい</rt></ruby><span class="grammar-point" onclick="showItem('toiu')">という</span><ruby>食<rt>た</rt></ruby>べ<ruby>放<rt>ほう</rt></ruby><ruby>題<rt>だい</rt></ruby>は<ruby>全<rt>ぜん</rt></ruby><ruby>部<rt>ぶ</rt></ruby><ruby>行<rt>い</rt></ruby>っているもん。
                            <p class="translation">这附近所有的自助餐厅我可全都去过了。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">小林</div>
                    <div class="job-content">
                        <div class="text-group">
                            へえ。
                            <p class="translation">欸。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">大田</div>
                    <div class="job-content">
                        <div class="text-group">
                            それにね、<ruby>残<rt>のこ</rt></ruby>したら、<ruby>罰<rt>ばっ</rt></ruby><ruby>金<rt>きん</rt></ruby>を<ruby>払<rt>はら</rt></ruby>わされる<ruby>店<rt>みせ</rt></ruby>もあるから<ruby>気<rt>き</rt></ruby>をつけないとだめよ。
                            <p class="translation">而且啊，有的店如果有剩菜会让你交罚款，所以必须小心。</p>
                        </div>
                        <div class="text-group">
                            <ruby>先<rt>せん</rt></ruby><ruby>週<rt>しゅう</rt></ruby>も<ruby>友<rt>とも</rt></ruby><ruby>達<rt>だち</rt></ruby>と<ruby>焼<rt>や</rt></ruby>き<ruby>肉<rt>にく</rt></ruby>の<ruby>食<rt>た</rt></ruby>べ<ruby>放<rt>ほう</rt></ruby><ruby>題<rt>だい</rt></ruby>に<ruby>行<rt>い</rt></ruby>ったんだけど、<span class="vocab-point" onclick="showItem('ayauku')"><ruby>危<rt>あや</rt></ruby>うく</span><ruby>罰<rt>ばっ</rt></ruby><ruby>金<rt>きん</rt></ruby>を<ruby>払<rt>はら</rt></ruby>わされる<span class="grammar-point" onclick="showItem('tokorodatta')">ところだった</span>んだから。
                            <p class="translation">上周我和朋友去吃烤肉自助，差点就被罚款了。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">小林</div>
                    <div class="job-content">
                        <div class="text-group">
                            それで、どうなったの？
                            <p class="translation">然后呢，怎么样了？</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">大田</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>最<rt>さい</rt></ruby><ruby>後<rt>ご</rt></ruby>の<ruby>力<rt>ちから</rt></ruby>を<span class="vocab-point" onclick="showItem('furishibotte')">ふりしぼって</span>、<ruby>私<rt>わたし</rt></ruby>が<ruby>食<rt>た</rt></ruby>べたわよ。
                            <p class="translation">我使出最后的力气把它吃掉了。</p>
                        </div>
                        <div class="text-group">
                            <ruby>罰<rt>ばっ</rt></ruby><ruby>金<rt>きん</rt></ruby><ruby>払<rt>はら</rt></ruby>う<span class="grammar-point" onclick="showItem('kurainara')">くらいなら</span>、がんばったほうがずっと<span class="grammar-point" onclick="showItem('mashi')">まし</span>だと<ruby>思<rt>おも</rt></ruby>って…。
                            <p class="translation">我想着与其交罚款，不如拼命吃了划算……。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">小林</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>大<rt>おお</rt></ruby><ruby>田<rt>た</rt></ruby>さんがいれば<span class="vocab-point" onclick="showItem('kokorozuyoi')"><ruby>心<rt>こころ</rt></ruby><ruby>強<rt>づよ</rt></ruby>い</span>ね。メンバー<ruby>集<rt>あつ</rt></ruby>めるから、<ruby>絶<rt>ぜっ</rt></ruby><ruby>対<rt>たい</rt></ruby><ruby>一<rt>いっ</rt></ruby><ruby>緒<rt>しょ</rt></ruby>に<ruby>行<rt>い</rt></ruby>こうね。よろしく！
                            <p class="translation">有大田小姐在真是让人放心呢。我去召集人马，一定要一起去哦。拜托了！</p>
                        </div>
                    </div>
                </div>

                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （イラスト：食べ放題）
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-15-content">
        <article>
            <div class="lesson-header"><span>エッセーを読む</span><span>満員電車（１）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    <ruby>満<rt>まん</rt></ruby><ruby>員<rt>いん</rt></ruby><ruby>電<rt>でん</rt></ruby><ruby>車<rt>しゃ</rt></ruby>（１）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">满员电车（1）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    <ruby>朝<rt>あさ</rt></ruby>の<ruby>通<rt>つう</rt></ruby><ruby>勤<rt>きん</rt></ruby><ruby>電<rt>でん</rt></ruby><ruby>車<rt>しゃ</rt></ruby>の<span class="vocab-point" onclick="showItem('konzatsu')"><ruby>混<rt>こん</rt></ruby><ruby>雑<rt>ざつ</rt></ruby></span>はつらい<span class="grammar-point" onclick="showItem('monogaaru')">ものがある</span>。
                    <p class="translation">早高峰通勤电车的拥挤，确实让人感到颇为艰辛。</p>
                </div>

                <div class="text-group">
                    <ruby>満<rt>まん</rt></ruby><ruby>員<rt>いん</rt></ruby><ruby>電<rt>でん</rt></ruby><ruby>車<rt>しゃ</rt></ruby>に<span class="vocab-point" onclick="showItem('stress')">ストレス</span>を<ruby>感<rt>かん</rt></ruby>じない<ruby>人<rt>ひと</rt></ruby>はいる<span class="grammar-point" onclick="showItem('mai')">まい</span>。
                    <p class="translation">大概没有人会在满员电车里感到毫无压力吧。</p>
                </div>

                <div class="text-group">
                    <ruby>日<rt>ひ</rt></ruby><ruby>々<rt>び</rt></ruby><span class="vocab-point" onclick="showItem('taete')"><ruby>耐<rt>た</rt></ruby>えて</span>いる<ruby>乗<rt>じょう</rt></ruby><ruby>客<rt>きゃく</rt></ruby>を<ruby>見<rt>み</rt></ruby>る<span class="grammar-point" onclick="showItem('nitsuke')">につけ</span>、みんな<span class="vocab-point" onclick="showItem('nanto')"><ruby>何<rt>なん</rt></ruby>と</span><span class="vocab-point" onclick="showItem('gamanzuyoi')"><ruby>我<rt>が</rt></ruby><ruby>慢<rt>まん</rt></ruby><ruby>強<rt>づよ</rt></ruby>い</span>のだろうと<ruby>思<rt>おも</rt></ruby>う。まるで<ruby>何<rt>なに</rt></ruby>かの<ruby>訓<rt>くん</rt></ruby><ruby>練<rt>れん</rt></ruby>をしているかのようだ。
                    <p class="translation">每当看到那些日复一日默默忍受的乘客，我总会感慨大家竟是如此坚韧。那副景象，简直就像是在进行某种特殊的修行一般。</p>
                </div>

                <div class="text-group">
                    <ruby>朝<rt>あさ</rt></ruby>のホームでは、いつも<ruby>同<rt>おな</rt></ruby>じ<ruby>場<rt>ば</rt></ruby><ruby>所<rt>しょ</rt></ruby>に<ruby>立<rt>た</rt></ruby>つ。この<ruby>路<rt>ろ</rt></ruby><ruby>線<rt>せん</rt></ruby>にはいくつか<ruby>高<rt>こう</rt></ruby><ruby>校<rt>こう</rt></ruby>があり、<ruby>階<rt>かい</rt></ruby><ruby>段<rt>だん</rt></ruby>の<ruby>近<rt>ちか</rt></ruby>くに<ruby>止<rt>と</rt></ruby>まるこの<span class="vocab-point" onclick="showItem('sharyou')"><ruby>車<rt>しゃ</rt></ruby><ruby>両<rt>りょう</rt></ruby></span>には<ruby>高<rt>こう</rt></ruby><ruby>校<rt>こう</rt></ruby><ruby>生<rt>せい</rt></ruby>がたくさん<ruby>乗<rt>の</rt></ruby>っている。
                    <p class="translation">早晨的站台上，我总是站在同一个位置候车。这条线路上有几所高中，由于这节车厢刚好停在靠近楼梯的位置，车上总是挤满了高中生。</p>
                </div>

                <div class="text-group">
                    だからこの<span class="vocab-point" onclick="showItem('sharyou')"><ruby>車<rt>しゃ</rt></ruby><ruby>両<rt>りょう</rt></ruby></span>は<ruby>混<rt>こ</rt></ruby>んでいる<span class="grammar-point" onclick="showItem('wariniwa')">わりには</span><ruby>座<rt>すわ</rt></ruby>れる<span class="vocab-point" onclick="showItem('chance')">チャンス</span>があるのだ。
                    <p class="translation">正因如此，这节车厢虽说拥挤，却反而更有机会等到座位。</p>
                </div>

                <div class="text-group">
                    <ruby>電<rt>でん</rt></ruby><ruby>車<rt>しゃ</rt></ruby>がホームに<ruby>入<rt>はい</rt></ruby>ってきた。ドアが<ruby>開<rt>ひら</rt></ruby>いた。<span class="vocab-point" onclick="showItem('osare')"><ruby>押<rt>お</rt></ruby>され</span>ながら<span class="vocab-point" onclick="showItem('norikomi')"><ruby>乗<rt>の</rt></ruby>り<ruby>込<rt>こ</rt></ruby>み</span>、<ruby>座<rt>すわ</rt></ruby>っている<ruby>高<rt>こう</rt></ruby><ruby>校<rt>こう</rt></ruby><ruby>生<rt>せい</rt></ruby>の<ruby>前<rt>まえ</rt></ruby>に<ruby>立<rt>た</rt></ruby>つ。
                    <p class="translation">电车进站了。车门开启，我顺着人流被挤进车厢，站到了一名正坐着的高中生面前。</p>
                </div>

                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （出典：『満員電車』）
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-16-content">
        <article>
            <div class="lesson-header"><span>エッセーを読む</span><span>満員電車（２）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    <ruby>満<rt>まん</rt></ruby><ruby>員<rt>いん</rt></ruby><ruby>電<rt>でん</rt></ruby><ruby>車<rt>しゃ</rt></ruby>（２）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">满员电车（2）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    <ruby>次<rt>つぎ</rt></ruby>の<ruby>駅<rt>えき</rt></ruby>が<ruby>近<rt>ちか</rt></ruby>づいてきた。<ruby>前<rt>まえ</rt></ruby>に<ruby>座<rt>すわ</rt></ruby>っている<ruby>女<rt>じょ</rt></ruby><ruby>子<rt>し</rt></ruby><ruby>高<rt>こう</rt></ruby><ruby>生<rt>せい</rt></ruby>が、<ruby>見<rt>み</rt></ruby>ていた<ruby>教<rt>きょう</rt></ruby><ruby>科<rt>か</rt></ruby><ruby>書<rt>しょ</rt></ruby>をかばんに<span class="vocab-point" onclick="showItem('shimatta')">しまった</span>。
                    <p class="translation">下一站快到了。坐在我面前的那名女高中生，把刚才一直在看的教科书收进了包里。</p>
                </div>

                <div class="text-group">
                    よし、<ruby>今<rt>きょ</rt></ruby><ruby>日<rt>う</rt></ruby>は<ruby>座<rt>すわ</rt></ruby>るぞ。<ruby>彼<rt>かの</rt></ruby><ruby>女<rt>じょ</rt></ruby>が<ruby>立<rt>た</rt></ruby>つ<span class="grammar-point" onclick="showItem('kakanouchini')">か</span><ruby>立<rt>た</rt></ruby>たない<span class="grammar-point" onclick="showItem('kakanouchini')">かのうちに</span>、<ruby>次<rt>つぎ</rt></ruby>は<ruby>自<rt>じ</rt></ruby><ruby>分<rt>ぶん</rt></ruby>が<ruby>座<rt>すわ</rt></ruby>るという<ruby>態<rt>たい</rt></ruby><ruby>度<rt>ど</rt></ruby>を<ruby>周<rt>まわ</rt></ruby>りに<span class="vocab-point" onclick="showItem('shimesu')"><ruby>示<rt>しめ</rt></ruby>す</span>。
                    <p class="translation">“好，今天总算能坐下了！”我心里暗暗鼓劲，在她还没来得及起身时，就向周围人展示出“下一个该我坐了”的架势。</p>
                </div>

                <div class="text-group">
                    しかしその<ruby>子<rt>こ</rt></ruby>は<ruby>全<rt>ぜん</rt></ruby><ruby>然<rt>ぜん</rt></ruby><ruby>立<rt>た</rt></ruby>とうとしない。<ruby>教<rt>きょう</rt></ruby><ruby>科<rt>か</rt></ruby><ruby>書<rt>しょ</rt></ruby>をしまったのは<ruby>文<rt>ぶん</rt></ruby><ruby>庫<rt>こ</rt></ruby><ruby>本<rt>ぼん</rt></ruby>を<ruby>取<rt>と</rt></ruby>り<ruby>出<rt>だ</rt></ruby>すためだった。ああ、<ruby>降<rt>お</rt></ruby>りないのか。<ruby>残<rt>ざん</rt></ruby><ruby>念<rt>ねん</rt></ruby>。
                    <p class="translation">然而，那个孩子完全没有要站起来的意思。原来她收起教科书，只是为了拿出另一本文库本小说。 “啊……原来不下车啊，真遗憾。”我不禁感到一阵失落。</p>
                </div>

                <div class="text-group">
                    <ruby>周<rt>まわ</rt></ruby>りを<ruby>見<rt>み</rt></ruby>ると、<ruby>座<rt>すわ</rt></ruby>っている<ruby>人<rt>ひと</rt></ruby>はみんな<ruby>自<rt>じ</rt></ruby><ruby>由<rt>ゆう</rt></ruby>に<ruby>好<rt>す</rt></ruby>きなことをしている。2、3<ruby>人<rt>にん</rt></ruby>で<ruby>雑<rt>ざっ</rt></ruby><ruby>誌<rt>し</rt></ruby>を<ruby>見<rt>み</rt></ruby>ながら<ruby>楽<rt>たの</rt></ruby>し<span class="grammar-point" onclick="showItem('ge')">げ</span>におしゃべりしている<ruby>子<rt>こ</rt></ruby>たちもいる。そんな<ruby>様<rt>よう</rt></ruby><ruby>子<rt>す</rt></ruby>が<span class="vocab-point" onclick="showItem('kuyashii')">くやしい</span><span class="grammar-point" onclick="showItem('yarayara')">やら</span>うらやましい<span class="grammar-point" onclick="showItem('yarayara')">やら</span>…。
                    <p class="translation">环顾四周，那些有座位的人都在随心所欲地做着自己喜欢的事。还有两三个女生正一边翻着杂志一边愉快地聊天。看着她们那副样子，我真是又觉得憋屈，又觉得羡慕……</p>
                </div>

                <div class="text-group">
                    <ruby>駅<rt>えき</rt></ruby>に<ruby>着<rt>つ</rt></ruby>いて<ruby>乗<rt>じょう</rt></ruby><ruby>客<rt>きゃく</rt></ruby>が<ruby>降<rt>お</rt></ruby>り<span class="grammar-point" onclick="showItem('katoumouto')">たかと思うと</span>、それ<ruby>以<rt>い</rt></ruby><ruby>上<rt>じょう</rt></ruby>の<ruby>人<rt>ひと</rt></ruby>が<ruby>乗<rt>の</rt></ruby>り<ruby>込<rt>こ</rt></ruby>んでくる。
                    <p class="translation">好不容易熬到了站，刚以为有乘客下去了，结果却涌进来了更多的人。</p>
                </div>

                <div class="text-group">
                    <ruby>結<rt>けっ</rt></ruby><ruby>局<rt>きょく</rt></ruby>、<ruby>立<rt>た</rt></ruby>ったまま<ruby>背<rt>せ</rt></ruby><ruby>中<rt>なか</rt></ruby>を<span class="vocab-point" onclick="showItem('guigui')">ぐいぐい</span><ruby>押<rt>お</rt></ruby>され、<ruby>耐<rt>た</rt></ruby>えているうちにまた<ruby>次<rt>つぎ</rt></ruby>の<ruby>駅<rt>えき</rt></ruby>に<ruby>着<rt>つ</rt></ruby>く。やはり<ruby>満<rt>まん</rt></ruby><ruby>員<rt>いん</rt></ruby><ruby>電<rt>でん</rt></ruby><ruby>車<rt>しゃ</rt></ruby>はつらい<ruby>訓<rt>くん</rt></ruby><ruby>練<rt>れん</rt></ruby>の<ruby>場<rt>ば</rt></ruby>なのだ。
                    <p class="translation">最终，我还是只能保持站姿，背部被推搡着，在一路忍耐中又到了下一站。 满员电车果然艰辛，这终究是一场体能与意志的“修行”啊。</p>
                </div>

                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （出典：『満員電車』）
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-17-content">
        <article>
            <div class="lesson-header"><span>記事を読む</span><span>ラーメンの紹介</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    <ruby>進<rt>しん</rt></ruby><ruby>化<rt>か</rt></ruby>する<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>食<rt>しょく</rt></ruby> ラーメンの<ruby>魅<rt>み</rt></ruby><ruby>力<rt>りょく</rt></ruby>
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">进化的日本美食 拉面的魅力</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    <ruby>外<rt>がい</rt></ruby><ruby>国<rt>こく</rt></ruby><ruby>人<rt>じん</rt></ruby>に「<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>で<ruby>何<rt>なに</rt></ruby>が<ruby>好<rt>す</rt></ruby>きか」と<span class="vocab-point" onclick="showItem('tazuneru')">たずねる</span>と、すしやてんぷらばかりではなく、「ラーメン」という<ruby>答<rt>こた</rt></ruby>えが<ruby>意<rt>い</rt></ruby><ruby>外<rt>がい</rt></ruby>に<ruby>多<rt>おお</rt></ruby>いのです。
                    <p class="translation">当你询问外国友人“最喜欢的日本料理是什么”时，得到的答案往往不仅是寿司或天妇罗，“拉面”这一回答意外地占据了极高比例。</p>
                </div>

                <div class="text-group">
                    ラーメンは<ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby>のめん<ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>を<span class="vocab-point" onclick="showItem('kigen')"><ruby>起<rt>き</rt></ruby><ruby>源<rt>げん</rt></ruby></span>にしていると<ruby>言<rt>い</rt></ruby>われていますが、<ruby>外<rt>がい</rt></ruby><ruby>国<rt>こく</rt></ruby><ruby>人<rt>じん</rt></ruby>にとってラーメンは<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby><span class="grammar-point" onclick="showItem('nihokanaranai')">にほかならない</span>のです。
                    <p class="translation">虽然拉面的起源被认为是中国的面食文化，但对当今的外国人而言，拉面已然是地地道道的“日本料理”了。</p>
                </div>

                <div class="text-group">
                    <ruby>昔<rt>むかし</rt></ruby>のラーメンは<span class="vocab-point" onclick="showItem('kigaru')"><ruby>気<rt>き</rt></ruby><ruby>軽<rt>がる</rt></ruby></span>に<ruby>空<rt>くう</rt></ruby><ruby>腹<rt>ふく</rt></ruby>を<span class="vocab-point" onclick="showItem('mitasu')"><ruby>満<rt>み</rt></ruby>たす</span>もの<span class="grammar-point" onclick="showItem('nisuginakatta')">にすぎなかった</span>かもしれませんが、<ruby>今<rt>いま</rt></ruby>ではラーメンは<span class="vocab-point" onclick="showItem('rippa')"><ruby>立<rt>りっ</rt></ruby><ruby>派<rt>ぱ</rt></ruby></span>な<ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>です。
                    <p class="translation">过去，拉面或许仅仅是一种为了快速填饱肚子而存在的便捷选择，但如今它已发展成为一种非常考究的盛宴。</p>
                </div>

                <div class="text-group">
                    ラーメンはめんやスープの<ruby>作<rt>つく</rt></ruby>り<ruby>方<rt>かた</rt></ruby>に<span class="vocab-point" onclick="showItem('kufu')"><ruby>工<rt>く</rt></ruby><ruby>夫<rt>ふう</rt></ruby></span>ができる<span class="grammar-point" onclick="showItem('ueni')">上に</span>、めんにのせる<span class="vocab-point" onclick="showItem('gu')"><ruby>具</ruby></span>にも<span class="vocab-point" onclick="showItem('variation')">バリエーション</span>がつけやすいのです。
                    <p class="translation">拉面不仅在面条和汤头的制作上倾注了大量心血，更因配菜的变化多样而展现出极强的可塑性。</p>
                </div>

                <div class="text-group">
                    そのため、ラーメン<span class="grammar-point" onclick="showItem('toittemo')">といっても</span>、<ruby>最<rt>さい</rt></ruby><ruby>近<rt>きん</rt></ruby>はイタリア<ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>のトマトソースを<ruby>使<rt>つか</rt></ruby>ったもの、<span class="vocab-point" onclick="showItem('saladkankaku')">サラダ<ruby>感<rt>かん</rt></ruby><ruby>覚<rt>かく</rt></ruby></span>で<ruby>食<rt>た</rt></ruby>べられるもの、スープのないものなど、<ruby>様<rt>さま</rt></ruby><ruby>々<rt>ざま</rt></ruby>なものがあります。
                    <p class="translation">现在的拉面早已跨越了传统界限，无论是加入意式番茄酱的新奇风味、爽口的沙拉风味，还是干拌的无汤拉面，种类之繁多令人目不暇接。</p>
                </div>

                <div class="text-group">
                    ラーメンはしょうゆ<span class="grammar-point" onclick="showItem('nikagiru')">に限る</span>と<ruby>言<rt>い</rt></ruby>う<ruby>人<rt>ひと</rt></ruby>も、<ruby>一<rt>いち</rt></ruby><ruby>度<rt>ど</rt></ruby><ruby>食<rt>た</rt></ruby>べてみる<ruby>価<rt>か</rt></ruby><ruby>値<rt>ち</rt></ruby>があるのではないでしょうか。
                    <p class="translation">即便你是那种坚称“拉面非酱油风味不可”的传统派，这些创新的拉面也绝对值得你一试。</p>
                </div>

                <div class="text-group">
                    <ruby>先<rt>せん</rt></ruby><ruby>日<rt>じつ</rt></ruby>インターネットで<span class="vocab-point" onclick="showItem('wadai')"><ruby>話<rt>わ</rt></ruby><ruby>題<rt>だい</rt></ruby></span>になっているラーメン<ruby>店<rt>てん</rt></ruby>に<ruby>行<rt>い</rt></ruby>ってみました。<ruby>人<rt>にん</rt></ruby><ruby>気<rt>き</rt></ruby><ruby>店<rt>てん</rt></ruby><span class="grammar-point" onclick="showItem('dakeatte')">だけあって</span>、すごい<span class="vocab-point" onclick="showItem('gyoretsu')"><ruby>行<rt>ぎょう</rt></ruby><ruby>列<rt>れつ</rt></ruby></span>でした。
                    <p class="translation">前些日子，我慕名去了一家网络热议的拉面店。真不愧是高人气店铺，排队的阵仗令人惊叹。</p>
                </div>

                <div class="text-group">
                    2<ruby>時<rt>じ</rt></ruby><ruby>間<rt>かん</rt></ruby><ruby>待<rt>ま</rt></ruby>たされましたが、<span class="vocab-point" onclick="showItem('sasugani')">さすがに</span>そのラーメンはスープ<span class="grammar-point" onclick="showItem('nishironishiro')">にしろ</span>、<span class="vocab-point" onclick="showItem('gu')"><ruby>具</ruby></span><span class="grammar-point" onclick="showItem('nishironishiro')">にしろ</span>、その<ruby>店<rt>みせ</rt></ruby><span class="vocab-point" onclick="showItem('dokuji')"><ruby>独<rt>どく</rt></ruby><ruby>自<rt>じ</rt></ruby></span>の<span class="vocab-point" onclick="showItem('kufu')"><ruby>工<rt>く</rt></ruby><ruby>夫<rt>ふう</rt></ruby></span>がされていて、<span class="vocab-point" onclick="showItem('imamadeninai')"><ruby>今<rt>いま</rt></ruby>までにない</span><ruby>新<rt>あたら</rt></ruby>しいものでした。
                    <p class="translation">虽然足足等了两个小时，但那碗拉面无论是汤底还是配料都融入了店家独特的创意，呈现出前所未有的新颖口感。</p>
                </div>

                <div class="text-group">
                    <ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>の<ruby>新<rt>しん</rt></ruby><span class="vocab-point" onclick="showItem('genre')">ジャンル</span>としてのラーメンがこれからどんな<ruby>進<rt>しん</rt></ruby><ruby>化<rt>か</rt></ruby>をしていくのか、<ruby>楽<rt>たの</rt></ruby>しみです。
                    <p class="translation">作为日本料理中的一个新兴流派，拉面未来还将如何进化演变？真是令人充满期待。</p>
                </div>

                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （文：週刊ABK編集部）
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-18-content">
        <article>
            <div class="lesson-header"><span>ビジネス場面の会話</span><span>ウォーキングシューズの開発（１）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    ウォーキングシューズの<ruby>開<rt>かい</rt></ruby><ruby>発<rt>はつ</rt></ruby>（１）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">开发轻便鞋（1）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="job-row">
                    <div class="job-label">川口</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>今<rt>こん</rt></ruby><ruby>度<rt>ど</rt></ruby>、ミズノから「<ruby>軽<rt>かる</rt></ruby>くて<ruby>疲<rt>つか</rt></ruby>れない<ruby>靴<rt>くつ</rt></ruby>」が<ruby>発<rt>はつ</rt></ruby><ruby>売<rt>ばい</rt></ruby>される<span class="grammar-point" onclick="showItem('toka')">とか</span>…。
                            <p class="translation">听说美津浓（Mizuno）最近要推出一款“轻便且不累脚”的鞋子……</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">山下</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>軽<rt>けい</rt></ruby><ruby>量<rt>りょう</rt></ruby><ruby>化<rt>か</rt></ruby>という<ruby>業<rt>ぎょう</rt></ruby><ruby>界<rt>かい</rt></ruby>の<span class="vocab-point" onclick="showItem('nagare')"><ruby>流<rt>なが</rt></ruby>れ</span><span class="grammar-point" onclick="showItem('nisotte')">にそって</span>、<ruby>新<rt>しん</rt></ruby><ruby>製<rt>せい</rt></ruby><ruby>品<rt>ひん</rt></ruby>が<ruby>開<rt>かい</rt></ruby><ruby>発<rt>はつ</rt></ruby>されていますからね。
                            <p class="translation">是啊，各大厂商现在都在顺应业界“轻量化”的大趋势来开发新品。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">山下</div>
                    <div class="job-content">
                        <div class="text-group">
                            わが<ruby>社<rt>しゃ</rt></ruby>も<span class="vocab-point" onclick="showItem('walkingshoes')">ウォーキングシューズ</span><span class="grammar-point" onclick="showItem('nikaketeha')">にかけては</span>、<ruby>実<rt>じっ</rt></ruby><ruby>績<rt>せき</rt></ruby>がありますが、<ruby>違<rt>ちが</rt></ruby>った<ruby>視<rt>し</rt></ruby><ruby>点<rt>てん</rt></ruby>で<ruby>開<rt>かい</rt></ruby><ruby>発<rt>はつ</rt></ruby>し<span class="grammar-point" onclick="showItem('naikotoniwa')">ないことには</span><ruby>新<rt>あたら</rt></ruby>しいお<ruby>客<rt>きゃく</rt></ruby>さんは<span class="vocab-point" onclick="showItem('kakutoku')"><ruby>獲<rt>かく</rt></ruby><ruby>得<rt>とく</rt></ruby></span>できないですよね。
                            <p class="translation">虽说我们公司在步行鞋领域确实拥有深厚的技术积淀，但如果不从全新的视角进行开发，恐怕很难争取到新客户。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">川口</div>
                    <div class="job-content">
                        <div class="text-group">
                            ウォーキングシューズというと、<span class="vocab-point" onclick="showItem('mitame')"><ruby>見<rt>み</rt></ruby>た<ruby>目<rt>め</rt></ruby></span>より<ruby>歩<rt>ある</rt></ruby>きやすさを<ruby>重<rt>じゅう</rt></ruby><ruby>視<rt>し</rt></ruby>し<span class="grammar-point" onclick="showItem('gachi')">がち</span>ですけど、<ruby>女<rt>じょ</rt></ruby><ruby>性<rt>せい</rt></ruby>としては、やっぱり<ruby>買<rt>か</rt></ruby>うときの<span class="vocab-point" onclick="showItem('kimete')"><ruby>決<rt>き</rt></ruby>め<ruby>手<rt>て</rt></ruby></span>はデザインですね。
                            <p class="translation">提起步行鞋，人们往往容易只看重功能性而忽略外观。 但对于女性来说，购买时的决定性因素果然还是设计感。</p>
                        </div>
                        <div class="text-group">
                            <ruby>歩<rt>ある</rt></ruby>きやすい<ruby>靴<rt>くつ</rt></ruby>がほしいと<ruby>思<rt>おも</rt></ruby>い<span class="grammar-point" onclick="showItem('tsutsumo')">つつも</span>、デザインを<ruby>優<rt>ゆう</rt></ruby><ruby>先<rt>せん</rt></ruby>してしまう<ruby>人<rt>ひと</rt></ruby>が<ruby>多<rt>おお</rt></ruby>いと<ruby>思<rt>おも</rt></ruby>うんです。
                            <p class="translation">我觉得很多人虽然心里想着想要一双好走的鞋，但实际挑选时还是会优先考虑款式。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">山下</div>
                    <div class="job-content">
                        <div class="text-group">
                            <ruby>女<rt>じょ</rt></ruby><ruby>性<rt>せい</rt></ruby>ですからね。
                            <p class="translation">毕竟是女性消费者的心理嘛。</p>
                        </div>
                    </div>
                </div>

                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （イラスト：ウォーキングシューズの開発）
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-19-content">
        <article>
            <div class="lesson-header"><span>ビジネス場面の会話</span><span>ウォーキングシューズの開発（２）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    ウォーキングシューズの<ruby>開<rt>かい</rt></ruby><ruby>発<rt>はつ</rt></ruby>（２）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">开发轻便鞋（2）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="job-row">
                    <div class="job-label">川口</div>
                    <div class="job-content">
                        <div class="text-group">
                            ええ。だから<ruby>新<rt>しん</rt></ruby><ruby>商<rt>しょう</rt></ruby><ruby>品<rt>ひん</rt></ruby>を<ruby>作<rt>つく</rt></ruby>る<span class="grammar-point" onclick="showItem('toshitara')">としたら</span>、<span class="vocab-point" onclick="showItem('fashionsei')">ファッション<ruby>性<rt>せい</rt></ruby></span>も<ruby>重<rt>じゅう</rt></ruby><ruby>視<rt>し</rt></ruby>しないと。
                            <p class="translation">是的。所以如果要开发新产品的话，必须也要重视其时尚属性。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">山下</div>
                    <div class="job-content">
                        <div class="text-group">
                            <span class="vocab-point" onclick="showItem('oshare')">おしゃれ</span>で、<ruby>疲<rt>つか</rt></ruby>れない<ruby>靴<rt>くつ</rt></ruby>ということですよね。
                            <p class="translation">也就是说要既时髦又不累脚的鞋子对吧。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">川口</div>
                    <div class="job-content">
                        <div class="text-group">
                            ええ。<ruby>作<rt>つく</rt></ruby>る<ruby>以<rt>い</rt></ruby><ruby>上<rt>じょう</rt></ruby>は、<ruby>今<rt>いま</rt></ruby>までにないものを<ruby>作<rt>つく</rt></ruby>りたいですね。
                            <p class="translation">对。既然要开发，我就想做出一款前所未有的产品。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">山下</div>
                    <div class="job-content">
                        <div class="text-group">
                            デザイン<span class="grammar-point" onclick="showItem('shidai')">次第</span>で、<span class="vocab-point" onclick="showItem('hit')">ヒット</span><ruby>商<rt>しょう</rt></ruby><ruby>品<rt>ひん</rt></ruby>になりますよ。
                            <p class="translation">只要设计得当，一定会成为爆款产品的。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">川口</div>
                    <div class="job-content">
                        <div class="text-group">
                            この<ruby>業<rt>ぎょう</rt></ruby><ruby>界<rt>かい</rt></ruby>も<ruby>競<rt>きょう</rt></ruby><ruby>争<rt>そう</rt></ruby>が<ruby>厳<rt>きび</rt></ruby>しくなる<span class="grammar-point" onclick="showItem('ippou_l19')">一方</span>ですけど、<span class="vocab-point" onclick="showItem('needs')">ニーズ</span>に<ruby>合<rt>あ</rt></ruby>った<ruby>商<rt>しょう</rt></ruby><ruby>品<rt>ひん</rt></ruby>なら<ruby>絶<rt>ぜっ</rt></ruby><ruby>対<rt>たい</rt></ruby><span class="vocab-point" onclick="showItem('uremasu')"><ruby>売<rt>う</rt></ruby>れます</span>よね。
                            <p class="translation">虽说这个行业的竞争日益激烈，但只要是符合需求的产品，绝对会大卖。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">山下</div>
                    <div class="job-content">
                        <div class="text-group">
                            それじゃ、<ruby>新<rt>しん</rt></ruby><ruby>製<rt>せい</rt></ruby><ruby>品<rt>ひん</rt></ruby>の<ruby>開<rt>かい</rt></ruby><ruby>発<rt>はつ</rt></ruby><span class="grammar-point" onclick="showItem('nisakidatte')">に先立って</span>、アンケート<ruby>調<rt>ちょう</rt></ruby><ruby>査<rt>さ</rt></ruby>が<ruby>必<rt>ひつ</rt></ruby><ruby>要<rt>よう</rt></ruby>になりますね。
                            <p class="translation">那么，在开发新产品之前，就有必要先进行问卷调查了。</p>
                        </div>
                    </div>
                </div>

                <div class="job-row">
                    <div class="job-label">川口</div>
                    <div class="job-content">
                        <div class="text-group">
                            そうですね。<ruby>市<rt>し</rt></ruby><ruby>場<rt>じょう</rt></ruby><ruby>調<rt>ちょう</rt></ruby><ruby>査<rt>さ</rt></ruby>をした<span class="grammar-point" onclick="showItem('uede')">上で</span>、<ruby>若<rt>わか</rt></ruby>い<ruby>社<rt>しゃ</rt></ruby><ruby>会<rt>かい</rt></ruby><ruby>人<rt>じん</rt></ruby>の<ruby>声<rt>こえ</rt></ruby><span class="grammar-point" onclick="showItem('nikotaeta')">にこたえた</span>「<ruby>見<rt>み</rt></ruby>た<ruby>目<rt>め</rt></ruby>もよくて<ruby>機<rt>き</rt></ruby><ruby>能<rt>のう</rt></ruby><ruby>性<rt>せい</rt></ruby><span class="vocab-point" onclick="showItem('batsugun')"><ruby>抜<rt>ばつ</rt></ruby><ruby>群<rt>ぐん</rt></ruby></span>」の<ruby>商<rt>しょう</rt></ruby><ruby>品<rt>ひん</rt></ruby>を<ruby>考<rt>かんが</rt></ruby>えましょう。
                            <p class="translation">没错。让我们在完成市场调研的基础上，构思一款响应年轻职场人士心声、“外观精美且功能性出众”的产品吧。</p>
                        </div>
                    </div>
                </div>

                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （イラスト：ウォーキングシューズの開発）
                </div>
            </div>
        </article>

    <template id="lesson-20-content">
        <article>
            <div class="lesson-header"><span>ストーリーを読む</span><span>人生の転機（１）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    <ruby>人<rt>じん</rt></ruby><ruby>生<rt>せい</rt></ruby>の<ruby>転<rt>てん</rt></ruby><ruby>機<rt>き</rt></ruby>（１）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">人生的转折点（1）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    「<ruby>課<rt>か</rt></ruby><ruby>長<rt>ちょう</rt></ruby><span class="vocab-point" onclick="showItem('shoushin')"><ruby>昇<rt>しょう</rt></ruby><ruby>進<rt>しん</rt></ruby></span>の<ruby>話<rt>はなし</rt></ruby>はなかった<span class="grammar-point" onclick="showItem('kotonisuru')">ことにする</span>」と<ruby>部<rt>ぶ</rt></ruby><ruby>長<rt>ちょう</rt></ruby>に<span class="vocab-point" onclick="showItem('tsugerareta')"><ruby>告<rt>つ</rt></ruby>げられた</span>のは3か<ruby>月<rt>げつ</rt></ruby><ruby>前<rt>まえ</rt></ruby>だった。
                    <p class="translation">部长亲口对我说“升职课长的事就此作罢”，已经是三个月前的事了。</p>
                </div>

                <div class="text-group">
                    <ruby>自<rt>じ</rt></ruby><ruby>分<rt>ぶん</rt></ruby>では<span class="vocab-point" onclick="showItem('seiippai')"><ruby>精<rt>せい</rt></ruby><ruby>一<rt>いっ</rt></ruby><ruby>杯<rt>ぱい</rt></ruby></span>がんばった<span class="grammar-point" onclick="showItem('tsumori_l20')">つもり</span>だったが、<span class="vocab-point" onclick="showItem('project')">プロジェクト</span>に<ruby>失<rt>しっ</rt></ruby><ruby>敗<rt>ぱい</rt></ruby>し、<ruby>大<rt>おお</rt></ruby>きな<span class="vocab-point" onclick="showItem('songai')"><ruby>損<rt>そん</rt></ruby><ruby>害<rt>がい</rt></ruby></span>を<span class="vocab-point" onclick="showItem('dashita')"><ruby>出<rt>だ</rt></ruby>した</span>のが<ruby>原<rt>げん</rt></ruby><ruby>因<rt>いん</rt></ruby>だ。
                    <p class="translation">明明觉得自己已经拼尽了全力，可最终还是因为项目的失败给公司造成了巨大的损失。</p>
                </div>

                <div class="text-group">
                    <span class="vocab-point" onclick="showItem('shussha')"><ruby>出<rt>しゅっ</rt></ruby><ruby>社<rt>しゃ</rt></ruby></span>しても、<ruby>毎<rt>まい</rt></ruby><ruby>日<rt>にち</rt></ruby>がつらく<span class="grammar-point" onclick="showItem('tenaranai')">てならなかった</span>。できる<span class="grammar-point" onclick="showItem('mononara')">ものなら</span>、<ruby>違<rt>ちが</rt></ruby>う<ruby>世<rt>せ</rt></ruby><ruby>界<rt>かい</rt></ruby>へ<ruby>行<rt>い</rt></ruby>ってしまいたいと<ruby>思<rt>おも</rt></ruby>いながら、<ruby>日<rt>ひ</rt></ruby><ruby>々<rt>び</rt></ruby>を<ruby>過<rt>す</rt></ruby>ごしていた。
                    <p class="translation">现在的我，每天在公司都觉得痛苦得不得了。如果可以的话，我甚至想逃往一个完全不同的世界，每天就这样浑浑噩噩地过着。</p>
                </div>

                <div class="text-group">
                    <span class="vocab-point" onclick="showItem('mushiatsui')"><ruby>蒸<rt>む</rt></ruby>し<ruby>暑<rt>あつ</rt></ruby>い</span>ある<ruby>晩<rt>ばん</rt></ruby>、<ruby>俺<rt>おれ</rt></ruby>は<ruby>散<rt>さん</rt></ruby><ruby>歩<rt>ぽ</rt></ruby>していた。<ruby>住<rt>じゅう</rt></ruby><ruby>宅<rt>たく</rt></ruby>もほとんどない<span class="vocab-point" onclick="showItem('makkura')"><ruby>真<rt>まっ</rt></ruby><ruby>暗<rt>くら</rt></ruby></span>な<ruby>道<rt>みち</rt></ruby>を<ruby>歩<rt>ある</rt></ruby>いていると、<ruby>向<rt>む</rt></ruby>こうの<ruby>一<rt>いっ</rt></ruby><ruby>軒<rt>けん</rt></ruby><ruby>屋<rt>や</rt></ruby>の2<ruby>階<rt>かい</rt></ruby>に<span class="vocab-point" onclick="showItem('akari')"><ruby>明<rt>あ</rt></ruby>かり</span>が<ruby>見<rt>み</rt></ruby>えた。
                    <p class="translation">某天晚上，外面格外闷热，我像往常一样出门散步。走在那条几乎没什么住户、漆黑一片的小路上时，我突然注意到对面一栋房子的二楼亮着灯。</p>
                </div>

                <div class="text-group">
                    「あれ？<ruby>確<rt>たし</rt></ruby>かあそこは<span class="vocab-point" onclick="showItem('akiya')"><ruby>空<rt>あき</rt></ruby><ruby>家<rt>や</rt></ruby></span>のはずだ」<span class="vocab-point" onclick="showItem('fushin')"><ruby>不<rt>ふ</rt></ruby><ruby>審<rt>しん</rt></ruby></span>に<ruby>思<rt>おも</rt></ruby>いつつ<ruby>近<rt>ちか</rt></ruby>づいていくと、<ruby>突<rt>とつ</rt></ruby><ruby>然<rt>ぜん</rt></ruby>「キャー」という<ruby>若<rt>わか</rt></ruby>い<ruby>女<rt>じょ</rt></ruby><ruby>性<rt>せい</rt></ruby>の<ruby>悲<rt>ひ</rt></ruby><ruby>鳴<rt>めい</rt></ruby>が<ruby>聞<rt>き</rt></ruby>こえた。そして<ruby>男<rt>だん</rt></ruby><ruby>女<rt>じょ</rt></ruby>の<span class="vocab-point" onclick="showItem('arasou')"><ruby>争<rt>あらそ</rt></ruby>う</span><ruby>声<rt>こえ</rt></ruby>。「やめて！」「うるさい！<ruby>黙<rt>だま</rt></ruby>れ！」
                    <p class="translation">“奇怪，那里明明应该是间空屋才对啊……” 我一边觉得心生怀疑，一边试着靠近，这时，屋里突然传来一声年轻女性的惨叫——“呀！” 紧接着是男女的争吵声：“住手！”“吵死了！给我闭嘴！”</p>
                </div>

                <div class="text-group">
                    もしかして、<span class="vocab-point" onclick="showItem('jiken')"><ruby>事<rt>じ</rt></ruby><ruby>件<rt>けん</rt></ruby></span>か。こんなときに<ruby>限<rt>かぎ</rt></ruby>って、<ruby>携<rt>けい</rt></ruby><ruby>帯<rt>たい</rt></ruby>をうちに<ruby>置<rt>お</rt></ruby>いてきてしまった。<ruby>行<rt>い</rt></ruby><span class="grammar-point" onclick="showItem('ukamaika')">こうか</span><ruby>行<rt>い</rt></ruby>く<span class="grammar-point" onclick="showItem('ukamaika')">まいか</span><ruby>迷<rt>まよ</rt></ruby>った<span class="grammar-point" onclick="showItem('sue')"><ruby>末<rt>すえ</rt></ruby></span>、<ruby>俺<rt>おれ</rt></ruby>はその<ruby>家<rt>いえ</rt></ruby>に<ruby>近<rt>ちか</rt></ruby>づいていった。
                    <p class="translation">难不成是出了什么案子？偏偏这种时候，我竟然把手机忘在家里了。到底该不该过去？我内心犹豫再三，最终还是决定向那栋房子走去。。</p>
                </div>
                
                <div class="text-group">
                    そしてその<ruby>家<rt>いえ</rt></ruby>のドアの<ruby>前<rt>まえ</rt></ruby>まで<ruby>来<rt>き</rt></ruby>たとき、「あのかばんはどこだ！<ruby>言<rt>い</rt></ruby>え！」という<ruby>低<rt>ひく</rt></ruby>い<ruby>男<rt>おとこ</rt></ruby>の<ruby>声<rt>こえ</rt></ruby>。そして「<ruby>助<rt>たす</rt></ruby>けてー！」という<ruby>女<rt>じょ</rt></ruby><ruby>性<rt>せい</rt></ruby>の<ruby>声<rt>こえ</rt></ruby>——。
                    <p class="translation">当我终于来到那扇门前时，屋里传来一个低沉男人的声音：“那个包在哪儿！快说！” 然后，是那个女人凄厉的呼救声：“救命啊——！”</p>
                </div>

                <div class="contact-info" style="border-top: 1px dashed #ccc; margin-top: 30px; padding-top: 10px; color:#777; text-align:right; font-size:0.9em;">
                    （ストーリー：人生の転機）
                </div>
            </div>
        </article>
    </template>
    <template id="lesson-21-content">
        <article>
            <div class="lesson-header"><span>ストーリーを読む</span><span>人生の転機（２）</span></div>
            
            <div class="paper-holes"></div>
            
            <div class="job-title-box">
                <div class="job-main-title">
                    <ruby>人<rt>じん</rt></ruby><ruby>生<rt>せい</rt></ruby>の<ruby>転<rt>てん</rt></ruby><ruby>機<rt>き</rt></ruby>（２）
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">人生的转折点（2）</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    <span class="grammar-point" onclick="showItem('tatoetemo')">たとえ</span>どんな<span class="vocab-point" onclick="showItem('jijo')"><ruby>事<rt>じ</rt></ruby><ruby>情<rt>じょう</rt></ruby></span>があっ<span class="grammar-point" onclick="showItem('tatoetemo')">ても</span>、<ruby>男<rt>おとこ</rt></ruby>2<ruby>人<rt>にん</rt></ruby>で<ruby>女<rt>じょ</rt></ruby><ruby>性<rt>せい</rt></ruby>に<ruby>暴<rt>ぼう</rt></ruby><ruby>力<rt>りょく</rt></ruby>を<span class="vocab-point" onclick="showItem('huru')"><ruby>振<rt>ふ</rt></ruby>る</span>なんて<ruby>許<rt>ゆる</rt></ruby>し<span class="grammar-point" onclick="showItem('gatai')">がたい</span><ruby>奴<rt>やつ</rt></ruby>らだ。<ruby>絶<rt>ぜっ</rt></ruby><ruby>対<rt>たい</rt></ruby><span class="vocab-point" onclick="showItem('tasukedasu')"><ruby>助<rt>たす</rt></ruby>け<ruby>出<rt>だ</rt></ruby>す</span>。<ruby>俺<rt>おれ</rt></ruby>は<ruby>勇<rt>ゆう</rt></ruby><ruby>気<rt>き</rt></ruby>を<ruby>出<rt>だ</rt></ruby>して、2<ruby>階<rt>かい</rt></ruby>へ<ruby>続<rt>つづ</rt></ruby>く<ruby>階<rt>かい</rt></ruby><ruby>段<rt>だん</rt></ruby>を<span class="vocab-point" onclick="showItem('nobotta')"><ruby>上<rt>のぼ</rt></ruby>った</span>。
                    <p class="translation">无论出于什么缘由，两个大男人对女性动粗都是断不可原谅的。我一定要救出她！我鼓起勇气冲上通往二楼的楼梯。</p>
                </div>

                <div class="text-group">
                    <span class="vocab-point" onclick="showItem('tsukiatari')"><ruby>突<rt>つ</rt></ruby>き<ruby>当<rt>あ</rt></ruby>り</span>の<ruby>部<rt>へ</rt></ruby><ruby>屋<rt>や</rt></ruby>のドアから<ruby>光<rt>ひかり</rt></ruby>が<span class="vocab-point" onclick="showItem('morete')"><ruby>漏<rt>も</rt></ruby>れて</span>いる。<ruby>俺<rt>おれ</rt></ruby>はドアを<span class="vocab-point" onclick="showItem('omoikiri')"><ruby>思<rt>おも</rt></ruby>い<ruby>切<rt>き</rt></ruby>り</span><ruby>開<rt>あ</rt></ruby>けて<ruby>部<rt>へ</rt></ruby><ruby>屋<rt>や</rt></ruby>に<ruby>飛<rt>と</rt></ruby>び<ruby>込<rt>こ</rt></ruby>んだ。そして<ruby>叫<rt>さけ</rt></ruby>んだ。
                    <p class="translation">尽头房间的门缝里正透出光亮。我猛地撞开房门冲了进去，声嘶力竭地大喊：</p>
                </div>

                <div class="text-group">
                    「やめろ！やめるんだ！」<ruby>俺<rt>おれ</rt></ruby>は<ruby>入<rt>い</rt></ruby><ruby>口<rt>ぐち</rt></ruby>にいた<ruby>男<rt>おとこ</rt></ruby>が<ruby>止<rt>と</rt></ruby>めるの<span class="grammar-point" onclick="showItem('mokamawazu')">もかまわず</span><ruby>彼<rt>かの</rt></ruby><ruby>女<rt>じょ</rt></ruby>の<ruby>横<rt>よこ</rt></ruby>にいた<ruby>男<rt>おとこ</rt></ruby>の<ruby>腹<rt>はら</rt></ruby>に<span class="vocab-point" onclick="showItem('punch')">パンチ</span>を<ruby>入<rt>い</rt></ruby>れた。
                    <p class="translation">“住手！快停下！”我全然不顾门口男人的阻拦，对着那个在女人身边的男人腹部就是一记重拳。</p>
                </div>

                <div class="text-group">
                    「カット！」
                    <p class="translation">“咔（Cut）！”</p>
                </div>

                <div class="text-group">
                    <span class="vocab-point" onclick="showItem('mabushii')"><ruby>眩<rt>まぶ</rt></ruby>しい</span><ruby>光<rt>ひかり</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で「<ruby>誰<rt>だれ</rt></ruby>だ、お<ruby>前<rt>まえ</rt></ruby>は！？」と<ruby>低<rt>ひく</rt></ruby>い<ruby>声<rt>こえ</rt></ruby>の<ruby>男<rt>おとこ</rt></ruby>が<ruby>俺<rt>おれ</rt></ruby>に<span class="vocab-point" onclick="showItem('toikaketa')"><ruby>問<rt>と</rt></ruby>いかけた</span>。その<ruby>横<rt>よこ</rt></ruby>でカメラを<ruby>持<rt>も</rt></ruby>った<ruby>男<rt>おとこ</rt></ruby>が<ruby>驚<rt>おどろ</rt></ruby>いた<ruby>顔<rt>かお</rt></ruby>で<ruby>俺<rt>おれ</rt></ruby>を<ruby>見<rt>み</rt></ruby>ていた。「あれ？これって、<ruby>映<rt>えい</rt></ruby><ruby>画<rt>が</rt></ruby>？」<ruby>恥<rt>は</rt></ruby>ずかしさの<span class="grammar-point" onclick="showItem('amari')">あまり</span>、<ruby>逃<rt>に</rt></ruby>げ<ruby>出<rt>だ</rt></ruby>したくなった<ruby>俺<rt>おれ</rt></ruby>に、<ruby>低<rt>ひく</rt></ruby>い<ruby>声<rt>こえ</rt></ruby>の<ruby>男<rt>おとこ</rt></ruby>が<ruby>聞<rt>き</rt></ruby>いた。「<ruby>今<rt>いま</rt></ruby>の、もう１<ruby>回<rt>かい</rt></ruby>できるか？」
                    <p class="translation">刺眼的灯光中，一个声音低沉的男人质问道：“你是谁啊！？”他身旁那个扛着摄像机的男人也一脸惊愕地看着我。“啊？这竟然……是在拍电影？”我当时羞愧得无地自容，恨不得立马逃走，可那个低沉嗓音的男人却突然问我：“刚才那一组动作，你能再演一遍吗？”</p>
                </div>

                <div class="text-group">
                    <ruby>俺<rt>おれ</rt></ruby>は<span class="vocab-point" onclick="showItem('tomadoi')"><ruby>戸<rt>と</rt></ruby><ruby>惑<rt>まど</rt></ruby>い</span>ながら、<ruby>言<rt>い</rt></ruby>われた<ruby>通<rt>とお</rt></ruby>りになぐった。「<ruby>違<rt>ちが</rt></ruby>う！もっと<ruby>気<rt>き</rt></ruby><ruby>持<rt>も</rt></ruby>ち<span class="grammar-point" onclick="showItem('okomete')">を込めて</span>やってみろ！…そうだ、いいぞ」
                    <p class="translation">我虽然还处在懵逼状态，但还是按照他的要求又揍了一拳。“不对！要把感情再投入一点！……对，就是这样，很好！”</p>
                </div>
                
                <div style="text-align:center; color:#999; margin: 20px 0;">~~~~~~</div>

                <div class="text-group">

                    <ruby>問<rt>と</rt></ruby>われる<ruby>五<rt>ご</rt></ruby><ruby>輪<rt>りん</rt></ruby><ruby>招<rt>しょう</rt></ruby><ruby>致<rt>ち</rt></ruby>の<ruby>是<rt>ぜ</rt></ruby><ruby>非<rt>ひ</rt></ruby>
                </div>
                <div class="text-group">
                    <p class="translation" style="display:block; margin-top:0;">社论：被问责的奥运申办之是非</p>
                </div>
            </div>

            <div class="job-notice">
                <div class="text-group">
                    オリンピック<ruby>開<rt>かい</rt></ruby><ruby>催<rt>さい</rt></ruby>といえば、<ruby>昔<rt>むかし</rt></ruby>は<ruby>国<rt>くに</rt></ruby>を<span class="vocab-point" onclick="showItem('agete')"><ruby>挙<rt>あ</rt></ruby>げて</span><ruby>喜<rt>よろこ</rt></ruby>んだ<span class="grammar-point" onclick="showItem('monoda')">ものだ</span>。しかし<ruby>今<rt>こん</rt></ruby><ruby>日<rt>にち</rt></ruby>ではどこの<ruby>国<rt>くに</rt></ruby>でも、オリンピック<ruby>開<rt>かい</rt></ruby><ruby>催<rt>さい</rt></ruby><span class="grammar-point" onclick="showItem('womegutte')">をめぐって</span><ruby>意<rt>い</rt></ruby><ruby>見<rt>けん</rt></ruby>が<ruby>対<rt>たい</rt></ruby><ruby>立<rt>りつ</rt></ruby>する。
                    <p class="translation">提起举办奥运会，过去常被视为一件举国欢腾的大事。然而在当今时代，无论在哪个国家，围绕举办奥运会，各方意见往往产生尖锐对立。</p>
                </div>

                <div class="text-group">
                    <ruby>開<rt>かい</rt></ruby><ruby>催<rt>さい</rt></ruby><ruby>国<rt>こく</rt></ruby>はオリンピックを<span class="vocab-point" onclick="showItem('keiki')"><ruby>契<rt>けい</rt></ruby><ruby>機<rt>き</rt></ruby></span>として、<ruby>国<rt>くに</rt></ruby>の<ruby>発<rt>はっ</rt></ruby><ruby>展<rt>てん</rt></ruby>を<ruby>願<rt>ねが</rt></ruby>う。しかし、オリンピック<ruby>開<rt>かい</rt></ruby><ruby>催<rt>さい</rt></ruby>には<ruby>多<rt>おお</rt></ruby>くの<ruby>費<rt>ひ</rt></ruby><ruby>用<rt>よう</rt></ruby>がかかる。それで<ruby>政<rt>せい</rt></ruby><ruby>府<rt>ふ</rt></ruby>に<ruby>対<rt>たい</rt></ruby>する<ruby>抗<rt>こう</rt></ruby><ruby>議<rt>ぎ</rt></ruby>の<span class="vocab-point" onclick="showItem('koegaagaru')"><ruby>声<rt>こえ</rt></ruby>が<ruby>上<rt>あ</rt></ruby>がる</span>ことになる<span class="grammar-point" onclick="showItem('wakeda_l22')">わけだ</span>。
                    <p class="translation">东道国固然希望以奥运为契机推动国家发展，但由于举办奥运会耗资巨大，社会各界对政府的抗议之声也随之高涨。</p>
                </div>

                <div class="text-group">
                    また、オリンピック<ruby>開<rt>かい</rt></ruby><ruby>催<rt>さい</rt></ruby><span class="grammar-point" onclick="showItem('niatatte')">にあたって</span>は、<ruby>資<rt>し</rt></ruby><ruby>金<rt>きん</rt></ruby><span class="grammar-point" onclick="showItem('nikuwaete')">に加えて</span>、<ruby>競<rt>きょう</rt></ruby><ruby>技<rt>ぎ</rt></ruby><ruby>場<rt>じょう</rt></ruby>などの<ruby>建<rt>けん</rt></ruby><ruby>設<rt>せつ</rt></ruby><ruby>用<rt>よう</rt></ruby><ruby>地<rt>ち</rt></ruby>の<ruby>確<rt>かく</rt></ruby><ruby>保<rt>ほ</rt></ruby>も<ruby>重<rt>じゅう</rt></ruby><ruby>要<rt>よう</rt></ruby>な<span class="vocab-point" onclick="showItem('kadai')"><ruby>課<rt>か</rt></ruby><ruby>題<rt>だい</rt></ruby></span>となる。そのために<ruby>住<rt>じゅう</rt></ruby><ruby>民<rt>みん</rt></ruby>の<span class="vocab-point" onclick="showItem('iten')"><ruby>移<rt>い</rt></ruby><ruby>転<rt>てん</rt></ruby></span><ruby>問<rt>もん</rt></ruby><ruby>題<rt>だい</rt></ruby>も<ruby>出<rt>で</rt></ruby>てくる。
                    <p class="translation">此外，在筹备奥运过程中，除资金投入外，确保体育场馆等建设用地也是一项重要课题。由此引发的居民动迁问题随之凸显。</p>
                </div>

                <div class="text-group">
                    <span class="vocab-point" onclick="showItem('suminareta')"><ruby>住<rt>す</rt></ruby>み<ruby>慣<rt>な</rt></ruby>れた</span><ruby>土<rt>と</rt></ruby><ruby>地<rt>ち</rt></ruby>を<ruby>離<rt>はな</rt></ruby>れることは、<span class="vocab-point" onclick="showItem('hoshoukin')"><ruby>保<rt>ほ</rt></ruby><ruby>証<rt>しょう</rt></ruby><ruby>金<rt>きん</rt></ruby></span>や<ruby>代<rt>か</rt></ruby>わりの<ruby>住<rt>じゅう</rt></ruby><ruby>宅<rt>たく</rt></ruby>が<span class="vocab-point" onclick="showItem('youisareta')"><ruby>用<rt>よう</rt></ruby><ruby>意<rt>い</rt></ruby>された</span><span class="grammar-point" onclick="showItem('toshitemo')">としても</span>、<ruby>簡<rt>かん</rt></ruby><ruby>単<rt>たん</rt></ruby>に<span class="vocab-point" onclick="showItem('nattoku')"><ruby>納<rt>なっ</rt></ruby><ruby>得<rt>とく</rt></ruby></span>できることではないだろう。
                    <p class="translation">即便政府提供了补偿金或安置房，要让人们离开早已住惯的土地，恐怕也绝非易事。</p>
                </div>

                <div class="text-group">
                    オリンピック<ruby>憲<rt>けん</rt></ruby><ruby>章<rt>しょう</rt></ruby>の<ruby>中<rt>なか</rt></ruby>に、「スポーツを<ruby>通<rt>つう</rt></ruby>じて<ruby>平<rt>へい</rt></ruby><ruby>和<rt>わ</rt></ruby>な<ruby>社<rt>しゃ</rt></ruby><ruby>会<rt>かい</rt></ruby>を<span class="vocab-point" onclick="showItem('kouchiku')"><ruby>構<rt>こう</rt></ruby><ruby>築<rt>ちく</rt></ruby>する</span>」とある。この<ruby>理<rt>り</rt></ruby><ruby>念<rt>ねん</rt></ruby><span class="grammar-point" onclick="showItem('nimotozuite')">に基づいて</span>、<ruby>国<rt>こく</rt></ruby><ruby>際<rt>さい</rt></ruby><ruby>社<rt>しゃ</rt></ruby><ruby>会<rt>かい</rt></ruby>の<ruby>平<rt>へい</rt></ruby><ruby>和<rt>わ</rt></ruby>を<span class="vocab-point" onclick="showItem('mezasu')"><ruby>目<rt>め</rt></ruby><ruby>指<rt>ざ</rt></ruby>す</span>ことは<ruby>素<rt>す</rt></ruby><ruby>晴<rt>ば</rt></ruby>らしいことだ。
                    <p class="translation">《奥林匹克宪章》中载明：“通过体育运动构建和平社会”。以此理念为基石追求国际社会和平固然美好。</p>
                </div>

                <div class="text-group">
                    しかし、<ruby>国<rt>こく</rt></ruby><ruby>民<rt>みん</rt></ruby>の<ruby>感<rt>かん</rt></ruby><ruby>情<rt>じょう</rt></ruby>や<ruby>生<rt>せい</rt></ruby><ruby>活<rt>かつ</rt></ruby>を<ruby>犠<rt>ぎ</rt></ruby><ruby>牲<rt>せい</rt></ruby>にしてオリンピックが<ruby>開<rt>かい</rt></ruby><ruby>催<rt>さい</rt></ruby>されることがあってはならない。<ruby>多<rt>おお</rt></ruby>くの<ruby>人<rt>ひと</rt></ruby>が<span class="vocab-point" onclick="showItem('sandou')"><ruby>賛<rt>さん</rt></ruby><ruby>同<rt>どう</rt></ruby></span>し<span class="grammar-point" onclick="showItem('tekoso')">てこそ</span>、オリンピックを<ruby>開<rt>ひら</rt></ruby>く<ruby>意<rt>い</rt></ruby><ruby>義<rt>ぎ</rt></ruby>がある。
                    <p class="translation">但绝不应以牺牲国民情感和生活为代价来举办奥运。唯有在获得广泛民众赞同的基础上，举办奥运会才有其真正的意义。</p>
                </div>

                <div class="text-group">
                    <ruby>今<rt>いま</rt></ruby>、<ruby>世<rt>せ</rt></ruby><ruby>界<rt>かい</rt></ruby><ruby>規<rt>き</rt></ruby><ruby>模<rt>ぼ</rt></ruby>でオリンピックの<span class="vocab-point" onclick="showItem('arikata')">あり<ruby>方<rt>かた</rt></ruby></span>を、<span class="vocab-point" onclick="showItem('aratamete')"><ruby>改<rt>あらた</rt></ruby>めて</span><ruby>考<rt>かんが</rt></ruby>えるときが<ruby>来<rt>き</rt></ruby>ているのではないだろうか。
                    <p class="translation">或许，现在正是全球共同重新审视奥运会运作模式的时刻。</p>

        };

        // ================= 核心逻辑 =================
        let currentLessonId = 1; // 默认第一课

        function initMenu() {
            const navList = document.getElementById('nav-list');
            navList.innerHTML = '';
            const keys = Object.keys(lessonConfig);
            if (keys.length === 0) return;
            keys.forEach(id => {
                const config = lessonConfig[id];
                const li = document.createElement('li');
                li.className = 'nav-item';
                li.textContent = config.title;
                li.onclick = () => loadLesson(id);
                navList.appendChild(li);
            });
            
            // 检查 URL 参数是否有 lesson
            const urlParams = new URLSearchParams(window.location.search);
            const lessonParam = urlParams.get('lesson');
            
            if (lessonParam) {
                loadLesson(lessonParam);
            } else {
                // 优先读取本地存储的上次进度
                const lastLesson = localStorage.getItem('try_n2_last_lesson');
                if (lastLesson && lessonConfig[lastLesson]) {
                    loadLesson(lastLesson);
                } else {
                    // 默认加载第一课
                    loadLesson(keys[0]);
                }
            }
        }

        function loadLesson(lessonId) {
            currentLessonId = lessonId; // 更新当前课程ID
            localStorage.setItem('try_n2_last_lesson', lessonId); // 保存阅读进度
            const config = lessonConfig[lessonId];
            if (!config) return;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.textContent === config.title) {
                    item.classList.add('active');
                    // 滚动到可见区域
                    setTimeout(() => {
                        item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }, 100);
                } else {
                    item.classList.remove('active');
                }
            });
            document.getElementById('audio-player').src = config.audio;
            const container = document.getElementById('lesson-container');
            container.innerHTML = ''; 
            const template = document.getElementById(config.contentId);
            if (template) {
                container.appendChild(template.content.cloneNode(true));
                setTimeout(() => {
                    const article = container.querySelector('article');
                    if(article) article.classList.add('active');
                }, 10);
            } else {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#999;">请在 HTML 中添加 id="${config.contentId}" 的 template 标签</div>`;
            }
        }

        function goToReview() {
            // 跳转到 search/search_2.html 并带上课程参数
            window.location.href = `text_2.html?lesson=${currentLessonId}`;
        }

        function showItem(key) {
            const data = dictData[key];
            if (!data) return;
            
            const panel = document.getElementById('grammar-panel');
            const body = document.getElementById('panel-body');
            
            // 切换颜色主题 (Grammar=红, Vocab=蓝)
            const typeClass = data.type === 'grammar' ? 'type-grammar' : 'type-vocab';
            panel.className = '';
            panel.classList.add(typeClass);
            
            const tagName = data.type === 'grammar' ? '文法' : '語彙';

            // 🟢 核心修改点：直接读取 desc 属性中的 HTML 内容，不进行额外嵌套
            let rowsHtml = '';
            if (data.desc) {
                rowsHtml = data.desc;
            } else if (data.rows) {
                // 兼容旧格式 (如果之后有其他课用旧格式)
                rowsHtml = data.rows.map(row => `
                    <div class="desc-row">
                        <span class="desc-label">${row.label}</span>
                        <span class="desc-text">${row.text}</span>
                    </div>
                `).join('');
            }

            // 组装最终 HTML
            body.innerHTML = `
                <div class="panel-header-box">
                    <span class="tag">${tagName}</span>
                    <span class="panel-title">${data.title}</span>
                </div>
                
                <div class="panel-body-content">
                    ${rowsHtml}
                </div>

                <div class="example-block">
                    <span class="example-title">例文 / 補足 :</span>
                    <div style="color:#333;">
                        ${data.ex ? data.ex.replace(/\n/g, '<br>') : '暂无例句'}
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                panel.classList.add('open');
            }, 10);
        }

        function closePanel() { document.getElementById('grammar-panel').classList.remove('open'); }

        function toggleRuby() { 
            document.body.classList.toggle('hide-ruby'); 
            document.getElementById('btn-ruby').classList.toggle('active');
        }
        function toggleTrans() { 
            document.body.classList.toggle('show-trans'); 
            document.getElementById('btn-trans').classList.toggle('active');
        }
        
        function changeSpeed(el) {
            const audio = document.getElementById('audio-player');
            audio.playbackRate = parseFloat(el.value);
        }

        document.getElementById('sidebar-toggle').onclick = () => {
            if (window.innerWidth <= 768) {
                document.body.classList.toggle('mobile-menu-open');
            } else {
                document.body.classList.toggle('sidebar-closed');
            }
        };

        document.addEventListener('click', function(e) {
            const panel = document.getElementById('grammar-panel');
            if (!panel.classList.contains('open')) return;
            const isClickInside = panel.contains(e.target);
            const isTrigger = e.target.classList.contains('vocab-point') || 
                              e.target.classList.contains('grammar-point');
            if (!isClickInside && !isTrigger) {
                closePanel();
            }
        });

        function checkResponsive() {
            if (window.innerWidth <= 768) {
                document.body.classList.remove('sidebar-closed');
                if (!document.body.classList.contains('mobile-menu-open')) {
                    document.body.classList.add('mobile-menu-open');
                }
            } else {
                document.body.classList.remove('mobile-menu-open');
            }
        }

        window.onload = function() {
            initMenu();
            checkResponsive();
        };
        
        window.onresize = checkResponsive;
    </script>
</body>
</html>
