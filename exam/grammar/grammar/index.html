<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT 语法题 - 水彩笔记特训</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;600;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
        // 与排序题入口统一的水彩素描本配色表
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['"Noto Sans SC"', '"Noto Sans JP"', 'sans-serif'],
                        'serif-jp': ['"Noto Serif SC"', '"Noto Serif JP"', '"Songti SC"', '"SimSun"', 'serif'],
                        'serif-sc': ['"Noto Serif SC"', '"Noto Serif JP"', '"Songti SC"', '"SimSun"', 'serif'],
                    },
                    colors: {
                        bgMain: '#ffffff',
                        bgCard: '#ffffff',
                        textMain: '#333333',
                        textSub: '#666666',       
                        textMuted: '#999999',     
                        borderMain: '#e5e5e5',
                        borderDark: '#cccccc',
                        borderStrong: '#333333',
                        accentRed: '#e64a4a',
                        accentGold: '#e64a4a',
                        markerYellow: 'rgba(255, 213, 79, 0.25)',
                        markerBlue: 'rgba(129, 212, 250, 0.25)',
                        markerMint: 'rgba(134, 239, 172, 0.25)',
                        markerPink: 'rgba(244, 143, 177, 0.25)',
                        markerGray: 'rgba(200, 200, 200, 0.2)',
                    }
                }
            }
        }
    </script>
    <style>
        /* ==============================================================
           纸张底座：噪点纹理与明亮背景
           ============================================================== */
        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--bgMain);
            color: var(--textMain);
            position: relative;
        }

        /* 极弱的纸张噪点纹理 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* 核心工具类：与排序题一致的手绘边框 */
        .sketch-box {
            border: 1.5px solid #333333 !important;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px !important;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.02) !important;
            transition: all 0.2s ease;
        }

        .sketch-btn {
            border: 1.5px solid #333333 !important;
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px !important;
            transition: all 0.2s ease;
        }
        
        /* 铅笔排线背景 (Hatching) */
        .hatching-yellow {
            background-image: repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(255, 213, 79, 0.25) 2px, rgba(255, 213, 79, 0.25) 4px) !important;
        }

        .hatching-gray {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px) !important;
        }

        /* ==============================================================
           选项卡片 (铅笔速写风)
           ============================================================== */
        
        .question-block .choice-option-btn {
            border: 1.5px dashed #cccccc !important; /* 较浅的铅笔虚线 */
            background: transparent !important;
            border-radius: 4px 255px 5px 25px / 255px 4px 225px 3px !important; 
            position: relative;
            transition: all 0.2s ease;
            transform: translate(0, 0);
            padding: 14px 18px !important;
            display: flex;
            align-items: center;
            text-align: left;
            width: 100%;
            cursor: pointer;
        }

        .question-block .choice-option-btn:hover:not(.is-judged) {
            border-style: solid !important;
            border-color: #666 !important;
            background: rgba(75, 75, 75, 0.02) !important; 
            transform: translateY(-1px) !important;
        }

        /* 选中状态：彩铅涂色 + 深色边框实体阴影 */
        .question-block .choice-option-btn.is-selected:not(.is-judged) {
            border-style: solid !important;
            border-width: 1.5px !important;
            border-color: #333333 !important;
            background: repeating-linear-gradient(-45deg, transparent, transparent 3px, rgba(255, 213, 79, 0.15) 3px, rgba(255, 213, 79, 0.15) 5px), #ffffff !important; 
            box-shadow: 2px 3px 0px rgba(59, 59, 59, 0.25) !important; /* 石墨阴影 */
            transform: translate(-1px, -2px) !important; 
        }

        .question-block .choice-option-btn.is-selected .option-letter {
            border-color: #333333 !important;
            color: #333333 !important;
            font-weight: 700 !important;
        }

        .question-block .option-letter {
            background: transparent !important;
            color: #777 !important;
            border: 1.2px solid #cccccc !important;
            /* 手绘不规则圆 */
            border-radius: 50% 45% 55% 40% / 45% 55% 45% 50% !important; 
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px !important;
            margin-right: 14px !important;
            flex-shrink: 0;
            font-weight: 500 !important;
            transition: all 0.2s ease;
        }

        .question-block .choice-option-btn.is-judged {
            pointer-events: none;
            box-shadow: none !important;
            transform: none !important;
        }

        /* 判题后：绿色排线 */
        .question-block .choice-option-btn.is-correct-ans {
            border-style: solid !important;
            border-color: #10B981 !important;
            background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(16, 185, 129, 0.08) 3px, rgba(16, 185, 129, 0.08) 6px), #ffffff !important;
            opacity: 1 !important;
        }
        
        .question-block .choice-option-btn.is-correct-ans .option-letter {
            color: #10B981 !important;
            border-color: #10B981 !important;
            font-weight: 700 !important;
        }

        /* 判题后：红色排线 */
        .question-block .choice-option-btn.is-wrong-ans {
            border-style: solid !important;
            border-color: #cc4444 !important;
            background: repeating-linear-gradient(-45deg, transparent, transparent 3px, rgba(230, 74, 74, 0.08) 3px, rgba(230, 74, 74, 0.08) 6px), #ffffff !important;
            opacity: 1 !important;
        }
        
        .question-block .choice-option-btn.is-wrong-ans .option-letter {
            color: #cc4444 !important;
            border-color: #cc4444 !important;
            font-weight: 700 !important;
        }

        .question-block .choice-option-btn.is-judged:not(.is-correct-ans):not(.is-wrong-ans) {
            opacity: 0.35;
            border-color: #d1d1d1 !important;
            background: transparent !important;
        }

        /* ==============================================================
           容器与面板
           ============================================================== */
        
        .font-title-unified {
            font-family: "Noto Serif SC", "Noto Serif JP", "Songti SC", "SimSun", serif;
            letter-spacing: 0.1em;
        }

        .question-block > .bg-bgCard {
            padding: 28px 32px !important;
        }

        .timer-toolbar-btn, .timer-chip-btn, .timer-control-btn, .timer-hide-btn, .random-target-btn {
            border: 1.5px solid #333333;
            border-radius: 3px 8px 4px 6px / 6px 4px 8px 3px;
            background: transparent;
            color: #333333;
            transition: all 0.2s ease;
        }

        .timer-toolbar-btn:hover:not(:disabled), .timer-chip-btn:hover:not(:disabled), 
        .timer-control-btn:hover:not(:disabled), .timer-hide-btn:hover:not(:disabled), 
        .random-target-btn:hover:not(:disabled) {
            background-color: rgba(51, 51, 51, 0.04); 
        }

        .timer-toolbar-btn.is-primary, .timer-chip-btn.is-selected, 
        .timer-control-btn.is-primary, .timer-hide-btn.is-selected, .random-target-btn.is-primary {
            background: #333333;
            color: #ffffff;
        }

        #view-level-select button,
        #view-mode-select button,
        #view-year-select button {
            border: 1.5px solid #333333 !important;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px !important;
            box-shadow: none !important;
            background-color: transparent;
            transition: all 0.2s ease;
        }

        #view-level-select button:hover:not(:disabled),
        #view-mode-select button:hover:not(:disabled),
        #view-year-select button:hover:not(:disabled) {
            /* hover 添加淡淡的灰色排线 */
            background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px) !important;
            transform: translate(-1px, -1px);
        }
        
        #view-year-select .bg-bgMain { background-color: transparent !important; }

        .question-block .submit-btn,
        .question-block .next-question-btn {
            background: #333333 !important;
            color: #ffffff !important;
            border: none !important;
            border-radius: 4px 8px 4px 6px / 6px 4px 8px 4px !important;
            box-shadow: 1px 2px 3px rgba(0,0,0,0.1) !important;
            transition: all 0.2s ease;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .question-block .submit-btn:hover:not(:disabled),
        .question-block .next-question-btn:hover {
            background: #333 !important; 
            transform: translateY(-1px);
            box-shadow: 1px 3px 6px rgba(0,0,0,0.15) !important;
        }

        .question-block .submit-btn:disabled {
            background: transparent !important;
            border: 1.5px dashed #cccccc !important;
            color: #999 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        /* 解析区 */
        .question-block .explanation-area {
            border: 1.5px solid #333333;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            background: transparent;
            margin-top: 16px;
            padding: 24px;
        }
        .explanation-stack {
            gap: 20px;
        }
        .explanation-group-title {
            font-size: 11.5px;
            font-weight: 800;
            letter-spacing: 0.12em;
            color: #666;
            margin-bottom: 10px;
            /* 标题加上淡淡的底纹 */
            display: inline-block;
            background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(75,75,75,0.06) 2px, rgba(75,75,75,0.06) 4px);
            padding: 2px 6px;
            border-radius: 2px;
        }
        .correct-answer-box {
            padding: 14px 16px;
            border: 1.5px dashed #cccccc;
            border-radius: 4px 255px 5px 25px / 255px 4px 225px 3px;
        }
        .explanation-copy {
            font-size: 0.96rem;
            line-height: 1.9;
            font-weight: 500;
            color: #333333;
        }
        
        /* 核心：铅笔排线高亮特效 */
        .explanation-copy strong,
        .explanation-copy b {
            font-weight: 700;
            color: #222;
            /* 用斜线渐变模拟彩铅涂抹 */
            background: repeating-linear-gradient(-60deg, transparent, transparent 2px, rgba(250, 190, 88, 0.4) 2px, rgba(250, 190, 88, 0.4) 4px);
            padding: 0 4px;
            margin: 0 2px;
            border-radius: 2px;
        }

        .view-section {
            display: none;
            animation: fadeInView 0.3s ease-out forwards;
        }
        .view-section.active {
            display: block;
        }
        @keyframes fadeInView {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeInView 0.3s ease-out forwards;
        }

        /* 批改印章：用红色彩铅色 */
        .status-badge {
            position: absolute;
            top: 24px;
            right: 32px;
            font-size: 15px !important;
            font-weight: 700 !important;
            color: #cc4444 !important; 
            letter-spacing: 0.1em;
            background: transparent !important;
            border: 1.5px solid #cc4444 !important; /* 给印章加个框 */
            padding: 4px 8px;
            border-radius: 4px 8px 4px 6px / 6px 4px 8px 4px !important;
            transform: rotate(3deg); /* 盖章歪一点 */
            box-shadow: none !important;
            animation: stampIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes stampIn {
            0% { opacity: 0; transform: scale(1.5) rotate(10deg); }
            100% { opacity: 1; transform: scale(1) rotate(3deg); }
        }

        .status-badge.hidden {
            display: none !important; 
        }

        .page-shell {
            width: min(100%, 1000px);
            margin: 0 auto;
            padding: 32px 16px 48px;
            box-sizing: border-box;
        }

        #view-practice.has-bottom-toolbar #practice-question-container {
            margin-bottom: 0 !important;
            padding-bottom: calc(8rem + env(safe-area-inset-bottom));
        }

        .selection-view-shell { width: min(100%, 700px); margin-left: auto; margin-right: auto; }
        
        .training-mode-overlay {
            position: fixed; inset: 0; z-index: 2100; display: flex; align-items: center; justify-content: center;
            padding: 20px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(4px);
        }
        .training-mode-overlay[hidden] { display: none; }
        .training-mode-modal {
            width: min(100%, 580px); padding: 32px; border: 1.5px solid #333333; background: #ffffff;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.05); box-sizing: border-box;
        }
        .training-mode-title { font-size: 1.4rem; font-weight: 700; color: #333333; letter-spacing: 0.1em; }
        .training-mode-subtitle { margin-top: 8px; color: #666; font-size: 0.95rem; }
        .training-mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
        .training-mode-card {
            appearance: none; border: 1.5px dashed #cccccc; border-radius: 8px; background: transparent; padding: 20px 18px; text-align: left; transition: all 0.2s ease; cursor: pointer;
        }
        .training-mode-card:hover { border-color: #666; background: rgba(75, 75, 75, 0.03); }
        .training-mode-card.is-selected { background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px); border-color: #333333; border-style: solid; }
        .training-mode-card-title { font-size: 1.1rem; font-weight: 700; color: #333333; }
        .training-mode-card-copy { margin-top: 10px; color: #666; font-size: 0.85rem; line-height: 1.6; }
        .training-mode-card-tag { display: inline-flex; padding: 2px 8px; border: 1px solid #333333; border-radius: 4px; font-size: 0.72rem; margin-top: 12px;}
        
        .training-mode-chip, .training-mode-action {
            border: 1.5px solid #333333; border-radius: 6px; padding: 8px 16px; background: transparent; font-size: 0.9rem; font-weight: 700; color: #333333;
        }
        .training-mode-chip.is-selected, .training-mode-action.is-primary { background: #333333 !important; color: #ffffff !important; }
        .training-mode-timer, .training-mode-random-settings { margin-top: 24px; padding: 20px; border: 1.5px dashed #cccccc; border-radius: 8px; }

        .practice-bottom-toolbar {
            position: fixed; left: 0; right: 0; bottom: 0;
            z-index: 1600; padding: 0 12px calc(env(safe-area-inset-bottom));
            display: none; pointer-events: none;
        }
        .practice-bottom-toolbar.is-visible { display: block; }
        .practice-toolbar-main {
            display: flex; align-items: center; gap: 12px; min-height: 60px; padding: 10px 16px;
            border: 1.5px solid #333333; border-radius: 8px 8px 0 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
            pointer-events: auto; max-width: 800px; margin: 0 auto;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
        }
        .practice-bottom-toolbar__inner { max-width: 800px; margin: 0 auto; }
        .practice-toolbar-slot { position: relative; }
        .practice-toolbar-backdrop {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.72); backdrop-filter: blur(3px);
        }
        .timer-drawer {
            position: absolute; right: 0; bottom: calc(100% + 10px);
            width: min(100vw - 24px, 340px); padding: 18px; border: 1.5px solid #333333;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px; background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 12px 30px rgba(0,0,0,0.05); box-sizing: border-box; pointer-events: auto;
        }
        .timer-drawer-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .timer-drawer-title { font-size: 0.95rem; font-weight: 700; letter-spacing: 0.08em; color: #333333; }
        .timer-drawer-close {
            width: 28px; height: 28px; border: 1.5px solid #333333; border-radius: 6px; background: transparent;
            color: #333333; font-size: 16px; line-height: 1; display: inline-flex; align-items: center; justify-content: center;
        }
        .timer-drawer-display {
            font-family: "Noto Sans SC", "Noto Sans JP", sans-serif; font-size: 2rem; font-weight: 800; line-height: 1; color: #333333; margin-bottom: 16px;
        }
        .timer-control-row { display: flex; flex-wrap: wrap; gap: 10px; }
        .timer-status-text { margin-top: 12px; font-size: 0.78rem; line-height: 1.6; color: #666; font-weight: 700; }
        .practice-toolbar-meta { display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .timer-status-dot { width: 8px; height: 8px; border-radius: 999px; background: #9ca3af; display: inline-block; flex-shrink: 0; }
        #timer-toolbar-main[data-timer-status="running"] .timer-status-dot,
        .random-toolbar-main .timer-status-dot { background: #10B981; }
        #timer-toolbar-main[data-timer-status="paused"] .timer-status-dot { background: #F59E0B; }
        .practice-toolbar-label { font-size: 11px; font-weight: 800; letter-spacing: 0.16em; color: #666; white-space: nowrap; }
        .practice-toolbar-time {
            min-width: 68px; font-size: 1.2rem; line-height: 1; font-weight: 800;
            font-family: "Noto Sans SC", "Noto Sans JP", sans-serif; color: #333333;
        }
        .timer-action-group { display: inline-flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; justify-content: flex-end; }
        .random-toolbar-main { justify-content: space-between; }
        .random-toolbar-summary { display: flex; align-items: center; justify-content: center; gap: 18px; flex: 1 1 auto; min-width: 0; }
        .random-toolbar-metric { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 58px; }
        .random-toolbar-metric-label { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; color: #666; white-space: nowrap; }
        .random-toolbar-metric-value { font-size: 1rem; line-height: 1; font-weight: 800; color: #333333; font-family: "Noto Sans SC", "Noto Sans JP", sans-serif; }

        .sort-page-header {
            width: 100%; padding: 16px 20px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(4px);
            border-bottom: 1.5px solid #333333; border-bottom-left-radius: 50% 2px; border-bottom-right-radius: 50% 3px;
        }

        .back-btn {
            text-decoration: none; color: #333333; font-size: 14px; font-weight: 700; padding: 4px 12px; background: transparent;
            border: 1.5px solid #333333; border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px; display: inline-flex; align-items: center;
            gap: 6px; transition: all 0.2s ease; letter-spacing: 0.05em;
        }
        .back-btn:hover { background: rgba(75, 75, 75, 0.05); }
        .sort-page-header-title {
            margin: 0; font-size: 18px; font-weight: 700; color: #333333; position: absolute; left: 50%; transform: translateX(-50%);
            white-space: nowrap; letter-spacing: 0.1em; display: flex; align-items: center;
        }
        .sort-page-header-title span {
            color: #333333; background: transparent; padding: 2px 8px; font-size: 12px; margin-left: 8px;
            border: 1.5px solid #333333; border-radius: 2px 8px 2px 6px / 6px 2px 8px 2px; font-family: "Noto Sans JP", sans-serif;
        }
        .sort-page-header-spacer { width: 70px; flex-shrink: 0; }
        .home-btn { min-width: 56px; justify-content: center; }
        .header-right-slot {
            min-width: 76px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-shrink: 0;
        }
        .study-elapsed-display {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 76px;
            padding: 4px 10px;
            border: 1.5px solid #333333;
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
            color: #333333;
            background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.04em;
            line-height: 1.4;
            white-space: nowrap;
            box-sizing: border-box;
        }
        .study-elapsed-display[hidden] { display: none !important; }
        .study-elapsed-display span {
            font-family: "Noto Sans SC", "Noto Sans JP", sans-serif;
            letter-spacing: 0.02em;
        }
        .review-panel { background: rgba(51, 51, 51, 0.035); }
        .review-panel > summary { list-style: none; }
        .review-panel > summary::-webkit-details-marker { display: none; }
        .review-summary {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            cursor: pointer; border-bottom: 1.5px dashed transparent;
        }
        .review-panel[open] .review-summary { padding-bottom: 12px; border-bottom-color: #cccccc; }
        .review-summary-main { min-width: 0; }
        .review-summary-title { font-size: 1rem; font-weight: 800; color: #333333; letter-spacing: 0.08em; }
        .review-summary-meta { margin-top: 4px; font-size: 0.74rem; font-weight: 700; color: #666666; line-height: 1.5; }
        .review-summary-status { display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .review-status-pill,
        .review-count-pill {
            border: 1.5px solid #333333; border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;

    <script src="./n2/data-choice.js"></script>
    <script src="./n3/data-choice.js"></script>
    <script src="./n2/category-catalog.js"></script>
    <script src="./n3/category-catalog.js"></script>
    <script src="../../../shared/practice-feedback-system.js"></script>
    <script>
        const ENABLED_LEVELS = ['N2', 'N3'];
        const questionDatabase = (window.grammarChoiceQuestionDatabase || []).filter(question => ENABLED_LEVELS.includes(question.level));
        const grammarChoiceCategoryCatalog = window.grammarChoiceCategoryCatalog || {};
        const questionById = new Map(questionDatabase.map(question => [question.id, question]));
        // --- 1. 工具与存储机制 ---
        const TIMER_PRESETS = [5, 10, 15];
        const RANDOM_TARGET_PRESETS = [5, 10, 20];

        function normalizeGrammarChoiceCategory(rawCategory, level) {
            if (!rawCategory || typeof rawCategory !== 'object') return null;
            const id = String(rawCategory.id || '').trim();
            if (!id) return null;
            const questionIds = Array.isArray(rawCategory.questionIds)
                ? Array.from(new Set(rawCategory.questionIds.map(item => String(item || '').trim()).filter(Boolean)))
                : [];
            const validQuestions = questionIds
                .map(questionId => questionById.get(questionId))
                .filter(question => question && question.level === level);
            const validIds = validQuestions.map(question => question.id);
            const missingIds = questionIds.filter(questionId => !validIds.includes(questionId));
            return {
                id,
                level,
                name: String(rawCategory.name || id).trim(),
                description: String(rawCategory.description || '').trim(),
                questionIds,
                validIds,
                missingIds,
                count: validIds.length
            };
        }

        function getGrammarChoiceCategories(level) {
            const rawList = Array.isArray(grammarChoiceCategoryCatalog[level]) ? grammarChoiceCategoryCatalog[level] : [];
            return rawList.map(category => normalizeGrammarChoiceCategory(category, level)).filter(Boolean);
        }

        function getGrammarChoiceCategory(level, categoryId) {
            const id = String(categoryId || '').trim();
            return getGrammarChoiceCategories(level).find(category => category.id === id) || null;
        }

        function getGrammarChoiceCategoryQuestions(category) {
            if (!category) return [];
            return category.validIds.map(questionId => questionById.get(questionId)).filter(Boolean);
        }
        
        function isEnabledChoiceLevel(level) {
            return questionDatabase.some(q => q.level === level);
        }

        function isEnabledChoiceYear(level, year) {
            return questionDatabase.some(q => q.level === level && q.year === year);
        }

        function clampTimerMinutes(value) {
            const numeric = Number(value);
            if (!Number.isFinite(numeric)) return TIMER_PRESETS[0];
            return Math.min(180, Math.max(1, Math.round(numeric)));
        }

        function formatTimerClock(totalSeconds) {
            const safeSeconds = Math.max(0, Math.floor(Number(totalSeconds) || 0));
            const minutes = Math.floor(safeSeconds / 60);
            const seconds = safeSeconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function shuffleQuestions(items) {
            const shuffled = [...items];
            for (let index = shuffled.length - 1; index > 0; index--) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
            }
            return shuffled;
        }

        function getIconSvg(name, className = '') {
            const icons = {
                'check-circle': '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>',
            };
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}" aria-hidden="true" focusable="false">${icons[name] || ''}</svg>`;
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // LocalStorage Keys
        function getGrammarChoiceMarksKey(level, year) { return `grammar_choice_marks::${level}::${year}`; }
        function getGrammarChoiceLastPracticeKey(level) { return `grammar_choice_last_practice::${level}`; }
        function getGrammarChoiceTrainingModeKey() { return 'grammar_choice_training_mode'; }
        function getGrammarChoiceChallengeMinutesKey() { return 'grammar_choice_challenge_minutes'; }

        function parseStoredIdList(rawValue) {
            try {
                const parsed = JSON.parse(rawValue || '[]');
                if (!Array.isArray(parsed)) return [];
                return Array.from(new Set(parsed.map(item => String(item || '').trim()).filter(Boolean)));
            } catch (error) { return []; }
        }

        function getYearMistakes(level, year) {
            return parseStoredIdList(localStorage.getItem(getGrammarChoiceMarksKey(level, year)));
        }

        function saveYearMistakes(level, year, ids) {
            const normalized = Array.from(new Set((ids || []).map(item => String(item || '').trim()).filter(Boolean)));
            const key = getGrammarChoiceMarksKey(level, year);
            if (normalized.length === 0) {
                localStorage.removeItem(key);
                return;
            }
            localStorage.setItem(key, JSON.stringify(normalized));
        }

        function getYearSortValue(year) {
            const match = String(year || '').match(/^(\d{4})年(\d{1,2})月$/);
            if (!match) return 0;
            return Number(match[1]) * 100 + Number(match[2]);
        }

        function collectYearReviewItems(level) {
            const prefix = `grammar_choice_marks::${level}::`;
            const items = [];
            for (let index = 0; index < localStorage.length; index++) {
                const key = localStorage.key(index);
                if (!key || !key.startsWith(prefix)) continue;
                const year = key.slice(prefix.length);
                const ids = getYearMistakes(level, year);
                if (ids.length === 0) continue;
                items.push({ year, count: ids.length });
            }
            items.sort((left, right) => getYearSortValue(right.year) - getYearSortValue(left.year));
            return items;
        }

        function replaceAppUrl(params) {
            const nextParams = new URLSearchParams();
            Object.entries(params || {}).forEach(([key, value]) => {
                if (value) nextParams.set(key, value);
            });
            const nextUrl = nextParams.toString() ? `${window.location.pathname}?${nextParams.toString()}` : window.location.pathname;
            try { window.history.replaceState({ path: nextUrl }, '', nextUrl); } catch (e) {}
        }

        // --- 2. 核心应用状态与逻辑 ---
        const app = {
            currentLevel: null,
            practiceMode: null, // 'year' | 'random' | 'mistake' | 'category'
            trainingMode: 'study',
            currentYear: null,
            currentCategoryId: null,
            currentCategoryName: null,
            
            questionQueue: [], 
            currentIndex: 0,
            stats: { correct: 0, incorrect: 0 }, 
            randomTargetCount: RANDOM_TARGET_PRESETS[1],
            randomRoundTarget: RANDOM_TARGET_PRESETS[1],
            randomAnsweredCount: 0,
            randomStreak: 0,
            randomBestStreak: 0,
            pendingPracticeEntry: null,
            
            trainingPicker: {
                open: false,
                selectedMode: localStorage.getItem(getGrammarChoiceTrainingModeKey()) === 'challenge' ? 'challenge' : 'study',
                selectedMinutes: clampTimerMinutes(localStorage.getItem(getGrammarChoiceChallengeMinutesKey()) || TIMER_PRESETS[1])
            },
            
            timer: {
                mode: 'countup', status: 'idle', elapsedSeconds: 0, remainingSeconds: TIMER_PRESETS[0] * 60,
                selectedMinutes: TIMER_PRESETS[0], totalSeconds: TIMER_PRESETS[0] * 60, timerId: null,
                drawerOpen: false, displayHidden: false, hasStarted: false, timeoutTriggered: false,
                resultHasRun: false, resultSeconds: 0, resultTimeout: false
            },

            init() {
                const params = new URLSearchParams(window.location.search);
                const level = params.get('level');
                const year = params.get('year');
                const mode = params.get('mode');
                const training = params.get('training');
                const timer = params.get('timer');
                const browse = params.get('browse');
                const category = params.get('category');

                if (!ENABLED_LEVELS.includes(level) || !isEnabledChoiceLevel(level)) {
                    replaceAppUrl({});
                    return;
                }

                this.currentLevel = level;
                document.getElementById('display-selected-level').textContent = level;
                this.updateModeSelectAvailability();

                const hasYear = year && isEnabledChoiceYear(level, year);
                if (hasYear) {
                    const initTrainingMode = training === 'challenge' ? 'challenge' : 'study';
                    const initChallengeMinutes = clampTimerMinutes(timer || this.trainingPicker.selectedMinutes);
                    if (mode === 'review') {
                        this.startMistakePractice(year, { updateUrl: false, fromInit: true, skipPicker: true, trainingMode: initTrainingMode, challengeMinutes: initChallengeMinutes });
                    } else {
                        this.startYearPractice(year, { updateUrl: false, skipPicker: true, trainingMode: initTrainingMode, challengeMinutes: initChallengeMinutes });
                    }
                    return;
                }

                const categoryData = category ? getGrammarChoiceCategory(level, category) : null;
                if (categoryData) {
                    const initTrainingMode = training === 'challenge' ? 'challenge' : 'study';
                    const initChallengeMinutes = clampTimerMinutes(timer || this.trainingPicker.selectedMinutes);
                    this.startCategoryPractice(categoryData.id, { updateUrl: false, skipPicker: true, trainingMode: initTrainingMode, challengeMinutes: initChallengeMinutes });
                    return;
                }

                if (browse === 'category') {
                    this.showCategoryList({ updateUrl: false });
                    return;
                }

                replaceAppUrl({ level });
                this.showYearList({ updateUrl: false });
            },

            getTrainingEntrySubtitle(entry) {
                if (!entry) return 'ノートにまとめるか、時間を測るか。';
                if (entry.kind === 'year') return `${this.currentLevel} · ${entry.year}`;
                if (entry.kind === 'mistake') return `${this.currentLevel} · ${entry.year} · 弱点特訓`;
                if (entry.kind === 'category') {
                    const category = getGrammarChoiceCategory(this.currentLevel, entry.categoryId);
                    return `${this.currentLevel} · ${category?.name || '分类练习'}`;
                }
                if (entry.kind === 'random') return `${this.currentLevel} · ランダム演習`;
                if (entry.kind === 'global-random') return 'N2 / N3 随机特训';
                return 'ノートにまとめるか、時間を測るか。';
            },

            updateModeSelectAvailability() {
                const card = document.getElementById('category-mode-card');
                const copy = document.getElementById('category-mode-copy');
                if (!card || !copy) return;
                const hasCategories = getGrammarChoiceCategories(this.currentLevel).some(category => category.count > 0);
                card.disabled = !hasCategories;
                card.classList.toggle('opacity-40', !hasCategories);
                card.classList.toggle('cursor-not-allowed', !hasCategories);
                copy.textContent = hasCategories ? '按考点题单集中练习。' : '这个级别暂未添加分类题单。';
            },

            renderTrainingModePicker() {
                const overlay = document.getElementById('training-mode-overlay');
                const subtitle = document.getElementById('training-mode-subtitle');
                const timerPanel = document.getElementById('training-mode-timer');
                const randomSettingsPanel = document.getElementById('training-mode-random-settings');
                const confirmBtn = document.getElementById('training-mode-confirm-btn');
                const customInput = document.getElementById('training-mode-custom-input');
                if (!overlay) return;

                subtitle.textContent = this.getTrainingEntrySubtitle(this.pendingPracticeEntry);
                overlay.hidden = !this.trainingPicker.open;
                document.body.style.overflow = this.trainingPicker.open ? 'hidden' : '';

                document.querySelectorAll('[data-training-mode]').forEach((button) => button.classList.toggle('is-selected', button.dataset.trainingMode === this.trainingPicker.selectedMode));
                document.querySelectorAll('[data-training-minutes]').forEach((button) => button.classList.toggle('is-selected', Number(button.dataset.trainingMinutes) === this.trainingPicker.selectedMinutes));

                if (customInput) customInput.value = String(this.trainingPicker.selectedMinutes);

                const isChallenge = this.trainingPicker.selectedMode === 'challenge';
                const isRandomEntry = this.pendingPracticeEntry?.kind === 'random' || this.pendingPracticeEntry?.kind === 'global-random';
                timerPanel.hidden = !isChallenge;
                randomSettingsPanel.hidden = !isRandomEntry;
                confirmBtn.textContent = isChallenge ? 'テスト開始' : '学習開始';

                document.querySelectorAll('[data-training-random-target]').forEach((button) => button.classList.toggle('is-selected', Number(button.dataset.trainingRandomTarget) === this.randomTargetCount));
            },

            openTrainingModePicker(entry) {
                this.pendingPracticeEntry = entry;
                this.trainingPicker.open = true;
                this.trainingPicker.selectedMode = localStorage.getItem(getGrammarChoiceTrainingModeKey()) === 'challenge' ? 'challenge' : 'study';
                this.trainingPicker.selectedMinutes = clampTimerMinutes(localStorage.getItem(getGrammarChoiceChallengeMinutesKey()) || TIMER_PRESETS[1]);
                this.renderTrainingModePicker();
            },

            closeTrainingModePicker() {
                this.trainingPicker.open = false;
                this.pendingPracticeEntry = null;
                this.renderTrainingModePicker();
            },

            setTrainingPickerMode(mode) {
                this.trainingPicker.selectedMode = mode === 'challenge' ? 'challenge' : 'study';
                this.renderTrainingModePicker();
            },

            setTrainingPickerMinutes(minutes) {
                this.trainingPicker.selectedMinutes = clampTimerMinutes(minutes || this.trainingPicker.selectedMinutes);
                this.renderTrainingModePicker();
            },

            prepareTrainingForRun(mode, challengeMinutes) {
                this.trainingMode = mode === 'challenge' ? 'challenge' : 'study';
                localStorage.setItem(getGrammarChoiceTrainingModeKey(), this.trainingMode);
                if (this.trainingMode === 'challenge') {
                    const minutes = clampTimerMinutes(challengeMinutes || this.trainingPicker.selectedMinutes || TIMER_PRESETS[1]);
                    this.trainingPicker.selectedMinutes = minutes;
                    localStorage.setItem(getGrammarChoiceChallengeMinutesKey(), String(minutes));
                    this.resetTimerForPractice();
                    this.setTimerMode('countdown');
                    this.setTimerSelectedMinutes(minutes);
                } else {
                    this.resetTimerForPractice();
                    this.setTimerMode('countup');
                }
                this.closeTimerDrawer({ skipUpdate: true });
            },

            confirmTrainingModePicker() {
                if (!this.pendingPracticeEntry) return;
                const { kind, year, categoryId, updateUrl = true, fromInit = false } = this.pendingPracticeEntry;
                const options = {
                    updateUrl, fromInit, skipPicker: true,
                    trainingMode: this.trainingPicker.selectedMode,
                    challengeMinutes: this.trainingPicker.selectedMinutes,
                    randomTargetCount: this.randomTargetCount
                };
                this.closeTrainingModePicker();
                if (kind === 'year') { this.startYearPractice(year, options); return; }
                if (kind === 'mistake') { this.startMistakePractice(year, options); return; }
                if (kind === 'category') { this.startCategoryPractice(categoryId, options); return; }
                if (kind === 'global-random') { this.startGlobalRandomPractice(options); return; }
                this.startRandomPractice(options);
            },

            getActiveViewId() { return document.querySelector('.view-section.active')?.id || 'view-level-select'; },

            handleHeaderBack() {
                const activeViewId = this.getActiveViewId();
                if (activeViewId === 'view-level-select') { window.location.href = '../index.html'; return; }
                if (activeViewId === 'view-mode-select') { this.goHome(); return; }
                if (activeViewId === 'view-year-select') { this.backToModeSelect(); return; }
                if (activeViewId === 'view-category-select') { this.backToModeSelect(); return; }
                if (activeViewId === 'view-practice') { this.handleBackFromPractice(); return; }
                window.location.href = '../index.html';
            },

            goHome() {
                this.closeTrainingModePicker(); this.resetTimerForPractice(); this.setPracticeToolbarMode(null);
                this.currentLevel = null; this.practiceMode = null; this.trainingMode = 'study'; this.currentYear = null; this.currentCategoryId = null; this.currentCategoryName = null;
                replaceAppUrl({}); this.switchView('view-level-select');
            },

            backToModeSelect() {
                this.closeTrainingModePicker(); this.practiceMode = null; this.currentYear = null; this.currentCategoryId = null; this.currentCategoryName = null;
                replaceAppUrl({ level: this.currentLevel }); this.switchView('view-mode-select');
            },

            returnToLevelSelect() {
                this.closeTrainingModePicker(); this.resetTimerForPractice(); this.setPracticeToolbarMode(null);
                this.currentLevel = null; this.practiceMode = null; this.trainingMode = 'study'; this.currentYear = null; this.currentCategoryId = null; this.currentCategoryName = null;
                replaceAppUrl({}); this.switchView('view-level-select');
            },

            handleBackFromPractice() {
                this.resetTimerForPractice(); this.setPracticeToolbarMode(null);
                if (this.practiceMode === 'year' || this.practiceMode === 'mistake') { this.showYearList(); } 
                else if (this.practiceMode === 'category') { this.showCategoryList(); }
                else if (this.currentLevel === 'ALL') { this.returnToLevelSelect(); } 
                else { replaceAppUrl({ level: this.currentLevel }); this.switchView('view-mode-select'); }
            },

            isPracticeInProgress() { return this.questionQueue.length > 0 && this.currentIndex < this.questionQueue.length; },

            getActiveToolbarMode() {
                const practiceView = document.getElementById('view-practice');
                if (!practiceView?.classList.contains('active') || !this.isPracticeInProgress()) return null;
                if (this.trainingMode === 'challenge') return 'timer';
                if (this.practiceMode === 'random') return 'random';
                return null;
            },

            isStudyElapsedHeaderActive() {
                return this.getActiveViewId() === 'view-practice' && this.trainingMode === 'study' && this.isPracticeInProgress();
            },

            updateHeaderRightSlot() {
                const homeBtn = document.getElementById('header-home-btn');
                const elapsedBox = document.getElementById('study-elapsed-display');
                const elapsedTime = document.getElementById('study-elapsed-time');
                const showElapsed = this.isStudyElapsedHeaderActive();
                if (homeBtn) homeBtn.hidden = showElapsed;
                if (elapsedBox) elapsedBox.hidden = !showElapsed;
                if (elapsedTime) elapsedTime.textContent = formatTimerClock(this.timer.elapsedSeconds);
            },

            setPracticeToolbarMode(mode) {
                const toolbar = document.getElementById('practice-bottom-toolbar');
                if (!toolbar) return;
                toolbar.hidden = !mode; toolbar.classList.toggle('is-visible', Boolean(mode));
                document.getElementById('view-practice').classList.toggle('has-bottom-toolbar', Boolean(mode));
                document.getElementById('timer-tool-slot').hidden = mode !== 'timer';
                document.getElementById('random-tool-slot').hidden = mode !== 'random';
                if (mode !== 'timer') {
                    this.timer.drawerOpen = false; toolbar.classList.remove('drawer-open');
                    document.getElementById('practice-toolbar-backdrop').hidden = true;
                    document.getElementById('timer-drawer').hidden = true;
                }
            },

            getRandomQuestionPool() {
                if (this.currentLevel === 'ALL') return [...questionDatabase];
                return questionDatabase.filter(q => q.level === this.currentLevel);
            },

            getEffectiveRandomTarget(poolLength) {
                const target = RANDOM_TARGET_PRESETS.includes(Number(this.randomTargetCount)) ? Number(this.randomTargetCount) : RANDOM_TARGET_PRESETS[1];
                return poolLength ? Math.min(target, poolLength) : target;
            },

            prepareRandomRound(pool) {
                const target = this.getEffectiveRandomTarget(pool.length);
                this.randomRoundTarget = target; this.randomAnsweredCount = 0; this.randomStreak = 0; this.randomBestStreak = 0;
                this.questionQueue = shuffleQuestions(pool).slice(0, target);
                this.currentIndex = 0;
            },

            setRandomTargetCount(value) {
                this.randomTargetCount = RANDOM_TARGET_PRESETS.includes(Number(value)) ? Number(value) : RANDOM_TARGET_PRESETS[1];
                if (this.trainingPicker.open) { this.renderTrainingModePicker(); } else { this.updateTimerUI(); }
            },

            updateRandomProgressAfterAnswer(isCorrect) {
                if (this.practiceMode !== 'random') return;
                this.randomAnsweredCount = Math.min(this.randomRoundTarget, this.randomAnsweredCount + 1);
                if (isCorrect) {
                    this.randomStreak += 1;
                    if (this.randomStreak > this.randomBestStreak) this.randomBestStreak = this.randomStreak;
                } else { this.randomStreak = 0; }
            },

            finishRandomRound() {
                if (this.practiceMode !== 'random') return;
                this.currentIndex = this.questionQueue.length;
                this.renderPracticeQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            // Timer logic
            stopTimer() { if (this.timer.timerId) { window.clearInterval(this.timer.timerId); this.timer.timerId = null; } },
            getTimerClockText() { return formatTimerClock(this.timer.mode === 'countdown' ? this.timer.remainingSeconds : this.timer.elapsedSeconds); },
            getTimerUsedSeconds() { return this.timer.hasStarted ? (this.timer.mode === 'countdown' ? Math.max(0, this.timer.totalSeconds - this.timer.remainingSeconds) : this.timer.elapsedSeconds) : 0; },
            getResultTimerText() { return this.timer.resultHasRun ? formatTimerClock(this.timer.resultSeconds) : '未計測'; },
            
            closeTimerDrawer(options = {}) { this.timer.drawerOpen = false; if (!options.skipUpdate) this.updateTimerUI(); },
            openTimerDrawer() { if (!this.isPracticeInProgress() || this.practiceMode !== 'year') return; this.timer.drawerOpen = true; this.updateTimerUI(); },
            toggleTimerDrawer() { if (!this.isPracticeInProgress() || this.practiceMode !== 'year') return; this.timer.drawerOpen = !this.timer.drawerOpen; this.updateTimerUI(); },

            resetTimerForPractice() {
                this.stopTimer(); this.timer.status = 'idle'; this.timer.elapsedSeconds = 0;
                this.timer.totalSeconds = clampTimerMinutes(this.timer.selectedMinutes) * 60;
                this.timer.remainingSeconds = this.timer.totalSeconds; this.timer.hasStarted = false;
                this.timer.timeoutTriggered = false; this.timer.resultHasRun = false;
                this.timer.resultSeconds = 0; this.timer.resultTimeout = false;
                this.closeTimerDrawer({ skipUpdate: true }); this.updateTimerUI();
            },

            finalizeTimerForResult(options = {}) {
                if (!this.timer.resultTimeout && !this.timer.resultHasRun) {
                    this.timer.resultHasRun = this.timer.hasStarted; this.timer.resultSeconds = this.getTimerUsedSeconds();
                }
                this.timer.resultTimeout = this.timer.resultTimeout || options.timedOut;
                this.stopTimer();
                this.timer.status = options.timedOut ? 'timeout' : (this.timer.hasStarted ? 'finished' : 'idle');
                if(options.timedOut) this.timer.remainingSeconds = 0;
                this.setPracticeToolbarMode(null); this.updateTimerUI();
            },

            setTimerMode(mode) {
                if (!['countup', 'countdown'].includes(mode) || this.timer.mode === mode) return;
                this.stopTimer(); this.timer.mode = mode; this.timer.status = 'idle'; this.timer.elapsedSeconds = 0;
                this.timer.totalSeconds = clampTimerMinutes(this.timer.selectedMinutes) * 60;
                this.timer.remainingSeconds = this.timer.totalSeconds; this.timer.hasStarted = false;
                this.updateTimerUI();
            },

            setTimerSelectedMinutes(value) {
                const minutes = clampTimerMinutes(value);
                this.timer.selectedMinutes = minutes; this.timer.totalSeconds = minutes * 60;
                if (this.timer.mode === 'countdown') {
                    this.stopTimer(); this.timer.status = 'idle'; this.timer.remainingSeconds = this.timer.totalSeconds;
                    this.timer.hasStarted = false;
                }
                this.updateTimerUI();
            },

            toggleTimerDisplayVisibility() { this.timer.displayHidden = !this.timer.displayHidden; this.updateTimerUI(); },

            startTimer() {
                if (!this.isPracticeInProgress()) return;
                const timer = this.timer; this.stopTimer();
                if (timer.mode === 'countdown') {
                    timer.totalSeconds = clampTimerMinutes(timer.selectedMinutes) * 60;
                    if (!timer.hasStarted || timer.status === 'idle' || timer.status === 'finished' || timer.status === 'timeout') timer.remainingSeconds = timer.totalSeconds;
                } else if (!timer.hasStarted || timer.status === 'finished' || timer.status === 'timeout') timer.elapsedSeconds = 0;
                
                timer.hasStarted = true; timer.status = 'running';
                timer.timerId = window.setInterval(() => {
                    if (timer.mode === 'countup') { timer.elapsedSeconds += 1; this.updateTimerUI(); return; }
                    timer.remainingSeconds = Math.max(0, timer.remainingSeconds - 1);
                    if (timer.remainingSeconds === 0) { this.finishCountdown(); return; }
                    this.updateTimerUI();
                }, 1000);
                this.updateTimerUI();
            },

            pauseTimer() { if (this.timer.status !== 'running') return; this.stopTimer(); this.timer.status = this.timer.hasStarted ? 'paused' : 'idle'; this.updateTimerUI(); },
            toggleTimerRun() { this.timer.status === 'running' ? this.pauseTimer() : this.startTimer(); },
            resetTimer() { this.resetTimerForPractice(); },

            startPracticeClock() {
                if (this.trainingMode === 'study' || this.trainingMode === 'challenge') this.startTimer();
            },

            finishCountdown() {
                if (!this.isPracticeInProgress() || this.timer.timeoutTriggered) return;
                this.stopTimer(); this.timer.remainingSeconds = 0; this.timer.status = 'timeout'; this.timer.timeoutTriggered = true;
                this.currentIndex = this.questionQueue.length; this.renderPracticeQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            updateTimerUI() {
                const timer = this.timer;
                this.updateHeaderRightSlot();
                const toolbar = document.getElementById('practice-bottom-toolbar');
                if (!toolbar) return;
                const activeMode = this.getActiveToolbarMode();
                this.setPracticeToolbarMode(activeMode);
                
                const realTime = this.getTimerClockText();
                const dDisplay = document.getElementById('timer-toolbar-display');
                if(dDisplay) {
                    dDisplay.textContent = timer.displayHidden ? '--:--' : realTime;
                    dDisplay.classList.toggle('is-concealed', timer.displayHidden);
                }
                const drawDisplay = document.getElementById('timer-drawer-display');
                if(drawDisplay) drawDisplay.textContent = realTime;

                const tMain = document.getElementById('timer-toolbar-main');
                if(tMain) tMain.dataset.timerStatus = timer.status;
                
                const tToggle = document.getElementById('timer-toolbar-toggle-btn');
                if(tToggle) tToggle.textContent = timer.status === 'running' ? '一時停止' : (timer.status === 'paused' ? '再開' : '開始');
                
                const tSet = document.getElementById('timer-toolbar-settings-btn');
                if(tSet) tSet.classList.toggle('is-primary', timer.drawerOpen && activeMode === 'timer');

                const drawer = document.getElementById('timer-drawer');
                if(drawer) drawer.hidden = !timer.drawerOpen || activeMode !== 'timer';
                
                const dStart = document.getElementById('timer-drawer-start-btn');
                if(dStart) dStart.textContent = timer.status === 'paused' ? '再開' : '開始';

                const rMain = document.getElementById('random-toolbar-main');
                if(rMain) rMain.dataset.timerStatus = this.randomStreak > 0 ? 'running' : 'idle';
                
                const rProg = document.getElementById('random-toolbar-progress');
                if(rProg) rProg.textContent = `${Math.min(this.randomAnsweredCount, this.randomRoundTarget)}/${this.randomRoundTarget}`;
                
                const rStrk = document.getElementById('random-toolbar-streak');
                if(rStrk) rStrk.textContent = String(this.randomStreak);
            },

            // View Management
            switchView(viewId) {
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                const view = document.getElementById(viewId);
                if (view) view.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'instant' });
                this.updateTimerUI();
            },

            selectLevel(level) {
                if (!isEnabledChoiceLevel(level)) return;
                this.currentLevel = level;
                document.getElementById('display-selected-level').textContent = level;
                this.updateModeSelectAvailability();
                replaceAppUrl({ level });
                this.switchView('view-mode-select');
            },

            showYearList(options = {}) {
                if (options.updateUrl !== false) replaceAppUrl({ level: this.currentLevel });
                this.practiceMode = 'year';
                this.currentCategoryId = null;
                this.currentCategoryName = null;
                
                const availableYears = [...new Set(questionDatabase.filter(q => q.level === this.currentLevel).map(q => q.year))]
                    .sort((left, right) => getYearSortValue(right) - getYearSortValue(left));

                const container = document.getElementById('year-list-container');
                const reviewSection = document.getElementById('year-review-section');
                const reviewGrid = document.getElementById('year-review-grid');
                const reviewStatus = document.getElementById('year-review-status');
                const reviewCount = document.getElementById('year-review-count');
                container.innerHTML = ''; reviewGrid.innerHTML = '';

                const reviewItems = collectYearReviewItems(this.currentLevel).filter(item => isEnabledChoiceYear(this.currentLevel, item.year));
                const totalReviewCount = reviewItems.reduce((sum, item) => sum + item.count, 0);
                if (reviewStatus) {
                    reviewStatus.textContent = totalReviewCount > 0 ? '有待复习' : '暂无错题';
                    reviewStatus.classList.toggle('has-items', totalReviewCount > 0);
                }
                if (reviewCount) reviewCount.textContent = `${totalReviewCount} 题`;
                reviewGrid.hidden = reviewItems.length === 0;
                if (reviewItems.length > 0) {
                    reviewGrid.innerHTML = reviewItems.map(item => `
                        <button onclick="app.startMistakePractice('${item.year}')" class="group inline-flex items-center gap-2 px-4 py-2 border-[1.5px] border-borderStrong bg-transparent text-textMain text-sm font-bold transition-all sketch-btn">
                            <span>${item.year}</span>
                            <span class="text-xs px-2 py-0.5 border border-borderStrong bg-transparent text-accentRed rounded-sm hatching-yellow">待复习 ${item.count} 题</span>
                        </button>
                    `).join('');
                }

                const lastPractice = localStorage.getItem(getGrammarChoiceLastPracticeKey(this.currentLevel)) || '';

                if (availableYears.length === 0) {
                    container.innerHTML = `<div class="col-span-full text-center py-12 text-textSub border-[1.5px] border-borderMain sketch-box">データがありません</div>`;
                } else {
                    container.innerHTML = availableYears.map(year => {
                        const qCount = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year).length;
                        const isLastPractice = year === lastPractice;
                        const isEnabled = isEnabledChoiceYear(this.currentLevel, year);
                        return `
                            <button ${isEnabled ? `onclick="app.startYearPractice('${year}')"` : 'type="button" disabled'} class="flex items-center justify-between p-5 border-[1.5px] border-borderStrong transition-all group text-left sketch-box ${isEnabled ? 'hover:bg-transparent' : 'opacity-50 cursor-not-allowed'}">
                                <div class="font-bold text-lg text-textMain tracking-wider">${year}</div>
                                <div class="flex items-center gap-2 shrink-0">
                                    ${isLastPractice ? '<span class="text-[10px] font-bold text-textMain px-2 py-1 border border-borderStrong rounded-sm hatching-yellow">前回</span>' : ''}
                                    <div class="text-sm text-textSub font-sans bg-transparent px-2 py-1 border-[1px] border-borderStrong rounded-sm">全 ${qCount} 問</div>
                                </div>
                            </button>
                        `;
                    }).join('');
                }
                this.switchView('view-year-select');
            },

            showCategoryList(options = {}) {
                if (!ENABLED_LEVELS.includes(this.currentLevel)) return;
                if (options.updateUrl !== false) replaceAppUrl({ level: this.currentLevel, browse: 'category' });
                this.practiceMode = 'category';
                this.currentYear = null;
                this.currentCategoryId = null;
                this.currentCategoryName = null;

                const container = document.getElementById('category-list-container');
                const levelLabel = document.getElementById('category-selected-level');
                const categories = getGrammarChoiceCategories(this.currentLevel);
                if (!container) return;
                if (levelLabel) levelLabel.textContent = this.currentLevel;

                if (categories.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-12 px-6 text-textSub border-[1.5px] border-borderMain sketch-box hatching-gray">
                            <div class="text-base font-bold text-textMain mb-2">还没有添加分类题单</div>
                            <div class="text-sm font-bold leading-relaxed">${this.currentLevel} 分类练习暂未开放。</div>
                        </div>
                    `;
                } else {
                    container.innerHTML = categories.map(category => {
                        const hasQuestions = category.count > 0;
                        return `
                            <button type="button" ${hasQuestions ? `data-category-id="${escapeHtml(category.id)}"` : 'disabled'} class="group text-left p-5 relative overflow-hidden sketch-box ${hasQuestions ? '' : 'opacity-50 cursor-not-allowed'}">
                                <div class="flex items-start justify-between gap-4">
                                    <div>
                                        <h3 class="text-lg font-bold text-textMain mb-2 tracking-wide">${escapeHtml(category.name)}</h3>
                                        <p class="text-xs text-textSub font-bold leading-relaxed">${escapeHtml(category.description || '集中练习同一类文法考点。')}</p>
                                    </div>
                                    <span class="shrink-0 text-xs font-bold text-textMain px-2 py-1 border border-borderStrong rounded-sm hatching-yellow">${category.count} 题</span>
                                </div>
                                ${category.missingIds.length > 0 ? `<div class="mt-4 text-[11px] font-bold text-accentRed">有 ${category.missingIds.length} 个题号未匹配</div>` : ''}
                            </button>
                        `;
                    }).join('');
                }

                this.switchView('view-category-select');
            },

            restartCurrentPractice() {
                const opts = { skipPicker: true, trainingMode: this.trainingMode, challengeMinutes: this.timer.selectedMinutes, randomTargetCount: this.randomTargetCount };
                if (this.practiceMode === 'year') { this.startYearPractice(this.currentYear, opts); }
                else if (this.practiceMode === 'mistake') { this.startMistakePractice(this.currentYear, opts); }
                else if (this.practiceMode === 'category') { this.startCategoryPractice(this.currentCategoryId, opts); }
                else if (this.currentLevel === 'ALL') { this.startGlobalRandomPractice(opts); }
                else { this.startRandomPractice(opts); }
            },

            startRandomPractice(options = {}) {
                if (!options.skipPicker) { this.openTrainingModePicker({ kind: 'random' }); return; }
                this.prepareTrainingForRun(options.trainingMode || 'study', options.challengeMinutes);
                this.randomTargetCount = RANDOM_TARGET_PRESETS.includes(Number(options.randomTargetCount)) ? Number(options.randomTargetCount) : this.randomTargetCount;
                this.practiceMode = 'random'; this.currentYear = 'ランダム演習';
                this.currentCategoryId = null; this.currentCategoryName = null;
                this.stats = { correct: 0, incorrect: 0 }; this.randomStreak = 0; this.randomBestStreak = 0;
                replaceAppUrl({ level: this.currentLevel });
                const pool = this.getRandomQuestionPool();
                if(pool.length === 0) { alert('問題がありません'); return; }
                this.prepareRandomRound(pool);
                this.renderPracticeQuestion(); this.switchView('view-practice');
                this.startPracticeClock();
            },

            startGlobalRandomPractice(options = {}) {
                if (!options.skipPicker) { this.openTrainingModePicker({ kind: 'global-random' }); return; }
                this.prepareTrainingForRun(options.trainingMode || 'study', options.challengeMinutes);
                this.randomTargetCount = RANDOM_TARGET_PRESETS.includes(Number(options.randomTargetCount)) ? Number(options.randomTargetCount) : this.randomTargetCount;
                this.currentLevel = 'ALL'; this.practiceMode = 'random'; this.currentYear = 'N2 / N3 随机';
                this.currentCategoryId = null; this.currentCategoryName = null;
                this.stats = { correct: 0, incorrect: 0 }; this.randomStreak = 0; this.randomBestStreak = 0;
                replaceAppUrl({});
                const pool = this.getRandomQuestionPool();
                if(pool.length === 0) { alert('問題がありません'); return; }
                this.prepareRandomRound(pool);
                this.renderPracticeQuestion(); this.switchView('view-practice');
                this.startPracticeClock();
            },

            startMistakePractice(year, options = {}) {
                if (!options.skipPicker) { this.openTrainingModePicker({ kind: 'mistake', year, updateUrl: options.updateUrl !== false, fromInit: options.fromInit }); return; }
                this.prepareTrainingForRun(options.trainingMode || 'study', options.challengeMinutes);
                this.practiceMode = 'mistake'; this.currentYear = year;
                this.currentCategoryId = null; this.currentCategoryName = null;
                this.stats = { correct: 0, incorrect: 0 }; this.randomStreak = 0; this.randomBestStreak = 0;

                const mistakeIds = getYearMistakes(this.currentLevel, year);
                const pool = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year && mistakeIds.includes(q.id));
                if (pool.length === 0) {
                    alert('弱点特訓の対象問題がありません。');
                    if (options.fromInit) replaceAppUrl({ level: this.currentLevel });
                    this.showYearList({ updateUrl: options.updateUrl !== false }); return;
                }

                localStorage.setItem(getGrammarChoiceLastPracticeKey(this.currentLevel), year);
                this.questionQueue = pool; this.currentIndex = 0;

                if (options.updateUrl !== false) {
                    replaceAppUrl({ level: this.currentLevel, year, mode: 'review', training: this.trainingMode, timer: this.trainingMode === 'challenge' ? String(this.timer.selectedMinutes) : null });
                }
                this.renderPracticeQuestion(); this.switchView('view-practice');
                this.startPracticeClock();
            },

            startCategoryPractice(categoryId, options = {}) {
                const level = ENABLED_LEVELS.includes(this.currentLevel) ? this.currentLevel : 'N2';
                const category = getGrammarChoiceCategory(level, categoryId);
                if (!category || category.count === 0) {
                    alert('这个分类还没有可练习的题目。');
                    this.showCategoryList({ updateUrl: options.updateUrl !== false });
                    return;
                }
                if (!options.skipPicker) { this.openTrainingModePicker({ kind: 'category', categoryId: category.id, updateUrl: options.updateUrl !== false }); return; }

                this.currentLevel = level;
                this.prepareTrainingForRun(options.trainingMode || 'study', options.challengeMinutes);
                this.practiceMode = 'category';
                this.currentYear = null;
                this.currentCategoryId = category.id;
                this.currentCategoryName = category.name;
                this.stats = { correct: 0, incorrect: 0 };
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                this.questionQueue = getGrammarChoiceCategoryQuestions(category);
                this.currentIndex = 0;

                if (options.updateUrl !== false) {
                    replaceAppUrl({ level, category: category.id, training: this.trainingMode, timer: this.trainingMode === 'challenge' ? String(this.timer.selectedMinutes) : null });
                }
                this.renderPracticeQuestion(); this.switchView('view-practice');
                this.startPracticeClock();
            },

            startYearPractice(year, options = {}) {
                if (!options.skipPicker) { this.openTrainingModePicker({ kind: 'year', year, updateUrl: options.updateUrl !== false }); return; }
                this.prepareTrainingForRun(options.trainingMode || 'study', options.challengeMinutes);
                this.practiceMode = 'year'; this.currentYear = year;
                this.currentCategoryId = null; this.currentCategoryName = null;
                this.stats = { correct: 0, incorrect: 0 }; this.randomStreak = 0; this.randomBestStreak = 0;
                localStorage.setItem(getGrammarChoiceLastPracticeKey(this.currentLevel), year);
                
                this.questionQueue = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year);
                this.currentIndex = 0;
                
                if (options.updateUrl !== false) {
                    replaceAppUrl({ level: this.currentLevel, year, training: this.trainingMode, timer: this.trainingMode === 'challenge' ? String(this.timer.selectedMinutes) : null });
                }
                this.renderPracticeQuestion(); this.switchView('view-practice');
                this.startPracticeClock();
            },

            buildChallengeExplanationCards() {
                return this.questionQueue.map((q, index) => `
                    <div class="bg-transparent border-[1.5px] border-borderStrong p-5 md:p-6 mb-6 rounded-lg shadow-sm">

                            <div class="text-sm font-bold text-textMain tracking-wide">${q.label || `Q${index + 1}`}</div>

                        </div>
                        <div class="space-y-6 explanation-stack">
                            <div>
                                <h4 class="explanation-group-title">【和訳】</h4>
                                <div class="explanation-copy text-textSub">${q.translation}</div>

                                <h4 class="explanation-group-title">【文法解説】</h4>
