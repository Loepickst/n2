                if (category && category.hasChildren) {
                    this.showCategoryList({ parentCategoryId: category.id });
                    return;
                }
                this.startCategoryPractice(categoryId);
            },

            // Step 2-B: 启动随机乱序练习
            restartCurrentPractice() {
                const options = {
                    skipPicker: true,
                    trainingMode: this.trainingMode,
                    challengeMinutes: this.timer.selectedMinutes,
                    randomTargetCount: this.randomTargetCount
                };
                if (this.practiceMode === 'year') {
                    this.startYearPractice(this.currentYear, options);
                    return;
                }
                if (this.practiceMode === 'mistake') {
                    this.startMistakePractice(this.currentYear, options);
                    return;
                }
                if (this.practiceMode === 'category') {
                    this.startCategoryPractice(this.currentCategoryId, options);
                    return;
                }
                if (this.currentLevel === 'ALL') {
                    this.startGlobalRandomPractice(options);
                    return;
                }
                this.startRandomPractice(options);
            },

            startRandomPractice(options = {}) {
                const { skipPicker = false, trainingMode = 'study', challengeMinutes = null, randomTargetCount = this.randomTargetCount } = options;
                if (!skipPicker) {
                    this.openTrainingModePicker({ kind: 'random' });
                    return;
                }
                this.prepareTrainingForRun(trainingMode, challengeMinutes);
                this.randomTargetCount = RANDOM_TARGET_PRESETS.includes(Number(randomTargetCount)) ? Number(randomTargetCount) : RANDOM_TARGET_PRESETS[1];
                this.practiceMode = 'random';
                this.currentYear = '随机练习';
                this.currentCategoryId = null;
                this.currentCategoryName = null;
                this.currentCategoryParentId = null;
                this.stats = { correct: 0, incorrect: 0 };
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                replaceAppUrl({ level: this.currentLevel });
                
                const pool = this.getRandomQuestionPool();
                if(pool.length === 0) { alert('暂无题目'); return; }

                this.prepareRandomRound(pool);
                this.renderPracticeQuestion();
                this.switchView('view-practice');
                this.startPracticeClock();
            },

            startGlobalRandomPractice(options = {}) {
                const { skipPicker = false, trainingMode = 'study', challengeMinutes = null, randomTargetCount = this.randomTargetCount } = options;
                if (!skipPicker) {
                    this.openTrainingModePicker({ kind: 'global-random' });
                    return;
                }
                this.prepareTrainingForRun(trainingMode, challengeMinutes);
                this.randomTargetCount = RANDOM_TARGET_PRESETS.includes(Number(randomTargetCount)) ? Number(randomTargetCount) : RANDOM_TARGET_PRESETS[1];
                this.currentLevel = 'ALL';
                this.practiceMode = 'random';
                this.currentYear = 'N2 / N3 随机';
                this.currentCategoryId = null;
                this.currentCategoryName = null;
                this.currentCategoryParentId = null;
                this.stats = { correct: 0, incorrect: 0 };
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                replaceAppUrl({});

                const pool = this.getRandomQuestionPool();
                if(pool.length === 0) { alert('暂无题目'); return; }

                this.prepareRandomRound(pool);
                this.renderPracticeQuestion();
                this.switchView('view-practice');
                this.startPracticeClock();
            },

            // Step 2-C: 启动错题回顾练习
            startMistakePractice(year, options = {}) {
                const { updateUrl = true, fromInit = false, skipPicker = false, trainingMode = 'study', challengeMinutes = null } = options;
                if (!skipPicker) {
                    this.openTrainingModePicker({ kind: 'mistake', year, updateUrl, fromInit });
                    return;
                }
                this.prepareTrainingForRun(trainingMode, challengeMinutes);
                this.practiceMode = 'mistake';
                this.currentYear = year;
                this.currentCategoryId = null;
                this.currentCategoryName = null;
                this.currentCategoryParentId = null;
                this.stats = { correct: 0, incorrect: 0 };
                this.randomStreak = 0;
                this.randomBestStreak = 0;

                const mistakeIds = getYearMistakes(this.currentLevel, year);
                let pool = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year && mistakeIds.includes(q.id));
                if (pool.length === 0) {
                    alert('错题复习の対象暂无题目。');
                    if (fromInit) replaceAppUrl({ level: this.currentLevel });
                    this.showYearList({ updateUrl });
                    return;
                }

                localStorage.setItem(getGrammarSortLastPracticeKey(this.currentLevel), year);
                this.questionQueue = pool;
                this.currentIndex = 0;

                if (updateUrl) {
                    replaceAppUrl({
                        level: this.currentLevel,
                        year,
                        mode: 'review',
                        training: this.trainingMode,
                        timer: this.trainingMode === 'challenge' ? String(this.timer.selectedMinutes) : null
                    });
                }
                this.renderPracticeQuestion();
                this.switchView('view-practice');
                this.startPracticeClock();
            },

            startCategoryPractice(categoryId, options = {}) {
                const { updateUrl = true, skipPicker = false, trainingMode = 'study', challengeMinutes = null } = options;
                const level = ENABLED_LEVELS.includes(this.currentLevel) ? this.currentLevel : 'N2';
                const category = getGrammarSortCategory(level, categoryId);
                if (category && category.hasChildren) {
                    this.showCategoryList({
                        updateUrl,
                        parentCategoryId: category.id
                    });
                    return;
                }
                if (!category || category.count === 0) {
                    alert('这个分类还没有可练习的题目。');
                    this.showCategoryList({
                        updateUrl,
                        parentCategoryId: this.currentCategoryParentId
                    });
                    return;
                }
                if (!skipPicker) {
                    this.openTrainingModePicker({ kind: 'category', categoryId: category.id, updateUrl });
                    return;
                }

                this.currentLevel = level;
                this.prepareTrainingForRun(trainingMode, challengeMinutes);
                this.practiceMode = 'category';
                this.currentYear = null;
                this.currentCategoryId = category.id;
                this.currentCategoryName = category.name;
                this.currentCategoryParentId = category.parentId || null;
                this.stats = { correct: 0, incorrect: 0 };
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                this.questionQueue = getGrammarSortCategoryQuestions(category);
                this.currentIndex = 0;

                if (updateUrl) {
                    replaceAppUrl({
                        level,
                        category: category.id,
                        training: this.trainingMode,
                        timer: this.trainingMode === 'challenge' ? String(this.timer.selectedMinutes) : null
                    });
                }
                this.renderPracticeQuestion();
                this.switchView('view-practice');
                this.startPracticeClock();
            },

            // Step 3: 启动指定年份练习
            startYearPractice(year, options = {}) {
                const { updateUrl = true, skipPicker = false, trainingMode = 'study', challengeMinutes = null } = options;
                if (!skipPicker) {
                    this.openTrainingModePicker({ kind: 'year', year, updateUrl });
                    return;
                }
                this.prepareTrainingForRun(trainingMode, challengeMinutes);
                this.practiceMode = 'year';
                this.currentYear = year;
                this.currentCategoryId = null;
                this.currentCategoryName = null;
                this.currentCategoryParentId = null;
                this.stats = { correct: 0, incorrect: 0 };
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                localStorage.setItem(getGrammarSortLastPracticeKey(this.currentLevel), year);
                
                this.questionQueue = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year);
                this.currentIndex = 0;
                
                if (updateUrl) {
                    replaceAppUrl({
                        level: this.currentLevel,
                        year,
                        training: this.trainingMode,
                        timer: this.trainingMode === 'challenge' ? String(this.timer.selectedMinutes) : null
                    });
                }
                this.renderPracticeQuestion();
                this.switchView('view-practice');
                this.startPracticeClock();
            },

            // 统一拼接正确解析
            buildCorrectOrderMarkup(q) {
                let correctOrderStrHtml = '';
                q.correctOrder.forEach((id, idx) => {
                    const targetOpt = q.options.find(o => String(o.id) === String(id));
                    const optText = targetOpt ? targetOpt.text : id;
                    
                    if (idx === q.starIndex) {
                        correctOrderStrHtml += `<span class="correct-answer-index inline-flex items-center justify-center border border-accentRed text-accentRed bg-red-50 rounded-full">★${id}</span><span class="correct-answer-token is-accent align-middle">${optText}</span>`;
                    } else {
                        correctOrderStrHtml += `<span class="correct-answer-index inline-flex items-center justify-center border border-borderStrong bg-white text-textMain rounded-full">${id}</span><span class="correct-answer-token align-middle">${optText}</span>`;
                    }
                    if (idx < q.correctOrder.length - 1) {
                        correctOrderStrHtml += ` <span class="correct-answer-divider align-middle">/</span> `;
                    }
                });
                return correctOrderStrHtml;
            },

            buildChallengeExplanationCards() {
                return this.questionQueue.map((q, index) => `
                    <div class="bg-white border-[1.5px] border-borderStrong p-5 md:p-6 mb-6 rounded-lg shadow-sm">
                        <div class="flex items-center justify-between gap-3 border-b border-dashed border-borderMain pb-3 mb-4">
                            <div class="text-sm font-bold text-textMain tracking-wide">${q.label || `Q${index + 1}`}</div>
                        </div>
                        <div class="text-textMain font-serif-jp text-lg md:text-xl font-bold leading-loose bg-gray-50 p-4 border-[1.5px] border-borderStrong mb-5 rounded-md">
                            ${q.prefix}
                            <span class="inline-flex items-end gap-2 mx-1 align-bottom">
                                ${Array.from({ length: 4 }, (_, slotIndex) => {
                                    const answerId = q.correctOrder[slotIndex];
                                    if (slotIndex === q.starIndex) {
                                        return `<span class="inline-flex w-8 h-8 items-center justify-center border-b-[2px] border-accentRed text-accentRed font-bold font-sans relative"><span class="slot-marker">★</span>${answerId}</span>`;
                                    }
                                    return `<span class="inline-flex w-8 h-8 items-center justify-center border-b-[2px] border-textMain text-textMain font-bold font-sans">${answerId}</span>`;
                                }).join('')}
                            </span>
                            ${q.suffix}
                        </div>
                        <div class="space-y-5 explanation-stack">
                            <div>
                                <h4 class="explanation-group-title">【正解】</h4>
                                <div class="correct-answer-box">
                                    <div class="correct-answer-line">
                                        ${this.buildCorrectOrderMarkup(q)}
                                    </div>
                                </div>
                            </div>
                            <div>
                                <h4 class="explanation-group-title">【解析】</h4>
                                <div class="space-y-3 explanation-copy">
                                    ${q.explanation}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            },

            openChallengeAnalysisView() {
                if (this.trainingMode !== 'challenge') return;
                const container = document.getElementById('practice-question-container');
                if (!container) return;
                const subtitleEl = document.getElementById('practice-subtitle');
                document.getElementById('practice-title').textContent = '错题解析';
                if (subtitleEl) {
                    subtitleEl.textContent = '测试模式已结束，请通过解析复盘薄弱点。';
                }
                container.innerHTML = `
                    <div class="bg-white border-[1.5px] border-borderStrong p-6 md:p-8 rounded-xl shadow-sm fade-in sketch-box">
                        <div class="text-center border-b border-dashed border-borderMain pb-4 mb-6">
                            <h2 class="text-2xl font-title-unified font-bold text-textMain tracking-wide">统一批改与解析</h2>
                        </div>
                        <div class="space-y-6">
                            ${this.buildChallengeExplanationCards()}
                        </div>
                        <div class="mt-8 flex flex-wrap justify-center gap-3">
                            <button onclick="app.renderPracticeQuestion()" class="px-5 py-2.5 bg-white text-textMain border-[1.5px] border-borderStrong rounded-md text-sm font-bold hover:bg-gray-50 transition-all">返回批改结果</button>
                            <button onclick="app.restartCurrentPractice()" class="px-5 py-2.5 bg-textMain text-white border-[1.5px] border-borderStrong rounded-md text-sm font-bold hover:bg-accentRed hover:border-accentRed transition-all">再练一次</button>
                        </div>
                    </div>
                `;
            },

            // 渲染做题界面
            renderPracticeQuestion() {
                const container = document.getElementById('practice-question-container');
                container.innerHTML = ''; 
                
                const headerTitle = this.practiceMode === 'category'
                    ? `[${this.currentLevel}] ${this.currentCategoryName || '分类练习'}`
                    : (this.currentLevel === 'ALL'
                        ? 'N2 / N3 随机特训'
                        : `[${this.currentLevel}] ${this.currentYear}${this.practiceMode === 'mistake' ? '（错题复习）' : ''}`);
                document.getElementById('practice-title').textContent = headerTitle;
                const subtitleEl = document.getElementById('practice-subtitle');
                if (subtitleEl) {
                    subtitleEl.textContent = this.trainingMode === 'challenge'
                        ? `测试模式 · 剩余 ${this.timer.selectedMinutes} 分 · 统一批改`
                        : '学习模式 · 選択肢をクリックして空欄を埋めてください。';
                }

                // 完成所有题目后的结算页
                if (this.currentIndex >= this.questionQueue.length) {
                    if (this.trainingMode === 'challenge') {
                        this.finalizeTimerForResult({ timedOut: this.timer.timeoutTriggered });
                    } else {
                        this.finalizeTimerForResult();
                    }
                    const restartAction = 'app.restartCurrentPractice()';

                    const totalQ = this.stats.correct + this.stats.incorrect;

                    let completeMsg = '';
                    if (this.practiceMode === 'year' || this.practiceMode === 'category') {
                        completeMsg = `练习完成！ <strong class="text-textMain">${headerTitle}</strong> の ${totalQ} 题が完了しました。<br>答错的题目会自动加入错题复习。`;
                    } else if (this.practiceMode === 'mistake') {
                        completeMsg = `练习完成！ <strong class="text-textMain">[${this.currentLevel}] ${this.currentYear}</strong> の错题复习が完了しました。<br>答对的题目会自动从错题记录中移除。`;
                    } else {
                        completeMsg = `练习完成！ <strong class="text-textMain">${headerTitle}</strong> の ${totalQ} 题が完了しました。`;
                    }
                    const petCompleteMsg = window.N2PracticeFeedback
                        ? window.N2PracticeFeedback.trackSummary({
                            module: 'exam-grammar',
                            subType: 'sort',
                            mode: this.practiceMode,
                            total: totalQ,
                            correct: this.stats.correct,
                            accuracy: totalQ ? this.stats.correct / totalQ : 0
                        })
                        : '';

                    const timerSummaryHtml = this.trainingMode === 'challenge' ? `
                        <div class="max-w-xs mx-auto mb-6 bg-white border-[1.5px] border-borderStrong rounded-lg px-4 py-4 shadow-sm">
                            <div class="text-xs font-bold tracking-widest text-textSub">所要時間</div>
                            <div class="mt-2 text-2xl font-bold text-textMain font-sans">${this.getResultTimerText()}</div>
                            ${this.timer.resultTimeout ? '<p class="mt-3 text-sm font-bold text-accentRed">タイムアップ</p>' : ''}
                        </div>
                    ` : '';

                    const studyTimerSummaryHtml = this.trainingMode === 'study' && this.timer.resultHasRun ? `
                        <div class="max-w-xs mx-auto mb-6 bg-white border-[1.5px] border-borderStrong rounded-lg px-4 py-4 shadow-sm">
                            <div class="text-xs font-bold tracking-widest text-textSub">所用时间</div>
                            <div class="mt-2 text-2xl font-bold text-textMain font-sans">${this.getResultTimerText()}</div>
                        </div>
                    ` : '';

                    const randomSummaryHtml = this.practiceMode === 'random' ? `
                        <div class="max-w-sm mx-auto mb-6 bg-white border-[1.5px] border-borderStrong rounded-lg px-5 py-4 shadow-sm">
                            <div class="grid grid-cols-2 gap-4 text-center">
                                <div>
                                    <div class="text-xs font-bold tracking-widest text-textSub">解答数</div>
                                    <div class="mt-2 text-2xl font-bold text-textMain font-sans">${this.randomRoundTarget}</div>
                                </div>
                                <div>
                                    <div class="text-xs font-bold tracking-widest text-textSub">最大連続正解</div>
                                    <div class="mt-2 text-2xl font-bold text-textMain font-sans">${this.randomBestStreak}</div>
                                </div>
                            </div>
                        </div>
                    ` : '';

                    container.innerHTML = `
                        <div class="text-center bg-white border-[1.5px] border-borderStrong rounded-xl p-8 md:p-12 shadow-sm fade-in relative sketch-box">
                            <div class="w-16 h-16 bg-green-100 border-[1.5px] border-green-600 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                ${getIconSvg('check-circle', 'w-8 h-8')}
                            </div>
                            <div class="lab-result-heading-row mb-6">
                                <h2 class="text-2xl font-bold text-textMain tracking-wide">练习完成</h2>
                            </div>
                            
                            <div class="flex justify-center gap-8 mb-8 border-y-[1.5px] border-dashed border-borderMain py-6 max-w-sm mx-auto">
                                <div class="text-center w-24">
                                    <div class="text-3xl font-bold text-textMain mb-2 font-sans">${this.stats.correct}</div>
                                    <div class="text-xs text-textMain font-bold border border-borderStrong bg-green-50 rounded-md py-1 px-2">正解</div>
                                </div>
                                <div class="text-center w-24">
                                    <div class="text-3xl font-bold text-accentRed mb-2 font-sans">${this.stats.incorrect}</div>
                                    <div class="text-xs text-accentRed font-bold border border-accentRed bg-red-50 rounded-md py-1 px-2">不正解</div>
                                </div>
                            </div>

                            ${timerSummaryHtml}
                            ${studyTimerSummaryHtml}
                            ${randomSummaryHtml}

                            <p class="text-textSub mb-8 text-sm font-bold leading-relaxed">${completeMsg}${petCompleteMsg ? `<br>${petCompleteMsg}` : ''}</p>
                            
                            <div class="flex flex-wrap justify-center gap-3">
                                ${this.trainingMode === 'challenge' ? '<button onclick="app.openChallengeAnalysisView()" class="px-6 py-2.5 bg-white text-textMain border-[1.5px] border-borderStrong rounded-md text-sm font-bold hover:bg-gray-50 transition-all">查看解析</button>' : ''}
                                <button onclick="${restartAction}" class="px-6 py-2.5 bg-textMain text-white border-[1.5px] border-borderStrong rounded-md text-sm font-bold hover:bg-accentRed hover:border-accentRed transition-all">再练一次</button>
                                <button onclick="app.handleBackFromPractice()" class="px-6 py-2.5 bg-white text-textMain border-[1.5px] border-borderStrong rounded-md text-sm font-bold hover:bg-gray-50 transition-all">返回列表</button>
                            </div>
                        </div>
                    `;
                    return;
                }

                const q = this.questionQueue[this.currentIndex];
                container.innerHTML = this.generateQuestionHTML(q, this.currentIndex, this.questionQueue.length);
                this.updateTimerUI();
            },

            // 生成题目的 HTML 模板 (还原水彩笔记截图)
            generateQuestionHTML(q, index, total) {
                // 生成下划线槽位 (虚线)
                let slotsHtml = '';
                for(let i=0; i<4; i++) {
                    if (i === q.starIndex) {
                        slotsHtml += `
                            <button class="sort-slot star-slot focus:outline-none" data-index="${i}">
                                <span class="slot-text"></span>
                                <span class="slot-marker">★</span>
                            </button>
                        `;
                    } else {
                        slotsHtml += `
                            <button class="sort-slot focus:outline-none" data-index="${i}">
                                <span class="slot-text"></span>
                            </button>
                        `;
                    }
                }

                // 生成虚线框选项卡片
                let optionsHtml = '';
                q.options.forEach(opt => {
                    optionsHtml += `
                        <button class="sort-option-btn focus:outline-none" data-id="${opt.id}">
                            <span class="option-letter">${opt.id}</span>
                            <span class="leading-relaxed font-bold text-textMain text-base">${opt.text}</span>
                        </button>
                    `;
                });

                let qLabel = '';
                if (this.practiceMode === 'year') {
                    qLabel = q.label;
                } else if (this.practiceMode === 'category') {
                    qLabel = `[${q.year}] Q${index + 1}`;
                } else if (this.practiceMode === 'mistake') {
                    qLabel = `[${q.year}] ${q.label}`;
                } else if (this.currentLevel === 'ALL') {
                    qLabel = `[${q.level}] Q${index + 1}`;
                } else {
                    qLabel = `Q${index + 1}`;
                }

                return `
                <div class="flex flex-col gap-3 md:gap-4 question-block mb-8 fade-in" data-correct-order="${q.correctOrder.join(',')}" data-star-index="${q.starIndex}">
                    <div class="bg-bgCard border-[1.5px] border-borderStrong rounded-xl shadow-sm relative p-6 md:p-8 sketch-box">
                        <div class="sort-question-top flex items-center justify-between mb-6 border-b border-dashed border-borderMain pb-4">
                            <div class="sort-question-meta flex items-center gap-2 text-textMain">
                                <span class="sort-question-label text-xs font-bold border border-borderStrong rounded-md px-3 py-1">${qLabel}</span>
                                <span class="sort-question-count text-xs font-bold text-textSub">(${index + 1}/${total})</span>
                            </div>
                            <span class="status-badge hidden text-sm font-bold text-accentRed"></span>
                        </div>

                        <div class="sort-sentence text-lg md:text-xl font-serif-jp font-bold text-textMain leading-loose mb-8">
                            ${q.prefix}
                            <span class="inline-flex items-end gap-2 mx-1 align-bottom">
                                ${slotsHtml}
                            </span>
                            ${q.suffix}
                        </div>

                        <div class="sort-options-grid grid grid-cols-1 sm:grid-cols-2 gap-4 font-serif-jp mb-6">
                            ${optionsHtml}
                        </div>

                        <div class="flex justify-end pt-2 action-area">
                            <button class="submit-btn px-6 py-2.5 bg-textMain text-white rounded-md text-sm font-bold disabled:opacity-50 disabled:cursor-not-allowed transition-colors">決定</button>
                        </div>
                    </div>

                    <div class="explanation-area hidden flex-col mt-4 p-6 bg-[#fdfdfd] border-[1.5px] border-[#333] rounded-xl sketch-box">
                        <div class="space-y-6 explanation-stack">
                            <div>
                                <h4 class="explanation-group-title">【正解】</h4>
                                <div class="correct-answer-box">
                                    <div class="correct-answer-line">
                                        ${this.buildCorrectOrderMarkup(q)}
                                    </div>
                                </div>
                            </div>
                            <div>
                                <h4 class="explanation-group-title">【解析】</h4>
                                <div class="explanation-copy">
                                    ${q.explanation}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }
        };

        window.app = app;
        app.init();
        app.updateTimerUI();

        document.getElementById('page-back-btn')?.addEventListener('click', () => app.handleHeaderBack());
        document.getElementById('timer-toolbar-toggle-btn')?.addEventListener('click', () => app.toggleTimerRun());
        document.getElementById('timer-toolbar-reset-btn')?.addEventListener('click', () => app.resetTimer());
        document.getElementById('timer-toolbar-settings-btn')?.addEventListener('click', () => app.toggleTimerDrawer());
        document.getElementById('timer-drawer-close-btn')?.addEventListener('click', () => app.closeTimerDrawer());
        document.getElementById('practice-toolbar-backdrop')?.addEventListener('click', () => app.closeTimerDrawer());
        document.querySelectorAll('[data-timer-mode]').forEach(button => button.addEventListener('click', () => app.setTimerMode(button.dataset.timerMode)));
        document.querySelectorAll('[data-timer-preset]').forEach(button => button.addEventListener('click', () => app.setTimerSelectedMinutes(button.dataset.timerPreset)));
        document.getElementById('timer-custom-input')?.addEventListener('input', (event) => app.setTimerSelectedMinutes(event.target.value));
        document.getElementById('timer-custom-input')?.addEventListener('change', (event) => app.setTimerSelectedMinutes(event.target.value));
        document.getElementById('timer-drawer-start-btn')?.addEventListener('click', () => app.startTimer());
        document.getElementById('timer-drawer-pause-btn')?.addEventListener('click', () => app.pauseTimer());
        document.getElementById('timer-drawer-reset-btn')?.addEventListener('click', () => app.resetTimer());
        document.getElementById('timer-hide-btn')?.addEventListener('click', () => app.toggleTimerDisplayVisibility());
        document.getElementById('random-toolbar-end-btn')?.addEventListener('click', () => app.finishRandomRound());
        document.querySelectorAll('[data-training-mode]').forEach(button => button.addEventListener('click', () => app.setTrainingPickerMode(button.dataset.trainingMode)));
        document.querySelectorAll('[data-training-minutes]').forEach(button => button.addEventListener('click', () => app.setTrainingPickerMinutes(button.dataset.trainingMinutes)));
        document.querySelectorAll('[data-training-random-target]').forEach(button => button.addEventListener('click', () => app.setRandomTargetCount(button.dataset.trainingRandomTarget)));
        document.getElementById('training-mode-custom-input')?.addEventListener('input', (event) => app.setTrainingPickerMinutes(event.target.value));
        document.getElementById('training-mode-custom-input')?.addEventListener('change', (event) => app.setTrainingPickerMinutes(event.target.value));
        document.getElementById('training-mode-cancel-btn')?.addEventListener('click', () => app.closeTrainingModePicker());
        document.getElementById('training-mode-confirm-btn')?.addEventListener('click', () => app.confirmTrainingModePicker());
        document.getElementById('training-mode-overlay')?.addEventListener('click', (event) => { if (event.target && event.target.id === 'training-mode-overlay') app.closeTrainingModePicker(); });
        document.getElementById('category-list-container')?.addEventListener('click', (event) => {
            const button = event.target.closest('[data-category-id]');
            if (button) app.handleCategoryCardClick(button.dataset.categoryId);
        });
        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && app.timer.drawerOpen) app.closeTimerDrawer();
            if (event.key === 'Escape' && app.trainingPicker.open) app.closeTrainingModePicker();
        });

        // 全局事件委托 (处理填空与交互)
        document.addEventListener('click', (e) => {
            const block = e.target.closest('.question-block');
            if (!block) return;

            const nextQuestionBtn = e.target.closest('.next-question-btn');
            if (nextQuestionBtn) {
                app.currentIndex++;
                app.renderPracticeQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            const slots = Array.from(block.querySelectorAll('.sort-slot'));
            const options = Array.from(block.querySelectorAll('.sort-option-btn'));
            const submitBtn = block.querySelector('.submit-btn');
            if(!submitBtn) return; 

            // 点击选项 -> 填入横线
            const optBtn = e.target.closest('.sort-option-btn');
            if (optBtn && !optBtn.classList.contains('option-used') && submitBtn.textContent === '決定') {
                const val = optBtn.dataset.id;
                const emptySlot = slots.find(s => !s.dataset.val);
                if (emptySlot) {
                    emptySlot.dataset.val = val;
                    emptySlot.querySelector('.slot-text').textContent = val;
                    emptySlot.classList.add(emptySlot.classList.contains('star-slot') ? 'slot-star-filled' : 'slot-filled');
                    optBtn.classList.add('option-used');
                    submitBtn.disabled = !slots.every(slot => slot.dataset.val);
                }
                return;
            }

            // 点击横线 -> 取消填入
            const slotBtn = e.target.closest('.sort-slot');
            if (slotBtn && slotBtn.dataset.val && submitBtn.textContent === '決定') {
                const val = slotBtn.dataset.val;
                slotBtn.removeAttribute('data-val');
                slotBtn.querySelector('.slot-text').textContent = '';
                slotBtn.classList.remove('slot-filled', 'slot-star-filled');
                
                const targetOpt = options.find(o => String(o.dataset.id) === String(val));
                if (targetOpt) targetOpt.classList.remove('option-used');
                submitBtn.disabled = true;
                return;
            }

            // 点击提交按钮
            if (e.target === submitBtn) {
                const currentOrder = slots.map(slot => String(slot.dataset.val));
                const correctOrder = block.dataset.correctOrder.split(',');
                const starIndex = parseInt(block.dataset.starIndex);
                const isStarCorrect = currentOrder[starIndex] === correctOrder[starIndex];
                const isAllCorrect = currentOrder.join(',') === correctOrder.join(',');

                const currentQuestion = app.questionQueue[app.currentIndex];

                if (isStarCorrect) app.stats.correct++;
                else app.stats.incorrect++;

                if (app.practiceMode === 'year' || app.practiceMode === 'mistake' || app.practiceMode === 'category') {
                    const mistakeYear = app.practiceMode === 'category' ? currentQuestion.year : app.currentYear;
                    let yearMistakes = getYearMistakes(app.currentLevel, mistakeYear);
                    if (!isAllCorrect) {
                        if (!yearMistakes.includes(currentQuestion.id)) {
                            yearMistakes.push(currentQuestion.id);
                            saveYearMistakes(app.currentLevel, mistakeYear, yearMistakes);
                        }
                    } else {
                        yearMistakes = yearMistakes.filter(id => id !== currentQuestion.id);
                        saveYearMistakes(app.currentLevel, mistakeYear, yearMistakes);
                    }
                }

                app.updateRandomProgressAfterAnswer(isStarCorrect);
                const answeredCount = app.stats.correct + app.stats.incorrect;

                if (window.N2PracticeFeedback) {
                    window.N2PracticeFeedback.trackAnswer({
                        module: 'exam-grammar',
                        subType: 'sort',
                        mode: app.practiceMode,
                        isCorrect: isStarCorrect,
                        questionId: currentQuestion && currentQuestion.id,
                        questionIndex: app.currentIndex + 1,
                        questionCount: app.questionQueue.length,
                        accuracy: answeredCount > 0 ? app.stats.correct / answeredCount : 0
                    });
                }

                const statusBadge = block.querySelector('.status-badge');
                if (isAllCorrect) {
                    statusBadge.classList.remove('hidden');
                    statusBadge.textContent = '正解';
                    statusBadge.className = 'status-badge text-sm font-bold text-[#10B981]';
                    slots.forEach(slot => slot.classList.add('judged-correct'));
                } else if (isStarCorrect) {
                    statusBadge.classList.remove('hidden');
                    statusBadge.textContent = '差点';
                    statusBadge.className = 'status-badge text-sm font-bold text-accentRed';
                    slots.forEach((slot, idx) => {
                        if (currentOrder[idx] === correctOrder[idx]) {
                            slot.classList.add('judged-correct');
                        } else {
                            slot.classList.add('judged-wrong');
                        }
                    });
                } else {
                    statusBadge.classList.remove('hidden');
                    statusBadge.textContent = '不正解';
                    statusBadge.className = 'status-badge text-sm font-bold text-accentRed';
                    slots.forEach((slot, idx) => {
                        if (currentOrder[idx] === correctOrder[idx]) {
                            slot.classList.add('judged-correct');
                        } else {
                            slot.classList.add('judged-wrong');
                        }
                    });
                }
                
                const explanationArea = block.querySelector('.explanation-area');
                if (explanationArea && app.trainingMode !== 'challenge') {
                    explanationArea.classList.remove('hidden');
                    explanationArea.classList.add('flex', 'fade-in');
                }

                const actionArea = block.querySelector('.action-area');
                const hasReachedRandomTarget = app.practiceMode === 'random' && app.randomAnsweredCount >= app.randomRoundTarget;
                const hasReachedFinalQuestion = app.currentIndex >= app.questionQueue.length - 1;
                const shouldOpenSummaryNext = hasReachedRandomTarget || hasReachedFinalQuestion;
                const nextLabel = shouldOpenSummaryNext ? '查看结果' : '下一题';
                
                actionArea.innerHTML = `<button class="next-question-btn bg-textMain text-white px-6 py-2.5 rounded-md text-sm font-bold transition-all hover:bg-opacity-80">${nextLabel}</button>`;
                app.updateTimerUI();
                return;
            }
        });
    </script>
</body>
</html>
