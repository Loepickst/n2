<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语法思维图 - Try! N2</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标库 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 引入日文字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0f0eb;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #2c2c2a;
        }
        .font-serif-jp {
            font-family: 'Noto Serif JP', serif;
        }

        /* 语法高亮样式 */
        .grammar-highlight {
            color: #8a3324;
            font-weight: bold;
            background-color: rgba(138, 51, 36, 0.08);
            padding: 0 4px;
            border-radius: 4px;
            border-bottom: 2px solid rgba(138, 51, 36, 0.3);
        }



        .practice-blank {
            display: inline-block;
            width: clamp(4rem, 12vw, 7rem);
            height: 0.9em;
            border-bottom: 0.08em solid currentColor;
            vertical-align: -0.05em;
            margin: 0 0.16em;
        }

        .challenge-timer {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.18rem 0.55rem;
            border-radius: 999px;
            color: #b42318;
            background: #fff1e8;
            border: 1px solid rgba(180, 35, 24, 0.26);
            box-shadow: 0 4px 12px rgba(180, 35, 24, 0.12);
        }

        .challenge-timer.is-urgent {
            color: #ffffff;
            background: #b42318;
            border-color: #b42318;
            box-shadow: 0 6px 18px rgba(180, 35, 24, 0.28);
            animation: challenge-timer-pulse 0.9s ease-in-out infinite;
        }

        @keyframes challenge-timer-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        /* 卡片翻转3D效果 */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        
        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 思维导图核心树状连线样式 */
        .mindmap-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.875rem;
        }
        .mindmap-row:last-child { margin-bottom: 0; }
        @media (min-width: 640px) { .mindmap-row { margin-bottom: 1.25rem; } }
        
        .mindmap-root-wrapper {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            margin-top: 0.25rem;
        }
        @media (min-width: 640px) { .mindmap-root-wrapper { margin-top: 0.5rem; } }
        .mindmap-root-wrapper--flush { margin-top: 0; }
        
        .mindmap-connector-main {
            width: 0.75rem;
            height: 2px;
            background-color: #d4d4d0;
            flex-shrink: 0;
        }
        @media (min-width: 640px) { .mindmap-connector-main { width: 1.5rem; } }
        
        .mindmap-children {
            --mindmap-line-top: 0px;
            --mindmap-line-bottom: 0px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
            padding: 0;
            gap: 0.5rem;
        }
        @media (min-width: 640px) { .mindmap-children { gap: 0.875rem; } }
        
        .mindmap-children::before {
            content: '';
            position: absolute;
            left: 0;
            top: var(--mindmap-line-top);
            width: 2px;
            height: calc(var(--mindmap-line-bottom) - var(--mindmap-line-top));
            background-color: #d4d4d0;
            transition: top 0.3s ease, height 0.3s ease;
        }
        .mindmap-children.single-child::before { display: none; }
        .mindmap-children--category-leaves.single-child::before { display: block; }
        
        .mindmap-node-wrapper {
            display: flex;
            align-items: center;
            position: relative;
            padding-left: 0.75rem;
            min-height: 40px;
        }
        @media (min-width: 640px) {
            .mindmap-node-wrapper {
                padding-left: 1.5rem;
                min-height: 52px;
            }
        }
        
        .mindmap-node-wrapper::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 0.75rem;
            height: 2px;
            background-color: #d4d4d0;
            transition: all 0.3s ease;
        }
        @media (min-width: 640px) { .mindmap-node-wrapper::before { width: 1.5rem; } }
        .mindmap-node-wrapper:hover::before { background-color: #8a3324; }

        .mindmap-branch-wrapper {
            --mindmap-branch-anchor-y: 16px;
            display: flex;
            align-items: flex-start;
            position: relative;
            padding-left: 0.75rem;
            min-height: 40px;
        }
        @media (min-width: 640px) {
            .mindmap-branch-wrapper {
                padding-left: 1.5rem;
                min-height: 52px;
            }
        }
        
        .mindmap-branch-wrapper::before {
            content: '';
            position: absolute;
            left: 0;
            top: var(--mindmap-branch-anchor-y);
            transform: translateY(-50%);
            width: 0.75rem;
            height: 2px;
            background-color: #d4d4d0;
            transition: all 0.3s ease;
        }
        @media (min-width: 640px) {
            .mindmap-branch-wrapper {
                --mindmap-branch-anchor-y: 20px;
            }
            .mindmap-branch-wrapper::before { width: 1.5rem; }
        }
        .mindmap-branch-wrapper:hover::before { background-color: #8a3324; }
        .mindmap-branch-anchor {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }
        .mindmap-branch-anchor-target {
            transform: translateY(6px);
        }
        @media (min-width: 640px) {
            .mindmap-branch-anchor-target {
                transform: translateY(7px);
            }
        }

        .mindmap-leaf-title {
            display: block;
            white-space: normal;
            overflow: hidden;
            line-height: 1.3;
            word-break: break-word;
        }
        .mindmap-leaf-meaning {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media (min-width: 640px) {
            .mindmap-leaf-title {
                white-space: nowrap;
                text-overflow: ellipsis;
            }
        }
        #flashcard-intro-inner {
            width: 100%;
        }
        @media (max-width: 639px) {
            #flashcard-intro {
                padding-top: 0.5rem;
                padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
                overscroll-behavior-y: contain;
            }
            #flashcard-intro-inner {
                min-height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            #flashcard-tag-filters {
                position: sticky;
                bottom: calc(env(safe-area-inset-bottom, 0px) + 0.35rem);
                z-index: 2;
                width: 100%;
                margin-top: 0.85rem;
                padding: 0.55rem 1rem calc(env(safe-area-inset-bottom, 0px) + 0.15rem);
                background: linear-gradient(180deg, rgba(240, 240, 235, 0) 0%, rgba(240, 240, 235, 0.7) 26%, rgba(240, 240, 235, 0.95) 56%, rgba(240, 240, 235, 1) 100%);
            }
            #flashcard-main {
                padding-bottom: calc(4.75rem + env(safe-area-inset-bottom, 0px));
                overscroll-behavior: contain;
            }
            #flashcard-swipe-surface {
                touch-action: pan-y pinch-zoom;
                overscroll-behavior-x: contain;
                -webkit-user-select: none;
                user-select: none;
            }
        }
    </style>
</head>
<body class="bg-[#f0f0eb] text-[#2c2c2a] font-sans h-screen flex flex-col overflow-hidden">

    <!-- 顶部导航栏 -->
    <header class="pt-5 pb-1 sm:pt-5 sm:pb-2 flex-shrink-0 relative z-30 isolate">
        <div class="max-w-6xl mx-auto px-3 sm:px-4">
            <div class="flex items-center justify-between gap-2 sm:gap-4 min-h-[44px]">
                <div class="min-w-0 flex items-center justify-start">
                    <a href="../daily/search/index.html" class="inline-flex min-h-[40px] sm:min-h-[44px] items-center gap-1.5 rounded-lg border border-[#d4d4d0] bg-[#f9f8f6] px-2.5 py-2 sm:px-4 text-[10px] sm:text-sm font-bold text-[#6f6f6a] shadow-sm transition-colors hover:bg-[#e5e5e0] hover:text-[#2c2c2a] whitespace-nowrap" data-back-nav>
                        <i class="fa-solid fa-arrow-left text-[10px] sm:text-xs"></i>
                        <span>返回搜索</span>
                    </a>
                </div>

                <div class="min-w-0 flex items-center justify-end">
                    <div class="bg-[#e5e5e0] p-1 rounded-xl inline-flex items-center min-h-[40px] sm:min-h-[44px] relative shadow-inner">
                        <button id="tab-directory" class="h-8 sm:h-9 px-3 sm:px-4 rounded-lg font-bold text-xs sm:text-sm transition-all bg-[#2c2c2a] text-white shadow-sm whitespace-nowrap" onclick="switchMainTab('directory')">
                            <i class="fa-solid fa-diagram-project mr-1"></i> 导图
                        </button>
                        <button id="tab-flashcard" class="h-8 sm:h-9 px-3 sm:px-4 rounded-lg font-bold text-xs sm:text-sm transition-all text-[#8a8a85] hover:text-[#2c2c2a] hover:bg-[#d4d4d0] whitespace-nowrap" onclick="switchMainTab('flashcard')">
                            <i class="fa-solid fa-clone mr-1"></i> 自检
                        </button>
                        <button id="tab-practice" class="h-8 sm:h-9 px-3 sm:px-4 rounded-lg font-bold text-xs sm:text-sm transition-all text-[#8a8a85] hover:text-[#2c2c2a] hover:bg-[#d4d4d0] whitespace-nowrap" onclick="switchMainTab('practice')">
                            <i class="fa-solid fa-pen-to-square mr-1"></i> 练习
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-2 sm:mt-3">
                <div class="h-px bg-gradient-to-r from-transparent via-[#d6d6d0] to-transparent opacity-80"></div>
            </div>


            <div id="scope-filter-shell" class="mt-2.5 sm:mt-3.5">
                <div class="bg-[#f9f8f6] border border-[#e5e5e0] rounded-2xl shadow-sm overflow-hidden">
                    <button id="scope-filter-toggle" type="button" onclick="toggleScopeFilter()" class="w-full px-4 py-3 sm:px-5 sm:py-3.5 flex items-center justify-between text-left text-sm sm:text-base font-bold text-[#2c2c2a] hover:bg-[#efefe9] transition-colors">
                        <span>书籍与课程</span>
                        <i id="scope-filter-chevron" class="fa-solid fa-chevron-down text-xs text-[#8a8a85] transition-transform duration-300"></i>
                    </button>
                    <div id="scope-filter-panel" class="hidden px-4 pb-4 sm:px-5 sm:pb-5">
                        <div id="scope-filter-books" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <div id="grammar-search-shell" class="mt-2.5 sm:mt-3.5 relative z-40 isolate">
                <div class="bg-[#f9f8f6] border border-[#e5e5e0] rounded-2xl shadow-sm relative">
                    <div class="px-4 py-3 sm:px-5 sm:py-3.5">
                        <div class="flex items-center gap-2 sm:gap-3">
                            <i class="fa-solid fa-magnifying-glass text-xs sm:text-sm text-[#8a8a85]"></i>
                            <input id="grammar-search-input" type="search" placeholder="搜索语法 / 假名 / 中文义项" class="flex-1 bg-transparent border-0 outline-none text-sm sm:text-base text-[#2c2c2a] placeholder:text-[#b1b1ab]">
                            <button id="grammar-search-clear" type="button" class="hidden text-[10px] sm:text-xs bg-white hover:bg-[#e5e5e0] text-[#8a8a85] hover:text-[#2c2c2a] font-bold px-2 py-1 sm:px-3 sm:py-1.5 rounded-md sm:rounded-lg border border-[#d4d4d0] shadow-sm transition-all">
                                清空
                            </button>
                        </div>
                    </div>
                    <div id="grammar-search-results" class="hidden absolute left-0 right-0 top-full z-50 mt-1 sm:mt-1.5 max-h-[40vh] sm:max-h-80 overflow-y-auto overscroll-contain rounded-2xl border border-[#e5e5e0] bg-white shadow-2xl"></div>
                </div>
            </div>


            <div id="directory-grouping-controls" class="mt-2 sm:mt-3 flex justify-start sm:justify-center">
                <div class="inline-flex bg-[#f9f8f6] border border-[#e5e5e0] rounded-full p-1 shadow-sm">
                        <button id="btn-group-lesson" class="px-4 py-1.5 sm:px-5 sm:py-1.5 rounded-full font-bold text-xs sm:text-sm transition-all bg-[#2c2c2a] text-white shadow-sm" onclick="setGrouping('lesson')">
                            <i class="fa-solid fa-book-open mr-1 opacity-70"></i> 按课本
                        </button>
                        <button id="btn-group-category" class="px-4 py-1.5 sm:px-5 sm:py-1.5 rounded-full font-bold text-xs sm:text-sm transition-all text-[#8a8a85] hover:text-[#2c2c2a] hover:bg-[#e5e5e0]" onclick="setGrouping('category')">
                            <i class="fa-solid fa-layer-group mr-1 opacity-70"></i> 按用法
                        </button>
                        <button id="btn-group-special" class="px-4 py-1.5 sm:px-5 sm:py-1.5 rounded-full font-bold text-xs sm:text-sm transition-all text-[#8a8a85] hover:text-[#2c2c2a] hover:bg-[#e5e5e0]" onclick="setGrouping('special')">
                            <i class="fa-solid fa-puzzle-piece mr-1 opacity-70"></i> 特殊分类
                        </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="flex-1 overflow-y-auto no-scrollbar relative z-0">
        <div class="max-w-6xl mx-auto px-3 sm:px-4 py-1 sm:py-4 h-full">

            <!-- 视图1: 语法目录/思维导图 -->
            <div id="view-directory" class="h-full flex flex-col">
                <!-- 导图容器 (已加入边框样式) -->
                <div id="directory-mindmap-shell" class="overflow-x-auto pb-12 pt-1 sm:pt-3 px-0.5 sm:px-1">
                    <div class="bg-[#f9f8f6] border border-[#e5e5e0] rounded-2xl shadow-sm p-3.5 sm:p-8 min-w-max w-full">
                        <div id="directory-container" class="flex flex-col pr-2 sm:pr-8">
                            <!-- 动态渲染的树状结构将插入这里 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 视图2: 自检卡片 -->
            <div id="view-flashcard" class="hidden h-full relative">
                
                <!-- 导入页 (模式选择) -->
                <div id="flashcard-intro" class="absolute inset-0 flex flex-col items-center justify-start sm:justify-center bg-[#f0f0eb] z-10 overflow-y-auto pt-3 pb-8 sm:py-8">
                    <div id="flashcard-intro-inner" class="w-full flex flex-col items-center sm:-translate-y-10">
                        <div class="mb-3 sm:mb-8 px-4 mt-0">
                            <div class="flex items-center justify-center gap-3 sm:flex-col sm:gap-0">
                                <div class="w-10 h-10 sm:w-16 sm:h-16 bg-[#e5e5e0] text-[#2c2c2a] rounded-full flex items-center justify-center shrink-0 shadow-sm mb-0 sm:mb-4">
                                    <i class="fa-solid fa-graduation-cap text-lg sm:text-3xl"></i>
                                </div>
                                <h2 class="text-xl sm:text-3xl font-extrabold text-[#2c2c2a] tracking-wide mb-0 sm:mb-2 font-serif-jp">请选择自检模式</h2>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-6 w-full max-w-3xl px-4 sm:px-6">
                            <!-- 模式1: 含义 -> 语法 -->
                            <button id="flashcard-mode-meaning" onclick="startFlashcard('meaning-to-grammar')" class="bg-[#f9f8f6] border border-[#e5e5e0] hover:border-[#2c2c2a] hover:shadow-lg transition-all rounded-2xl p-5 sm:p-8 text-left group flex flex-col h-full relative overflow-hidden">
                                <div class="absolute -right-4 -top-4 text-[#e5e5e0] opacity-30 group-hover:opacity-60 transition-opacity">
                                    <i class="fa-solid fa-language text-8xl"></i>
                                </div>
                                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-[#2c2c2a] text-white rounded-xl flex items-center justify-center mb-3 sm:mb-5 relative z-10">
                                    <i class="fa-solid fa-spell-check text-lg sm:text-xl"></i>
                                </div>
                                <h3 class="text-[1.05rem] sm:text-xl font-bold text-[#2c2c2a] mb-1.5 sm:mb-3 relative z-10 group-hover:text-[#8a3324] transition-colors">看含义 → 想语法</h3>
                                <p class="text-xs sm:text-sm text-[#555552] leading-relaxed relative z-10">正面显示中文含义、首假名和特征，来回想对应日语语法条目。</p>
                            </button>

                            <!-- 模式2: 语法 -> 含义 -->
                            <button id="flashcard-mode-grammar" onclick="startFlashcard('grammar-to-meaning')" class="bg-[#f9f8f6] border border-[#e5e5e0] hover:border-[#2c2c2a] hover:shadow-lg transition-all rounded-2xl p-5 sm:p-8 text-left group flex flex-col h-full relative overflow-hidden">
                                <div class="absolute -right-4 -top-4 text-[#e5e5e0] opacity-30 group-hover:opacity-60 transition-opacity">
                                    <i class="fa-solid fa-book-open-reader text-8xl"></i>
                                </div>
                                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-[#2c2c2a] text-white rounded-xl flex items-center justify-center mb-3 sm:mb-5 relative z-10">
                                    <i class="fa-solid fa-lightbulb text-lg sm:text-xl"></i>
                                </div>
                                <h3 class="text-[1.05rem] sm:text-xl font-bold text-[#2c2c2a] mb-1.5 sm:mb-3 relative z-10 group-hover:text-[#8a3324] transition-colors">看语法 → 想含义与接续</h3>
                                <p class="text-xs sm:text-sm text-[#555552] leading-relaxed relative z-10">正面显示日语语法条目，来回想它的中文意思，用法和接续方式。</p>
                            </button>
                        </div>
                        <div id="flashcard-tag-filters" class="mt-3 sm:mt-6 flex flex-wrap items-center justify-center gap-2 px-4 sm:px-6"></div>
                    </div>
                </div>

                <!-- 自检卡片主区域 (卡片已整体加大) -->
                <div id="flashcard-main" class="hidden w-full h-full flex-col items-center justify-center pb-10 sm:pb-16 pt-4 sm:pt-0 relative">
                    <!-- 返回选单按钮 -->
                    <button onclick="resetFlashcardMode()" class="absolute top-0 sm:top-2 left-2 sm:left-4 px-3 py-1.5 sm:px-4 sm:py-2 text-[10px] sm:text-sm font-bold text-[#8a8a85] hover:text-[#2c2c2a] hover:bg-[#e5e5e0] rounded-md transition-colors flex items-center gap-1.5 z-10">
                        <i class="fa-solid fa-arrow-left"></i> 返回选单
                    </button>

                    <div id="flashcard-swipe-surface" class="w-full max-w-[23rem] sm:max-w-xl perspective-1000 h-[27.5rem] sm:h-[37rem] mb-5 sm:mb-8 cursor-pointer px-3 sm:px-0 mt-2 sm:mt-0" onclick="flipCard()">
                        <div id="flashcard-inner" class="w-full h-full relative transform-style-3d flip-card-inner rounded-xl shadow-md border border-[#e5e5e0]">
                            
                            <!-- 卡片正面 (提问) -->
                            <div class="absolute w-full h-full backface-hidden bg-[#f9f8f6] rounded-xl flex flex-col items-center justify-center p-5 sm:p-8 text-center transition-colors">
                                
                                <div id="card-front-kana-container" class="hidden w-10 h-10 sm:w-12 sm:h-12 bg-[#2c2c2a] text-white rounded-md flex items-center justify-center mb-4 sm:mb-6 shadow-sm">
                                    <span id="card-front-kana" class="text-lg sm:text-xl font-bold font-serif-jp">?</span>
                                </div>
                                
                                <span id="card-front-header-text" class="text-[#8a8a85] font-bold mb-2 sm:mb-3 text-[10px] sm:text-xs tracking-widest border border-[#d4d4d0] px-3 py-1 rounded-full uppercase"><i class="fa-solid fa-mouse-pointer mr-1"></i>请思考这句中文对应的语法</span>
                                
                                <h2 id="card-front-text" class="text-lg sm:text-2xl font-bold text-[#2c2c2a] leading-relaxed px-2 sm:px-4 mt-2 sm:mt-4">正在逐渐...</h2>
                                
                                <!-- 简易使用特征 -->
                                <div id="card-front-keyword" class="mt-4 sm:mt-6 px-3 py-1 sm:px-4 sm:py-1.5 bg-[#e5e5e0] text-[#555552] rounded text-[10px] sm:text-xs font-bold">
                                    特征
                                </div>
                            </div>
                            
                            <!-- 卡片背面 (答案) -->
                            <div class="absolute w-full h-full backface-hidden bg-[#f9f8f6] rounded-xl flex flex-col items-center justify-start p-6 sm:p-8 text-left rotate-y-180 overflow-y-auto no-scrollbar">
                                <div class="w-full border-b border-[#e5e5e0] pb-3 sm:pb-4 mb-4 sm:mb-5 text-center shrink-0">
                                    <span id="card-back-header-text" class="text-[#8a8a85] font-bold mb-2 text-[10px] sm:text-xs tracking-widest uppercase block">Target Grammar</span>
                                    <h2 id="card-back-title" class="text-2xl sm:text-3xl font-extrabold text-[#2c2c2a] font-serif-jp px-2">～つつある</h2>
                                </div>
                                
                                <div class="w-full flex-1 overflow-y-auto no-scrollbar">
                                    <!-- 动态渲染接续/意思等区块 -->
                                    <div id="card-back-content-area" class="space-y-4 sm:space-y-5"></div>
                                </div>
                                <div class="w-full border-t border-[#e5e5e0] pt-4 mt-4 shrink-0">
                                    <div id="card-back-tag-actions" class="flex items-center justify-center gap-2" onclick="event.stopPropagation()"></div>
                                </div>

                            </div>

                        </div>

        function getLessonNumber(lesson) {
            const match = lesson.match(/\d+/);
            return match ? Number(match[0]) : Number.MAX_SAFE_INTEGER;
        }

        function sortLessonLabels(lessons) {
            return [...lessons].sort((a, b) => getLessonNumber(a) - getLessonNumber(b) || a.localeCompare(b, 'zh-CN'));

        function getGrammarById(id) {
            return grammarData.find(grammar => grammar.id === id) || null;

        const BOOK_LESSON_OPTIONS = BOOK_ORDER.reduce((acc, book) => {
            const lessons = sortLessonLabels([...new Set(grammarData.filter(item => item.book === book).map(item => item.lesson))]);
            acc[book] = lessons;
            return acc;
        }, {});

        function createDefaultSelectedLessonsByBook() {
            return BOOK_ORDER.reduce((acc, book) => {
                acc[book] = new Set(BOOK_LESSON_OPTIONS[book] || []);
                return acc;
            }, {});
        }

        function createDefaultExpandedBookFilters() {
            return BOOK_ORDER.reduce((acc, book) => {
                acc[book] = false;
                return acc;
            }, {});

        function serializeSelectedLessonsByBook() {
            return BOOK_ORDER.reduce((acc, book) => {
                acc[book] = [...(selectedLessonsByBook[book] || new Set())];
                return acc;
            }, {});
        }

        function deserializeSelectedLessonsByBook(raw = {}) {
            return BOOK_ORDER.reduce((acc, book) => {
                const validLessons = new Set(BOOK_LESSON_OPTIONS[book] || []);
                const values = Array.isArray(raw[book]) ? raw[book].filter(label => validLessons.has(label)) : [];
                acc[book] = new Set(values.length ? values : BOOK_LESSON_OPTIONS[book] || []);
                return acc;
            }, {});
        }

        function sanitizeSelectedBooks(rawBooks) {
            const validBooks = new Set(BOOK_ORDER);

        }

        function isValidFlashcardTag(value) {

        function sanitizeFlashcardTagsById(raw) {
            if (!raw || typeof raw !== 'object') return {};
            const validIds = new Set(grammarData.map(item => String(item.id)));
            const next = {};
            Object.entries(raw).forEach(([id, tag]) => {
                if (!validIds.has(String(id))) return;
                if (!isValidFlashcardTag(tag) || tag === 'untagged') return;
                next[id] = tag;
            });
            return next;
        }

            return [...new Set(raw.map(id => String(id)).filter(id => validIds.has(id)))];
        }

        function sanitizeWrongPracticeQuestionRecords(raw, legacyIds = []) {
            const validIds = new Set(practiceQuestionData.map(question => String(question.id)));
            const records = {};
            if (raw && typeof raw === 'object' && !Array.isArray(raw)) {
                Object.entries(raw).forEach(([id, record]) => {
                    const key = String(id);
                    if (!validIds.has(key)) return;
                    const data = record && typeof record === 'object' ? record : {};
                    records[key] = {
                        id: key,
                        wrongCount: Math.max(1, Number.parseInt(data.wrongCount, 10) || 1),
                        lastSelectedIndex: Number.isInteger(data.lastSelectedIndex) ? data.lastSelectedIndex : null,
                        status: data.status || 'wrong',
                        updatedAt: data.updatedAt || Date.now()
                    };
                });
            }
            sanitizeWrongPracticeQuestionIds(legacyIds).forEach(id => {
                if (!records[id]) {
                    records[id] = {
                        id,
                        wrongCount: 1,
                        lastSelectedIndex: null,
                        status: 'wrong',
                        updatedAt: Date.now()
                    };
                }
            });
            return records;

        function shuffleArray(items) {
            const next = [...items];
            for (let index = next.length - 1; index > 0; index -= 1) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [next[index], next[swapIndex]] = [next[swapIndex], next[index]];
            }
            return next;
        }

        function handleFlashcardTouchStart(event) {
            if (!isFlashcardSwipeEnabled || event.touches.length !== 1) return;
            clearFlashcardAutoAdvanceTimer();
            const touch = event.touches[0];
            flashcardSwipeState = {
                startX: touch.clientX,
                startY: touch.clientY,
                lastX: touch.clientX,
                lastY: touch.clientY,
                isHorizontal: false
            };
        }

        function handleFlashcardTouchMove(event) {
            if (!isFlashcardSwipeEnabled || !flashcardSwipeState || event.touches.length !== 1) return;
            const touch = event.touches[0];
            const deltaX = touch.clientX - flashcardSwipeState.startX;
            const deltaY = touch.clientY - flashcardSwipeState.startY;
            flashcardSwipeState.lastX = touch.clientX;
            flashcardSwipeState.lastY = touch.clientY;

            if (!flashcardSwipeState.isHorizontal) {
                if (Math.abs(deltaX) < FLASHCARD_SWIPE_LOCK_THRESHOLD) return;
                if (Math.abs(deltaX) <= Math.abs(deltaY) * 1.15) return;
                flashcardSwipeState.isHorizontal = true;
            }

            if (flashcardSwipeState.isHorizontal) {
                event.preventDefault();
            }
        }

        function handleFlashcardTouchEnd() {
            if (!isFlashcardSwipeEnabled || !flashcardSwipeState) return;
            const { startX, startY, lastX, lastY, isHorizontal } = flashcardSwipeState;
            resetFlashcardSwipeState();
            if (!isHorizontal) return;

            const deltaX = lastX - startX;
            const deltaY = lastY - startY;
            if (Math.abs(deltaX) < FLASHCARD_SWIPE_THRESHOLD || Math.abs(deltaX) <= Math.abs(deltaY) * 1.2) return;

            suppressNextFlipTemporarily();
            if (deltaX < 0) nextCard();
            else prevCard();
        }

        function handleFlashcardTouchCancel() {
            resetFlashcardSwipeState();
        }

        function initializeFlashcardSwipe() {
            const swipeSurface = document.getElementById('flashcard-swipe-surface');
            if (!swipeSurface || hasInitializedFlashcardSwipe) return;

            swipeSurface.addEventListener('touchstart', handleFlashcardTouchStart, { passive: true });
            swipeSurface.addEventListener('touchmove', handleFlashcardTouchMove, { passive: false });
            swipeSurface.addEventListener('touchend', handleFlashcardTouchEnd, { passive: false });
            swipeSurface.addEventListener('touchcancel', handleFlashcardTouchCancel, { passive: true });
            hasInitializedFlashcardSwipe = true;
        }

        function enableFlashcardSwipe() {
            initializeFlashcardSwipe();
            isFlashcardSwipeEnabled = true;
            resetFlashcardSwipeState();
            clearFlashcardFlipSuppressTimer();
            suppressNextFlipClick = false;
        }

        function disableFlashcardSwipe() {
            isFlashcardSwipeEnabled = false;
            resetFlashcardSwipeState();
            clearFlashcardFlipSuppressTimer();
            suppressNextFlipClick = false;
        }

        function normalizeSearchText(value) {
            return String(value || '')
                .normalize('NFKC')
                .toLowerCase()
                .replace(/[～〜・/／\s]+/g, '')
                .replace(/[()（）\[\]【】「」『』、，。．…:：;；!！?？'"“”‘’＿_\-]/g, '');
        }

        function getBookOrderIndex(book) {
            const index = BOOK_ORDER.indexOf(book);
            return index === -1 ? BOOK_ORDER.length : index;
        }

        function toHiragana(value) {
            return String(value || '').replace(/[\u30a1-\u30f6]/g, char => String.fromCharCode(char.charCodeAt(0) - 0x60));
        }

        function extractKanaFromText(value) {
            return toHiragana(value).replace(/[^ぁ-ゖゔー]/g, '');
        }

        const ROMAJI_DIGRAPHS = {
            'きゃ': 'kya', 'きゅ': 'kyu', 'きょ': 'kyo',
            'しゃ': 'sha', 'しゅ': 'shu', 'しょ': 'sho',
            'ちゃ': 'cha', 'ちゅ': 'chu', 'ちょ': 'cho',
            'にゃ': 'nya', 'にゅ': 'nyu', 'にょ': 'nyo',
            'ひゃ': 'hya', 'ひゅ': 'hyu', 'ひょ': 'hyo',
            'みゃ': 'mya', 'みゅ': 'myu', 'みょ': 'myo',
            'りゃ': 'rya', 'りゅ': 'ryu', 'りょ': 'ryo',
            'ぎゃ': 'gya', 'ぎゅ': 'gyu', 'ぎょ': 'gyo',
            'じゃ': 'ja', 'じゅ': 'ju', 'じょ': 'jo',
            'びゃ': 'bya', 'びゅ': 'byu', 'びょ': 'byo',
            'ぴゃ': 'pya', 'ぴゅ': 'pyu', 'ぴょ': 'pyo'
        };

        const ROMAJI_MONOGRAPHS = {
            'あ': 'a', 'い': 'i', 'う': 'u', 'え': 'e', 'お': 'o',
            'か': 'ka', 'き': 'ki', 'く': 'ku', 'け': 'ke', 'こ': 'ko',
            'さ': 'sa', 'し': 'shi', 'す': 'su', 'せ': 'se', 'そ': 'so',
            'た': 'ta', 'ち': 'chi', 'つ': 'tsu', 'て': 'te', 'と': 'to',
            'な': 'na', 'に': 'ni', 'ぬ': 'nu', 'ね': 'ne', 'の': 'no',
            'は': 'ha', 'ひ': 'hi', 'ふ': 'fu', 'へ': 'he', 'ほ': 'ho',
            'ま': 'ma', 'み': 'mi', 'む': 'mu', 'め': 'me', 'も': 'mo',
            'や': 'ya', 'ゆ': 'yu', 'よ': 'yo',
            'ら': 'ra', 'り': 'ri', 'る': 'ru', 'れ': 're', 'ろ': 'ro',
            'わ': 'wa', 'を': 'wo', 'ん': 'n',
            'が': 'ga', 'ぎ': 'gi', 'ぐ': 'gu', 'げ': 'ge', 'ご': 'go',
            'ざ': 'za', 'じ': 'ji', 'ず': 'zu', 'ぜ': 'ze', 'ぞ': 'zo',
            'だ': 'da', 'ぢ': 'ji', 'づ': 'zu', 'で': 'de', 'ど': 'do',
            'ば': 'ba', 'び': 'bi', 'ぶ': 'bu', 'べ': 'be', 'ぼ': 'bo',
            'ぱ': 'pa', 'ぴ': 'pi', 'ぷ': 'pu', 'ぺ': 'pe', 'ぽ': 'po',
            'ぁ': 'a', 'ぃ': 'i', 'ぅ': 'u', 'ぇ': 'e', 'ぉ': 'o',
            'ゔ': 'vu'
        };

        function canonicalizeRomaji(value) {
            return String(value || '')
                .normalize('NFKC')
                .toLowerCase()
                .replace(/[āâàá]/g, 'a')
                .replace(/[īîìí]/g, 'i')
                .replace(/[ūûùú]/g, 'u')
                .replace(/[ēêèé]/g, 'e')
                .replace(/[ōôòó]/g, 'o')
                .replace(/shi/g, 'si')
                .replace(/chi/g, 'ti')
                .replace(/tsu/g, 'tu')
                .replace(/fu/g, 'hu')
                .replace(/jya/g, 'zya')
                .replace(/jyu/g, 'zyu')
                .replace(/jyo/g, 'zyo')
                .replace(/sha/g, 'sya')
                .replace(/shu/g, 'syu')
                .replace(/sho/g, 'syo')
                .replace(/cha/g, 'tya')
                .replace(/chu/g, 'tyu')
                .replace(/cho/g, 'tyo')
                .replace(/ja/g, 'zya')
                .replace(/ju/g, 'zyu')
                .replace(/jo/g, 'zyo')
                .replace(/ji/g, 'zi')
                .replace(/ou/g, 'o')
                .replace(/oo/g, 'o')
                .replace(/uu/g, 'u')
                .replace(/[～〜・/／\s]+/g, '')
                .replace(/[^a-z0-9]/g, '');
        }

        function romanizeKana(value) {
            const source = extractKanaFromText(value);
            if (!source) return '';
            let result = '';

            const getChunk = (index) => {
                const two = source.slice(index, index + 2);
                if (ROMAJI_DIGRAPHS[two]) return [ROMAJI_DIGRAPHS[two], 2];
                return [ROMAJI_MONOGRAPHS[source[index]] || '', 1];
            };

            for (let index = 0; index < source.length; ) {
                const current = source[index];
                if (current === 'っ') {
                    const [nextRomaji] = getChunk(index + 1);
                    const consonant = (nextRomaji.match(/^[bcdfghjklmnpqrstvwxyz]+/) || [''])[0];
                    result += consonant ? consonant[0] : '';
                    index += 1;
                    continue;
                }
                if (current === 'ー') {
                    const lastVowel = (result.match(/[aeiou](?!.*[aeiou])/u) || [''])[0];
                    result += lastVowel;
                    index += 1;
                    continue;
                }
                const [chunk, consumed] = getChunk(index);
                result += chunk;
                index += consumed;
            }

            return canonicalizeRomaji(result);
        }

        function buildGrammarSearchIndex(grammar) {
            const pointText = normalizeSearchText(grammar.point);
            const pointKana = normalizeSearchText(extractKanaFromText(grammar.point));
            const firstKanaText = normalizeSearchText(grammar.firstKana);
            const meaningText = normalizeSearchText(grammar.meaning);
            const keywordText = normalizeSearchText(grammar.keyword);
            const pointRomaji = romanizeKana(grammar.point);
            const firstKanaRomaji = canonicalizeRomaji(grammar.firstKana) || romanizeKana(grammar.firstKana);
            const romajiCandidates = [...new Set([pointRomaji, firstKanaRomaji].filter(Boolean))];
            return { pointText, pointKana, firstKanaText, meaningText, keywordText, romajiCandidates };
        }

        function levenshteinDistance(a, b) {
            if (a === b) return 0;
            if (!a.length) return b.length;
            if (!b.length) return a.length;
            const matrix = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
            for (let i = 0; i <= a.length; i += 1) matrix[i][0] = i;
            for (let j = 0; j <= b.length; j += 1) matrix[0][j] = j;
            for (let i = 1; i <= a.length; i += 1) {
                for (let j = 1; j <= b.length; j += 1) {
                    const cost = a[i - 1] === b[j - 1] ? 0 : 1;
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j] + 1,
                        matrix[i][j - 1] + 1,
                        matrix[i - 1][j - 1] + cost
                    );
                }
            }
            return matrix[a.length][b.length];
        }

        function getRomajiMatchScore(query, candidate) {
            if (!query || !candidate) return 0;
            if (candidate === query) return 960;
            if (candidate.startsWith(query)) return 840;
            if (candidate.includes(query)) return 700;

            const distance = levenshteinDistance(query, candidate);
            const maxLength = Math.max(query.length, candidate.length);
            const similarity = maxLength ? 1 - (distance / maxLength) : 0;

            if (distance <= 1) return 620;
            if (distance <= 2 && similarity >= 0.65) return 560;
            if (similarity >= 0.72) return 500;
            return 0;
        }

        function getGrammarSearchResultsFromSource(query, sourceData) {
            const normalizedQuery = normalizeSearchText(query);
            const normalizedRomajiQuery = canonicalizeRomaji(query);
            if (!normalizedQuery && !normalizedRomajiQuery) return [];

            const scoreGrammarSearchMatch = (grammar) => {
                const index = buildGrammarSearchIndex(grammar);
                let score = 0;

                if (normalizedQuery) {
                    if (index.pointText === normalizedQuery) score = Math.max(score, 1000);
                    else if (index.pointKana === normalizedQuery) score = Math.max(score, 940);
                    else if (index.firstKanaText === normalizedQuery) score = Math.max(score, 900);
                    else if (index.pointText.startsWith(normalizedQuery)) score = Math.max(score, 860);
                    else if (index.pointKana.startsWith(normalizedQuery)) score = Math.max(score, 820);
                    else if (index.firstKanaText.startsWith(normalizedQuery)) score = Math.max(score, 780);
                    else if (index.pointText.includes(normalizedQuery)) score = Math.max(score, 720);
                    else if (index.pointKana.includes(normalizedQuery)) score = Math.max(score, 680);

                    if (index.meaningText.includes(normalizedQuery)) score = Math.max(score, 360);
                    if (index.keywordText.includes(normalizedQuery)) score = Math.max(score, 340);
                }

                if (normalizedRomajiQuery) {
                    index.romajiCandidates.forEach(candidate => {
                        score = Math.max(score, getRomajiMatchScore(normalizedRomajiQuery, candidate));
                    });
                }

                return score;
            };

            return sourceData
                .map(grammar => ({ grammar, score: scoreGrammarSearchMatch(grammar) }))
                .filter(item => item.score > 0)
                .sort((a, b) => b.score - a.score || getBookOrderIndex(a.grammar.book) - getBookOrderIndex(b.grammar.book) || a.grammar.lessonNumber - b.grammar.lessonNumber || a.grammar.id - b.grammar.id)
                .map(item => item.grammar);
        }

        function getGrammarSearchResults(query = searchQuery) {
            const scopedResults = getGrammarSearchResultsFromSource(query, getFilteredGrammarByScope());
            if (scopedResults.length) return scopedResults;
            return getGrammarSearchResultsFromSource(query, grammarData);
        }

        function renderGrammarSearchResults() {
            const input = document.getElementById('grammar-search-input');
            const clearButton = document.getElementById('grammar-search-clear');
            const resultsContainer = document.getElementById('grammar-search-results');
            if (!input || !clearButton || !resultsContainer) return;

            if (input.value !== searchQuery) input.value = searchQuery;

            searchResults = getGrammarSearchResults(searchQuery);
            currentSearchResultIds = searchResults.map(item => item.id);

            clearButton.classList.toggle('hidden', !searchQuery.trim());

            if (!searchQuery.trim()) {
                resultsContainer.classList.add('hidden');
                resultsContainer.innerHTML = '';
                return;
            }

            resultsContainer.classList.remove('hidden');
            resultsContainer.innerHTML = '';

            if (!searchResults.length) {
                const emptyState = document.createElement('div');
                emptyState.className = 'px-4 py-3 sm:px-5 sm:py-3.5 text-xs sm:text-sm text-[#8a8a85]';
                emptyState.textContent = '未找到匹配语法';
                resultsContainer.appendChild(emptyState);
                return;
            }

            searchResults.slice(0, 20).forEach(grammar => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'w-full text-left px-4 py-3 sm:px-5 sm:py-3.5 border-b border-[#f0efea] last:border-b-0 hover:bg-[#f6f5f1] transition-colors';
                button.innerHTML = `
                    <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                            <div class="text-sm sm:text-base font-bold text-[#2c2c2a] font-serif-jp leading-tight break-words">${grammar.point}</div>
                            <div class="mt-1 text-[10px] sm:text-xs text-[#8a8a85] break-words">${grammar.book} · ${grammar.lesson} · ${grammar.macro}</div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-[10px] sm:text-xs text-[#b1b1ab] shrink-0 mt-1"></i>
                    </div>
                `;
                button.onclick = () => {
                    currentSearchResultIds = searchResults.map(item => item.id);
                    openModal(grammar.id, { search: true });
                };
                resultsContainer.appendChild(button);
            });
        }

        function setGrammarSearchQuery(query) {
            searchQuery = query;
            renderGrammarSearchResults();
        }

        function clearGrammarSearch() {
            searchQuery = '';
            searchResults = [];
            currentSearchResultIds = [];
            renderGrammarSearchResults();
        }

        function initializeGrammarSearch() {
            const input = document.getElementById('grammar-search-input');
            const clearButton = document.getElementById('grammar-search-clear');
            if (!input || !clearButton || input.dataset.bound === 'true') return;

            input.addEventListener('input', (event) => {
                setGrammarSearchQuery(event.target.value);
            });

            input.addEventListener('keydown', (event) => {
                if (event.key !== 'Enter') return;
                if (!searchResults.length) return;
                event.preventDefault();
                currentSearchResultIds = searchResults.map(item => item.id);
                openModal(searchResults[0].id, { search: true });
            });

            clearButton.addEventListener('click', () => {
                clearGrammarSearch();
                input.focus();
            });

            input.dataset.bound = 'true';
            renderGrammarSearchResults();
        }

        function normalizeLooseText(value) {
            return normalizeSearchText(String(value || '').replace(/課/g, '课'));
        }

        function resolveLessonLabelFromParam(rawValue, preferredBook = "N2") {
            const book = BOOK_ORDER.includes(preferredBook) ? preferredBook : BOOK_ORDER[0];
            const lessons = BOOK_LESSON_OPTIONS[book] || [];
            const normalizedValue = normalizeLooseText(rawValue);
            if (!normalizedValue) return null;

            const exactMatch = lessons.find(label => normalizeLooseText(label) === normalizedValue);
            if (exactMatch) return exactMatch;

            const valueText = String(rawValue || '').normalize('NFKC');
            const numericMatch = valueText.match(/\d+/);
            if (!numericMatch) return null;
            const lessonNumber = Number(numericMatch[0]);
            return lessons.find(label => getLessonNumber(label) === lessonNumber) || null;
        }

        function resolveGrammarFromParam(rawValue) {
            const valueText = String(rawValue || '').trim();
            if (!valueText) return null;

            const numericValue = Number(valueText);
            if (Number.isFinite(numericValue)) {
                return grammarData.find(item => item.id === numericValue)
                    || grammarData.find(item => item.sourceId === numericValue)
                    || null;
            }

            const normalizedValue = normalizeLooseText(valueText);
            if (!normalizedValue) return null;
            return grammarData.find(item => normalizeLooseText(item.point) === normalizedValue)
                || grammarData.find(item => normalizeLooseText(item.point).includes(normalizedValue))
                || null;
        }

        function applySingleBookScope(book, lessonLabel = null) {
            const targetBook = BOOK_ORDER.includes(book) ? book : BOOK_ORDER[0];
            selectedBooks = new Set([targetBook]);
            selectedLessonsByBook = createDefaultSelectedLessonsByBook();
            BOOK_ORDER.forEach(currentBook => {
                if (currentBook === targetBook) {
                    selectedLessonsByBook[currentBook] = lessonLabel
                        ? new Set([lessonLabel])
                        : new Set(BOOK_LESSON_OPTIONS[currentBook] || []);
                } else {
                    selectedLessonsByBook[currentBook] = new Set();
                }
            });
        }

        function findMatchingCategoryMacros(rawValue, sourceData = getFilteredGrammarByScope()) {
            const normalizedValue = normalizeLooseText(rawValue);
            if (!normalizedValue) return [];

            const matches = new Set();

            sourceData.forEach(item => {
                const macroMatch = normalizeLooseText(item.macro);
                const categoryMatch = normalizeLooseText(item.category);
                if (
                    macroMatch === normalizedValue
                    || categoryMatch === normalizedValue
                    || macroMatch.includes(normalizedValue)
                    || categoryMatch.includes(normalizedValue)
                ) {
                    matches.add(item.macro);
                }
            });

            CATEGORY_BLOCKS.forEach(block => {
                const blockMatch = normalizeLooseText(block.label);
                if (blockMatch === normalizedValue || blockMatch.includes(normalizedValue)) {
                    block.macros.forEach(macroKey => matches.add(macroKey));
                }
            });

            return [...matches];
        }

        function findMatchingSpecialTargets(rawValue) {
            const normalizedValue = normalizeLooseText(rawValue);
            if (!normalizedValue) return [];

            const matches = [];
            SPECIAL_CLASSIFICATION_GROUPS.forEach(family => {
                const familyMatch = normalizeLooseText(family.familyKey);
                const familyMatchesQuery = familyMatch === normalizedValue || familyMatch.includes(normalizedValue);

                family.groups.forEach(group => {
                    const groupMatch = normalizeLooseText(group.groupKey);
                    if (
                        familyMatchesQuery
                        || groupMatch === normalizedValue
                        || groupMatch.includes(normalizedValue)
                    ) {
                        matches.push({
                            familyKey: family.familyKey,
                            groupKey: group.groupKey
                        });
                    }
                });
            });

            return matches;
        }

        function parseInitialUrlState() {
            const params = new URLSearchParams(window.location.search);
            const state = {
                lesson: params.get('lesson'),
                category: params.get('category'),
                collection: params.get('collection'),
                grammar: params.get('grammar'),
                mode: params.get('mode'),
                query: params.get('q') || params.get('query')
            };

            const hasOverrides = Object.values(state).some(value => typeof value === 'string' && value.trim());
            return hasOverrides ? state : null;
        }

        function resolveUrlModalDisplayContext(grammar, urlState) {
            if (!grammar || !urlState) return null;

            if (urlState.collection) {
                const matchedTarget = findMatchingSpecialTargets(urlState.collection)
                    .find(target => isGrammarInSpecialGroup(grammar.id, target.familyKey, target.groupKey));
                if (matchedTarget) {
                    return {
                        specialFamily: matchedTarget.familyKey,
                        specialCategory: matchedTarget.groupKey
                    };
                }
            }

            if (urlState.category) {
                return {
                    displayMacro: grammar.macro,
                    displayCategory: grammar.category
                };
            }

            if (urlState.mode === 'search' && searchQuery.trim()) {
                return { search: true };
            }

            return null;
        }

        function applyInitialUrlState(urlState) {
            pendingInitialModalState = null;
            if (!urlState) return;

            const grammarTarget = resolveGrammarFromParam(urlState.grammar);
            const scopedBook = grammarTarget?.book && BOOK_ORDER.includes(grammarTarget.book) ? grammarTarget.book : "N2";
            const wantsDirectoryMode = urlState.lesson || urlState.category || urlState.collection || urlState.grammar || urlState.mode === 'search' || urlState.query;

            if (wantsDirectoryMode) currentMode = 'directory';

            let scopedByLesson = false;

            if (urlState.lesson) {
                const lessonLabel = resolveLessonLabelFromParam(urlState.lesson, scopedBook);
                if (lessonLabel) {
                    applySingleBookScope(scopedBook, lessonLabel);
                    currentGrouping = 'lesson';
                    expandedLessonKey = `${scopedBook}::${lessonLabel}`;
                    scopedByLesson = true;
                }
            }

            if (!scopedByLesson && grammarTarget) {
                applySingleBookScope(scopedBook, grammarTarget.lesson);
                currentGrouping = 'lesson';
                expandedLessonKey = `${scopedBook}::${grammarTarget.lesson}`;
            } else if (!scopedByLesson && (urlState.category || urlState.collection)) {
                applySingleBookScope("N2");
            }

            if (urlState.category) {
                currentGrouping = 'category';
                expandedLessonKey = null;
                expandedSpecialGroups = {};
                expandedCategoryGroups = {};
                findMatchingCategoryMacros(urlState.category).forEach(macroKey => {
                    expandedCategoryGroups[macroKey] = true;
                });
            }

            if (urlState.collection) {
                currentGrouping = 'special';
                expandedLessonKey = null;
                expandedCategoryGroups = {};
                expandedSpecialGroups = {};
                findMatchingSpecialTargets(urlState.collection).forEach(target => {
                    expandedSpecialGroups[target.familyKey] = true;
                });
            }

            if (urlState.query) {
                searchQuery = urlState.query;
            }

            if (grammarTarget) {
                pendingInitialModalState = {
                    grammarId: grammarTarget.id,
                    displayContext: resolveUrlModalDisplayContext(grammarTarget, urlState)
                };
            }
        }

        function applyPostRenderUrlState(urlState) {
            if (!urlState) return;

            if (urlState.mode === 'search') {
                const input = document.getElementById('grammar-search-input');
                if (input) {
                    requestAnimationFrame(() => {
                        input.focus();
                        if (searchQuery.trim()) input.select();
                    });
                }
            }

            if (pendingInitialModalState?.grammarId) {
                const { grammarId, displayContext } = pendingInitialModalState;
                pendingInitialModalState = null;
                requestAnimationFrame(() => {
                    openModal(grammarId, displayContext);
                });
            }
        }

        function updateFlashcardModeButtons() {
            const disabled = getFilteredFlashcards().length === 0;
            ['flashcard-mode-meaning', 'flashcard-mode-grammar'].forEach(id => {
                const button = document.getElementById(id);
                if (!button) return;
                button.disabled = disabled;
                button.classList.toggle('opacity-50', disabled);
                button.classList.toggle('pointer-events-none', disabled);
                button.classList.toggle('cursor-not-allowed', disabled);
            });
        }

        function renderScopeFilter() {
            const panel = document.getElementById('scope-filter-panel');
            const booksContainer = document.getElementById('scope-filter-books');
            const chevron = document.getElementById('scope-filter-chevron');
            if (!panel || !booksContainer || !chevron) return;

            booksContainer.innerHTML = '';
            BOOK_ORDER.forEach(book => {
                const bookSection = document.createElement('div');

                const header = document.createElement('div');

                const expandButton = document.createElement('button');

        function toggleSelectAllBookLessons(book) {
            const allLessons = BOOK_LESSON_OPTIONS[book] || [];

            if (selectedBooks.has(book) && selectedCount === allLessons.length) selectedLessonsByBook[book] = new Set();

        function getCategoryMacroEntries(sourceData = getFilteredDirectoryGrammar()) {
            const macroGrouped = sourceData.reduce((acc, curr) => { if (!acc[curr.macro]) acc[curr.macro] = []; acc[curr.macro].push(curr); return acc; }, {});
            return Object.keys(macroGrouped).filter(macroKey => !SPECIAL_ONLY_MACROS.includes(macroKey)).sort((a, b) => a.localeCompare(b, 'zh-CN')).map(macroKey => {
                const microGrouped = macroGrouped[macroKey].reduce((acc, curr) => { if (!acc[curr.category]) acc[curr.category] = []; acc[curr.category].push(curr); return acc; }, {});
                return { macroKey, microEntries: Object.keys(microGrouped).sort((a, b) => a.localeCompare(b, 'zh-CN')).map(microKey => ({ microKey, items: microGrouped[microKey] })) };
            }).filter(entry => entry.microEntries && entry.microEntries.length > 0);
        }

        function getCategoryMacroBlocks(macroEntries = getCategoryMacroEntries()) {
            const regularEntryMap = new Map(macroEntries.map(entry => [entry.macroKey, entry]));
            const assignedMacros = new Set(CATEGORY_BLOCKS.flatMap(block => block.macros));
            const blocks = CATEGORY_BLOCKS.map(block => ({ blockKey: block.label, special: false, entries: block.macros.map(macroKey => regularEntryMap.get(macroKey)).filter(Boolean) })).filter(block => block.entries.length > 0);
            const fallbackEntries = macroEntries.filter(entry => !assignedMacros.has(entry.macroKey));
            if (fallbackEntries.length > 0) blocks.push({ blockKey: CATEGORY_FALLBACK_BLOCK_LABEL, special: false, entries: fallbackEntries });
            return blocks;
        }

        function isGrammarInSpecialGroup(grammarId, familyKey, groupKey) {
            return SPECIAL_CLASSIFICATION_GROUPS
                .some(family => family.familyKey === familyKey
                    && family.groups.some(group => group.groupKey === groupKey && group.ids.includes(grammarId)));
        }

        function getSpecialGroupItems(familyKey, groupKey, sourceData = getFilteredDirectoryGrammar()) {
            const allowedIds = new Set(sourceData.map(item => item.id));
            const family = SPECIAL_CLASSIFICATION_GROUPS.find(item => item.familyKey === familyKey);
            if (!family) return [];
            const group = family.groups.find(item => item.groupKey === groupKey);
            if (!group) return [];
            return group.ids.map(getGrammarById).filter(item => item && allowedIds.has(item.id));
        }

        function getSpecialFamilyEntries(sourceData = getFilteredDirectoryGrammar()) {
            return SPECIAL_CLASSIFICATION_GROUPS
                .map(family => ({
                    familyKey: family.familyKey,
                    groups: family.groups
                        .map(group => ({
                            groupKey: group.groupKey,
                            items: getSpecialGroupItems(family.familyKey, group.groupKey, sourceData)
                        }))
                        .filter(group => group.items.length > 0)
                }))
                .filter(family => family.groups.length > 0);
        }

        function formatModalMeta(grammar, displayContext = null) {
            const prefix = `${grammar.book} · ${grammar.lesson}`;
            if (displayContext?.search) return `${prefix} · 搜索结果`;
            if (displayContext?.specialFamily && displayContext?.specialCategory) return `${prefix} · 特殊分类 / ${displayContext.specialFamily} / ${displayContext.specialCategory}`;
            if (displayContext?.displayMacro && displayContext?.displayCategory) return `${prefix} · ${displayContext.displayMacro} / ${displayContext.displayCategory}`;
            if (displayContext?.displayCategory) return `${prefix} · ${displayContext.displayCategory}`;
            if (currentGrouping === 'category') return `${prefix} · ${grammar.macro} / ${grammar.category}`;
            return `${prefix} · ${grammar.category}`;
        }

        function resolveDisplayContextForGrammar(grammar, preferredContext = null) {
            if (preferredContext?.search) {
                if (currentSearchResultIds.includes(grammar.id)) return preferredContext;
                if (currentGrouping === 'category') return { displayMacro: grammar.macro, displayCategory: grammar.category };
                return null;
            }
            if (preferredContext?.specialFamily && preferredContext?.specialCategory) {
                if (isGrammarInSpecialGroup(grammar.id, preferredContext.specialFamily, preferredContext.specialCategory)) return preferredContext;
                return { displayMacro: grammar.macro, displayCategory: grammar.category };
            }
            if (preferredContext?.displayMacro && preferredContext?.displayCategory) {
                if (grammar.macro === preferredContext.displayMacro && grammar.category === preferredContext.displayCategory) return preferredContext;
                return { displayMacro: grammar.macro, displayCategory: grammar.category };
            }
            if (preferredContext?.displayCategory) {
                if (grammar.category === preferredContext.displayCategory) return preferredContext;
                return { displayCategory: grammar.category };
            }
            if (currentGrouping === 'category') return { displayMacro: grammar.macro, displayCategory: grammar.category };
            return null;
        }

        function resolveModalNavigationItems(grammar, displayContext = null) {
            let items;
            if (displayContext?.search) {
                const allowedIds = new Set(getFilteredGrammarByScope().map(item => item.id));
                items = currentSearchResultIds.map(getGrammarById).filter(item => item && allowedIds.has(item.id));
            }
            if (displayContext?.specialFamily && displayContext?.specialCategory) items = getSpecialGroupItems(displayContext.specialFamily, displayContext.specialCategory);
            else if (displayContext?.displayMacro && displayContext?.displayCategory) items = getFilteredDirectoryGrammar().filter(item => item.macro === displayContext.displayMacro && item.category === displayContext.displayCategory);
            else if (!displayContext?.search) items = getFilteredGrammarByScope().filter(item => item.book === grammar.book && item.lesson === grammar.lesson);
            if (!items.length || !items.some(item => item.id === grammar.id)) return [grammar];
            return items;
        }

        function queueMindmapSync() {
            if (syncMindmapFrame) cancelAnimationFrame(syncMindmapFrame);
            syncMindmapFrame = requestAnimationFrame(() => {
                syncMindmapFrame = null;
                syncMindmapLines();
            });
        }

        function syncMindmapLines() {
            const directoryView = document.getElementById('view-directory');
            if (!directoryView || directoryView.classList.contains('hidden')) return;

            document.querySelectorAll('.mindmap-branch-wrapper').forEach(branch => {
                const anchor = branch.querySelector('.mindmap-branch-anchor-target');
                if (!anchor || branch.offsetParent === null) return;

                const branchRect = branch.getBoundingClientRect();
                const anchorRect = anchor.getBoundingClientRect();
                const anchorY = anchorRect.top - branchRect.top + (anchorRect.height / 2);
                branch.style.setProperty('--mindmap-branch-anchor-y', `${anchorY}px`);
            });

            document.querySelectorAll('.mindmap-children').forEach(group => {
                if (group.classList.contains('hidden')) {
                    group.style.setProperty('--mindmap-line-top', '0px');
                    group.style.setProperty('--mindmap-line-bottom', '0px');
                    return;
                }

                const visibleChildren = Array.from(group.children).filter(child => !child.classList.contains('hidden'));

                if (group.classList.contains('mindmap-children--category-leaves')) {
                    syncCategoryLeafLines(group, visibleChildren);
                    return;
                }

                if (visibleChildren.length <= 1) {
                    group.style.setProperty('--mindmap-line-top', '0px');
                    group.style.setProperty('--mindmap-line-bottom', '0px');
                    return;
                }

                const groupRect = group.getBoundingClientRect();
                if (!groupRect.height) return;

                const firstRect = getMindmapAnchorRect(group, visibleChildren[0]);
                const lastRect = getMindmapAnchorRect(group, visibleChildren[visibleChildren.length - 1]);
                const top = firstRect.top - groupRect.top + (firstRect.height / 2);
                const bottom = lastRect.top - groupRect.top + (lastRect.height / 2);

                group.style.setProperty('--mindmap-line-top', `${top}px`);
                group.style.setProperty('--mindmap-line-bottom', `${bottom}px`);
            });
        }

        function syncCategoryLeafLines(group, visibleChildren) {
            const branchWrapper = group.closest('.mindmap-branch-wrapper');
            const branchAnchor = branchWrapper ? branchWrapper.querySelector('.mindmap-branch-anchor-target') : null;

            if (!branchAnchor) {
                group.style.setProperty('--mindmap-line-top', '0px');
                group.style.setProperty('--mindmap-line-bottom', '0px');
                return;
            }

            const groupRect = group.getBoundingClientRect();
            if (!groupRect.height) return;

            const anchorRect = branchAnchor.getBoundingClientRect();
            const positions = [
                anchorRect.top - groupRect.top + (anchorRect.height / 2)
            ];

            visibleChildren.forEach(item => {
                const rect = getCategoryLeafAnchorRect(item);
                positions.push(rect.top - groupRect.top + (rect.height / 2));
            });

            const top = Math.min(...positions);
            const bottom = Math.max(...positions);

            group.style.setProperty('--mindmap-line-top', `${top}px`);
            group.style.setProperty('--mindmap-line-bottom', `${bottom}px`);
        }

        function getMindmapAnchorRect(group, item) {
            if (group.classList.contains('mindmap-children--category')) {
                return getCategoryBranchAnchorRect(item);
            }

            if (group.classList.contains('mindmap-children--category-leaves')) {
                return getCategoryLeafAnchorRect(item);
            }

            return getDefaultMindmapAnchorRect(item);
        }

        function getDefaultMindmapAnchorRect(item) {
            return item.getBoundingClientRect();
        }

        function getCategoryBranchAnchorRect(item) {
            const anchor = item.querySelector('.mindmap-branch-anchor-target');
            if (anchor) return anchor.getBoundingClientRect();
            return item.getBoundingClientRect();
        }

        function getCategoryLeafAnchorRect(item) {
            const anchor = item.querySelector('.mindmap-node-wrapper-anchor');
            if (anchor) return anchor.getBoundingClientRect();
            return item.getBoundingClientRect();
        }

        // ==================== 弹窗(Modal)逻辑 ====================
        const modal = document.getElementById('grammar-modal');
        const modalInner = modal.querySelector('div');
        const MODAL_TAG_BUTTON_CLASS = "text-[10px] sm:text-xs bg-white hover:bg-[#e5e5e0] text-[#555552] hover:text-[#2c2c2a] font-bold px-2 py-1 sm:px-3 sm:py-1.5 rounded-md sm:rounded-lg border border-[#d4d4d0] shadow-sm transition-all hover:-translate-y-0.5";
        const MODAL_TAG_BUTTON_DISABLED_CLASS = "text-[10px] sm:text-xs bg-[#f3f3ef] text-[#b1b1ab] font-bold px-2 py-1 sm:px-3 sm:py-1.5 rounded-md sm:rounded-lg border border-[#e5e5e0] shadow-sm cursor-not-allowed";

        function transitionModalTo(targetId, displayContext = null) {
            openModal(targetId, displayContext ?? currentModalDisplayContext);
        }

        function renderLessonPager(grammar, hostContainer) {
            if (!hostContainer) return;

            const pagerContainer = document.createElement('div');
            pagerContainer.className = "flex flex-wrap gap-1.5 sm:gap-2 ml-auto";
            const navigationItems = currentModalNavigationItems.length
                ? currentModalNavigationItems
                : resolveModalNavigationItems(grammar, currentModalDisplayContext);
            const currentIndex = navigationItems.findIndex(item => item.id === grammar.id);
            const prevItem = currentIndex > 0 ? navigationItems[currentIndex - 1] : null;
            const nextItem = currentIndex >= 0 && currentIndex < navigationItems.length - 1 ? navigationItems[currentIndex + 1] : null;

            [
                { label: '上一条', icon: 'fa-chevron-left', target: prevItem },
                { label: '下一条', icon: 'fa-chevron-right', target: nextItem }
            ].forEach(({ label, icon, target }) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = target ? MODAL_TAG_BUTTON_CLASS : MODAL_TAG_BUTTON_DISABLED_CLASS;
                button.innerHTML = `<i class="fa-solid ${icon} mr-1 opacity-70"></i> ${label}`;
                button.disabled = !target;

                if (target) {
                    button.onclick = (e) => {
                        e.stopPropagation();
                        transitionModalTo(target.id, currentModalDisplayContext);
                    };
                }

                pagerContainer.appendChild(button);
            });

            hostContainer.appendChild(pagerContainer);
        }

        function openModal(id, displayContext = null) {
            const grammar = grammarData.find(g => g.id === id);
            if (!grammar) return;

            const resolvedDisplayContext = resolveDisplayContextForGrammar(grammar, displayContext);
            currentModalDisplayContext = resolvedDisplayContext;
            currentModalNavigationItems = resolveModalNavigationItems(grammar, resolvedDisplayContext);

            document.getElementById('modal-meta').innerText = formatModalMeta(grammar, resolvedDisplayContext);
            document.getElementById('modal-title').innerText = grammar.point;
            document.getElementById('modal-connection').innerHTML = grammar.connection;
            document.getElementById('modal-meaning').innerText = grammar.meaning;
            document.getElementById('modal-explanation').innerHTML = grammar.explanation;

            const exContainer = document.getElementById('modal-example');
            exContainer.innerHTML = `
                <div>
                    <p class="text-[#2c2c2a] font-serif-jp font-bold text-[15px] sm:text-base mb-1.5 leading-relaxed tracking-wide">${grammar.example.jp}</p>
                    <p class="text-[#8a8a85] text-xs sm:text-sm leading-relaxed">${grammar.example.cn}</p>
                </div>
            `;

            const similarContainer = document.getElementById('modal-similar');
            similarContainer.innerHTML = '';
            
            if (grammar.similarGrammar && grammar.similarGrammar.length > 0) {
                grammar.similarGrammar.forEach(simId => {
                    const simGrammar = grammarData.find(g => g.id === simId);
                    if (simGrammar) {
                        const btn = document.createElement('button');
                        btn.className = MODAL_TAG_BUTTON_CLASS;
                        btn.innerHTML = `<i class="fa-solid fa-link mr-1 opacity-70"></i> ${simGrammar.point}`;
                        btn.onclick = (e) => {
                            e.stopPropagation();
                            transitionModalTo(simId, resolveDisplayContextForGrammar(simGrammar, resolvedDisplayContext));
                        };
                        similarContainer.appendChild(btn);
                    }
                });
            } else {
                similarContainer.innerHTML = '<span class="text-[10px] sm:text-xs text-[#8a8a85] mt-1 sm:mt-1.5 italic">暂无相关近似语法</span>';
            }

            renderLessonPager(grammar, similarContainer);

            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalInner.classList.remove('scale-95');
                }, 10);
            }
        }

        function closeModal(e) {
            if (!e || e.target === modal || e.currentTarget.tagName === 'BUTTON') {
                modal.classList.add('opacity-0');
                modalInner.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

            const cardInner = document.getElementById('flashcard-inner');

        function nextCard() {
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
            } else {
                currentCardIndex = 0;
            }
            updateCardUI();
        }

        function prevCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
            } else {
                currentCardIndex = flashcards.length - 1;
            }
            updateCardUI();
        }

        function shuffleCards() {
            if (!flashcards.length) {
                currentCardIndex = 0;
                updateCardUI();
                return;
            }

            for (let i = flashcards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
            }
            currentCardIndex = 0;
            updateCardUI();
            
            const icon = document.querySelector('.fa-shuffle');
            icon.classList.add('animate-spin');
            setTimeout(() => icon.classList.remove('animate-spin'), 500);
        }

        // ==================== 练习模式逻辑 ====================

        function showPracticeSection(section) {
            const intro = document.getElementById('practice-intro');
            const main = document.getElementById('practice-main');
            const result = document.getElementById('practice-result');
            if (!intro || !main || !result) return;

            intro.classList.toggle('hidden', section !== 'intro');
            main.classList.toggle('hidden', section !== 'main');
            result.classList.toggle('hidden', section !== 'result');

            const challengeModeButton = document.getElementById('practice-mode-challenge');
            const wrongModeButton = document.getElementById('practice-mode-wrong');
            const count5Button = document.getElementById('practice-count-5');
            const count10Button = document.getElementById('practice-count-10');
            const count20Button = document.getElementById('practice-count-20');
            const countAllButton = document.getElementById('practice-count-all');
            const countButtonsWrap = document.getElementById('practice-count-buttons');
            const countText = document.getElementById('practice-available-count');
            const startButton = document.getElementById('practice-start-button');
            if (!normalModeButton || !challengeModeButton || !wrongModeButton || !count5Button || !count10Button || !count20Button || !countAllButton || !countButtonsWrap || !countText || !startButton) return;

            const availableCount = getFilteredPracticeQuestionsByScope().length;
            const wrongCount = wrongPracticeQuestionIds.length;

            challengeModeButton.className = currentPracticeMode === 'challenge' ? PRACTICE_COUNT_ACTIVE_CLASS : PRACTICE_COUNT_INACTIVE_CLASS;

            wrongModeButton.textContent = `错题库（${wrongCount}题）`;

            count5Button.className = currentPracticeCount === 5 ? PRACTICE_COUNT_ACTIVE_CLASS : PRACTICE_COUNT_INACTIVE_CLASS;
            count10Button.className = currentPracticeCount === 10 ? PRACTICE_COUNT_ACTIVE_CLASS : PRACTICE_COUNT_INACTIVE_CLASS;
            count20Button.className = currentPracticeCount === 20 ? PRACTICE_COUNT_ACTIVE_CLASS : PRACTICE_COUNT_INACTIVE_CLASS;
            countAllButton.className = currentPracticeCount === 'all' ? PRACTICE_COUNT_ACTIVE_CLASS : PRACTICE_COUNT_INACTIVE_CLASS;

        function setPracticeMode(mode) {

            currentPracticeMode = ['normal', 'challenge', 'wrong'].includes(mode) ? mode : 'normal';

            currentPracticeCount = count;
            renderPracticeIntro();

        function updatePracticeTagActions(grammarId) {
            const container = document.getElementById('practice-tag-actions');
            if (!container) return;
            container.innerHTML = '';
            if (!grammarId) return;
            const currentTag = getFlashcardTagForId(grammarId);
            ['fuzzy', 'known'].forEach(tag => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = currentTag === tag ? FLASHCARD_CARD_TAG_ACTIVE_CLASS : FLASHCARD_CARD_TAG_INACTIVE_CLASS;
                button.textContent = FLASHCARD_TAG_LABELS[tag];
                button.onclick = event => {
                    event.stopPropagation();
                    togglePracticeGrammarTag(tag);
                };
                container.appendChild(button);
            });
        }

        function togglePracticeGrammarTag(tag) {
            const question = getCurrentPracticeQuestion();
            if (!question) return;
            const currentTag = getFlashcardTagForId(question.targetGrammarId);
            const nextTag = currentTag === tag ? 'untagged' : tag;
            setFlashcardTagForId(question.targetGrammarId, nextTag);
            saveAppState();
            renderFlashcardTagFilters();
            updateFlashcardModeButtons();
            updatePracticeTagActions(linkedGrammar ? question.targetGrammarId : null);
        }

            const explanationContainer = document.getElementById('practice-explanation');

            const linkedGrammar = question.targetGrammarId ? grammarData.find(item => item.id === question.targetGrammarId) : null;
            const grammarPointLine = linkedGrammar
                ? `<button type="button" data-practice-grammar-link="${question.targetGrammarId}" class="${PRACTICE_GRAMMAR_LINK_CLASS}">${question.grammarPointLabel}</button>`

                            <div class="mt-1">${grammarPointLine}</div>
                        </div>
                        <div>

        function clearChallengeAdvanceTimer() {
            if (challengeAdvanceTimerId) {
