<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻松一读 - kikiの日本語の家</title>
    <link rel="stylesheet" href="../../shared/site-fonts.css">
    <style>
        :root {
            --bg-color: #fdfaf5;
            --paper-color: #ffffff;
            --text-color: #2c2c2c;
            --accent-color: #6f8578;
            --sub-color: #787878;
            --line-color: rgba(111, 133, 120, 0.14);
            --shadow: 0 10px 24px rgba(52, 62, 55, 0.06);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(111, 133, 120, 0.05), transparent 24%),
                linear-gradient(180deg, #fbf8f2 0%, #f3ece3 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }

        header {
            width: 100%;
            padding: 18px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            background-color: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .back-btn {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            opacity: 0.72;
            transition: opacity 0.25s, transform 0.25s;
        }

        .back-btn:hover {
            opacity: 1;
            transform: translateX(-2px);
        }


        h1 {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .page-shell {
            width: min(92%, 860px);
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .intro-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--line-color);
            border-radius: calc(var(--radius) + 4px);
            box-shadow: var(--shadow);
            padding: 26px 28px;
            margin-bottom: 20px;
        }

        .eyebrow {
            margin: 0 0 10px;
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--sub-color);
        }

        .intro-card h2 {
            margin: 0;
            font-size: 30px;
            font-weight: 600;
            letter-spacing: 0.06em;
        }

        .intro-card p {
            margin: 12px 0 0;
            color: var(--sub-color);
            line-height: 1.8;
            font-size: 14px;
        }

        .lesson-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lesson-item {
            background: var(--paper-color);
            padding: 18px 20px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.04);
            transition: 0.2s;
            border-left: 4px solid transparent;
            text-decoration: none;
            color: var(--text-color);
        }

        .lesson-item:hover {
            border-left-color: var(--accent-color);
            transform: translateX(5px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }

        .lesson-item.disabled {
            opacity: 0.62;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(0.15);
        }

        .lesson-content {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .lesson-icon {
            font-size: 18px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 700;
            background: rgba(111, 133, 120, 0.1);
            color: var(--accent-color);
        }

        .lesson-text {
            min-width: 0;
        }

        .lesson-text h3 {
            margin: 0 0 4px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .lesson-text p {
            margin: 0;
            font-size: 12px;
            color: var(--sub-color);
            line-height: 1.6;
        }

        .lesson-tag {
            background: #f4f1eb;
            color: #7c7b74;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            flex-shrink: 0;
        }

        footer {
            margin-top: auto;
            padding: 28px;
            text-align: center;
            font-size: 12px;
            color: var(--sub-color);
        }

        @media (max-width: 680px) {
            .page-shell {
                width: min(94%, 860px);
                padding-top: 24px;
            }

            .intro-card {
                padding: 18px;
            }

            .intro-card h2 {
                font-size: 24px;
            }

            .lesson-item {
                align-items: flex-start;
            }

            .lesson-tag {
                margin-top: 4px;
            }
        }
    </style>
    <link rel="stylesheet" href="../../shared/header-back-control.css">
</head>
<body>
    <header>
        <a href="../../index.html#daily" class="back-btn header-back-control" data-back-nav>← 戻る</a>
        <h1>轻松一读</h1>
    </header>

    <main class="page-shell">
        <section class="lesson-list" aria-label="轻松一读入口">
            <a href="javascript:void(0)" class="lesson-item disabled">
                <div class="lesson-content">
                    <div class="lesson-icon">日</div>
                    <div class="lesson-text">
                        <h3>每日の読み（待整理）</h3>
                        <p>这个日更栏目先保留位置，等后续有内容后再开放。</p>
                    </div>
                </div>
                <span class="lesson-tag">Soon</span>
            </a>

            <a href="./folklore/read_folklore.html" class="lesson-item">
                <div class="lesson-content">
                    <div class="lesson-icon">話</div>
                    <div class="lesson-text">
                        <h3>日本の昔話</h3>
                        <p>通过文章来了解日本有名的民间故事。</p>
                    </div>
                </div>
                <span class="lesson-tag">Stories</span>
            </a>
        </section>
    </main>

    <footer>读得轻一点，也能慢慢积起来。</footer>

    <script src="../../shared/back-navigation.js"></script>
    <script>
        window.bindHierarchicalBack({
            selector: "[data-back-nav]",
            fallback: "../../index.html#daily"
        });
    </script>
</body>
</html>
