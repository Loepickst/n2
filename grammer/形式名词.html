        .settings-panel { background: var(--white); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .section-label { font-size: 0.9rem; font-weight: bold; color: #888; margin-bottom: 8px; display: block; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .checkbox-btn {
            display: inline-block;
        }
        .checkbox-btn input { display: none; }
        .checkbox-btn span {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            background: #eee;
            color: #666;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .checkbox-btn input:checked + span {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 5px rgba(211, 84, 0, 0.2);
        }

        .card { background: var(--white); padding: 30px 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; border: 1px solid var(--border); }
        .question-text { font-size: 1.3rem; color: var(--text); margin: 20px 0; line-height: 1.6; font-weight: bold; }
        .hint-text { font-size: 0.9rem; color: #888; margin-bottom: 25px; background: #f8f9fa; padding: 5px 10px; border-radius: 15px; display: inline-block; }
        
        input[type="text"] { width: 100%; padding: 15px; font-size: 1.3rem; border: 2px solid #e9ecef; border-radius: 10px; text-align: center; box-sizing: border-box; outline: none; background: #f8f9fa; transition: all 0.3s; }
        input:focus { border-color: var(--primary); background: var(--white); }
        .correct { border-color: var(--success) !important; background: #e8f8f0 !important; }
        .wrong { border-color: var(--error) !important; background: #fceceb !important; }
        
        /* --- 选择题样式 --- */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .option-btn {
            padding: 15px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            font-weight: bold;
            text-align: center;
        }
        .option-btn:hover { border-color: var(--primary); background: #fff; transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .option-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .option-btn.wrong { background: var(--error) !important; color: white !important; border-color: var(--error) !important; }

        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(211, 84, 0, 0.3); margin-top: 20px; }
        .btn-secondary { width: 100%; padding: 12px; background: transparent; color: #999; border: none; font-size: 0.9rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .result-score { font-size: 4rem; color: var(--primary); font-weight: bold; margin: 10px 0; }
        .hidden { display: none !important; }
        
    </style>
</head>

                    lv: "N3",
                    questions: [
                        { q: "今日は大事な会議があるから、休む____にはいかない。", a: "わけ" },
                        { q: "上司の命令だから、断る____にはいかない。", a: "わけ" }
                    ]
                }
            ]
        },
        {
            id: "hazu",
            label: "はず",
            sub: "筈",
            desc: "表示基于根据的“推测”或“理应如此”。",
            grammars: [
                { 
                    id: "hazu_da", 
                    pt: "～はずだ", 
                    mean: "应该是/理应是", 
                    ex: "彼は3時に来ると言ったから、もうすぐ着くはずだ。", 
                    lv: "N3",
                    questions: [
                        { q: "彼は3時に来ると言ったから、もうすぐ着く____だ。", a: "はず" },
                        { q: "この本は面白かったから、彼も気に入る____だ。", a: "はず" }
                    ]
                },
                { 
                    id: "hazu_ga_nai", 
                    pt: "～はずがない", 
                    mean: "不可能", 
                    ex: "そんなはずがない。", 
                    lv: "N3",
                    questions: [
                        { q: "そんな____がない。", a: "はず" },
                        { q: "彼が約束を破る____がない。", a: "はず" }
                    ]
                }
            ]
        },
        {
            id: "tsumori",
            label: "つもり",
            sub: "打算",
            desc: "表示意图、打算或某种心态。",
            grammars: [
                { 
                    id: "tsumori_da", 
                    pt: "～つもりだ", 
                    mean: "打算/计划", 
                    ex: "夏休みに旅行に行くつもりです。", 
                    lv: "N4",
                    questions: [
                        { q: "夏休みに旅行に行く____です。", a: "つもり" },
                        { q: "大学院に進学する____です。", a: "つもり" }
                    ]
                },
                { 
                    id: "tsumori_de", 
                    pt: "～つもりで", 
                    mean: "当作/抱着...的心态", 
                    ex: "死んだつもりで頑張ります。", 
                    lv: "N3",
                    questions: [
                        { q: "死んだ____で頑張ります。", a: "つもり" },
                        { q: "旅行に行った____で、貯金する。", a: "つもり" }
                    ]
                }
            ]
        }
    ];

    // ================= 逻辑控制 =================
    
    // 1. 初始化
    function init() {
        renderNounGrid();
        renderPracticeSettings();
    }

    // 渲染名词网格
    function renderNounGrid() {
        const grid = document.getElementById('nounGrid');
        grid.innerHTML = '';
        formalNouns.forEach(item => {
            const card = document.createElement('div');
            card.className = 'noun-card';
            card.innerHTML = `
                <div class="noun-main">${item.label}</div>
                <div class="noun-sub">${item.sub}</div>
            `;
            card.onclick = () => showDetail(item);
            grid.appendChild(card);
        });
    }

    // 显示详情
    function showDetail(item) {
        document.getElementById('detailTitle').innerText = `${item.label} (${item.sub})`;
        document.getElementById('detailDesc').innerText = item.desc;
        
        const list = document.getElementById('grammarList');
        list.innerHTML = '';
        
        item.grammars.forEach(g => {
            const div = document.createElement('div');
            div.className = 'grammar-item';
            div.innerHTML = `
                <div class="grammar-head">
                    <span class="grammar-pt">${g.pt}</span>
                    <span class="level-tag tag-${g.lv}">${g.lv}</span>
                </div>
                <div class="grammar-mean">${g.mean}</div>
                <div class="grammar-ex">${g.ex}</div>
            `;
            list.appendChild(div);
        });

        document.getElementById('study-detail').classList.add('show');
    }

    function closeDetail() {
        document.getElementById('study-detail').classList.remove('show');
    }

    // 渲染练习设置
    function renderPracticeSettings() {
        const box = document.getElementById('nounFilter');
        box.innerHTML = '';
        formalNouns.forEach(item => {
            const label = document.createElement('label');
            label.className = 'checkbox-btn';
            label.innerHTML = `
                <input type="checkbox" value="${item.id}" checked>
                <span>${item.label}</span>
            `;
            box.appendChild(label);
        });
    }

    // Tab 切换
    function switchTab(tabId) {
        document.querySelectorAll('.tab-view').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active'); // 注意：这里的event是全局的，可能需要优化
    }
    // 修复 Tab 切换的 event 问题
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-view').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        // 查找对应的nav-item
        const items = document.querySelectorAll('.nav-item');
        if (tabId === 'study') items[0].classList.add('active');
        if (tabId === 'practice') items[1].classList.add('active');
        if (tabId === 'mistakes') {
            items[2].classList.add('active');
            renderMistakes();
        }
    };

    // ================= 错题本逻辑 =================
    function saveMistake(grammarId) {
        let mistakes = JSON.parse(localStorage.getItem('noun_mistakes') || '[]');
        if (!mistakes.includes(grammarId)) {
            mistakes.push(grammarId);
            localStorage.setItem('noun_mistakes', JSON.stringify(mistakes));
        }
    }

    function renderMistakes() {
        const mistakes = JSON.parse(localStorage.getItem('noun_mistakes') || '[]');
        const list = document.getElementById('mistakeList');
        
        if (mistakes.length === 0) {
            list.innerHTML = '<div style="text-align:center; color:#999; margin-top:50px;">暂无错题，继续加油！</div>';
            return;
        }

        list.innerHTML = '';
        
        // 遍历所有数据查找对应的语法点
        formalNouns.forEach(noun => {
            noun.grammars.forEach(g => {
                if (mistakes.includes(g.id)) {
                    const div = document.createElement('div');
                    div.className = 'grammar-item';
                    div.style.borderLeft = "4px solid #e74c3c";
                    div.innerHTML = `
                        <div class="grammar-head">
                            <span class="grammar-pt">${g.pt}</span>
                            <span class="level-tag tag-${g.lv}">${g.lv}</span>
                        </div>
                        <div class="grammar-mean">${g.mean}</div>
                        <div class="grammar-ex">${g.ex}</div>
                        <div style="text-align:right; margin-top:10px;">
                            <button onclick="removeMistake('${g.id}')" style="font-size:0.8rem; color:#999; background:none; border:none; cursor:pointer;">已掌握，移除 ✕</button>
                        </div>
                    `;
                    list.appendChild(div);
                }
            });
        });
    }

    function removeMistake(grammarId) {
        let mistakes = JSON.parse(localStorage.getItem('noun_mistakes') || '[]');
        mistakes = mistakes.filter(id => id !== grammarId);
        localStorage.setItem('noun_mistakes', JSON.stringify(mistakes));
        renderMistakes(); // 重新渲染
    }

    function clearMistakes() {
        if(confirm('确定要清空所有错题记录吗？')) {
            localStorage.removeItem('noun_mistakes');
            renderMistakes();
        }
    }

    function toggleSettings() {
        const content = document.getElementById('settingContent');
        const icon = document.getElementById('settingIcon');
        if (content.style.display === 'none') {
            content.style.display = 'block';
            icon.innerText = '▼';
        } else {
            content.style.display = 'none';
            icon.innerText = '▲';
        }
    }

    // ================= 练习逻辑 =================
    let streak = 0;
    let state = 'idle';
    let currentQ = {};
    let validQuestions = [];

    function restartGame() {
        toggleSettings();
        streak = 0;
        document.getElementById('streakVal').innerText = streak;
        startGame();
    }

    function startGame() {
        // 1. 获取名词筛选
        const nounChecks = document.querySelectorAll('#nounFilter input:checked');
        const selectedNouns = Array.from(nounChecks).map(cb => cb.value);

        // 2. 获取级别筛选
        const levelChecks = document.querySelectorAll('#levelFilter input:checked');
        const selectedLevels = Array.from(levelChecks).map(cb => cb.value);

        if (selectedNouns.length === 0 || selectedLevels.length === 0) {
            alert("请至少选择一个名词和一个级别！");
            return;
        }

        // 3. 构建题库
        validQuestions = [];
        formalNouns.forEach(noun => {
            if (selectedNouns.includes(noun.id)) {
                noun.grammars.forEach(g => {
                    if (selectedLevels.includes(g.lv) && g.questions) {
                        g.questions.forEach(q => {
                            validQuestions.push({
                                q: q.q,
                                a: q.a,
                                hint: g.mean,
                                lv: g.lv,
                                fullEx: g.ex, // 仍保留原例句作为解析参考
                                grammarId: g.id,
                                nounId: noun.id
                            });
                        });
                    }
                });
            }
        });

        if (validQuestions.length === 0) {
            alert("没有符合条件的题目，请调整筛选设置。");
            return;
        }

        // UI 切换
        document.getElementById('quizCard').classList.remove('hidden');
        document.getElementById('resultCard').classList.add('hidden');
        document.getElementById('startBtn').classList.add('hidden'); // 隐藏开始按钮
        document.getElementById('endBtn').classList.remove('hidden');
        
        nextQuestion();
    }

    function nextQuestion() {
        state = 'answering';
        const idx = Math.floor(Math.random() * validQuestions.length);
        currentQ = validQuestions[idx];

        document.getElementById('qDisplay').innerHTML = currentQ.q.replace('____', '<span style="border-bottom:2px solid var(--primary); color:var(--primary); padding:0 5px;">____</span>');
        document.getElementById('qHint').innerText = "含义: " + currentQ.hint;
        
        const tag = document.getElementById('qTag');
        tag.className = `level-tag tag-${currentQ.lv}`;
        tag.innerText = currentQ.lv;

        // 生成选项
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';
        
        // 准备选项：正确答案 + 3个干扰项
        const distractors = formalNouns
            .filter(n => n.label !== currentQ.a) // 排除正确答案
            .sort(() => 0.5 - Math.random()) // 随机打乱
            .slice(0, 3) // 取前3个
            .map(n => n.label);
        
        const options = [currentQ.a, ...distractors].sort(() => 0.5 - Math.random()); // 混合并打乱

        options.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt);
            grid.appendChild(btn);
        });

        document.getElementById('feedback').innerText = '';
        document.getElementById('actionBtn').classList.add('hidden'); // 隐藏下一题按钮，直到作答
    }

    function checkAnswer(btn, userVal) {
        if (state !== 'answering') return;
        state = 'result';

        // 禁用所有按钮
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.classList.add('disabled'));

        const isCorrect = userVal === currentQ.a;

        if (isCorrect) {
            streak++;
            btn.classList.add('correct');
            document.getElementById('feedback').innerHTML = `<span style='color:var(--success)'>⭕️ 正确！</span>`;
        } else {
            streak = 0;
            btn.classList.add('wrong');
            // 找出正确按钮并高亮
            allBtns.forEach(b => {
                if (b.innerText === currentQ.a) b.classList.add('correct');
            });
            document.getElementById('feedback').innerHTML = `<span style='color:var(--error)'>❌ 应该是: ${currentQ.a}<br><span style="font-size:0.8em;color:#666">${currentQ.fullEx}</span></span>`;
            
            // 记录错题
            saveMistake(currentQ.grammarId);
        }

        document.getElementById('streakVal').innerText = streak;
        document.getElementById('actionBtn').classList.remove('hidden'); // 显示下一题按钮
    }

    function finishGame() {
        document.getElementById('quizCard').classList.add('hidden');
        document.getElementById('resultCard').classList.remove('hidden');
        document.getElementById('endBtn').classList.add('hidden');
        document.getElementById('startBtn').classList.remove('hidden');
        document.getElementById('startBtn').innerText = "再练一次";
        document.getElementById('actionBtn').classList.add('hidden');
        
        document.getElementById('finalScore').innerText = streak;
        
        let comment = streak > 10 ? "太棒了！" : "继续加油！";
        document.getElementById('finalComment').innerText = comment;
    }

    // 启动
    init();

</script>

</body>
</html>
