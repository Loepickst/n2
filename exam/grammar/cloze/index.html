<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT 完形填空 - 水彩笔记特训</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;600;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['"Noto Sans SC"', '"Noto Sans JP"', 'sans-serif'],
                        'serif-jp': ['"Noto Serif SC"', '"Noto Serif JP"', '"Songti SC"', '"SimSun"', 'serif'],
                        'serif-sc': ['"Noto Serif SC"', '"Noto Serif JP"', '"Songti SC"', '"SimSun"', 'serif'],
                    },
                    colors: {
                        bgMain: '#ffffff',
                        bgCard: '#ffffff',
                        textMain: '#333333',
                        textSub: '#666666',
                        textMuted: '#999999',
                        borderMain: '#e5e5e5',
                        borderDark: '#cccccc',
                        borderStrong: '#333333',
                        accentRed: '#e64a4a',
                        markerYellow: 'rgba(255, 213, 79, 0.25)',
                        markerBlue: 'rgba(129, 212, 250, 0.25)',
                        markerMint: 'rgba(134, 239, 172, 0.25)',
                        markerLavender: 'rgba(196, 181, 253, 0.25)',
                        markerPink: 'rgba(244, 143, 177, 0.25)',
                        markerGray: 'rgba(200, 200, 200, 0.2)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bgMain: #ffffff;
            --textMain: #333333;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--bgMain);
            color: var(--textMain);
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        .sketch-box {
            border: 1.5px solid #333333 !important;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px !important;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.02) !important;
            transition: all 0.2s ease;
        }

        .sketch-btn {
            border: 1.5px solid #333333 !important;
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px !important;
            transition: all 0.2s ease;
        }

        .hatching-bg {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px) !important;
        }

        .hatching-yellow {
            background-image: repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(255, 213, 79, 0.25) 2px, rgba(255, 213, 79, 0.25) 4px) !important;
        }

        .hatching-gray {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px) !important;
        }

        .font-title-unified {
            font-family: "Noto Serif SC", "Noto Serif JP", "Songti SC", "SimSun", serif;
            letter-spacing: 0.1em;
        }

        .page-shell {
            width: min(100%, 1000px);
            margin: 0 auto;
            padding: 32px 16px 48px;
            box-sizing: border-box;
        }

        .selection-view-shell {
            width: min(100%, 700px);
            margin-left: auto;
            margin-right: auto;
        }

        .selection-view-hero,
        .selection-view-standard {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        .sort-page-header {
            width: 100%;
            padding: 16px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            border-bottom: 1.5px solid #333333;
            border-bottom-left-radius: 50% 2px;
            border-bottom-right-radius: 50% 3px;
        }

        .back-btn {
            text-decoration: none;
            color: #333333;
            font-size: 14px;
            font-weight: 700;
            padding: 4px 12px;
            background: transparent;
            border: 1.5px solid #333333;
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            letter-spacing: 0.05em;
        }

        .back-btn:hover {
            background: rgba(255, 213, 79, 0.25);
        }

        .sort-page-header-title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #333333;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
        }

        .sort-page-header-title span {
            color: #333333;
            background: transparent;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
            border: 1.5px solid #333333;
            border-radius: 2px 8px 2px 6px / 6px 2px 8px 2px;
            font-family: "Noto Sans JP", "Noto Sans SC", sans-serif;
        }

        .sort-page-header-spacer {
            width: 70px;
            flex: 0 0 70px;
        }

        .home-btn {
            min-width: 56px;
            justify-content: center;
        }

        .review-panel {
            background: rgba(255, 213, 79, 0.15);
        }

        .review-panel > summary {
            list-style: none;
        }

        .review-panel > summary::-webkit-details-marker {
            display: none;
        }

        .review-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1.5px dashed transparent;
        }

        .review-panel[open] .review-summary {
            padding-bottom: 12px;
            border-bottom-color: #cccccc;
        }

        .review-summary-main {
            min-width: 0;
        }

        .review-summary-title {
            font-size: 1rem;
            font-weight: 800;
            color: #333333;
            letter-spacing: 0.08em;
        }

        .review-summary-meta {
            margin-top: 4px;
            font-size: 0.74rem;
            font-weight: 700;
            color: #666666;
            line-height: 1.5;
        }

        .review-summary-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .review-status-pill,
        .review-count-pill {
            border: 1.5px solid #333333;
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
            padding: 4px 8px;
            font-size: 0.72rem;
            font-weight: 800;
            white-space: nowrap;
            background: #ffffff;
        }

        .review-status-pill.has-items {
            color: #e64a4a;
            background: rgba(255, 213, 79, 0.28);
        }

        .review-summary-action::after {
            content: "展开";
        }

        .review-panel[open] .review-summary-action::after {
            content: "收起";
        }

        .review-empty {
            color: #666666;
            font-size: 0.82rem;
            font-weight: 700;
            line-height: 1.7;
        }

        .history-panel {
            background: rgba(129, 212, 250, 0.12);
        }

        .history-list {
            display: grid;
            gap: 10px;
        }

        .history-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: #ffffff;
            border: 1.5px solid #333333;
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
        }

        .history-item-title {
            color: #333333;
            font-size: 0.88rem;
            font-weight: 800;
            line-height: 1.4;
        }

        .history-item-meta {
            margin-top: 3px;
            color: #666666;
            font-size: 0.72rem;
            font-weight: 700;
            line-height: 1.45;
        }

        .history-item-score {
            color: #333333;
            font-size: 0.95rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .history-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .history-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 7px;
            border: 1px solid #333333;
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
            background: rgba(255, 213, 79, 0.18);
            color: #333333;
            font-size: 0.68rem;
            font-weight: 800;
            line-height: 1.25;
        }

        .entry-disabled {
            opacity: 0.48;
            cursor: not-allowed;
        }

        #view-level-select button,
        #view-mode-select button,
        #view-year-select button {
            border: 1.5px solid #333333 !important;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px !important;
            box-shadow: none !important;
            background-color: transparent;
            transition: all 0.2s ease;
        }

        #view-level-select button:hover:not(:disabled),
        #view-mode-select button:hover:not(:disabled),
        #view-year-select button:hover:not(:disabled) {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px) !important;
            transform: translate(-1px, -1px);
        }

        .training-mode-overlay {
            position: fixed;
            inset: 0;
            z-index: 2100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
        }

        .training-mode-overlay[hidden] {
            display: none;
        }

        .training-mode-modal {
            width: min(100%, 580px);
            padding: 32px;
            border: 1.5px solid #333333;
            background: #ffffff;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .training-mode-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333333;
            letter-spacing: 0.1em;
        }

        .training-mode-subtitle {
            margin-top: 8px;
            color: #666666;
            font-size: 0.95rem;
        }

        .training-mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 24px;
        }

        .training-mode-card {
            appearance: none;
            border: 1.5px dashed #cccccc;
            border-radius: 8px;
            background: transparent;
            padding: 20px 18px;
            text-align: left;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .training-mode-card:hover {
            border-color: #333333;
            background: rgba(129, 212, 250, 0.1);
        }

        .training-mode-card.is-selected {
            background: rgba(129, 212, 250, 0.25);
            border-color: #333333;
            border-style: solid;
        }

        .training-mode-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333333;
        }

        .training-mode-card-copy {
            margin-top: 10px;
            color: #666666;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .training-mode-card-tag {
            display: inline-flex;
            padding: 2px 8px;
            border: 1px solid #333333;
            border-radius: 4px;
            font-size: 0.72rem;
            margin-top: 12px;
        }

        .training-mode-chip,
        .training-mode-action {
            border: 1.5px solid #333333;
            border-radius: 6px;
            padding: 8px 16px;
            background: transparent;
            font-size: 0.9rem;
            font-weight: 700;
            color: #333333;
        }

        .training-mode-chip.is-selected,
        .training-mode-action.is-primary {
            background: #333333 !important;
            color: #ffffff !important;
        }

        .training-mode-timer {
            margin-top: 24px;
            padding: 20px;
            border: 1.5px dashed #cccccc;
            border-radius: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 720px) {
            .sort-page-header {
                padding: 12px 16px;
            }

            .sort-page-header-title {
                font-size: 16px;
            }

            .back-btn {
                font-size: 12px;
                padding: 4px 10px;
            }

            .home-btn {
                min-width: 50px;
            }

            .page-shell {
                padding: 24px 14px 44px;
            }
        }

        @media (max-width: 520px) {
            .sort-page-header {
                padding: 10px 12px;
            }

            .back-btn {
                font-size: 11px;
                padding: 4px 8px;
            }

            .sort-page-header-title {
                font-size: 15px;
            }

            .sort-page-header-title span {
                font-size: 10px;
                padding: 2px 6px;
            }

            .sort-page-header-spacer {
                width: 58px;
                flex-basis: 58px;
            }

            .home-btn {
                min-width: 46px;
            }

            .review-summary {
                align-items: flex-start;
                gap: 10px;
            }

            .review-summary-status {
                gap: 6px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .review-status-pill,
            .review-count-pill {
                font-size: 0.68rem;
                padding: 3px 7px;
            }

            .history-item {
                grid-template-columns: 1fr;
                gap: 6px;
            }

            .history-item-score {
                justify-self: start;
                font-size: 0.86rem;
            }

            .history-pill {
                font-size: 0.64rem;
            }

            .training-mode-modal {
                padding: 20px;
            }

            .training-mode-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-top: 18px;
            }

            .training-mode-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen">

    <header class="sort-page-header">
        <button type="button" id="page-back-btn" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            戻る
        </button>
        <h1 class="sort-page-header-title">文法 <span>完形填空</span></h1>
        <a href="../../../index.html" class="back-btn home-btn">主页</a>
    </header>

    <div class="page-shell">
        <div class="max-w-4xl mx-auto">
            <div id="view-level-select" class="view-section active selection-view-shell selection-view-hero">
                <div class="text-center mb-10">
                    <div style="display:inline-block; font-size: 12px; font-weight: 700; background: rgba(196, 181, 253, 0.25); padding: 4px 12px; border-radius: 4px; border: 1px solid #333; margin-bottom: 16px;">✎ 完形填空笔记</div>
                    <h1 class="text-2xl md:text-3xl font-title-unified font-bold text-textMain tracking-[0.05em] mb-4">文法：完形填空特训</h1>
                    <p class="text-textSub font-bold text-sm">请选择 N2 真题练习</p>
                </div>

                <div class="flex flex-col md:flex-row justify-center gap-6 mb-6">
                    <button type="button" onclick="app.selectLevel('N2')" class="flex-1 flex flex-col items-center group relative overflow-hidden bg-white py-8 px-6 sketch-box">
                        <span class="text-3xl font-bold font-sans text-textMain mb-2 group-hover:scale-105 transition-transform">N2</span>
                        <span class="text-xs text-textSub font-bold tracking-widest">真题练习</span>
                    </button>
                </div>
            </div>

            <div id="view-mode-select" class="view-section selection-view-shell selection-view-standard">
                <div class="mb-8 text-center">
                    <h2 class="text-xl font-bold text-textMain tracking-widest">
                        <span id="display-selected-level" style="background: rgba(196, 181, 253, 0.25); padding: 2px 8px; border: 1px solid #333; border-radius: 4px;" class="text-lg mr-2">N?</span>练习模式
                    </h2>
                </div>

                <div class="grid grid-cols-1 gap-6">
                    <button type="button" onclick="app.showYearList()" class="group text-left bg-white p-6 relative overflow-hidden flex flex-col items-start sketch-box">
                        <div class="w-10 h-10 border border-borderStrong rounded-md flex items-center justify-center mb-4" style="background: rgba(129, 212, 250, 0.25);">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-textMain"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                        </div>
                        <h3 class="text-lg font-bold text-textMain mb-2 tracking-wide">年度练习</h3>
                        <p class="text-xs text-textSub font-bold leading-relaxed">按年份进入文章文法真题，选择学习或测试模式后开始。</p>
                    </button>
                </div>
            </div>

            <div id="view-year-select" class="view-section selection-view-shell selection-view-standard">
                <div class="mb-8 text-center">
                    <h2 class="text-xl font-bold text-textMain tracking-widest">
                        <span id="display-year-level" style="background: rgba(196, 181, 253, 0.25); padding: 2px 8px; border: 1px solid #333; border-radius: 4px;" class="text-lg mr-2">N?</span>年度练习
                    </h2>
                    <p class="text-textSub font-bold text-xs mt-3">阅读文章整体脉络，选择空格中最合适的表达。</p>
                </div>

                <details id="year-review-section" class="review-panel mb-8 p-5 sketch-box">
                    <summary class="review-summary">
                        <div class="review-summary-main">
                            <div class="review-summary-title">✔ 错题复习</div>
                        </div>
                        <div class="review-summary-status">
                            <span id="year-review-status" class="review-status-pill">暂无错题</span>
                            <span id="year-review-count" class="review-count-pill">0 题</span>
                            <span class="review-count-pill review-summary-action" aria-hidden="true"></span>
                        </div>
                    </summary>
                    <div id="year-review-grid" class="mt-4 flex flex-wrap gap-3">
                    </div>
                </details>

                <details id="year-history-section" class="review-panel history-panel mb-8 p-5 sketch-box">
                    <summary class="review-summary">
                        <div class="review-summary-main">
                            <div class="review-summary-title">练习历史</div>
                        </div>
                        <div class="review-summary-status">
                            <span id="year-history-status" class="review-status-pill">暂无记录</span>
                            <span id="year-history-count" class="review-count-pill">0 次</span>
                            <span class="review-count-pill review-summary-action" aria-hidden="true"></span>
                        </div>
                    </summary>
                    <div id="year-history-list" class="history-list mt-4">
                    </div>
                </details>

                <div id="year-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                </div>
            </div>

            <div id="training-mode-overlay" class="training-mode-overlay" hidden>
                <div class="training-mode-modal" role="dialog" aria-modal="true" aria-labelledby="training-mode-title">
                    <div id="training-mode-title" class="training-mode-title">选择练习方式</div>
                    <div id="training-mode-subtitle" class="training-mode-subtitle">先决定这篇文章要慢慢学，还是限时做。</div>
                    <div class="training-mode-grid">
                        <button type="button" class="training-mode-card" data-training-mode="study">
                            <div class="training-mode-card-title">学习模式</div>
                            <div class="training-mode-card-copy">打开文章后自由作答，可配合计时工具慢慢整理文章逻辑。</div>
                            <div class="training-mode-card-tag">自由练习</div>
                        </button>
                        <button type="button" class="training-mode-card" data-training-mode="challenge">
                            <div class="training-mode-card-title">测试模式</div>
                            <div class="training-mode-card-copy">进入后先设置倒计时，开始考试后再显示内容。</div>
                            <div class="training-mode-card-tag">倒计时</div>
                        </button>
                    </div>
                    <div id="training-mode-timer" class="training-mode-timer" hidden>
                        <div class="text-sm font-bold mb-3 text-textMain">设置限时</div>
                        <div class="flex flex-wrap gap-3">
                            <button type="button" class="training-mode-chip" data-training-minutes="8">8 分</button>
                            <button type="button" class="training-mode-chip" data-training-minutes="10">10 分</button>
                            <button type="button" class="training-mode-chip" data-training-minutes="15">15 分</button>
                            <label class="inline-flex items-center gap-2 border border-borderStrong rounded-md px-3 bg-transparent text-sm font-bold text-textMain">
                                自定义
                                <input id="training-mode-custom-input" type="number" min="1" max="180" step="1" value="10" style="width: 40px; border:none; text-align:center; outline:none; background: transparent;">
                                分
                            </label>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 mt-6">
                        <button type="button" id="training-mode-cancel-btn" class="training-mode-action" style="border:none; text-decoration:underline;">取消</button>
                        <button type="button" id="training-mode-confirm-btn" class="training-mode-action is-primary">开始</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./shared/cloze-history.js"></script>
    <script>
        const clozeEntries = [
            { level: 'N2', year: '2020年12月', title: 'ロボット・セラピー', href: './n2/2020.12.html' },

            { level: 'N2', year: '2010年12月', title: '花粉症とうまく付き合う', href: './n2/2010.12.html' },
            { level: 'N2', year: '2010年7月', title: '血液型と性格', href: './n2/2010.7.html' }
        ];

        function replaceAppUrl(params = {}) {
            const url = new URL(window.location.href);
            url.search = '';
            Object.entries(params).forEach(([key, value]) => {
                if (value) url.searchParams.set(key, value);
            });
            window.history.replaceState({}, '', url.toString());
        }

        function isEnabledLevel(level) {
            return clozeEntries.some(entry => entry.level === level);
        }

        function getClozeEntryId(entry) {
            return String(entry?.href || '').split('/').pop().replace(/\.html(?:\?.*)?$/, '');
        }

        function getClozeMistakesKey(entry) {
            return `grammar_cloze_mistakes::${entry.level}::${getClozeEntryId(entry)}`;
        }

        function getClozeMistakes(entry) {
            try {
                const parsed = JSON.parse(localStorage.getItem(getClozeMistakesKey(entry)) || '[]');
                return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
            } catch (error) {
                return [];
            }
        }

        function getClozeHistoryApi() {
            return window.ClozeHistory || null;
        }

        function renderHistoryScore(record) {
            if (!record || !record.total) return '';
            const percent = Math.round((record.accuracy || 0) * 100);
            return `${record.correct}/${record.total} · ${percent}%`;
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        const app = {
            currentLevel: null,
            trainingPicker: {
                entry: null,
                isReview: false,
                selectedMode: 'study',
                minutes: 10
            },

            init() {
                const params = new URLSearchParams(window.location.search);
                const level = params.get('level');
                const view = params.get('view');
                if (level && isEnabledLevel(level)) {
                    this.currentLevel = level;
                    document.getElementById('display-selected-level').textContent = level;
                    document.getElementById('display-year-level').textContent = level;
                    if (view === 'years') {
                        this.showYearList({ updateUrl: false });
                    } else {
                        this.switchView('view-mode-select');
                    }
                }
            },

            switchView(viewId) {
                document.querySelectorAll('.view-section').forEach(section => section.classList.remove('active'));
                document.getElementById(viewId)?.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'instant' });
            },

            getActiveViewId() {
                return document.querySelector('.view-section.active')?.id || 'view-level-select';
            },

            handleHeaderBack() {
                const activeViewId = this.getActiveViewId();
                if (activeViewId === 'view-level-select') {
                    window.location.href = '../index.html';
                    return;
                }
                if (activeViewId === 'view-mode-select') {
                    this.currentLevel = null;
                    replaceAppUrl({});
                    this.switchView('view-level-select');
                    return;
                }
                if (activeViewId === 'view-year-select') {
                    replaceAppUrl({ level: this.currentLevel });
                    this.switchView('view-mode-select');
                }
            },

            selectLevel(level) {
                if (!isEnabledLevel(level)) return;
                this.currentLevel = level;
                document.getElementById('display-selected-level').textContent = level;
                document.getElementById('display-year-level').textContent = level;
                replaceAppUrl({ level });
                this.switchView('view-mode-select');
            },

            showYearList(options = {}) {
                if (!this.currentLevel || !isEnabledLevel(this.currentLevel)) return;
                if (options.updateUrl !== false) replaceAppUrl({ level: this.currentLevel, view: 'years' });
                document.getElementById('display-year-level').textContent = this.currentLevel;

                const container = document.getElementById('year-list-container');
                const entries = clozeEntries.filter(entry => entry.level === this.currentLevel);
                const reviewGrid = document.getElementById('year-review-grid');
                const reviewStatus = document.getElementById('year-review-status');
                const reviewCount = document.getElementById('year-review-count');
                const historyApi = getClozeHistoryApi();
                const historySection = document.getElementById('year-history-section');
                const historyStatus = document.getElementById('year-history-status');
                const historyCount = document.getElementById('year-history-count');
                const historyList = document.getElementById('year-history-list');
                const reviewItems = entries.map((entry) => ({ entry, mistakes: getClozeMistakes(entry) })).filter(item => item.mistakes.length > 0);
                const totalReviewCount = reviewItems.reduce((sum, item) => sum + item.mistakes.length, 0);
                if (reviewStatus) {
                    reviewStatus.textContent = totalReviewCount > 0 ? '有待复习' : '暂无错题';
                    reviewStatus.classList.toggle('has-items', totalReviewCount > 0);
                }
                if (reviewCount) reviewCount.textContent = `${totalReviewCount} 题`;
                if (reviewGrid) {
                    reviewGrid.hidden = reviewItems.length === 0;
                    reviewGrid.innerHTML = reviewItems.map((item) => {
                        const entryIndex = clozeEntries.indexOf(item.entry);
                        return `
                            <button type="button" onclick="app.openTrainingModePicker(${entryIndex}, true)" class="group inline-flex items-center gap-2 px-4 py-2 border-[1.5px] border-borderStrong bg-white text-textMain text-sm font-bold hover:bg-red-50 hover:text-accentRed transition-all sketch-btn">
                                <span>${item.entry.year}</span>
                                <span class="max-w-[180px] truncate text-textSub">${item.entry.title || '文章の文法'}</span>
                                <span class="text-xs px-2 py-0.5 border border-borderStrong bg-red-50 text-accentRed rounded-sm">待复习 ${item.mistakes.length} 题</span>
                            </button>
                        `;
                    }).join('');
                }
                if (historyApi && historyList) {
                    const historyRecords = historyApi.getRecords({ level: this.currentLevel });
                    const recentRecords = historyRecords.slice(0, 6);
                    if (historyStatus) {
                        historyStatus.textContent = historyRecords.length > 0 ? '已有记录' : '暂无记录';
                        historyStatus.classList.toggle('has-items', historyRecords.length > 0);
                    }
                    if (historyCount) historyCount.textContent = `${historyRecords.length} 次`;
                    if (historySection) historySection.open = historyRecords.length > 0;
                    historyList.innerHTML = recentRecords.length > 0
                        ? recentRecords.map((record) => `
                            <div class="history-item">
                                <div class="min-w-0">
                                    <div class="history-item-title">${record.year ? `${escapeHtml(record.year)} · ` : ''}${escapeHtml(record.title || '文章の文法')}</div>
                                    <div class="history-item-meta">${escapeHtml(historyApi.formatDate(record.completedAt))} · ${escapeHtml(historyApi.modeLabel(record.mode))} · 错 ${record.wrongCount || 0} 题</div>
                                </div>
                                <div class="history-item-score">${renderHistoryScore(record)}</div>
                            </div>
                        `).join('')
                        : '<div class="review-empty">还没有练习记录。做完一篇后，这里会留下最近成绩。</div>';
                }
                container.innerHTML = entries.map((entry) => {
                    const entryIndex = clozeEntries.indexOf(entry);
                    const stats = historyApi ? historyApi.getStatsByEntry(entry) : null;
                    const latest = stats?.latest;
                    const best = stats?.best;
                    const historyPills = stats && stats.attempts > 0 ? `
                        <div class="history-pills">
                            ${latest ? `<span class="history-pill">上次 ${renderHistoryScore(latest)}</span>` : ''}
                            ${best ? `<span class="history-pill">最佳 ${renderHistoryScore(best)}</span>` : ''}
                            <span class="history-pill">${stats.attempts} 次</span>
                        </div>
                    ` : '';
                    return `
                    <button type="button" onclick="app.openTrainingModePicker(${entryIndex})" class="flex items-center justify-between gap-4 p-5 border-[1.5px] border-borderStrong transition-all group text-left sketch-box">
                        <div class="min-w-0">
                            <div class="font-bold text-lg text-textMain tracking-wider">${escapeHtml(entry.year)}</div>
                            <div class="mt-1 text-xs text-textSub font-bold leading-relaxed">${escapeHtml(entry.title || '文章の文法')}</div>
                            ${historyPills}
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <div class="text-sm text-textSub font-sans bg-white px-2 py-1 border-[1px] border-borderStrong rounded-sm">进入练习</div>
                        </div>
                    </button>
                `;
                }).join('');
                this.switchView('view-year-select');
            },

            syncTrainingModePicker() {
                const overlay = document.getElementById('training-mode-overlay');
                const timerPanel = document.getElementById('training-mode-timer');
                const customInput = document.getElementById('training-mode-custom-input');
                const isChallenge = this.trainingPicker.selectedMode === 'challenge';
                if (timerPanel) timerPanel.hidden = !isChallenge;
                if (customInput) customInput.value = String(this.trainingPicker.minutes);
                document.querySelectorAll('[data-training-mode]').forEach((button) => {
                    button.classList.toggle('is-selected', button.dataset.trainingMode === this.trainingPicker.selectedMode);
                });
                document.querySelectorAll('[data-training-minutes]').forEach((button) => {
                    button.classList.toggle('is-selected', Number(button.dataset.trainingMinutes) === this.trainingPicker.minutes);
                });
                if (overlay) overlay.hidden = !this.trainingPicker.entry;
            },

            openTrainingModePicker(entryIndex, isReview = false) {
                const entry = clozeEntries[entryIndex];
                if (!entry) return;
                this.trainingPicker.entry = entry;
                this.trainingPicker.isReview = Boolean(isReview);
                this.trainingPicker.selectedMode = 'study';
                this.trainingPicker.minutes = 10;
                this.syncTrainingModePicker();
            },

            closeTrainingModePicker() {
                this.trainingPicker.entry = null;
                this.trainingPicker.isReview = false;
                this.syncTrainingModePicker();
            },

            setTrainingPickerMode(mode) {
                this.trainingPicker.selectedMode = mode === 'challenge' ? 'challenge' : 'study';
                this.syncTrainingModePicker();
            },

            setTrainingPickerMinutes(value) {
                const numeric = Number(value);
                this.trainingPicker.minutes = Number.isFinite(numeric)
                    ? Math.min(180, Math.max(1, Math.round(numeric)))
                    : 10;
                this.syncTrainingModePicker();
            },

            confirmTrainingModePicker() {
                const entry = this.trainingPicker.entry;
                if (!entry) return;
                const targetUrl = new URL(entry.href, window.location.href);
                if (this.trainingPicker.selectedMode === 'challenge') {
                    targetUrl.searchParams.set('readingMode', 'test');
                    targetUrl.searchParams.set('timer', String(this.trainingPicker.minutes));
                } else {
                    targetUrl.searchParams.set('readingMode', 'study');
                }
                if (this.trainingPicker.isReview) {
                    targetUrl.searchParams.set('mode', 'review');
                }
                window.location.href = targetUrl.href;
            }
        };

        document.getElementById('page-back-btn').addEventListener('click', () => app.handleHeaderBack());
        document.querySelectorAll('[data-training-mode]').forEach((button) => {
            button.addEventListener('click', () => app.setTrainingPickerMode(button.dataset.trainingMode));
        });
        document.querySelectorAll('[data-training-minutes]').forEach((button) => {
            button.addEventListener('click', () => app.setTrainingPickerMinutes(button.dataset.trainingMinutes));
        });
        document.getElementById('training-mode-custom-input')?.addEventListener('input', (event) => app.setTrainingPickerMinutes(event.target.value));
        document.getElementById('training-mode-custom-input')?.addEventListener('change', (event) => app.setTrainingPickerMinutes(event.target.value));
        document.getElementById('training-mode-cancel-btn')?.addEventListener('click', () => app.closeTrainingModePicker());
        document.getElementById('training-mode-confirm-btn')?.addEventListener('click', () => app.confirmTrainingModePicker());
        document.getElementById('training-mode-overlay')?.addEventListener('click', (event) => {
            if (event.target && event.target.id === 'training-mode-overlay') app.closeTrainingModePicker();
        });
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
