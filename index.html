<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kikiの日本語の家</title>
    <!-- 引入明朝体与黑体，确保不同字重下显示清晰细腻 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 极简和风调色板 */
            --page-bg: #f7f6f2;      /* 和纸底色 */
            --panel-bg: #ffffff;     /* 纯白 */
            --panel-strong: #faf9f6; /* 微暖白 */
            --ink-main: #2c363f;     /* 墨色/深靛蓝 */
            --ink-soft: #73736e;     /* 偏暖的灰 */
            --accent: #993333;       /* 薄朱/暗红 */
            --accent-soft: rgba(153, 51, 51, 0.06);
            --line: #e6e4df;         /* 细腻的边界线 */
            --line-strong: #dcd6cc;  /* 加深的边界线 */
            
            /* 硬朗但极淡的实体阴影（版画/凸版印刷感） */
            --shadow-soft: 2px 2px 0px rgba(44, 54, 63, 0.04);
            --shadow-card: 3px 3px 0px rgba(44, 54, 63, 0.05);
            
            /* 更加克制的微圆角，增强精致的木牌/卡片感 */
            --radius-xl: 6px;
            --radius-lg: 4px;
            --radius-md: 3px;
            --radius-sm: 2px;
            
            /* 对齐 ki计划 首页的整体视口宽度基线 */
            --site-width: 1020px;
            --transition: 250ms cubic-bezier(0.2, 0.8, 0.2, 1);
            
            --font-ui: "Noto Sans SC", "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: "Noto Serif SC", "Noto Serif JP", "Songti SC", "SimSun", serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            overscroll-behavior-y: none;
        }

        body {
            min-height: 100vh;
            font-family: var(--font-ui);
            color: var(--ink-main);
            background: var(--page-bg);
            font-synthesis: none;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            overscroll-behavior-y: none;
            letter-spacing: 0.02em;
        }

        body.modal-open {
            overflow: hidden;
        }

        /* 极其微妙的背景肌理 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--line-strong) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.25;
            pointer-events: none;
        }

        a, button, input { font: inherit; }
        a { color: inherit; }
        button { border: none; background: none; cursor: pointer; color: inherit; }

        .page-shell {
            position: relative;
            z-index: 1;
            width: min(calc(100% - 28px), var(--site-width));
            margin: 16px auto;
            padding: 20px;
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            background: var(--panel-bg);
            box-shadow: 0 4px 16px rgba(0,0,0,0.02);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 2px 2px 16px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 20px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            min-width: 0;
        }

        .brand-avatar {
            width: 58px;
            height: 58px;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--line-strong);
            flex-shrink: 0;
            padding: 2px;
            background: #fff;
        }

        .brand-avatar img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }

        .brand-copy {
            min-width: 0;
        }

        .brand-name {
            display: block;
            font-family: var(--font-display);
            font-size: 21px;
            letter-spacing: 0.12em;
            font-weight: 600;
            color: var(--ink-main);
        }

        .brand-sub {
            display: block;
            margin-top: 4px;
            color: var(--ink-soft);
            font-size: 11px;
            letter-spacing: 0.15em;
            font-family: var(--font-display);
        }

        .tool-rail {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            min-width: 0;
        }

        .tool-countdown {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 44px;
            padding: 0 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--line);
            background: var(--panel-strong);
            color: var(--ink-main);
            font-size: 12.5px;
            letter-spacing: 0.08em;
            font-family: var(--font-display);
            font-weight: 600;
            white-space: nowrap;
            min-width: 0;
            flex-shrink: 1;
            cursor: default;
        }

        .tool-countdown .tool-icon {
            width: 16px;
            height: 16px;
            color: var(--accent);
        }

        .countdown-copy {
            min-width: 0;
        }

        .countdown-copy--short {
            display: none;
        }

        /* 统一按钮形态：小巧、克制、方正 */
        .tool-button, .main-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 46px;
            padding: 0 16px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            background: var(--panel-strong);
            border: 1px solid var(--line);
            color: var(--ink-main);
            transition: all var(--transition);
            font-size: 13px;
            letter-spacing: 0.08em;
            font-family: var(--font-display);
            font-weight: 600;
        }

        .tool-button:hover, .main-chip:hover {
            transform: translate(-1px, -1px);
            background: var(--panel-bg);
            border-color: var(--ink-main);
            box-shadow: var(--shadow-soft);
        }

        /* ======= 御神签（日式抽签）风格运势入口 ======= */
        .tool-link--fortune {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            position: relative;
            background: #fffdfa; /* 微黄的纸色 */
            border: 1px solid var(--line-strong);
            border-left: 3px solid var(--accent); /* 左侧朱红强调，像挂签的边缘 */
            border-radius: var(--radius-sm);
            color: var(--ink-main);
            font-family: var(--font-display);
            font-size: 12.5px;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 0 14px 0 10px;
            min-height: 44px;
            overflow: hidden;
            text-decoration: none;
            transition: all var(--transition);
            box-shadow: 1px 1px 0 rgba(44, 54, 63, 0.03);
        }

        /* 底部若隐若现的“吉”字印章 */
        .tool-link--fortune::after {
            content: '吉';
            position: absolute;
            right: 2px;
            bottom: -8px;
            font-size: 28px;
            color: rgba(153, 51, 51, 0.06);
            font-family: var(--font-display);
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .tool-link--fortune .tool-icon {
            color: var(--accent);
            width: 16px;
            height: 16px;
        }

        .tool-link--fortune:hover {
            background: #ffffff;
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 2px 2px 0 rgba(153, 51, 51, 0.1);
            transform: translate(-1px, -1px);
        }

        .fortune-reminder-badge {
            position: absolute;
            top: -7px;
            right: -8px;
            min-width: 30px;
            height: 18px;
            padding: 0 7px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            border: 1px solid rgba(153, 51, 51, 0.18);
            background: linear-gradient(180deg, #fff9f3 0%, #fff1e6 100%);
            color: var(--accent);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.14em;
            box-shadow: 0 4px 10px rgba(153, 51, 51, 0.12);
            opacity: 0;
            transform: translateY(1px) scale(0.92);
            transform-origin: top right;
            pointer-events: none;
            transition: opacity var(--transition), transform var(--transition);
        }

        .tool-link--fortune.is-omikuji-available {
            border-color: rgba(153, 51, 51, 0.35);
            box-shadow: 0 0 0 1px rgba(153, 51, 51, 0.05), 2px 2px 0 rgba(153, 51, 51, 0.1);
        }

        .tool-link--fortune.is-omikuji-available .fortune-reminder-badge {
            opacity: 1;
            transform: translateY(0) scale(1);
            animation: fortuneBadgeNudge 1.8s ease-in-out infinite;
        }

        @keyframes fortuneBadgeNudge {
            0%, 100% {
                transform: translateY(0) rotate(-5deg);
            }
            50% {
                transform: translateY(-3px) rotate(2deg);
            }
        }
        /* =========================================== */

        .main-chip {
            width: 100%;
            font-size: 13px;
            padding: 0 16px;
        }

        .main-chip.is-active {
            background: var(--ink-main);
            border-color: var(--ink-main);
            color: #fff;
            box-shadow: none;
        }

        .icon-slot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            color: currentColor;
            flex-shrink: 0;
        }

        .icon-svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            vector-effect: non-scaling-stroke;
        }

        .page-main {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .switch-board {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .panel-stage {
            position: relative;
            min-height: 260px;
        }

        .notice-panel.is-hidden, .content-panel.is-hidden { display: none; }

        .notice-card {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: var(--panel-strong);
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 26px 30px;
        }

        .notice-meta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 11px;
            letter-spacing: 0.15em;
            font-weight: 600;
            font-family: var(--font-display);
        }

        .notice-countdown-inline {
            display: none;
            color: inherit;
            font: inherit;
            letter-spacing: inherit;
            white-space: nowrap;
        }

        .notice-title {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            line-height: 1.2;
            letter-spacing: 0.08em;
            font-weight: 600;
            color: var(--ink-main);
            border-bottom: 1px dashed var(--line-strong);
            padding-bottom: 20px;
            margin-bottom: 12px;
        }

        .notice-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 720px;
            color: #4a4744;
            font-size: 14px;
            line-height: 2;
            letter-spacing: 0.04em;
        }

        .notice-foot {
            margin-top: 8px;
            padding-top: 16px;
            border-top: 1px solid var(--line);
            color: var(--ink-soft);
            font-size: 12px;
            line-height: 1.8;
            letter-spacing: 0.05em;
        }

        .content-panel { padding: 18px 0; }
        .feature-panels { position: relative; }
        .feature-panel { display: none; }
        .feature-panel.is-active { display: block; }
        .feature-panel.is-entering { animation: featurePanelFade 240ms ease-out; }

        /* ======== 核心：电脑端4列，手机端2列 ======== */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }

        /* 课程卡片：小巧精致的木板印刷风格 */
        .feature-card {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: #FFFFFF;
            text-decoration: none;
            color: var(--ink-main);
            min-width: 0;
            opacity: 0;
            transform: translateY(14px);
            animation: revealCard 400ms ease-out forwards;
            animation-delay: calc(var(--item-index) * 48ms);
            transition: all var(--transition);
        }

        .feature-card:hover {
            transform: translate(-1px, -2px);
            border-color: var(--line-strong);
            box-shadow: var(--shadow-card);
        }

        .feature-card--disabled {
            cursor: default;
            background: var(--page-bg);
            border-style: dashed;
        }
        .feature-card--disabled:hover {
            transform: none;
            border-color: var(--line);
            box-shadow: none;
        }

        .feature-card--favorite, .feature-card--add {
            padding: 0;
            overflow: hidden;
        }
        .feature-card--add { width: 100%; text-align: left; cursor: pointer; }

        .feature-card-link {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 100%;
            padding: 12px;
            color: inherit;
            text-decoration: none;
        }

        .feature-card--favorite .feature-card-link { padding-top: 14px; }

        .feature-visual {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-md);
            aspect-ratio: 1 / 0.9;
            padding: 14px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .feature-cover {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .feature-cover img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .feature-cover::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(247, 246, 242, 0.1), rgba(247, 246, 242, 0.7));
        }

        /* 降低内部装饰的饱和度，贴合和风 */
        .feature-visual--sage { background: #f0eee9; }
        .feature-visual--pearl { background: #f5f4ef; }
        .feature-visual--mist { background: #ecebe6; }
        .feature-visual--blush { background: #f5ecec; }
        .feature-visual--favorite { background: #f2efe9; }
        
        .feature-visual--sage::before { background: rgba(140, 115, 85, 0.08); }
        .feature-visual--pearl::before { background: rgba(140, 115, 85, 0.06); }
        .feature-visual--mist::before { background: rgba(140, 115, 85, 0.08); }
        .feature-visual--blush::before { background: rgba(153, 51, 51, 0.06); }
        
        .feature-illustration {
            position: absolute;
            inset: 0;
            background-image: var(--feature-illustration, none);
            background-repeat: no-repeat;
            background-position: right -6px bottom -4px;
            background-size: 75% auto;
            opacity: 0.15;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .feature-visual::before, .feature-visual::after {
            content: "";
            position: absolute;
            opacity: 0.05;
        }
        .feature-visual::before {
            width: 60px;
            height: 60px;
            top: -15px;
            right: -15px;
            transform: rotate(15deg);
        }

        .feature-visual--add { justify-content: center; align-items: center; }

        .feature-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            display: inline-flex;
            align-items: center;
            min-height: 21px;
            padding: 0 8px;
            border-radius: var(--radius-sm);
            background: #ffffff;
            border: 1px solid var(--line);
            color: var(--ink-soft);
            font-size: 9px;
            letter-spacing: 0.15em;
            font-family: var(--font-display);
            z-index: 1;
        }

        .feature-art {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 58px;
            height: 58px;
            border-radius: var(--radius-sm);
            background: #ffffff;
            border: 1px solid var(--line);
            color: var(--ink-main);
        }
        .feature-art .icon-slot { width: 28px; height: 28px; }
        .feature-art--plus { width: 82px; height: 82px; }
        .feature-plus { font-family: var(--font-display); font-size: 44px; line-height: 1; font-weight: 400; }

        .feature-body {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 2px 4px;
        }

        .feature-title {
            font-family: var(--font-display);
            font-size: 18px;
            line-height: 1.18;
            letter-spacing: 0.08em;
            font-weight: 600;
            color: var(--ink-main);
        }

        .feature-desc {
            color: var(--ink-soft);
            font-size: 12px;
            line-height: 1.75;
            letter-spacing: 0.04em;
        }

        .feature-edit {
            position: absolute;
            top: 18px;
            right: 18px;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
            padding: 0 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--line);
            background: #ffffff;
            color: var(--ink-soft);
            font-size: 11px;
            letter-spacing: 0.06em;
            transition: all var(--transition);
            font-family: var(--font-display);
        }

        .feature-edit:hover {
            transform: translate(-1px, -1px);
            background: var(--panel-bg);
            border-color: var(--ink-main);
            color: var(--ink-main);
            box-shadow: 2px 2px 0 rgba(44, 54, 63, 0.05);
        }

        .page-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px dashed var(--line-strong);
            color: var(--ink-soft);
            font-size: 11px;
            letter-spacing: 0.15em;
            font-family: var(--font-display);
        }
        .page-footer a { text-decoration: none; }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(44, 54, 63, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }
        .modal-overlay.is-open { display: flex; }

        .modal-card {
            position: relative;
            width: min(100%, 400px);
            padding: 28px;
            border-radius: var(--radius-xl);
            background: var(--panel-strong);
            border: 1px solid var(--line);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }
        .modal-card--editor {
            display: flex;
            flex-direction: column;
        }

        .modal-close {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 14px;
            right: 14px;
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            color: var(--ink-soft);
            border: 1px solid transparent;
            transition: all var(--transition);
            z-index: 1;
        }
        .modal-close:hover {
            border-color: var(--line-strong);
            background: #fff;
            color: var(--ink-main);
        }

        .modal-title {
            margin-top: 0;
            font-size: 18px;
            letter-spacing: 0.08em;
            font-family: var(--font-display);
            font-weight: 600;
        }

        .modal-text {
            margin-top: 8px;
            color: var(--ink-soft);
            font-size: 11px;
            line-height: 1.6;
            letter-spacing: 0.02em;
        }

        .custom-form { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
        .field-label {
            display: block;
            margin-bottom: 5px;
            color: var(--ink-main);
            font-size: 11px;
            letter-spacing: 0.15em;
            font-family: var(--font-display);
            font-weight: 600;
        }
        .field-input {
            width: 100%;
            padding: 9px 11px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--line-strong);
            background: #ffffff;
            color: var(--ink-main);
            outline: none;
            transition: all var(--transition);
            font-family: var(--font-ui);
            font-size: 12px;
        }
        .field-input:focus {
            border-color: var(--ink-main);
            box-shadow: 2px 2px 0 rgba(44, 54, 63, 0.06);
        }
        .favorite-presets {
            display: grid;
            gap: 6px;
            margin: 0;
            padding: 8px;
            border-radius: calc(var(--radius-md) - 4px);
            border: 1px dashed rgba(44, 54, 63, 0.2);
            background: linear-gradient(180deg, rgba(250, 247, 242, 0.98), rgba(255, 255, 255, 0.96));
        }
        .favorite-presets-head {
            display: grid;
            gap: 1px;
        }
        .favorite-presets-title {
            font-family: var(--font-display);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: var(--ink-main);
        }
        .favorite-presets-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
        }
        .favorite-preset-button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-height: 34px;
            padding: 6px 8px;
            border-radius: calc(var(--radius-sm) + 1px);
            border: 1px solid rgba(44, 54, 63, 0.12);
            background: rgba(255, 255, 255, 0.92);
            text-align: left;
            transition: all var(--transition);
        }
        .favorite-preset-button:hover {
            transform: translate(-1px, -1px);
            border-color: rgba(44, 54, 63, 0.28);
            box-shadow: 2px 2px 0 rgba(44, 54, 63, 0.05);
        }

        function getLocalDayStamp(date) {

        function getExamCountdownText(now = new Date()) {
            const todayStamp = getLocalDayStamp(now);
            const targetStamp = Date.UTC(EXAM_TARGET.year, EXAM_TARGET.monthIndex, EXAM_TARGET.day);
            const diffDays = Math.round((targetStamp - todayStamp) / MS_PER_DAY);

            if (diffDays > 0) {
                return {
                    full: `试炼降临还有 ${diffDays} 天`,
                    short: `试炼还有 ${diffDays} 天`
                };
            }

            if (diffDays === 0) {
                return {
                    full: "试炼就是今天",
                    short: "今天开场"
                };
            }

            return {
                full: "本轮试炼已开场",
                short: "已开场"
            };
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalizeHref(rawValue) {
            const value = String(rawValue || "").trim();
            if (!value) return "";
            const safeRelative = /^(#|\/|\.\/|\.\.\/|[A-Za-z0-9_\-./]+(?:\?[^\s#]*)?(?:#[^\s]*)?)$/;
            const safeAbsolute = /^https?:\/\/[^\s]+$/i;
            return (safeAbsolute.test(value) || safeRelative.test(value)) ? value : "";
        }

        function normalizeCoverImage(rawValue) {
            const value = String(rawValue || "").trim();
            if (!value) return "";
            const safeRelative = /^(\/|\.\/|\.\.\/|[A-Za-z0-9_\-./]+(?:\?[^\s#]*)?(?:#[^\s]*)?)$/;
            const safeAbsolute = /^https?:\/\/[^\s]+$/i;
            return (safeAbsolute.test(value) || safeRelative.test(value)) ? value : "";
        }

        function toHomeCdnUrl(rawValue) {
            const value = normalizeCoverImage(rawValue);
            if (!value) return "";
            if (/^https?:\/\//i.test(value)) return value;
            const normalizedPath = value.replace(/^(?:\.\.\/)+/, "").replace(/^(?:\.\/)+/, "").replace(/^\/+/, "");
            return normalizedPath ? `${HOME_CDN_BASE}${normalizedPath}` : "";
        }

        function normalizeCoverFortuneId(rawValue) {
            const value = String(rawValue || "").trim();
            return value ? value.slice(0, 80) : "";
        }

        function getFavoriteCoverFortune(fortuneId) {
            if (!omikujiCatalogApi || typeof omikujiCatalogApi.getFortuneById !== "function") {
                return null;
            }
            const normalizedId = normalizeCoverFortuneId(fortuneId);
            return normalizedId ? omikujiCatalogApi.getFortuneById(normalizedId) : null;
        }

        function getUnlockedFavoriteCoverCatalog() {
            if (!omikujiCatalogApi || typeof omikujiCatalogApi.getUnlockedCatalog !== "function") {
                return [];
            }
            return omikujiCatalogApi.getUnlockedCatalog({ includeRewardOnly: true });
        }

        function normalizeFavoriteEntry(entry) {
            const name = String(entry && entry.name ? entry.name : "").trim();
            const href = normalizeHref(entry && entry.href ? entry.href : "");
            const note = String(entry && entry.note ? entry.note : "").trim();
            const coverFortuneId = normalizeCoverFortuneId(entry && entry.coverFortuneId ? entry.coverFortuneId : "");
            if (!name || !href) return null;
            return {
                name: name.slice(0, 18),
                href,
                note: note.slice(0, 28),
                ...(coverFortuneId ? { coverFortuneId } : {})
            };
        }

        function loadLegacyFavoriteEntry() {
            try {
                const parsed = JSON.parse(localStorage.getItem(LEGACY_KEY));
                if (!parsed || typeof parsed !== "object") return null;
                const normalized = normalizeFavoriteEntry({ name: parsed.name, href: parsed.href, note: "从旧版首页迁移" });
                return (!normalized || normalized.name === "我的常用") ? null : normalized;
            } catch (error) { return null; }
        }

        function loadFavoriteEntries() {
            try {
                const stored = localStorage.getItem(FAVORITES_KEY);
                if (stored !== null) {
                    const parsed = JSON.parse(stored);
                    if (!Array.isArray(parsed)) return [];
                    return parsed.map(normalizeFavoriteEntry).filter(Boolean).slice(0, MAX_FAVORITES);
                }
                const legacy = loadLegacyFavoriteEntry();
                return legacy ? [legacy] : [];
            } catch (error) {
                const legacy = loadLegacyFavoriteEntry();
                return legacy ? [legacy] : [];
            }
        }

            });
        }

        function getIllustrationCss(name) {
            const svg = FEATURE_ILLUSTRATIONS[name];
            return svg ? `url('data:image/svg+xml,${encodeURIComponent(svg)}')` : "none";
        }

        function getCoverImageMarkup(rawValue) {
            const coverImage = toHomeCdnUrl(rawValue);
            if (!coverImage) return "";
            return `
                <span class="feature-cover" aria-hidden="true">
                    <img class="feature-cover-image" src="${escapeHtml(coverImage)}" alt="" loading="lazy" decoding="async">
                </span>
            `;
        }

        function getStaticCoverMarkup(item) {
            return getCoverImageMarkup(item.coverImage);
        }

        function getSectionHash(sectionKey) {
            return (sectionKey === "daily" || sectionKey === "exam" || sectionKey === "favorites") ? `#${sectionKey}` : "";
        }

        function syncSectionHash(sectionKey) {
            const nextUrl = `${location.pathname}${location.search}${getSectionHash(sectionKey)}`;
            try {
                history.replaceState(null, "", nextUrl);
            } catch (error) {
                console.warn('History API is restricted in this environment.');
            }
        }

        function getFallbackTarget(sectionKey, href) {
            const cleanHref = String(href || "").split(/[?#]/)[0];
            const pathSegments = cleanHref ? cleanHref.split("/").filter(Boolean) : [];
            const depth = Math.max(0, pathSegments.length - 1);
            const prefix = depth > 0 ? "../".repeat(depth) : "";
            return `${prefix}index.html${getSectionHash(sectionKey)}`;
        }

        function appendReturnParam(href, sectionKey) {
            const value = String(href || "").trim();
            if (!value || /^(https?:\/\/|mailto:|tel:|javascript:|#)/i.test(value)) return value;
            const separator = value.includes("?") ? "&" : "?";
            return `${value}${separator}return=${encodeURIComponent(getFallbackTarget(sectionKey, value))}`;
        }

        function getFeatureCardMarkup(item, index, sectionKey) {
            const hasCover = Boolean(toHomeCdnUrl(item.coverImage));
            const visualClass = hasCover ? `feature-visual feature-visual--${item.tone} has-cover` : `feature-visual feature-visual--${item.tone}`;
            const badgeMarkup = item.badge 
                ? `<span class="feature-badge" style="border-color:#993333; color:#993333;">${escapeHtml(item.badge)}</span>` 
                : `<span class="feature-badge">${escapeHtml(item.tag)}</span>`;

            const visualMarkup = `
                <span class="${visualClass}">
                    ${getStaticCoverMarkup(item)}
                    ${badgeMarkup}
                    <span class="feature-art"><span class="icon-slot" aria-hidden="true">${getIconMarkup(item.icon)}</span></span>
                </span>
            `;
            const bodyMarkup = `
                <span class="feature-body">
                    <span class="feature-title">${escapeHtml(item.title)}</span>
                    <span class="feature-desc">${escapeHtml(item.desc)}</span>
                </span>
            `;

            if (item.disabled) {
                return `
                    <div class="feature-card feature-card--disabled" style="--item-index:${index};" aria-disabled="true">
                        <div class="feature-card-link">${visualMarkup}${bodyMarkup}</div>
                    </div>
                `;
            }

            return `
                <a class="feature-card" href="${escapeHtml(appendReturnParam(item.href, sectionKey))}" style="--item-index:${index};">
                    <span class="feature-card-link">${visualMarkup}${bodyMarkup}</span>
                </a>
            `;
        }

        function getFavoriteCardMarkup(entry, index) {
            const tone = FAVORITE_TONES[index % FAVORITE_TONES.length];
            const safeName = escapeHtml(entry.name);
            const safeHref = escapeHtml(entry.href);
            const safeDesc = escapeHtml(entry.note || getDisplayHref(entry.href));
            const coverFortune = getFavoriteCoverFortune(entry.coverFortuneId);
            const coverMarkup = coverFortune ? getCoverImageMarkup(coverFortune.icon) : "";
            const visualClass = coverFortune
                ? `feature-visual feature-visual--${tone} feature-visual--favorite has-cover`
                : `feature-visual feature-visual--${tone} feature-visual--favorite`;
            const artMarkup = coverFortune
                ? ""
                : `<span class="feature-art"><span class="icon-slot" aria-hidden="true">${getIconMarkup("custom")}</span></span>`;

            return `
                <article class="feature-card feature-card--favorite" style="--item-index:${index};">
                    <button type="button" class="feature-edit" data-favorite-edit="${index}" aria-label="编辑 ${safeName}">编辑</button>
                    <a class="feature-card-link" href="${safeHref}">
                        <span class="${visualClass}" style="--feature-illustration:${getIllustrationCss("favorite")};">
                            <span class="feature-illustration" aria-hidden="true"></span>
                            ${coverMarkup}
                            <span class="feature-badge">常用</span>
                            ${artMarkup}
                        </span>
                        <span class="feature-body">
                            <span class="feature-title">${safeName}</span>
                            <span class="feature-desc">${safeDesc}</span>
                        </span>
                    </a>
                </article>
            `;
        }

        function getFavoriteAddMarkup(index) {
            return `
                <button type="button" class="feature-card feature-card--add" data-favorite-add="true" style="--item-index:${index};">
                    <span class="feature-card-link">
                        <span class="feature-visual feature-visual--mist feature-visual--add" style="--feature-illustration:${getIllustrationCss("add")};">
                            <span class="feature-illustration" aria-hidden="true"></span>
                            <span class="feature-badge" style="color:var(--ink-soft);border-color:var(--line-strong);">新增</span>
                            <span class="feature-art feature-art--plus" aria-hidden="true"><span class="feature-plus">+</span></span>
                        </span>
                        <span class="feature-body">
                            <span class="feature-title">添加入口</span>
                            <span class="feature-desc">点击这里打开编辑界面，保存一个新的常用路径。</span>
                        </span>
                    </span>
                </button>
            `;
        }

        function getFavoritesGridMarkup() {
            const favorites = loadFavoriteEntries();
            const cards = favorites.map((entry, index) => getFavoriteCardMarkup(entry, index));
            if (favorites.length < MAX_FAVORITES) cards.push(getFavoriteAddMarkup(favorites.length));
            return cards.join("");
        }

        function bindFeatureCoverFallbacks(scope = featurePanels) {
            scope.querySelectorAll(".feature-cover-image").forEach((image) => {
                if (image.dataset.bound === "true") return;
                image.dataset.bound = "true";
                image.addEventListener("error", () => {
                    const visual = image.closest(".feature-visual");
                    const cover = image.closest(".feature-cover");
                    if (visual) { visual.classList.remove("has-cover"); visual.classList.add("is-image-fallback"); }
                    if (cover) { cover.remove(); }
                }, { once: true });
            });
        }

        function getSectionGridMarkup(sectionKey) {
            return sectionKey === "favorites" ? getFavoritesGridMarkup() : HOME_SECTIONS[sectionKey].items.map((item, index) => getFeatureCardMarkup(item, index, sectionKey)).join("");
        }

        function getOrCreateSectionPanel(sectionKey) {
            if (sectionPanels.has(sectionKey)) return sectionPanels.get(sectionKey);
            const panel = document.createElement("section");
            panel.className = "feature-panel";
            panel.dataset.section = sectionKey;
            const grid = document.createElement("div");
            grid.className = "feature-grid";
            grid.dataset.sectionGrid = sectionKey;
            panel.appendChild(grid);
            featurePanels.appendChild(panel);
            sectionPanels.set(sectionKey, panel);
            return panel;
        }

        function renderSectionPanel(sectionKey) {
            const panel = getOrCreateSectionPanel(sectionKey);
            const grid = panel.querySelector(".feature-grid");
            if (!grid) return panel;
            grid.innerHTML = getSectionGridMarkup(sectionKey);
            bindFeatureCoverFallbacks(grid);
            panel.dataset.rendered = "true";
            if (sectionKey === "favorites") favoritesPanelDirty = false;
            return panel;
        }

        function ensureSectionPanel(sectionKey) {
            const panel = getOrCreateSectionPanel(sectionKey);
            const needsRender = panel.dataset.rendered !== "true" || (sectionKey === "favorites" && favoritesPanelDirty);
            if (needsRender) return renderSectionPanel(sectionKey);
            return panel;
        }

        function showSectionPanel(sectionKey, animate = true) {
            const targetPanel = ensureSectionPanel(sectionKey);
            sectionPanels.forEach((panel, key) => {
                const isTarget = key === sectionKey;
                panel.classList.toggle("is-active", isTarget);
                panel.classList.remove("is-entering");
            });
            if (targetPanel && animate) {
                requestAnimationFrame(() => { targetPanel.classList.add("is-entering"); });
            }
        }

        function initializeSectionPanels() {
            ["daily", "exam", "favorites"].forEach((sectionKey) => {
                renderSectionPanel(sectionKey);
                const panel = sectionPanels.get(sectionKey);
                if (panel) panel.classList.remove("is-active", "is-entering");
            });
        }

        function syncFavoriteDeleteButton() { favoriteDeleteBtn.disabled = editingFavoriteIndex === null; }

        function syncFavoriteCoverStatus() {
            const coverFortune = getFavoriteCoverFortune(activeFavoriteCoverFortuneId);
            const hasKnownCover = Boolean(coverFortune);
            const hasStoredCover = Boolean(normalizeCoverFortuneId(activeFavoriteCoverFortuneId));

            favoriteCoverStatus.classList.toggle("has-image", hasKnownCover);

            if (hasKnownCover) {
                favoriteCoverThumb.src = toHomeCdnUrl(coverFortune.icon);
                favoriteCoverThumb.alt = `${coverFortune.title} 封面`;
                favoriteCoverName.textContent = coverFortune.title;
                favoriteCoverMeta.textContent = `${coverFortune.rarity} 卡面已选中`;
                favoriteCoverClearBtn.disabled = false;
                return;
            }

            favoriteCoverThumb.removeAttribute("src");
            favoriteCoverThumb.alt = "";

            if (hasStoredCover) {
                favoriteCoverName.textContent = "封面暂时不可用";
                favoriteCoverMeta.textContent = "可保留，也可重选。";
                favoriteCoverClearBtn.disabled = false;
                return;
            }

            favoriteCoverName.textContent = "使用默认封面";
            favoriteCoverMeta.textContent = "可用抽签卡封面。";
            favoriteCoverClearBtn.disabled = true;
        }

        function getFavoriteCoverPickerCardMarkup(fortune) {
            const isActive = fortune.id === activeFavoriteCoverFortuneId;
            return `
                <button type="button" class="favorite-cover-option${isActive ? " is-active" : ""}" data-favorite-cover-option="${escapeHtml(fortune.id)}" aria-pressed="${isActive ? "true" : "false"}">
                    <img class="favorite-cover-option-thumb" src="${escapeHtml(toHomeCdnUrl(fortune.icon))}" alt="${escapeHtml(fortune.title)}" loading="lazy" decoding="async">
                    <span class="favorite-cover-option-head">
                        <span class="favorite-cover-option-name">${escapeHtml(fortune.title)}</span>
                        <span class="favorite-cover-option-rarity">${escapeHtml(fortune.rarity)}</span>
                    </span>
                </button>
            `;
        }

        function renderFavoriteCoverPicker() {
            const unlockedCatalog = getUnlockedFavoriteCoverCatalog();
            if (!favoriteCoverPickerGrid) return;

            if (!unlockedCatalog.length) {
                favoriteCoverPickerGrid.innerHTML = `
                    <div class="favorite-cover-empty">
                        <div class="favorite-cover-empty-copy">还没有可用的卡面封面，先去御神签抽到一张喜欢的卡吧。</div>
                        <a class="favorite-cover-empty-link" href="lottery.html">去抽签解锁</a>
                    </div>
                `;
                return;
            }

            favoriteCoverPickerGrid.innerHTML = unlockedCatalog.map(getFavoriteCoverPickerCardMarkup).join("");
        }

        function openFavoriteCoverPicker() {
            renderFavoriteCoverPicker();
            openModal(favoriteCoverModal);
        }

        function syncFavoritePresetSelection(presetId = null) {
            activeFavoritePresetId = presetId;
            if (!favoritePresetGrid) return;
            favoritePresetGrid.querySelectorAll("[data-favorite-preset]").forEach((button) => {
                const isActive = button.getAttribute("data-favorite-preset") === presetId;
                button.classList.toggle("is-active", isActive);
                button.setAttribute("aria-pressed", String(isActive));
            });
        }

        function renderFavoritePresets() {
            if (!favoritePresetGrid) return;
            favoritePresetGrid.innerHTML = FAVORITE_PRESETS.map((preset) => `
                <button type="button" class="favorite-preset-button" data-favorite-preset="${escapeHtml(preset.id)}" aria-pressed="false">
                    <span class="favorite-preset-name">${escapeHtml(preset.name)}</span>
                </button>
            `).join("");
            syncFavoritePresetSelection(activeFavoritePresetId);
        }

        function applyFavoritePreset(presetId) {
            const preset = FAVORITE_PRESETS.find((item) => item.id === presetId);
            if (!preset) return;
            favoriteNameInput.value = preset.name;
            favoriteUrlInput.value = preset.url;
            favoriteNoteInput.value = preset.note;
            syncFavoritePresetSelection(preset.id);
            favoriteNoteInput.focus();
            favoriteNoteInput.setSelectionRange(favoriteNoteInput.value.length, favoriteNoteInput.value.length);
        }

        function resetFavoriteEditor() {
            editingFavoriteIndex = null;
            favoriteTitle.textContent = "新增入口";
            favoritesForm.reset();
            activeFavoriteCoverFortuneId = null;
            syncFavoritePresetSelection(null);
            syncFavoriteCoverStatus();
            syncFavoriteDeleteButton();
        }

        function fillFavoriteEditor(index) {
            const favorites = loadFavoriteEntries();
            const entry = favorites[index];
            if (!entry) { resetFavoriteEditor(); return; }
            editingFavoriteIndex = index;
            favoriteTitle.textContent = `编辑入口 ${String(index + 1).padStart(2, "0")}`;
            favoriteNameInput.value = entry.name;
            favoriteUrlInput.value = entry.href;
            favoriteNoteInput.value = entry.note || "";
            activeFavoriteCoverFortuneId = entry.coverFortuneId || null;
            syncFavoritePresetSelection(null);
            syncFavoriteCoverStatus();
            syncFavoriteDeleteButton();
        }

        function openFavoriteModal(index = null) {
            if (index === null) resetFavoriteEditor();
            else fillFavoriteEditor(index);
            openModal(favoritesModal);
            requestAnimationFrame(() => { favoriteNameInput.focus(); });
        }

        function renderNotice(syncHash = true) {
            activeSection = null;
            setActiveSwitch(null);
            noticePanel.classList.remove("is-hidden");
            contentPanel.classList.add("is-hidden");
            if (syncHash) syncSectionHash(null);
            if (homePetController) homePetController.sync("section-change");
        }

        function renderSection(sectionKey, animate = true, syncHash = true) {
            if (!HOME_SECTIONS[sectionKey]) return;
            activeSection = sectionKey;
            setActiveSwitch(sectionKey);
            noticePanel.classList.add("is-hidden");
            contentPanel.classList.remove("is-hidden");
            showSectionPanel(sectionKey, animate);
            if (syncHash) syncSectionHash(sectionKey);
            if (homePetController) homePetController.sync("section-change");
        }

        switchButtons.forEach((button) => {
            button.addEventListener("click", () => {
                const nextSection = button.dataset.section;
                if (nextSection) renderSection(nextSection);
            });
        });

        featurePanels.addEventListener("click", (event) => {
            const addTarget = event.target.closest("[data-favorite-add]");
            if (addTarget) { event.preventDefault(); openFavoriteModal(); return; }

            const editTarget = event.target.closest("[data-favorite-edit]");
            if (editTarget) {
                event.preventDefault();
                event.stopPropagation();
                openFavoriteModal(Number(editTarget.getAttribute("data-favorite-edit")));
                return;
            }

            const launchTarget = event.target.closest("a[href]");
            if (launchTarget && featurePanels.contains(launchTarget) && homePetController) {
                const titleNode = launchTarget.querySelector(".feature-title");
                homePetController.recordStudyLaunch({
                    href: launchTarget.getAttribute("href"),
                    label: titleNode ? titleNode.textContent.trim() : "学习入口",
                    sectionKey: activeSection || ""
                });
            }
        });

        favoritesForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const entry = normalizeFavoriteEntry({
                name: favoriteNameInput.value,
                href: favoriteUrlInput.value,
                note: favoriteNoteInput.value,
                coverFortuneId: activeFavoriteCoverFortuneId
            });
            if (!entry) return;
            const favorites = loadFavoriteEntries();
            if (editingFavoriteIndex === null) {
                if (favorites.length >= MAX_FAVORITES) return;
                favorites.push(entry);
            } else if (favorites[editingFavoriteIndex]) {
                favorites[editingFavoriteIndex] = entry;
            }
            saveFavoriteEntries(favorites);
            favoritesPanelDirty = true;
            if (activeSection === "favorites") renderSection("favorites", false, false);
            closeModal(favoritesModal);
        });

        favoritePresetGrid.addEventListener("click", (event) => {
            const presetButton = event.target.closest("[data-favorite-preset]");
            if (!presetButton) return;
            applyFavoritePreset(presetButton.getAttribute("data-favorite-preset"));
        });

        favoriteCoverPickerBtn.addEventListener("click", () => {
            openFavoriteCoverPicker();
        });

        favoriteCoverClearBtn.addEventListener("click", () => {
            activeFavoriteCoverFortuneId = null;
            syncFavoriteCoverStatus();
        });

        favoriteCoverPickerGrid.addEventListener("click", (event) => {
            const coverOption = event.target.closest("[data-favorite-cover-option]");
            if (!coverOption) return;
            activeFavoriteCoverFortuneId = coverOption.getAttribute("data-favorite-cover-option");
            syncFavoriteCoverStatus();
            closeModal(favoriteCoverModal);
            requestAnimationFrame(() => { favoriteCoverPickerBtn.focus(); });
        });

        favoriteNewBtn.addEventListener("click", () => { resetFavoriteEditor(); favoriteNameInput.focus(); });

        favoriteDeleteBtn.addEventListener("click", () => {
            if (editingFavoriteIndex === null) { resetFavoriteEditor(); favoriteNameInput.focus(); return; }
            const favorites = loadFavoriteEntries();
            if (!favorites[editingFavoriteIndex]) { resetFavoriteEditor(); return; }
            favorites.splice(editingFavoriteIndex, 1);
            saveFavoriteEntries(favorites);
            favoritesPanelDirty = true;
            if (activeSection === "favorites") renderSection("favorites", false, false);
            closeModal(favoritesModal);
            resetFavoriteEditor();
        });

        document.querySelectorAll("[data-close]").forEach((button) => {
            button.addEventListener("click", () => {
                const targetId = button.getAttribute("data-close");
                const modal = document.getElementById(targetId);
                if (modal) closeModal(modal);
            });
        });

        [favoritesModal, favoriteCoverModal].forEach((modal) => {
            modal.addEventListener("click", (event) => {
                if (event.target === modal) closeModal(modal);
            });
        });

        document.addEventListener("keydown", (event) => {
            if (event.key !== "Escape") return;
            if (isFavoriteCoverModalOpen) {
                closeModal(favoriteCoverModal);
                return;
            }
            if (isFavoritesModalOpen) closeModal(favoritesModal);
        });

        document.addEventListener("touchstart", (event) => {
            if (event.touches.length !== 1) return;
            touchStartY = event.touches[0].clientY;
            touchStartX = event.touches[0].clientX;
        }, { passive: true });

        document.addEventListener("touchmove", (event) => {
            if (event.touches.length !== 1 || document.body.classList.contains("modal-open")) return;
            const touch = event.touches[0];
            const deltaY = touch.clientY - touchStartY;
            const deltaX = touch.clientX - touchStartX;
            const target = event.target;
            if (window.scrollY > 0 || deltaY <= 0 || Math.abs(deltaY) <= Math.abs(deltaX)) return;
            if (target && target.closest("#home-pet-root, input, textarea, select, [contenteditable='true']")) return;
            event.preventDefault();
        }, { passive: false });

        window.addEventListener("hashchange", () => {
            const sectionKey = location.hash.replace(/^#/, "");
            if (HOME_SECTIONS[sectionKey]) renderSection(sectionKey, false, false);
            else renderNotice(false);
        });

        window.addEventListener("pageshow", updateFortuneEntryState);
        window.addEventListener("storage", (event) => {
            if (!event || event.key === null || event.key === "lotteryState_v2") {
                updateFortuneEntryState();
            }
        });
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                updateFortuneEntryState();
            }
        });

        mountStaticIcons();
        renderExamCountdown();
        updateFortuneEntryState();
        window.setInterval(renderExamCountdown, 60 * 1000);
        renderFavoritePresets();
        initializeSectionPanels();
        resetFavoriteEditor();
        document.body.classList.add("has-home-pet");

        if (window.HomePetSystem && homePetRoot) {
            homePetController = window.HomePetSystem.init({
                mountSelector: "#home-pet-root",
                pageShellSelector: ".page-shell",
                getActiveSection: () => activeSection,
                sectionCatalog: HOME_SECTIONS,
                buildReturnHref: (href, sectionKey) => appendReturnParam(href, sectionKey)
            });
        }

        const initialSection = location.hash.replace(/^#/, "");
        if (HOME_SECTIONS[initialSection]) renderSection(initialSection, false, false);
        else renderNotice(false);

        if (homePetController) {
            homePetController.setModalState(Boolean(document.querySelector(".modal-overlay.is-open")));
            homePetController.sync("boot");
        }
    </script>
</body>
</html>
