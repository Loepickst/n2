    <main class="shell-container">
        <p class="page-subtitle">按照题型逐个突破，强化听力中的信息抓取、核心判断与应答反应。</p>

        <div class="card-list">

                    <div class="card-icon" style="background: rgba(129, 199, 132, 0.12); color: #69a96f;">📝</div>
                    <div class="card-copy">
                        <h2>課題理解</h2>
                        <p>听取接下来的具体行动或要求，判断最合适的下一步。</p>
                    </div>
                </div>
                <span class="card-tag">待开放</span>
            </a>

            <a href="point-comprehension/index.html" class="nav-card locked" onclick="alert('该题型正在整理中，敬请期待！'); return false;" aria-disabled="true">
                <div class="card-main">
                    <div class="card-icon" style="background: rgba(100, 181, 246, 0.12); color: #4f91c9;">💡</div>
                    <div class="card-copy">
                        <h2>ポイント理解</h2>
                        <p>抓取原因、理由或关键结论，训练对重点信息的定位。</p>
                    </div>
                </div>
                <span class="card-tag">待开放</span>
            </a>

                        <p>把握整段话的主旨、意图和态度，不依赖纸面选项。</p>
                    </div>
                </div>
                <span class="card-tag">待开放</span>
            </a>

            <a href="immediate-response/index.html" class="nav-card">

                    </div>
                </div>
                <span class="card-tag">已接入</span>
            </a>

                        <p>针对较长语篇综合提取多个线索并完成判断。</p>
                    </div>
                </div>
                <span class="card-tag">待开放</span>
