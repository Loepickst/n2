<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT 文法排序 - 水彩笔记特训</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;600;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
        // 重写 Tailwind 配置表，注入水彩素描本风格配色
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['"Noto Sans SC"', '"Noto Sans JP"', 'sans-serif'],
                        'serif-jp': ['"Noto Serif SC"', '"Noto Serif JP"', '"Songti SC"', '"SimSun"', 'serif'],
                        'serif-sc': ['"Noto Serif SC"', '"Noto Serif JP"', '"Songti SC"', '"SimSun"', 'serif'],
                    },
                    colors: {
                        // 素描本底色
                        bgMain: '#ffffff',        
                        bgCard: '#ffffff',        
                        
                        // 铅笔字色
                        textMain: '#333333',      
                        textSub: '#666666',       
                        textMuted: '#999999',     
                        
                        // 铅笔线框
                        borderMain: '#e5e5e5',    
                        borderDark: '#cccccc',    
                        borderStrong: '#333333',  
                        
                        // 强调色 (红铅笔)
                        accentRed: '#e64a4a',     
                        accentGold: '#e64a4a',    /* 星号标红 */
                        
                        // 水彩记号笔 (Marker)
                        markerYellow: 'rgba(255, 213, 79, 0.25)',
                        markerBlue: 'rgba(129, 212, 250, 0.25)',
                        markerMint: 'rgba(134, 239, 172, 0.25)',
                        markerPink: 'rgba(244, 143, 177, 0.25)',
                        markerGray: 'rgba(200, 200, 200, 0.2)',
                    }
                }
            }
        }
    </script>
    <style>
        /* ==============================================================
           纸张底座：噪点纹理与明亮背景
           ============================================================== */
        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--bgMain);
            color: var(--textMain);
            position: relative;
        }

        /* 极弱的纸张噪点纹理 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* 工具类：手绘感不规则边框 (Sketchy Border) */
        .sketch-box {
            border: 1.5px solid #333333 !important;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px !important;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.02) !important;
            transition: all 0.2s ease;
        }

        .sketch-btn {
            border: 1.5px solid #333333 !important;
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px !important;
            transition: all 0.2s ease;
        }
        
        /* 铅笔排线背景 (Hatching) */
        .hatching-bg {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px) !important;
        }

        /* ==============================================================
           排序专有：填空槽位与选项卡片 (视觉重塑)
           ============================================================== */
        
        /* 1. 填空槽位 (Sort Slots) 变成试卷上的下划虚线。增加固定高度防止排版跳动 */
        .question-block .sort-slot {
            border: none !important;
            border-bottom: 2px dashed #cccccc !important;
            background: transparent !important;
            color: #333333 !important;
            box-shadow: none !important;
            transition: all 0.2s ease;
            position: relative;
            min-width: 48px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 4px;
            vertical-align: bottom;
        }
        
        /* 关键位靶槽 */
        .question-block .sort-slot.star-slot {
            border-bottom-color: #e64a4a !important;
        }

        .question-block .sort-slot .slot-marker {
            position: absolute;
            left: 50%;
            bottom: -1px;
            transform: translateX(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            padding: 0;
            border-radius: 0;
            background: transparent;
            border: none;
            color: #e64a4a;
            font-size: 10px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0;
            white-space: nowrap;
            pointer-events: none;
        }

        /* 选中槽位：文字浮现在线上，淡淡黄底 */
        .question-block .sort-slot.slot-filled { 
            border-bottom-style: solid !important;
            border-bottom-color: #333333 !important;
            background: rgba(255, 213, 79, 0.25) !important; /* markerYellow */
            color: #333333 !important; 
            border-radius: 4px 4px 0 0;
        }
        
        /* 星号槽位选中：粉底红字 */
        .question-block .sort-slot.slot-star-filled { 
            border-bottom-style: solid !important;
            border-bottom-color: #e64a4a !important;
            background: rgba(244, 143, 177, 0.25) !important; /* markerPink */
            color: #e64a4a !important; 
            border-radius: 4px 4px 0 0;
        }

        /* JS判题后的样式强制覆盖：红笔批改风 (与截图一致的浅绿底+红边) */
        .question-block .sort-slot.judged-correct {
            background: #eaf6ea !important; /* 浅绿底 */
            border-bottom-color: #e64a4a !important; /* 红色底线 */
            border-bottom-style: solid !important;
            color: #333333 !important;
            border-radius: 4px 4px 0 0;
        }
        .question-block .sort-slot.judged-wrong {
            background: #fdfdfd !important; 
            border-bottom-color: #cccccc !important; 
            border-bottom-style: dashed !important;
            color: #999999 !important;
            border-radius: 4px 4px 0 0;
        }

        /* 槽位里的文字字体保障 */
        .question-block .sort-slot .slot-text {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1;
            font-family: "Noto Sans SC", "Noto Sans JP", sans-serif;
        }

        /* 2. 选项木牌 -> 虚线字条卡片 (贴合截图) */
        .question-block .sort-option-btn {
            border: 1.5px dashed #e0e0e0 !important;
            background: #ffffff !important;
            border-radius: 4px !important; 
            box-shadow: none !important;
            position: relative;
            transition: all 0.2s ease;
            transform: translate(0, 0);
            padding: 12px 16px !important;
            display: flex;
            align-items: center;
            text-align: left;
            width: 100%;
        }

        .question-block .sort-option-btn:hover:not(.option-used) {
            border-style: solid !important;
            border-color: #cccccc !important;
            background: rgba(129, 212, 250, 0.1) !important; /* 淡水彩蓝悬停 */
            transform: translateY(-1px) !important;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.02) !important;
        }

        /* 选项被使用后，变透明且不可点 */
        .question-block .sort-option-btn.option-used {
            opacity: 0.35;
            pointer-events: none;
            background-color: transparent !important;
            border-color: #e0e0e0 !important;
            border-style: dashed !important;
            box-shadow: none !important;
            transform: none !important;
        }

        /* 选项左侧标识字母：细线圆圈包裹 (贴合截图) */
        .question-block .option-letter {
            background: #ffffff !important;
            color: #666666 !important;
            border: 1.2px solid #999999 !important;
            border-radius: 50% !important; 
            box-shadow: none !important;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px !important;
            margin-right: 12px !important;
            flex-shrink: 0;
            font-weight: 500 !important;
        }

        .question-block .sort-option-btn:hover:not(.option-used) .option-letter {
            border-color: #333333 !important;
            color: #333333 !important;
        }

        /* ==============================================================
           容器与面板：轻量化笔记本排版
           ============================================================== */
        
        .font-title-unified {
            font-family: "Noto Serif SC", "Noto Serif JP", "Songti SC", "SimSun", serif;
            letter-spacing: 0.1em;
        }

        /* 题目卡片外框 */
        .question-block > .bg-bgCard {
            background: #ffffff !important;
            border: 1.5px solid #333333 !important;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px !important;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.02) !important;
            position: relative;
            padding: 28px 32px !important;
        }

        /* 顶部导航与按钮板 */
        .timer-toolbar-btn, .timer-chip-btn, .timer-control-btn, .timer-hide-btn, .random-target-btn {
            border: 1.5px solid #333333;
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
            background: transparent;
            color: #333333;
            transition: all 0.2s ease;
        }

        .timer-toolbar-btn:hover:not(:disabled), .timer-chip-btn:hover:not(:disabled), 
        .timer-control-btn:hover:not(:disabled), .timer-hide-btn:hover:not(:disabled), 
        .random-target-btn:hover:not(:disabled) {
            background: rgba(255, 213, 79, 0.25); /* markerYellow */
        }

        /* 主状态按钮 */
        .timer-toolbar-btn.is-primary, .timer-chip-btn.is-selected, 
        .timer-control-btn.is-primary, .timer-hide-btn.is-selected, .random-target-btn.is-primary {
            background: #333333;
            color: #ffffff;
        }
        .timer-toolbar-btn.is-primary:hover, .timer-control-btn.is-primary:hover {
            background: #e64a4a;
            border-color: #e64a4a;
        }

        /* 主界面级别与模式选择按钮 */
        #view-level-select button,
        #view-mode-select button,
        #view-year-select button,
        #view-category-select button {
            border: 1.5px solid #333333 !important;
            border-radius: 3px 255px 4px 25px / 255px 5px 225px 4px !important;
            box-shadow: none !important;
            background-color: transparent;
            transition: all 0.2s ease;
        }

        #view-level-select button:hover:not(:disabled),
        #view-mode-select button:hover:not(:disabled),
        #view-year-select button:hover:not(:disabled),
        #view-category-select button:hover:not(:disabled) {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.03) 3px, rgba(51, 51, 51, 0.03) 4px) !important;
            background-color: #fafafa !important;
            transform: translate(-1px, -1px);
        }
        
        #view-year-select .bg-bgMain,
        #view-category-select .bg-bgMain { background-color: transparent !important; }

        /* 提交与下一题按钮：深灰底圆角 (贴合截图) */
        .question-block .submit-btn,
        .question-block .next-question-btn {
            background: #3a3a3a !important;
            color: #ffffff !important;
            border: none !important;
            border-radius: 6px !important;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.1) !important;
            transition: all 0.2s ease;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .question-block .submit-btn:hover:not(:disabled),
        .question-block .next-question-btn:hover {
            background: #222222 !important; 
            transform: translateY(-1px);
            box-shadow: 0px 4px 8px rgba(0,0,0,0.15) !important;
        }

        .question-block .submit-btn:disabled {
            background: transparent !important;
            border: 1.5px dashed #cccccc !important;
            color: #999999 !important;
            box-shadow: none !important;
        }

        /* 解析区 */
        .question-block .explanation-area {
            border: 1.5px solid #333333;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            background: #fdfdfd;
            margin-top: 16px;
            padding: 24px;
        }
        .explanation-stack {
            gap: 20px;
        }
        .explanation-group-title {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.12em;
            color: #666;
            margin-bottom: 10px;
        }
        .correct-answer-box {
            padding: 14px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            background: #ffffff;
        }
        .correct-answer-line {
            font-family: "Noto Serif SC", "Noto Serif JP", "Songti SC", "SimSun", serif;
            font-size: 1rem;
            line-height: 1.8;
            letter-spacing: 0.01em;
            color: #333;
            font-weight: 500;
        }
        .correct-answer-token {
            font-weight: 600;
            color: #333;
            vertical-align: middle;
        }
        .correct-answer-token.is-accent {
            color: #e64a4a;
            font-weight: 700;
        }
        .correct-answer-index {
            width: 20px;
            height: 20px;
            margin-right: 6px;
            font-size: 10px;
            flex-shrink: 0;
        }
        .correct-answer-divider {
            margin: 0 6px;
            font-size: 13px;
            font-weight: 600;
            color: #999;
            vertical-align: middle;
        }
        .explanation-copy {
            font-size: 0.96rem;
            line-height: 1.9;
            font-weight: 500;
            color: #555;
        }
        .explanation-copy strong,
        .explanation-copy b {
            font-weight: 700;
            color: #333;
        }

        /* ==============================================================
           视图切换逻辑
           ============================================================== */
        .view-section {
            display: none;
            animation: fadeInView 0.3s ease-out forwards;
        }
        .view-section.active {
            display: block;
        }
        @keyframes fadeInView {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeInView 0.3s ease-out forwards;
        }

        /* ==============================================================
           判卷结果：右上角红色小字 (如截图的"差点")
           ============================================================== */
        .status-badge {
            position: absolute;
            top: 24px;
            right: 32px;
            font-size: 15px !important;
            font-weight: 700 !important;
            color: #e64a4a !important; /* 统一为柔和红色 */
            letter-spacing: 0.1em;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .status-badge.hidden {
            display: none !important; 
        }

        /* 响应式调整及其他 */
        .page-shell {
            width: min(100%, 1000px);
            margin: 0 auto;
            padding: 32px 16px 48px;
            box-sizing: border-box;
        }

        #view-practice.has-bottom-toolbar #practice-question-container {
            margin-bottom: 0 !important;
            padding-bottom: calc(8rem + env(safe-area-inset-bottom));
        }

        .selection-view-shell { width: min(100%, 700px); margin-left: auto; margin-right: auto; }
        
        /* 训练模式弹窗覆盖 */
        .training-mode-overlay {
            position: fixed; inset: 0; z-index: 2100; display: flex; align-items: center; justify-content: center;
            padding: 20px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(4px);
        }
        .training-mode-overlay[hidden] { display: none; }
        .training-mode-modal {
            width: min(100%, 580px); padding: 32px; border: 1.5px solid #333; background: #fff;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.05); box-sizing: border-box;
        }
        .training-mode-title { font-size: 1.4rem; font-weight: 700; color: #333; letter-spacing: 0.1em; }
        .training-mode-subtitle { margin-top: 8px; color: #666; font-size: 0.95rem; }
        .training-mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
        .training-mode-card {
            appearance: none; border: 1.5px solid #ccc; border-radius: 8px; background: #fff; padding: 20px 18px; text-align: left; transition: all 0.2s ease; cursor: pointer;
        }
        .training-mode-card:hover { border-color: #333; background: rgba(129, 212, 250, 0.1); }
        .training-mode-card.is-selected { background: rgba(129, 212, 250, 0.25); border-color: #333; }
        .training-mode-card-title { font-size: 1.1rem; font-weight: 700; color: #333; }
        .training-mode-card-copy { margin-top: 10px; color: #666; font-size: 0.85rem; line-height: 1.6; }
        .training-mode-card-tag { display: inline-flex; padding: 2px 8px; border: 1px solid #333; border-radius: 4px; font-size: 0.72rem; margin-top: 12px;}
        
        .training-mode-chip, .training-mode-action {
            border: 1.5px solid #333; border-radius: 6px; padding: 8px 16px; background: transparent; font-size: 0.9rem; font-weight: 700;
        }
        .training-mode-chip.is-selected, .training-mode-action.is-primary { background: #333 !important; color: #fff !important; }
        .training-mode-timer, .training-mode-random-settings { margin-top: 24px; padding: 20px; border: 1.5px dashed #ccc; border-radius: 8px; }

        /* 底部悬浮计时器栏 */
        .practice-bottom-toolbar {
            position: fixed; left: 0; right: 0; bottom: 0;
            z-index: 1600; padding: 0 12px calc(env(safe-area-inset-bottom));
            display: none; pointer-events: none;
        }
        .practice-bottom-toolbar.is-visible { display: block; }
        .practice-toolbar-main {
            display: flex; align-items: center; gap: 12px; min-height: 60px; padding: 10px 16px;
            border: 1.5px solid #333; border-radius: 8px 8px 0 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
            pointer-events: auto; max-width: 800px; margin: 0 auto;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
        }
        .practice-bottom-toolbar__inner {
            max-width: 800px;
            margin: 0 auto;
        }
        .practice-toolbar-slot {
            position: relative;
        }
        .practice-toolbar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(3px);
        }
        .timer-drawer {
            position: absolute;
            right: 0;
            bottom: calc(100% + 10px);
            width: min(100vw - 24px, 340px);
            padding: 18px;
            border: 1.5px solid #333;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            box-sizing: border-box;
            pointer-events: auto;
        }
        .timer-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .timer-drawer-title {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #333;
        }
        .timer-drawer-close {
            width: 28px;
            height: 28px;
            border: 1.5px solid #333;
            border-radius: 6px;
            background: #fff;
            color: #333;
            font-size: 16px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .timer-drawer-display {
            font-family: "Noto Sans SC", "Noto Sans JP", sans-serif;
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
            color: #333;
            margin-bottom: 16px;
        }
        .timer-control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .timer-status-text {
            margin-top: 12px;
            font-size: 0.78rem;
            line-height: 1.6;
            color: #666;
            font-weight: 700;
        }
        .practice-toolbar-meta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .timer-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #9ca3af;
            display: inline-block;
            flex-shrink: 0;
        }
        #timer-toolbar-main[data-timer-status="running"] .timer-status-dot,
        .random-toolbar-main .timer-status-dot {
            background: #10B981;
        }
        #timer-toolbar-main[data-timer-status="paused"] .timer-status-dot {
            background: #F59E0B;
        }
        .practice-toolbar-label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.16em;
            color: #666;
            white-space: nowrap;
        }
        .practice-toolbar-time {
            min-width: 68px;
            font-size: 1.2rem;
            line-height: 1;
            font-weight: 800;
            font-family: "Noto Sans SC", "Noto Sans JP", sans-serif;
            color: #333;
        }
        .timer-action-group {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .timer-toolbar-btn,
        .timer-control-btn,
        .training-mode-chip,
        .training-mode-action {
            min-height: 36px;
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            line-height: 1;
            white-space: nowrap;
        }
        .random-toolbar-main {
            justify-content: space-between;
        }
        .random-toolbar-summary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            flex: 1 1 auto;
            min-width: 0;
        }
        .random-toolbar-metric {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 58px;
        }
        .random-toolbar-metric-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.12em;
            color: #666;
            white-space: nowrap;
        }
        .random-toolbar-metric-value {
            font-size: 1rem;
            line-height: 1;
            font-weight: 800;
            color: #333;
            font-family: "Noto Sans SC", "Noto Sans JP", sans-serif;
        }

        .sort-page-header {
            width: 100%;

    <script src="./n2/data-sort-n2.js"></script>
    <script src="./n2/category-catalog.js"></script>
    <script src="./n3/data-sort-n3.js"></script>
    <script src="../../../shared/practice-feedback-system.js"></script>

    <script>
        // --- 1. 结构化题库 (带级别和年份元数据) ---
        const ENABLED_LEVELS = ['N2', 'N3'];
        const sortQuestionBanks = window.sortQuestionBanks || {};
        const questionDatabase = [
            ...(sortQuestionBanks.N2 || []),
            ...(sortQuestionBanks.N3 || [])
        ].filter(question => ENABLED_LEVELS.includes(question.level));
        const grammarSortCategoryCatalog = window.grammarSortCategoryCatalog || {};
        const questionById = new Map(questionDatabase.map(question => [question.id, question]));

        const TIMER_PRESETS = [5, 10, 15];
        const RANDOM_TARGET_PRESETS = [5, 10, 20];
        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeGrammarSortCategory(rawCategory, level, parentId = '') {
            if (!rawCategory || typeof rawCategory !== 'object') return null;
            const id = String(rawCategory.id || '').trim();
            if (!id) return null;
            const rawItems = Array.isArray(rawCategory.items)
                ? rawCategory.items
                : (Array.isArray(rawCategory.questionIds) ? rawCategory.questionIds.map(questionId => ({ id: questionId })) : []);
            const items = rawItems
                .map((item) => {
                    if (typeof item === 'string') {
                        return { id: item, docId: '', keyPoint: '' };
                    }
                    return {
                        id: String(item && item.id ? item.id : '').trim(),
                        docId: String(item && item.docId ? item.docId : '').trim(),
                        keyPoint: String(item && item.keyPoint ? item.keyPoint : '').trim()
                    };
                })
                .filter(item => item.id);
            const questionIds = Array.from(new Set(items.map(item => item.id)));
            const itemById = new Map(items.map(item => [item.id, item]));
            const validQuestions = questionIds
                .map(questionId => questionById.get(questionId))
                .filter(question => question && question.level === level);
            const validIds = validQuestions.map(question => question.id);
            const validIdSet = new Set(validIds);
            const missingIds = questionIds.filter(questionId => !validIdSet.has(questionId));
            const children = Array.isArray(rawCategory.children)
                ? rawCategory.children
                    .map(child => normalizeGrammarSortCategory(child, level, id))
                    .filter(Boolean)
                : [];
            return {
                id,
                level,
                parentId,
                name: String(rawCategory.name || id).trim(),
                description: String(rawCategory.description || '').trim(),
                usageCategoryCode: String(rawCategory.usageCategoryCode || '').trim(),
                questionIds,
                validIds,
                missingIds,
                itemById,
                children,
                hasChildren: children.length > 0,
                count: validIds.length || children.reduce((sum, child) => sum + child.count, 0)
            };
        }

        function getGrammarSortRootCategories(level) {
            const rawList = Array.isArray(grammarSortCategoryCatalog[level]) ? grammarSortCategoryCatalog[level] : [];
            return rawList.map(category => normalizeGrammarSortCategory(category, level)).filter(Boolean);
        }

        function findGrammarSortCategory(categories, categoryId) {
            const id = String(categoryId || '').trim();
            if (!id) return null;
            for (const category of categories) {
                if (category.id === id) return category;
                const childMatch = findGrammarSortCategory(category.children || [], id);
                if (childMatch) return childMatch;
            }
            return null;
        }

        function getGrammarSortCategories(level, parentCategoryId = '') {
            const rootCategories = getGrammarSortRootCategories(level);
            const parentId = String(parentCategoryId || '').trim();
            if (!parentId) return rootCategories;
            const parent = findGrammarSortCategory(rootCategories, parentId);
            return parent ? parent.children || [] : [];
        }

        function getGrammarSortCategory(level, categoryId) {
            return findGrammarSortCategory(getGrammarSortRootCategories(level), categoryId);
        }

        function getGrammarSortCategoryQuestions(category) {
            if (!category) return [];
            return category.validIds.map(questionId => questionById.get(questionId)).filter(Boolean);
        }

        function isEnabledSortLevel(level) {
            return questionDatabase.some(q => q.level === level);
        }

        function isEnabledSortYear(level, year) {
            return questionDatabase.some(q => q.level === level && q.year === year);
        }

        function clampTimerMinutes(value) {
            const numeric = Number(value);
            if (!Number.isFinite(numeric)) {
                return TIMER_PRESETS[0];
            }
            return Math.min(180, Math.max(1, Math.round(numeric)));
        }

        function formatTimerClock(totalSeconds) {
            const safeSeconds = Math.max(0, Math.floor(Number(totalSeconds) || 0));
            const minutes = Math.floor(safeSeconds / 60);
            const seconds = safeSeconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function shuffleQuestions(items) {
            const shuffled = [...items];
            for (let index = shuffled.length - 1; index > 0; index--) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
            }
            return shuffled;
        }

        function getIconSvg(name, className = '') {
            const icons = {
                shuffle: '<path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/>',
                'chevron-right': '<path d="m9 18 6-6-6-6"/>',
                'arrow-left': '<path d="M19 12H5"/><path d="m12 19-7-7 7-7"/>',
                list: '<path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/>',
                'check-circle': '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>',
                'arrow-right': '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
                calendar: '<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>'
            };
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}" aria-hidden="true" focusable="false">${icons[name] || ''}</svg>`;
        }

        function getGrammarSortMarksKey(level, year) {
            return `grammar_sort_marks::${level}::${year}`;
        }

        function getGrammarSortLastPracticeKey(level) {
            return `grammar_sort_last_practice::${level}`;
        }

        function getGrammarSortTrainingModeKey() {
            return 'grammar_sort_training_mode';
        }

        function getGrammarSortChallengeMinutesKey() {
            return 'grammar_sort_challenge_minutes';
        }

        function parseStoredIdList(rawValue) {
            try {
                const parsed = JSON.parse(rawValue || '[]');
                if (!Array.isArray(parsed)) {
                    return [];
                }
                return Array.from(new Set(
                    parsed
                        .map(item => String(item || '').trim())
                        .filter(Boolean)
                ));
            } catch (error) {
                return [];
            }
        }

        function getYearMistakes(level, year) {
            return parseStoredIdList(localStorage.getItem(getGrammarSortMarksKey(level, year)));
        }

        function saveYearMistakes(level, year, ids) {
            const normalized = Array.from(new Set(
                (ids || [])
                    .map(item => String(item || '').trim())
                    .filter(Boolean)
            ));
            const key = getGrammarSortMarksKey(level, year);
            if (normalized.length === 0) {
                localStorage.removeItem(key);
                return;
            }
            localStorage.setItem(key, JSON.stringify(normalized));
        }

        function getYearSortValue(year) {
            const match = String(year || '').match(/^(\d{4})年(\d{1,2})月$/);
            if (!match) return 0;
            return Number(match[1]) * 100 + Number(match[2]);
        }

        function collectYearReviewItems(level) {
            const prefix = `grammar_sort_marks::${level}::`;
            const items = [];
            for (let index = 0; index < localStorage.length; index++) {
                const key = localStorage.key(index);
                if (!key || !key.startsWith(prefix)) continue;
                const year = key.slice(prefix.length);
                const ids = getYearMistakes(level, year);
                if (ids.length === 0) continue;
                items.push({ year, count: ids.length });
            }
            items.sort((left, right) => getYearSortValue(right.year) - getYearSortValue(left.year));
            return items;
        }

        function replaceAppUrl(params) {
            const nextParams = new URLSearchParams();
            Object.entries(params || {}).forEach(([key, value]) => {
                if (value) {
                    nextParams.set(key, value);
                }
            });
            const nextUrl = nextParams.toString()
                ? `${window.location.pathname}?${nextParams.toString()}`
                : window.location.pathname;
            try {
                window.history.replaceState({ path: nextUrl }, '', nextUrl);
            } catch (error) {
                console.warn('History API is restricted in this environment.');
            }
        }

        // --- 2. 核心应用状态与逻辑 ---
        const app = {
            currentLevel: null,
            practiceMode: null, // 'year' | 'random' | 'mistake' | 'category'
            trainingMode: 'study',
            currentYear: null,
            currentCategoryId: null,
            currentCategoryName: null,
            currentCategoryParentId: null,
            
            questionQueue: [], // 当前需要练习的题目队列
            currentIndex: 0,
            stats: { correct: 0, incorrect: 0 }, // 记录单次练习的数据
            randomTargetCount: RANDOM_TARGET_PRESETS[1],
            randomRoundTarget: RANDOM_TARGET_PRESETS[1],
            randomAnsweredCount: 0,
            randomStreak: 0,
            randomBestStreak: 0,
            pendingPracticeEntry: null,
            trainingPicker: {
                open: false,
                selectedMode: localStorage.getItem(getGrammarSortTrainingModeKey()) === 'challenge' ? 'challenge' : 'study',
                selectedMinutes: clampTimerMinutes(localStorage.getItem(getGrammarSortChallengeMinutesKey()) || TIMER_PRESETS[1])
            },
            timer: {
                mode: 'countup',
                status: 'idle',
                elapsedSeconds: 0,
                remainingSeconds: TIMER_PRESETS[0] * 60,
                selectedMinutes: TIMER_PRESETS[0],
                totalSeconds: TIMER_PRESETS[0] * 60,
                timerId: null,
                drawerOpen: false,
                displayHidden: false,
                hasStarted: false,
                timeoutTriggered: false,
                resultHasRun: false,
                resultSeconds: 0,
                resultTimeout: false
            },

            // 初始化函数
            init() {
                const params = new URLSearchParams(window.location.search);
                const level = params.get('level');
                const year = params.get('year');
                const mode = params.get('mode');
                const category = params.get('category');
                const browse = params.get('browse');
                const training = params.get('training');
                const timer = params.get('timer');

                if (!ENABLED_LEVELS.includes(level) || !isEnabledSortLevel(level)) {
                    replaceAppUrl({});
                    return;
                }

                this.currentLevel = level;
                document.getElementById('display-selected-level').textContent = level;
                this.renderModeSelect();

                const hasYear = year && isEnabledSortYear(level, year) && questionDatabase.some(q => q.level === level && q.year === year);
                if (hasYear) {
                    const initTrainingMode = training === 'challenge' ? 'challenge' : 'study';
                    const initChallengeMinutes = clampTimerMinutes(timer || this.trainingPicker.selectedMinutes);
                    if (mode === 'review') {
                        this.startMistakePractice(year, {
                            updateUrl: false,
                            fromInit: true,
                            skipPicker: true,
                            trainingMode: initTrainingMode,
                            challengeMinutes: initChallengeMinutes
                        });
                    } else {
                        this.startYearPractice(year, {
                            updateUrl: false,
                            skipPicker: true,
                            trainingMode: initTrainingMode,
                            challengeMinutes: initChallengeMinutes
                        });
                    }
                    return;
                }

                const categoryData = category ? getGrammarSortCategory(level, category) : null;
                if (categoryData && categoryData.hasChildren) {
                    this.showCategoryList({
                        updateUrl: false,
                        parentCategoryId: categoryData.id
                    });
                    return;
                }
                if (categoryData && categoryData.count > 0) {
                    const initTrainingMode = training === 'challenge' ? 'challenge' : 'study';
                    const initChallengeMinutes = clampTimerMinutes(timer || this.trainingPicker.selectedMinutes);
                    this.startCategoryPractice(categoryData.id, {
                        updateUrl: false,
                        skipPicker: true,
                        trainingMode: initTrainingMode,
                        challengeMinutes: initChallengeMinutes
                    });
                    return;
                }

                const browseCategory = browse && browse !== 'category' ? getGrammarSortCategory(level, browse) : null;
                if (browseCategory && browseCategory.hasChildren) {
                    this.showCategoryList({
                        updateUrl: false,
                        parentCategoryId: browseCategory.id
                    });
                    return;
                }

                if (browse === 'category') {
                    this.showCategoryList({ updateUrl: false });
                    return;
                }

                replaceAppUrl({ level });
                this.showYearList({ updateUrl: false });
            },

            getTrainingSummary() {
                return this.trainingMode === 'challenge'
                    ? `测试模式 · 剩余 ${this.timer.selectedMinutes} 分 · 统一批改`
                    : '学习模式 · 即时解析付き';
            },

            getTrainingEntrySubtitle(entry) {
                if (!entry) return '慢慢学习，还是计时挑战。';
                if (entry.kind === 'year') return `${this.currentLevel} · ${entry.year}`;
                if (entry.kind === 'mistake') return `${this.currentLevel} · ${entry.year} · 错题复习`;
                if (entry.kind === 'category') {
                    const category = getGrammarSortCategory(this.currentLevel, entry.categoryId);
                    return `${this.currentLevel} · ${category?.name || '分类练习'}`;
                }
                if (entry.kind === 'random') return `${this.currentLevel} · 随机练习`;
                if (entry.kind === 'global-random') return 'N2 / N3 随机特训';
                return '慢慢学习，还是计时挑战。';
            },

            renderModeSelect() {
                const card = document.getElementById('category-mode-card');
                const copy = document.getElementById('category-mode-copy');
                if (!card || !copy) return;
                const hasCategories = getGrammarSortCategories(this.currentLevel).some(category => category.count > 0);
                card.disabled = !hasCategories;
                card.classList.toggle('opacity-50', !hasCategories);
                card.classList.toggle('cursor-not-allowed', !hasCategories);
                copy.textContent = hasCategories
                    ? '按排序考点题单集中练习。'
                    : '这个级别暂未添加分类题单。';
            },

            renderTrainingModePicker() {
                const overlay = document.getElementById('training-mode-overlay');
                const subtitle = document.getElementById('training-mode-subtitle');
                const timerPanel = document.getElementById('training-mode-timer');
                const randomSettingsPanel = document.getElementById('training-mode-random-settings');
                const confirmBtn = document.getElementById('training-mode-confirm-btn');
                const customInput = document.getElementById('training-mode-custom-input');
                if (!overlay || !subtitle || !timerPanel || !randomSettingsPanel || !confirmBtn) return;

                subtitle.textContent = this.getTrainingEntrySubtitle(this.pendingPracticeEntry);
                overlay.hidden = !this.trainingPicker.open;
                document.body.style.overflow = this.trainingPicker.open ? 'hidden' : '';

                document.querySelectorAll('[data-training-mode]').forEach((button) => {
                    button.classList.toggle('is-selected', button.dataset.trainingMode === this.trainingPicker.selectedMode);
                });

                document.querySelectorAll('[data-training-minutes]').forEach((button) => {
                    button.classList.toggle('is-selected', Number(button.dataset.trainingMinutes) === this.trainingPicker.selectedMinutes);
                });

                if (customInput) {
                    customInput.value = String(this.trainingPicker.selectedMinutes);
                }

                const isChallenge = this.trainingPicker.selectedMode === 'challenge';
                const isRandomEntry = this.pendingPracticeEntry?.kind === 'random' || this.pendingPracticeEntry?.kind === 'global-random';
                timerPanel.hidden = !isChallenge;
                randomSettingsPanel.hidden = !isRandomEntry;
                confirmBtn.textContent = isChallenge ? '开始测试' : '开始学习';

                document.querySelectorAll('[data-training-random-target]').forEach((button) => {
                    button.classList.toggle('is-selected', Number(button.dataset.trainingRandomTarget) === this.randomTargetCount);
                });
            },

            openTrainingModePicker(entry) {
                this.pendingPracticeEntry = entry;
                this.trainingPicker.open = true;
                this.trainingPicker.selectedMode = localStorage.getItem(getGrammarSortTrainingModeKey()) === 'challenge' ? 'challenge' : 'study';
                this.trainingPicker.selectedMinutes = clampTimerMinutes(localStorage.getItem(getGrammarSortChallengeMinutesKey()) || this.trainingPicker.selectedMinutes || TIMER_PRESETS[1]);
                this.renderTrainingModePicker();
            },

            closeTrainingModePicker() {
                this.trainingPicker.open = false;
                this.pendingPracticeEntry = null;
                this.renderTrainingModePicker();
            },

            setTrainingPickerMode(mode) {
                this.trainingPicker.selectedMode = mode === 'challenge' ? 'challenge' : 'study';
                this.renderTrainingModePicker();
            },

            setTrainingPickerMinutes(minutes) {
                this.trainingPicker.selectedMinutes = clampTimerMinutes(minutes || this.trainingPicker.selectedMinutes);
                this.renderTrainingModePicker();
            },

            prepareTrainingForRun(mode, challengeMinutes) {
                this.trainingMode = mode === 'challenge' ? 'challenge' : 'study';
                localStorage.setItem(getGrammarSortTrainingModeKey(), this.trainingMode);
                if (this.trainingMode === 'challenge') {
                    const minutes = clampTimerMinutes(challengeMinutes || this.trainingPicker.selectedMinutes || TIMER_PRESETS[1]);
                    this.trainingPicker.selectedMinutes = minutes;
                    localStorage.setItem(getGrammarSortChallengeMinutesKey(), String(minutes));
                    this.resetTimerForPractice();
                    this.setTimerMode('countdown');
                    this.setTimerSelectedMinutes(minutes);
                } else {
                    this.resetTimerForPractice();
                    this.setTimerMode('countup');
                }
                this.closeTimerDrawer({ skipUpdate: true });
            },

            confirmTrainingModePicker() {
                if (!this.pendingPracticeEntry) return;
                const { kind, year, categoryId, updateUrl = true, fromInit = false } = this.pendingPracticeEntry;
                const options = {
                    updateUrl,
                    fromInit,
                    skipPicker: true,
                    trainingMode: this.trainingPicker.selectedMode,
                    challengeMinutes: this.trainingPicker.selectedMinutes,
                    randomTargetCount: this.randomTargetCount
                };
                this.closeTrainingModePicker();
                if (kind === 'year') {
                    this.startYearPractice(year, options);
                    return;
                }
                if (kind === 'mistake') {
                    this.startMistakePractice(year, options);
                    return;
                }
                if (kind === 'category') {
                    this.startCategoryPractice(categoryId, options);
                    return;
                }
                if (kind === 'global-random') {
                    this.startGlobalRandomPractice(options);
                    return;
                }
                this.startRandomPractice(options);
            },

            getActiveViewId() {
                return document.querySelector('.view-section.active')?.id || 'view-level-select';
            },

            handleHeaderBack() {
                const activeViewId = this.getActiveViewId();
                if (activeViewId === 'view-level-select') {
                    window.location.href = '../index.html';
                    return;
                }
                if (activeViewId === 'view-mode-select') {
                    this.goHome();
                    return;
                }
                if (activeViewId === 'view-year-select') {
                    this.backToModeSelect();
                    return;
                }
                if (activeViewId === 'view-category-select') {
                    if (this.currentCategoryParentId) {
                        this.showCategoryList();
                        return;
                    }
                    this.backToModeSelect();
                    return;
                }
                if (activeViewId === 'view-practice') {
                    this.handleBackFromPractice();
                    return;
                }
                window.location.href = '../index.html';
            },

            goHome() {
                this.closeTrainingModePicker();
                this.resetTimerForPractice();
                this.setPracticeToolbarMode(null);
                this.currentLevel = null;
                this.practiceMode = null;
                this.trainingMode = 'study';
                this.currentYear = null;
                this.currentCategoryId = null;
                this.currentCategoryName = null;
                this.currentCategoryParentId = null;
                replaceAppUrl({});
                this.switchView('view-level-select');
            },

            backToModeSelect() {
                this.closeTrainingModePicker();
                this.practiceMode = null;
                this.currentYear = null;
                this.currentCategoryId = null;
                this.currentCategoryName = null;
                this.currentCategoryParentId = null;
                replaceAppUrl({ level: this.currentLevel });
                this.switchView('view-mode-select');
            },

            returnToLevelSelect() {
                this.closeTrainingModePicker();
                this.resetTimerForPractice();
                this.setPracticeToolbarMode(null);
                this.currentLevel = null;
                this.practiceMode = null;
                this.trainingMode = 'study';
                this.currentYear = null;
                this.currentCategoryId = null;
                this.currentCategoryName = null;
                this.currentCategoryParentId = null;
                replaceAppUrl({});
                this.switchView('view-level-select');
            },

            handleBackFromPractice() {
                this.resetTimerForPractice();
                this.setPracticeToolbarMode(null);
                
                if (this.practiceMode === 'year' || this.practiceMode === 'mistake') {
                    this.showYearList();
                } else if (this.practiceMode === 'category') {
                    this.showCategoryList({ parentCategoryId: this.currentCategoryParentId });
                } else if (this.currentLevel === 'ALL') {
                    this.returnToLevelSelect();
                } else {
                    replaceAppUrl({ level: this.currentLevel });
                    this.switchView('view-mode-select');
                }
            },

            isPracticeInProgress() {
                return this.questionQueue.length > 0 && this.currentIndex < this.questionQueue.length;
            },

            getActiveToolbarMode() {
                const practiceView = document.getElementById('view-practice');
                const isActivePracticeView = practiceView?.classList.contains('active');
                if (!isActivePracticeView || !this.isPracticeInProgress()) return null;
                if (this.trainingMode === 'challenge') return 'timer';
                if (this.practiceMode === 'random') return 'random';
                return null;
            },

            isStudyElapsedHeaderActive() {
                const practiceView = document.getElementById('view-practice');
                return Boolean(
                    practiceView?.classList.contains('active') &&
                    this.trainingMode === 'study' &&
                    this.isPracticeInProgress()
                );
            },

            updateHeaderRightSlot() {
                const homeBtn = document.getElementById('header-home-btn');
                const elapsedDisplay = document.getElementById('study-elapsed-display');
                if (!homeBtn || !elapsedDisplay) return;
                const showElapsed = this.isStudyElapsedHeaderActive();
                homeBtn.hidden = showElapsed;
                elapsedDisplay.hidden = !showElapsed;
                if (showElapsed) {
                    elapsedDisplay.textContent = `用时 ${formatTimerClock(this.timer.elapsedSeconds)}`;
                }
            },

            setPracticeToolbarMode(mode) {
                const toolbar = document.getElementById('practice-bottom-toolbar');
                const practiceView = document.getElementById('view-practice');
                const backdrop = document.getElementById('practice-toolbar-backdrop');
                const drawer = document.getElementById('timer-drawer');
                const timerSlot = document.getElementById('timer-tool-slot');
                const randomSlot = document.getElementById('random-tool-slot');
                const visible = Boolean(mode);

                if (!toolbar || !practiceView) return;

                toolbar.hidden = !visible;
                toolbar.classList.toggle('is-visible', visible);
                practiceView.classList.toggle('has-bottom-toolbar', visible);

                if (timerSlot) timerSlot.hidden = mode !== 'timer';
                if (randomSlot) randomSlot.hidden = mode !== 'random';

                if (mode !== 'timer') {
                    this.timer.drawerOpen = false;
                    toolbar.classList.remove('drawer-open');
                    if (backdrop) backdrop.hidden = true;
                    if (drawer) drawer.hidden = true;
                }
            },

            getRandomQuestionPool() {
                if (this.currentLevel === 'ALL') return [...questionDatabase];
                return questionDatabase.filter(q => q.level === this.currentLevel);
            },

            getEffectiveRandomTarget(poolLength) {
                const desiredTarget = RANDOM_TARGET_PRESETS.includes(Number(this.randomTargetCount))
                    ? Number(this.randomTargetCount)
                    : RANDOM_TARGET_PRESETS[1];
                if (!poolLength) return desiredTarget;
                return Math.min(desiredTarget, poolLength);
            },

            prepareRandomRound(pool) {
                const effectiveTarget = this.getEffectiveRandomTarget(pool.length);
                this.randomRoundTarget = effectiveTarget;
                this.randomAnsweredCount = 0;
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                this.questionQueue = shuffleQuestions(pool).slice(0, effectiveTarget);
                this.currentIndex = 0;
            },

            setRandomTargetCount(value) {
                const nextTarget = RANDOM_TARGET_PRESETS.includes(Number(value))
                    ? Number(value)
                    : RANDOM_TARGET_PRESETS[1];
                this.randomTargetCount = nextTarget;
                if (this.trainingPicker.open) {
                    this.renderTrainingModePicker();
                    return;
                }
                this.updateTimerUI();
            },

            updateRandomProgressAfterAnswer(isStarCorrect) {
                if (this.practiceMode !== 'random') return;
                this.randomAnsweredCount = Math.min(this.randomRoundTarget, this.randomAnsweredCount + 1);

                if (isStarCorrect) {
                    this.randomStreak += 1;
                    if (this.randomStreak > this.randomBestStreak) {
                        this.randomBestStreak = this.randomStreak;
                    }
                } else {
                    this.randomStreak = 0;
                }
            },

            finishRandomRound() {
                if (this.practiceMode !== 'random') return;
                this.currentIndex = this.questionQueue.length;
                this.renderPracticeQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            stopTimer() {
                if (this.timer.timerId) {
                    window.clearInterval(this.timer.timerId);
                    this.timer.timerId = null;
                }
            },

            getTimerClockText() {
                return this.timer.mode === 'countdown'
                    ? formatTimerClock(this.timer.remainingSeconds)
                    : formatTimerClock(this.timer.elapsedSeconds);
            },

            getTimerUsedSeconds() {
                if (!this.timer.hasStarted) return 0;
                if (this.timer.mode === 'countdown') return Math.max(0, this.timer.totalSeconds - this.timer.remainingSeconds);
                return this.timer.elapsedSeconds;
            },

            getResultTimerText() {
                return this.timer.resultHasRun
                    ? formatTimerClock(this.timer.resultSeconds)
                    : '未計測';
            },

            getTimerStatusMeta() {
                const timer = this.timer;
                if (timer.resultTimeout || timer.status === 'timeout') return { text: '时间结束。', tone: 'danger' };
                if (timer.status === 'running') {
                    if (timer.mode === 'countdown') return { text: 'カウントダウン進行中。', tone: 'warning' };
                    return { text: '計測中。', tone: '' };
                }
                if (timer.status === 'paused') return { text: '暂停中。', tone: '' };
                if (timer.mode === 'countdown') return { text: `剩余 ${timer.selectedMinutes} 分から开始します。`, tone: 'warning' };
                return { text: '开始すると計測を开始します。', tone: '' };
            },

            closeTimerDrawer(options = {}) {
                const { skipUpdate = false } = options;
                this.timer.drawerOpen = false;
                if (!skipUpdate) this.updateTimerUI();
            },

            openTimerDrawer() {
                if (!this.isPracticeInProgress() || this.trainingMode !== 'challenge') return;
                this.timer.drawerOpen = true;
                this.updateTimerUI();
            },

            toggleTimerDrawer() {
                if (!this.isPracticeInProgress() || this.trainingMode !== 'challenge') return;
                this.timer.drawerOpen = !this.timer.drawerOpen;
                this.updateTimerUI();
            },

            resetTimerForPractice() {
                this.stopTimer();
                this.timer.status = 'idle';
                this.timer.elapsedSeconds = 0;
                this.timer.totalSeconds = clampTimerMinutes(this.timer.selectedMinutes) * 60;
                this.timer.remainingSeconds = this.timer.totalSeconds;
                this.timer.hasStarted = false;
                this.timer.timeoutTriggered = false;
                this.timer.resultHasRun = false;
                this.timer.resultSeconds = 0;
                this.timer.resultTimeout = false;
                this.closeTimerDrawer({ skipUpdate: true });
                this.updateTimerUI();
            },

            finalizeTimerForResult(options = {}) {
                const { timedOut = false } = options;
                if (!this.timer.resultTimeout && !this.timer.resultHasRun) {
                    this.timer.resultHasRun = this.timer.hasStarted;
                    this.timer.resultSeconds = this.getTimerUsedSeconds();
                }
                this.timer.resultTimeout = this.timer.resultTimeout || timedOut;
                this.stopTimer();

                if (timedOut) {
                    this.timer.status = 'timeout';
                    this.timer.remainingSeconds = 0;
                } else if (this.timer.hasStarted) {
                    this.timer.status = 'finished';
                } else {
                    this.timer.status = 'idle';
                }
                this.setPracticeToolbarMode(null);
                this.updateTimerUI();
            },

            setTimerMode(mode) {
                if (!['countup', 'countdown'].includes(mode) || this.timer.mode === mode) return;
                this.stopTimer();
                this.timer.mode = mode;
                this.timer.status = 'idle';
                this.timer.elapsedSeconds = 0;
                this.timer.totalSeconds = clampTimerMinutes(this.timer.selectedMinutes) * 60;
                this.timer.remainingSeconds = this.timer.totalSeconds;
                this.timer.hasStarted = false;
                this.timer.timeoutTriggered = false;
                this.timer.resultHasRun = false;
                this.timer.resultSeconds = 0;
                this.timer.resultTimeout = false;
                this.updateTimerUI();
            },

            setTimerSelectedMinutes(value) {
                const minutes = clampTimerMinutes(value);
                this.timer.selectedMinutes = minutes;
                this.timer.totalSeconds = minutes * 60;
                if (this.timer.mode === 'countdown') {
                    this.stopTimer();
                    this.timer.status = 'idle';
                    this.timer.remainingSeconds = this.timer.totalSeconds;
                    this.timer.hasStarted = false;
                    this.timer.timeoutTriggered = false;
                    this.timer.resultHasRun = false;
                    this.timer.resultSeconds = 0;
                    this.timer.resultTimeout = false;
                }
                this.updateTimerUI();
            },

            toggleTimerDisplayVisibility() {
                this.timer.displayHidden = !this.timer.displayHidden;
                this.updateTimerUI();
            },

            startTimer() {
                if (!this.isPracticeInProgress()) return;
                const timer = this.timer;
                this.stopTimer();
                if (timer.mode === 'countdown') {
                    timer.totalSeconds = clampTimerMinutes(timer.selectedMinutes) * 60;
                    if (!timer.hasStarted || timer.status === 'idle' || timer.status === 'finished' || timer.status === 'timeout') {
                        timer.remainingSeconds = timer.totalSeconds;
                    }
                } else if (!timer.hasStarted || timer.status === 'finished' || timer.status === 'timeout') {
                    timer.elapsedSeconds = 0;
                }
                timer.hasStarted = true;
                timer.timeoutTriggered = false;
                timer.resultHasRun = false;
                timer.resultSeconds = 0;
                timer.resultTimeout = false;
                timer.status = 'running';

                timer.timerId = window.setInterval(() => {
                    if (timer.mode === 'countup') {
                        timer.elapsedSeconds += 1;
                        this.updateTimerUI();
                        return;
                    }
                    timer.remainingSeconds = Math.max(0, timer.remainingSeconds - 1);
                    if (timer.remainingSeconds === 0) {
                        this.finishCountdown();
                        return;
                    }
                    this.updateTimerUI();
                }, 1000);
                this.updateTimerUI();
            },

            pauseTimer() {
                if (this.timer.status !== 'running') return;
                this.stopTimer();
                this.timer.status = this.timer.hasStarted ? 'paused' : 'idle';
                this.updateTimerUI();
            },

            toggleTimerRun() {
                if (this.timer.status === 'running') {
                    this.pauseTimer();
                    return;
                }
                this.startTimer();
            },

            resetTimer() {
                this.stopTimer();
                this.timer.status = 'idle';
                this.timer.elapsedSeconds = 0;
                this.timer.totalSeconds = clampTimerMinutes(this.timer.selectedMinutes) * 60;
                this.timer.remainingSeconds = this.timer.totalSeconds;
                this.timer.hasStarted = false;
                this.timer.timeoutTriggered = false;
                this.timer.resultHasRun = false;
                this.timer.resultSeconds = 0;
                this.timer.resultTimeout = false;
                this.updateTimerUI();
            },

            startPracticeClock() {
                if (this.trainingMode === 'study' || this.trainingMode === 'challenge') {
                    this.startTimer();
                }
            },

            finishCountdown() {
                if (!this.isPracticeInProgress() || this.timer.timeoutTriggered) return;
                this.stopTimer();
                this.timer.remainingSeconds = 0;
                this.timer.status = 'timeout';
                this.timer.timeoutTriggered = true;
                this.currentIndex = this.questionQueue.length;
                this.renderPracticeQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            updateTimerUI() {
                const timer = this.timer;
                this.updateHeaderRightSlot();
                const toolbar = document.getElementById('practice-bottom-toolbar');
                const toolbarDisplay = document.getElementById('timer-toolbar-display');
                const drawerDisplay = document.getElementById('timer-drawer-display');
                const toolbarMain = document.getElementById('timer-toolbar-main');
                const toolbarToggle = document.getElementById('timer-toolbar-toggle-btn');
                const toolbarReset = document.getElementById('timer-toolbar-reset-btn');
                const toolbarSettings = document.getElementById('timer-toolbar-settings-btn');
                const drawer = document.getElementById('timer-drawer');
                const backdrop = document.getElementById('practice-toolbar-backdrop');
                const drawerStart = document.getElementById('timer-drawer-start-btn');
                const drawerPause = document.getElementById('timer-drawer-pause-btn');
                const drawerReset = document.getElementById('timer-drawer-reset-btn');
                const hideBtn = document.getElementById('timer-hide-btn');
                const statusText = document.getElementById('timer-status-text');
                const customInput = document.getElementById('timer-custom-input');
                const randomToolbarMain = document.getElementById('random-toolbar-main');
                const randomProgress = document.getElementById('random-toolbar-progress');
                const randomStreak = document.getElementById('random-toolbar-streak');
                const randomTarget = document.getElementById('random-toolbar-target');
                const randomEndBtn = document.getElementById('random-toolbar-end-btn');

                if (!toolbar || !toolbarDisplay || !drawerDisplay || !toolbarMain) return;

                const activeToolbarMode = this.getActiveToolbarMode();
                const shouldShowTimer = activeToolbarMode === 'timer';
                const shouldShowRandom = activeToolbarMode === 'random';
                this.setPracticeToolbarMode(activeToolbarMode);

                const realTime = this.getTimerClockText();
                const toolbarTime = timer.displayHidden ? '--:--' : realTime;

                toolbarDisplay.textContent = toolbarTime;
                toolbarDisplay.classList.toggle('is-concealed', timer.displayHidden);
                drawerDisplay.textContent = realTime;
                toolbarMain.dataset.timerStatus = timer.status;

                if (toolbarToggle) toolbarToggle.textContent = timer.status === 'running' ? '暂停' : (timer.status === 'paused' ? '继续' : '开始');
                if (toolbarReset) toolbarReset.disabled = !timer.hasStarted && timer.status === 'idle';
                if (toolbarSettings) toolbarSettings.classList.toggle('is-primary', timer.drawerOpen && shouldShowTimer);
                
                if (drawer) drawer.hidden = !timer.drawerOpen || !shouldShowTimer;
                if (backdrop) backdrop.hidden = !timer.drawerOpen || !shouldShowTimer;
                toolbar.classList.toggle('drawer-open', timer.drawerOpen && shouldShowTimer);

                if (drawerStart) drawerStart.textContent = timer.status === 'paused' ? '继续' : '开始';
                if (drawerPause) drawerPause.disabled = timer.status !== 'running';
                if (drawerReset) drawerReset.disabled = !timer.hasStarted && timer.status === 'idle';

                if (hideBtn) {
                    hideBtn.classList.toggle('is-selected', timer.displayHidden);
                    hideBtn.textContent = timer.displayHidden ? '時間を表示' : '時間を隠す';
                }

                if (customInput) customInput.value = String(timer.selectedMinutes);

                document.querySelectorAll('[data-timer-mode]').forEach(button => {
                    button.classList.toggle('is-selected', button.dataset.timerMode === timer.mode);
                });

                document.querySelectorAll('[data-timer-preset]').forEach(button => {
                    button.classList.toggle('is-selected', Number(button.dataset.timerPreset) === timer.selectedMinutes);
                });

                if (statusText) {
                    const statusMeta = this.getTimerStatusMeta();
                    statusText.textContent = statusMeta.text;
                    statusText.classList.remove('is-warning', 'is-danger');
                    if (statusMeta.tone === 'warning') statusText.classList.add('is-warning');
                    if (statusMeta.tone === 'danger') statusText.classList.add('is-danger');
                }

                if (randomToolbarMain) randomToolbarMain.dataset.timerStatus = this.randomStreak > 0 ? 'running' : 'idle';
                if (randomProgress) randomProgress.textContent = `${Math.min(this.randomAnsweredCount, this.randomRoundTarget)}/${this.randomRoundTarget}`;
                if (randomStreak) randomStreak.textContent = String(this.randomStreak);
                if (randomTarget) randomTarget.textContent = `${this.randomRoundTarget}题`;
                if (randomEndBtn) randomEndBtn.disabled = !shouldShowRandom;
            },

            // View Management
            switchView(viewId) {
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                const view = document.getElementById(viewId);
                if (view) view.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'instant' });
                this.updateTimerUI();
            },

            // Step 1: 选择级别
            selectLevel(level) {
                if (!isEnabledSortLevel(level)) return;
                this.currentLevel = level;
                document.getElementById('display-selected-level').textContent = level;
                this.renderModeSelect();
                replaceAppUrl({ level });
                this.switchView('view-mode-select');
            },

            // Step 2-A: 显示年份列表
            showYearList(options = {}) {
                const { updateUrl = true } = options;
                this.practiceMode = 'year';
                this.currentCategoryId = null;
                this.currentCategoryName = null;
                this.currentCategoryParentId = null;
                if (updateUrl) replaceAppUrl({ level: this.currentLevel });
                
                const availableYears = [...new Set(questionDatabase
                    .filter(q => q.level === this.currentLevel)
                    .map(q => q.year)
                )].sort((left, right) => getYearSortValue(right) - getYearSortValue(left));

                const container = document.getElementById('year-list-container');
                const reviewSection = document.getElementById('year-review-section');
                const reviewGrid = document.getElementById('year-review-grid');
                const reviewStatus = document.getElementById('year-review-status');
                const reviewCount = document.getElementById('year-review-count');
                container.innerHTML = '';
                reviewGrid.innerHTML = '';

                const reviewItems = collectYearReviewItems(this.currentLevel).filter(item => isEnabledSortYear(this.currentLevel, item.year));
                const totalReviewCount = reviewItems.reduce((sum, item) => sum + item.count, 0);
                if (reviewStatus) {
                    reviewStatus.textContent = totalReviewCount > 0 ? '有待复习' : '暂无错题';
                    reviewStatus.classList.toggle('has-items', totalReviewCount > 0);
                }
                if (reviewCount) reviewCount.textContent = `${totalReviewCount} 题`;
                reviewGrid.hidden = reviewItems.length === 0;
                if (reviewItems.length > 0) {
                    reviewGrid.innerHTML = reviewItems.map(item => `
                        <button onclick="app.startMistakePractice('${item.year}')" class="group inline-flex items-center gap-2 px-4 py-2 border-[1.5px] border-borderStrong bg-white text-textMain text-sm font-bold hover:bg-red-50 hover:text-accentRed transition-all sketch-btn">
                            <span>${item.year}</span>
                            <span class="text-xs px-2 py-0.5 border border-borderStrong bg-red-50 text-accentRed rounded-sm">待复习 ${item.count} 题</span>
                        </button>
                    `).join('');
                }

                const lastPractice = localStorage.getItem(getGrammarSortLastPracticeKey(this.currentLevel)) || '';

                if (availableYears.length === 0) {
                    container.innerHTML = `<div class="col-span-full text-center py-12 text-textSub bg-white border-[1.5px] border-borderMain sketch-box">暂无数据</div>`;
                } else {
                    container.innerHTML = availableYears.map(year => {
                        const qCount = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year).length;
                        const isLastPractice = year === lastPractice;
                        const isEnabled = isEnabledSortYear(this.currentLevel, year);

                        return `
                            <button ${isEnabled ? `onclick="app.startYearPractice('${year}')"` : 'type="button" disabled'} class="flex items-center justify-between p-5 bg-white border-[1.5px] border-borderStrong transition-all group text-left sketch-box ${isEnabled ? 'hover:bg-blue-50' : 'opacity-50 cursor-not-allowed'}">
                                <div class="flex items-center gap-3">
                                    <div class="font-bold text-lg text-textMain tracking-wider">${year}</div>
                                </div>
                                <div class="flex items-center gap-2 shrink-0">
                                    ${isLastPractice ? '<span class="text-[10px] font-bold text-textMain bg-yellow-100 px-2 py-1 border border-borderStrong rounded-sm">前回</span>' : ''}
                                    <div class="text-sm text-textSub font-sans bg-white px-2 py-1 border-[1px] border-borderStrong rounded-sm">全 ${qCount} 题</div>
                                </div>
                            </button>
                        `;
                    }).join('');
                }
                this.switchView('view-year-select');
            },

            showCategoryList(options = {}) {
                if (!ENABLED_LEVELS.includes(this.currentLevel)) return;
                const parentCategoryId = String(options.parentCategoryId || '').trim();
                const parentCategory = parentCategoryId ? getGrammarSortCategory(this.currentLevel, parentCategoryId) : null;
                if (options.updateUrl !== false) {
                    replaceAppUrl({
                        level: this.currentLevel,
                        browse: parentCategory ? parentCategory.id : 'category'
                    });
                }
                this.practiceMode = 'category';
                this.currentYear = null;
                this.currentCategoryId = null;
                this.currentCategoryName = null;
                this.currentCategoryParentId = parentCategory ? parentCategory.id : null;

                const container = document.getElementById('category-list-container');
                const levelLabel = document.getElementById('category-selected-level');
                const categories = getGrammarSortCategories(this.currentLevel, this.currentCategoryParentId);
                if (!container) return;
                if (levelLabel) levelLabel.textContent = this.currentLevel;

                if (categories.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-12 px-6 text-textSub bg-white border-[1.5px] border-borderMain sketch-box">
                            <div class="text-base font-bold text-textMain mb-2">还没有添加分类题单</div>
                            <div class="text-sm font-bold leading-relaxed">${escapeHtml(this.currentLevel)} 分类练习暂未开放。</div>
                        </div>
                    `;
                } else {
                    container.innerHTML = categories.map(category => {
                        const hasChildren = category.hasChildren && category.children.length > 0;
                        const hasQuestions = category.count > 0 || hasChildren;
                        return `
                            <button type="button" ${hasQuestions ? `data-category-id="${escapeHtml(category.id)}"` : 'disabled'} class="group text-left bg-white p-5 relative overflow-hidden sketch-box ${hasQuestions ? '' : 'opacity-50 cursor-not-allowed'}">
                                <div class="flex items-start justify-between gap-4">
                                    <div>
                                        <h3 class="text-lg font-bold text-textMain mb-2 tracking-wide">${escapeHtml(category.name)}</h3>
                                        <p class="text-xs text-textSub font-bold leading-relaxed">${escapeHtml(category.description || '集中练习同一类排序考点。')}</p>
                                    </div>
                                    <span class="shrink-0 text-xs font-bold text-textMain px-2 py-1 border border-borderStrong rounded-sm" style="background: rgba(255, 213, 79, 0.25);">${category.count} 题</span>
                                </div>
                                ${hasChildren ? `<div class="mt-4 text-[11px] font-bold text-textMain">${category.children.length} 个小类</div>` : ''}
                                ${category.missingIds.length > 0 ? `<div class="mt-4 text-[11px] font-bold text-accentRed">有 ${category.missingIds.length} 个题号未匹配</div>` : ''}
                            </button>
                        `;
                    }).join('');
                }

                this.switchView('view-category-select');
            },

            handleCategoryCardClick(categoryId) {
                const category = getGrammarSortCategory(this.currentLevel, categoryId);
