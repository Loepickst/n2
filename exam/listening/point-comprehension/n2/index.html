<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポイント理解 - N2 ステージ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
:root {
  --paper: #ffffff;
  --graphite: #333333;
  --graphite-sub: #666666;
  --graphite-faint: #cccccc;
  --red-pencil: #e64a4a;
  --marker-yellow: rgba(255, 213, 79, 0.35);
  --marker-blue: rgba(129, 212, 250, 0.35);
  --marker-peach: rgba(253, 186, 116, 0.35);
  --marker-mint: rgba(134, 239, 172, 0.35);
  --marker-pink: rgba(244, 143, 177, 0.35);
  --marker-gray: rgba(200, 200, 200, 0.25);
  --hatching-graphite: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px);
  --transition: all 0.2s ease-out;
}
* { box-sizing: border-box; }
body {
  font-family: 'Noto Serif JP', 'Noto Sans JP', 'Noto Sans SC', serif;
  background: var(--paper);
  color: var(--graphite);
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
  z-index: -1;
  pointer-events: none;
}
.container, .vocab-container {
  width: 95%;
  max-width: 860px;
  padding: 40px 0 80px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.intro-box {
  text-align: center;
  margin-bottom: 36px;
  animation: fadeIn 0.4s ease-out;
}
.intro-box p {
  color: var(--graphite);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  font-weight: 700;
  margin: 0;
  background: linear-gradient(transparent 50%, rgba(255, 213, 79, 0.4) 50%);
  border-bottom: 1.5px dashed var(--graphite-faint);
  display: inline-block;
  padding: 4px 16px;
  letter-spacing: 0.1em;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
.level-grid, .year-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 24px;
  animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.level-card, .year-card, .empty-card {
  background: transparent;
  border: 1.5px solid var(--graphite);
  border-radius: 3px 255px 4px 25px / 255px 5px 225px 4px;
  padding: 24px;
  color: var(--graphite);
  text-decoration: none;
  transition: var(--transition);
  min-width: 0;
}
.level-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
.level-card:hover:not(.disabled), .year-card:hover { transform: translate(-1px, -1px); background: var(--hatching-graphite); }
.level-card:active:not(.disabled) { transform: translate(1px, 1px); }
.level-card.disabled, .empty-card {
  border-style: dashed;
  border-color: var(--graphite-faint);
  opacity: 0.82;
}
.level-info { min-width: 0; display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
.level-info h2, .year-title {
  margin: 0;
  font-size: 24px;
  font-weight: 700;
  color: var(--graphite);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  letter-spacing: 0.05em;
}
.level-info p, .category-description, .empty-card p {
  font-family: 'Noto Sans JP', sans-serif;
  margin: 0;
  color: var(--graphite-sub);
  line-height: 1.7;
  font-size: 14px;
  font-weight: 600;
}
.lesson-tag, .status-tag {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 900;
  color: var(--graphite);
  padding: 2px 8px;
  border: 1.5px solid var(--graphite);
  border-radius: 2px 8px 2px 6px / 6px 2px 8px 2px;
  letter-spacing: 0.08em;
  background: var(--marker-yellow);
}
.level-card:nth-child(1) .lesson-tag { background: var(--marker-blue); }
.level-card:nth-child(2) .lesson-tag { background: var(--marker-peach); }
.level-card:nth-child(3) .lesson-tag { background: var(--marker-mint); }
.level-card.disabled .lesson-tag { background: var(--marker-gray); border-color: var(--graphite-faint); color: var(--graphite-sub); }
.level-icon { font-size: 42px; line-height: 1; filter: grayscale(0.1); }
.year-card { display: flex; flex-direction: column; gap: 20px; }
.year-info {
  display: flex;
  flex-direction: column;
  gap: 12px;
  border-bottom: 1.5px dashed var(--graphite-faint);
  padding-bottom: 16px;
}
.year-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.last-practice-tag {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  font-weight: 900;
  background: var(--marker-yellow);
  padding: 2px 8px;
  border: 1.5px solid var(--graphite);
  border-radius: 2px 8px 2px 6px / 6px 2px 8px 2px;
}
.exam-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 14px; }
.exam-btn {
  text-decoration: none;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 900;
  padding: 10px 16px;
  border: 1.5px solid var(--graphite);
  border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
  color: var(--graphite);
  transition: var(--transition);
  letter-spacing: 0.05em;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-blue { background: var(--marker-blue); }
.btn-pink { background: var(--marker-pink); }
.exam-btn:hover { filter: brightness(0.96); border-style: dashed; }
.review-section {
  background: var(--marker-yellow);
  border: 1.5px solid var(--red-pencil);
  border-radius: 3px 255px 5px 25px / 255px 3px 225px 5px;
  padding: 20px;
  margin-bottom: 32px;
}
.review-panel > summary { list-style: none; }
.review-panel > summary::-webkit-details-marker { display: none; }
.review-summary { display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; }
.review-panel[open] .review-summary { padding-bottom: 12px; margin-bottom: 14px; border-bottom: 1.5px dashed var(--graphite-faint); }
.review-summary-title { font-size: 18px; font-weight: 900; letter-spacing: 0.04em; }
.review-summary-tags { display: inline-flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
.review-status-pill, .review-count-pill, .review-action-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 28px;
  padding: 4px 9px;
  border: 1.5px solid var(--graphite);
  border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
  background: #fff;
  color: var(--graphite);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 900;
  line-height: 1;
  white-space: nowrap;
}
.review-status-pill.has-items { background: var(--marker-yellow); color: var(--red-pencil); }
.review-action-pill::after { content: '展开'; }
.review-panel[open] .review-action-pill::after { content: '收起'; }
.review-grid { display: flex; flex-wrap: wrap; gap: 12px; }
.review-item {
  text-decoration: none;
  background: #fff;
  border: 1.5px solid var(--graphite);
  border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
  padding: 8px 14px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: var(--graphite);
  font-weight: 900;
  font-family: 'Noto Sans JP', sans-serif;
}
.review-item:hover { border-color: var(--red-pencil); color: var(--red-pencil); }
.review-count { color: var(--red-pencil); font-size: 12px; padding: 2px 6px; border: 1.5px solid var(--red-pencil); border-radius: 50% 45% 55% 40% / 45% 55% 40% 50%; }
[hidden] {
  display: none !important;
}
.practice-toolbar {
  display: flex;
  justify-content: center;
  margin: -12px 0 28px;
}
.browse-mode-toggle {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px;
  border: 1.5px solid var(--graphite);
  border-radius: 3px 14px 4px 12px / 12px 4px 14px 3px;
  background: #fff;
}
.browse-mode-btn {
  appearance: none;
  border: 1.5px solid transparent;
  border-radius: 2px 9px 3px 7px / 7px 3px 9px 2px;
  background: transparent;
  color: var(--graphite);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0.08em;
  padding: 8px 16px;
  transition: var(--transition);
}
.browse-mode-btn:hover:not(.active) {
  background: var(--hatching-graphite);
  border-color: var(--graphite-faint);
}
.browse-mode-btn.active {
  background: var(--marker-yellow);
  border-color: var(--graphite);
}
.category-card .year-info {
  gap: 14px;
}
.category-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.category-count {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 900;
  color: var(--graphite);
  background: #fff;
  border: 1.5px solid var(--graphite);
  border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
  padding: 4px 9px;
}
.category-count.pending {
  color: var(--red-pencil);
  border-color: var(--red-pencil);
  background: var(--marker-pink);
}
.category-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.category-actions .exam-btn {
  min-width: 150px;
}
.category-open-btn {
  cursor: pointer;
}
body.set-modal-open {
  overflow: hidden;
}
.category-set-modal {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: grid;
  place-items: center;
  padding: 24px;
}
.category-set-modal[hidden] {
  display: none !important;
}
.category-set-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(255, 255, 255, 0.76);
  backdrop-filter: blur(4px);
}
.category-set-dialog {
  position: relative;
  width: min(760px, 100%);
  max-height: min(82vh, 760px);
  overflow: auto;
  background: #fff;
  border: 1.5px solid var(--graphite);
  border-radius: 4px 255px 5px 28px / 255px 4px 225px 5px;
  box-shadow: 0 20px 48px rgba(51, 51, 51, 0.14);
  padding: 28px;
}
.category-set-close {
  position: absolute;
  top: 16px;
  right: 18px;
  width: 34px;
  height: 34px;
  border: 1.5px solid var(--graphite);
  border-radius: 50%;
  background: #fff;
  color: var(--graphite);
  cursor: pointer;
  font-size: 22px;
  font-weight: 900;
  line-height: 1;
}
.category-set-kicker {
  margin: 0 0 8px;
  color: var(--graphite-sub);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0.16em;
}
.category-set-heading {
  margin: 0 42px 10px 0;
  color: var(--graphite);
  font-size: 26px;
  line-height: 1.35;
}
.category-set-copy {
  margin: 0 0 16px;
  color: var(--graphite-sub);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 700;
  line-height: 1.75;
}
.category-set-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 18px;
}
.category-set-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
}
.category-set-link {
  color: var(--graphite);
  text-decoration: none;
  background: #fff;
  border: 1.5px solid var(--graphite);
  border-radius: 2px 9px 3px 7px / 7px 3px 9px 2px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: var(--transition);
}
.category-set-link:hover {
  background: var(--hatching-graphite);
  border-style: dashed;
  transform: translate(-1px, -1px);
}
.category-set-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 0.04em;
}
.category-set-status {
  color: var(--graphite-sub);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  font-weight: 800;
  line-height: 1.35;
}
.category-set-status.in-progress {
  color: #9a6a00;
}
.category-set-status.completed {
  color: #247a4f;
}
@media (max-width: 720px) {
  .container, .vocab-container { width: calc(100% - 32px); padding: 22px 0 44px; }
  .intro-box { margin-bottom: 24px; }
  .intro-box p { font-size: 13px; padding: 4px 12px; }
  .level-grid, .year-grid { grid-template-columns: 1fr; gap: 16px; }
  .level-card, .year-card, .empty-card { padding: 16px; }
  .level-info h2, .year-title { font-size: 18px; gap: 8px; }
  .level-info p, .category-description, .empty-card p { font-size: 13px; }
  .level-icon { font-size: 32px; }
  .exam-buttons { gap: 10px; }
  .exam-btn { font-size: 13px; padding: 8px 12px; }
  .practice-toolbar { margin: -8px 0 22px; }
  .browse-mode-toggle { width: 100%; justify-content: center; }
  .browse-mode-btn { flex: 1 1 0; font-size: 13px; padding: 7px 10px; }
  .review-section { padding: 16px; margin-bottom: 24px; }
  .review-summary-title { font-size: 15px; }
}
@media (max-width: 520px) {
  .container, .vocab-container { width: calc(100% - 24px); padding: 18px 0 36px; }
  .intro-box p { font-size: 12px; }
  .level-card, .year-card, .empty-card { padding: 14px; }
  .exam-btn { font-size: 12px; padding: 7px 10px; }
  .browse-mode-toggle { gap: 6px; padding: 5px; }
  .browse-mode-btn { font-size: 12px; letter-spacing: 0.04em; }
  .category-actions .exam-btn { min-width: 0; width: 100%; }
  .category-set-modal { padding: 14px; }
  .category-set-dialog { padding: 22px 16px 18px; }
  .category-set-heading { font-size: 21px; }
  .category-set-list { grid-template-columns: 1fr; }
  .review-summary { align-items: flex-start; }
  .review-status-pill, .review-count-pill, .review-action-pill { min-height: 24px; padding: 3px 7px; font-size: 10px; }
}
</style>

  },
  {
    title: '2019年',
    tag: 'トラック',
    entries: [
      { key: '2019-07', label: '7月 演習', href: 'years/2019.html?year=2019-07&mode=study', tone: 'blue' },
      { key: '2019-12', label: '12月 演習', href: 'years/2019.html?year=2019-12&mode=study', tone: 'pink' }
    ]
  },
  {
    title: '2020年',
    tag: 'トラック',
    entries: [
      { key: '2020-12', label: '12月 演習', href: 'years/2020.html?year=2020-12&mode=study', tone: 'pink' }
    ]
  }
];
const yearGrid = document.getElementById('yearGrid');
const categoryGrid = document.getElementById('categoryGrid');
const categorySetModal = document.getElementById('categorySetModal');
const categorySetTitle = document.getElementById('categorySetTitle');
const categorySetDescription = document.getElementById('categorySetDescription');
const categorySetSummary = document.getElementById('categorySetSummary');
const categorySetList = document.getElementById('categorySetList');
const mistakeReview = document.getElementById('mistakeReview');
const reviewGrid = document.getElementById('reviewGrid');
const reviewStatus = document.getElementById('reviewStatus');
const reviewTotal = document.getElementById('reviewTotal');
const introText = document.getElementById('introText');
const browseModeButtons = Array.from(document.querySelectorAll('[data-browse-mode]'));
const randomRoot = document.getElementById('randomExamRoot');
const initialParams = new URLSearchParams(window.location.search);
let currentBrowseMode = initialParams.get('browse') === 'category' ? 'category' : 'year';

function escapeHtml(value) {
  return String(value || '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  })[char]);
}

function getMistakes(key) {
  if (!window.ListeningProgress || typeof window.ListeningProgress.getMistakeIds !== 'function') return [];
  return window.ListeningProgress.getMistakeIds(LISTENING_TYPE, LISTENING_LEVEL, key) || [];
}

function renderYears() {
  if (!YEAR_GROUPS.length) return;
  const lastPractice = window.ListeningProgress && typeof window.ListeningProgress.getLastPractice === 'function'
    ? window.ListeningProgress.getLastPractice(LISTENING_TYPE, LISTENING_LEVEL)
    : '';
  yearGrid.innerHTML = YEAR_GROUPS.map((group) => {
    const lastTag = group.entries.some((entry) => entry.key === lastPractice)
      ? '<span class="last-practice-tag">前回の続き</span>'
      : '';
    const buttons = group.entries.map((entry) => '<a href="' + entry.href + '" class="exam-btn btn-' + (entry.tone || 'blue') + '">' + entry.label + '</a>').join('');
    return '<section class="year-card">'
      + '<div class="year-info">'
      + '<h2 class="year-title">' + group.title + ' <span class="lesson-tag">' + (group.tag || '') + '</span></h2>'
      + '<div class="year-meta">' + lastTag + '</div>'
      + '</div>'
      + '<div class="exam-buttons">' + buttons + '</div>'
      + '</section>';
  }).join('');
}

function renderCategories() {
  if (!window.ListeningCategorySystem || typeof window.ListeningCategorySystem.getCategories !== 'function') {
    categoryGrid.innerHTML = '<section class="empty-card"><h2 class="year-title">分類データを読み込めません</h2><p>分类练习系统暂时不可用。</p></section>';
    return;
  }

  const categories = window.ListeningCategorySystem.getCategories(CATEGORY_TYPE, CATEGORY_LEVEL);
  if (!categories.length) {
    categoryGrid.innerHTML = '<section class="empty-card"><h2 class="year-title">分類は準備中です</h2><p>当前没有可练习的分类。</p></section>';
    return;
  }

  categoryGrid.innerHTML = categories.map((category) => {
    const missing = Number(category.missingCount || 0);
    const playable = Number(category.itemCount || 0);
    const sourceTotal = Number(category.sourceItemCount || playable);
    const countLabel = missing > 0
      ? `可练 ${playable} / 待补 ${missing}`
      : `${playable} 题`;
    const countClass = missing > 0 ? 'category-count pending' : 'category-count';
    const sets = window.ListeningCategorySystem.getCategorySets(CATEGORY_TYPE, CATEGORY_LEVEL, category.id, CATEGORY_SET_SIZE);
    const hasProgress = sets.some((set) => set.completed || set.lastIndex >= 0);
    const continueTag = hasProgress ? '<span class="last-practice-tag">前回の続き</span>' : '';

    return '<section class="year-card category-card">'
      + '<div class="year-info">'
      + '<div class="category-title-row">'
      + '<h2 class="year-title">' + escapeHtml(category.name) + '</h2>'
      + '<span class="' + countClass + '">' + escapeHtml(countLabel) + '</span>'
      + '</div>'
      + '<p class="category-description">' + escapeHtml(category.description || '按题干问法进行集中练习。') + '</p>'
      + '<div class="year-meta">' + continueTag + '<span class="lesson-tag">来源 ' + sourceTotal + ' 题</span><span class="lesson-tag">共 ' + sets.length + ' 组</span></div>'
      + '</div>'
      + '<div class="category-actions"><button type="button" class="exam-btn btn-blue category-open-btn" data-category-id="' + escapeHtml(category.id) + '">选择练习组</button></div>'
      + '</section>';
  }).join('');
}

function getSetStatus(set) {
  if (set.completed) return { className: 'completed', text: '已完成' };
  if (set.lastIndex >= 0) return { className: 'in-progress', text: `练习中 第 ${set.lastIndex + 1} / ${set.totalCount} 题` };
  return { className: '', text: '未开始' };
}

function renderSetLinks(category) {
  const sets = window.ListeningCategorySystem.getCategorySets(CATEGORY_TYPE, CATEGORY_LEVEL, category.id, CATEGORY_SET_SIZE);
  return sets.map((set) => {
    const href = window.ListeningCategorySystem.buildCategoryPracticeUrl({
      type: CATEGORY_TYPE,
      level: CATEGORY_LEVEL,
      categoryId: category.id,
      setNumber: set.setNumber
    });
    const status = getSetStatus(set);
    return '<a href="' + href + '" class="category-set-link">'
      + '<span class="category-set-title">第' + set.setNumber + '组 ' + set.start + '-' + set.end + '题</span>'
      + '<span class="category-set-status ' + status.className + '">' + status.text + '</span>'
      + '</a>';
  }).join('');
}

function openCategorySetModal(categoryId) {
  if (!window.ListeningCategorySystem) return;
  const category = window.ListeningCategorySystem.getCategory(CATEGORY_TYPE, CATEGORY_LEVEL, categoryId);
  if (!category) return;
  const stats = window.ListeningCategorySystem.getCategoryStats(CATEGORY_TYPE, CATEGORY_LEVEL, categoryId);
  const sets = window.ListeningCategorySystem.getCategorySets(CATEGORY_TYPE, CATEGORY_LEVEL, categoryId, CATEGORY_SET_SIZE);
  categorySetTitle.textContent = category.name;
  categorySetDescription.textContent = category.description || '按题干问法进行集中练习。';
  categorySetSummary.innerHTML = '<span class="category-count">' + stats.itemCount + ' 题</span>'
    + '<span class="category-count">共 ' + sets.length + ' 组</span>';
  categorySetList.innerHTML = renderSetLinks(category);
  categorySetModal.hidden = false;
  document.body.classList.add('set-modal-open');
}

function closeCategorySetModal() {
  categorySetModal.hidden = true;
  document.body.classList.remove('set-modal-open');
}

function renderReview() {
  if (!YEAR_GROUPS.length) {
    reviewGrid.innerHTML = '';
    return;
  }
  const items = [];
  YEAR_GROUPS.forEach((group) => {
    group.entries.forEach((entry) => {
      const mistakes = getMistakes(entry.key);
      if (mistakes.length > 0) {
        const sep = entry.href.includes('?') ? '&' : '?';
        items.push({
          href: entry.href + sep + 'mode=review',
          label: group.title + ' ' + entry.label,
          count: mistakes.length,
        });
      }
    });
  });
  const total = items.reduce((sum, item) => sum + item.count, 0);
  reviewStatus.textContent = total > 0 ? '有待复习' : '暂无错题';
  reviewStatus.classList.toggle('has-items', total > 0);
  reviewTotal.textContent = total + ' 题';
  reviewGrid.innerHTML = items.map((item) => '<a class="review-item" href="' + item.href + '"><span>' + item.label + '</span><span class="review-count">待复习 ' + item.count + ' 题</span></a>').join('');
}

function syncBrowseUrl(mode) {
  const url = new URL(window.location.href);
  url.searchParams.set('browse', mode);
  window.history.replaceState(null, '', url.toString());
}

function updateBrowseMode(mode = currentBrowseMode, options = {}) {
  currentBrowseMode = mode === 'category' ? 'category' : 'year';
  const isCategory = currentBrowseMode === 'category';

  browseModeButtons.forEach((button) => {
    const active = button.dataset.browseMode === currentBrowseMode;
    button.classList.toggle('active', active);
    button.setAttribute('aria-selected', active ? 'true' : 'false');
  });

  introText.textContent = isCategory
    ? '✎ 練習する分類を選んでください'
    : '✎ 練習する年度を選んでください';
  randomRoot.hidden = isCategory;
  yearGrid.hidden = isCategory;
  categoryGrid.hidden = !isCategory;
  mistakeReview.hidden = isCategory;

  if (isCategory) {
    renderCategories();
  }

  if (options.syncUrl !== false) {
    syncBrowseUrl(currentBrowseMode);
  }
}

browseModeButtons.forEach((button) => {
  button.addEventListener('click', () => {
    updateBrowseMode(button.dataset.browseMode);
  });
});

categoryGrid.addEventListener('click', (event) => {
  const button = event.target.closest('.category-open-btn');
  if (!button) return;
  openCategorySetModal(button.dataset.categoryId);
});

categorySetModal.addEventListener('click', (event) => {
  if (event.target.closest('[data-close-category-modal]')) {
    closeCategorySetModal();
  }
});

document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape' && !categorySetModal.hidden) {
    closeCategorySetModal();
  }
});

renderYears();
renderReview();
if (window.ListeningRandomEntry) {
  window.ListeningRandomEntry.mount({
    mount: randomRoot,
    type: 'point_comprehension',
    level: 'N2'
  });
}
updateBrowseMode(currentBrowseMode, { syncUrl: false });
</script>
<script src="../../../../shared/back-navigation.js"></script>
<script>
if (typeof window.bindHierarchicalBack === 'function') {
  window.bindHierarchicalBack({ selector: '[data-back-nav]', fallback: '../../index.html' });
}
</script>
</body>
</html>
